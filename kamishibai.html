<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>紙芝居朗読「あばばばば」芥川龍之介</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --frame:#2a2118; --paper:#f3e9d3; --ink:#3a2f28; --accent:#c4552d; }
body { background:#241d15; color:#e8dcc8; font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
header { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:8px 16px;
  background:#1b1510; border-bottom:2px solid #4a3b28; font-family:-apple-system,"Hiragino Sans",sans-serif; }
header h1 { font-size:15px; font-weight:600; font-family:"Hiragino Mincho ProN",serif; letter-spacing:1px; }
header .sp { flex:1; }
button, select { background:#33291d; color:#e8dcc8; border:1px solid #5c4a32; border-radius:8px;
  padding:6px 13px; font-size:13px; cursor:pointer; font-family:inherit; }
button:hover { border-color:var(--accent); }
button.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
button:disabled { opacity:.4; cursor:default; }
label.tgl { font-size:12px; display:flex; align-items:center; gap:4px; color:#b8a888; }
input[type=range] { width:90px; accent-color:var(--accent); }
#counter { font-size:12px; color:#b8a888; }
#stagewrap { flex:1; display:flex; flex-direction:column; min-height:0; padding:12px 16px 8px; gap:10px; }
#stage { position:relative; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; }
#art { height:100%; max-width:100%; aspect-ratio:16/9; background:var(--paper);
  border:10px solid var(--frame); border-radius:4px; box-shadow:0 10px 40px rgba(0,0,0,.55);
  transition:opacity .35s; display:flex; }
#art svg { width:100%; height:100%; display:block; }
#art.fade { opacity:0; }
.navarrow { position:absolute; top:50%; transform:translateY(-50%); font-size:22px; padding:14px 12px;
  background:rgba(27,21,16,.75); border-radius:10px; z-index:5; }
#prev { left:6px; } #next { right:6px; }
#scenetitle { position:absolute; left:50%; transform:translateX(-50%); bottom:8px;
  background:rgba(27,21,16,.8); padding:4px 18px; border-radius:14px; font-size:13px; letter-spacing:2px; color:#e0cfa8; }
#text { height:30%; min-height:120px; overflow-y:auto; background:var(--paper); color:var(--ink);
  border-radius:6px; padding:16px 22px; line-height:2.1; font-size:17px; scroll-behavior:smooth; }
#text p { margin-bottom:.3em; min-height:1em; }
#text p.reading { background:#eeddb4; border-radius:4px; box-shadow:0 0 0 5px #eeddb4; }
ruby rt { font-size:.44em; color:#8a7a5c; }
body.noruby rt { display:none; }
#text .placeholder { color:#8a7a5c; text-align:center; margin-top:26px; font-size:14px; }
@media (max-width:720px) { #text { font-size:15px; } header { padding:6px 8px; gap:6px; } }
</style>
</head>
<body>
<header>
  <h1>紙芝居朗読　あばばばば</h1>
  <span id="counter"></span>
  <span class="sp"></span>
  <select id="voice" title="朗読の声"></select>
  <label class="tgl">速さ <input type="range" id="rate" min="0.6" max="1.3" step="0.05" value="0.85"></label>
  <label class="tgl">高さ <input type="range" id="pitch" min="0.5" max="1.2" step="0.05" value="0.8"></label>
  <label class="tgl">音量 <input type="range" id="vol" min="0" max="1" step="0.05" value="1"></label>
  <label class="tgl"><input type="checkbox" id="auto" checked> 自動でめくる</label>
  <label class="tgl"><input type="checkbox" id="ruby" checked> ルビ</label>
  <button id="play" class="primary">▶ 朗読開始</button>
  <button id="stop">■ 停止</button>
</header>
<div id="stagewrap">
  <div id="stage">
    <div id="art"></div>
    <button class="navarrow" id="prev">←</button>
    <button class="navarrow" id="next">→</button>
    <div id="scenetitle"></div>
  </div>
  <div id="text"></div>
</div>

\"96\" width=\"40\" height=\"34\" fill=\"#c4552d\" stroke=\"#3a2f28\" stroke-width=\"1\"/><rect x=\"340\" y=\"96\" width=\"40\" height=\"34\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1\"/><rect x=\"380\" y=\"96\" width=\"40\" height=\"34\" fill=\"#c4552d\" stroke=\"#3a2f28\" stroke-width=\"1\"/><rect x=\"420\" y=\"96\" width=\"40\" height=\"34\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1\"/><rect x=\"460\" y=\"96\" width=\"40\" height=\"34\" fill=\"#c4552d\" stroke=\"#3a2f28\" stroke-width=\"1\"/><rect x=\"500\" y=\"96\" width=\"40\" height=\"34\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1\"/><\/g>\n<path d=\"M60 130 h480\" stroke=\"#3a2f28\" stroke-width=\"2\"/>\n<rect x=\"82\" y=\"160\" width=\"170\" height=\"130\" fill=\"#e9f0f0\" stroke=\"#3a2f28\" stroke-width=\"2\"/>\n<g fill=\"#6b7d8c\">\n<polygon points=\"105,240 230,240 218,254 117,254\"/>\n<rect x=\"140\" y=\"222\" width=\"52\" height=\"18\" rx=\"2\"/>\n<line x1=\"150\" y1=\"222\" x2=\"150\" y2=\"200\" stroke=\"#6b7d8c\" stroke-width=\"3\"/>\n<line x1=\"182\" y1=\"222\" x2=\"182\" y2=\"206\" stroke=\"#6b7d8c\" stroke-width=\"3\"/>\n<\/g>\n<rect x=\"147\" y=\"197\" width=\"12\" height=\"7\" fill=\"#c4552d\"/>\n<rect x=\"98\" y=\"180\" width=\"14\" height=\"34\" fill=\"#7fa87a\"/><rect x=\"118\" y=\"172\" width=\"14\" height=\"42\" fill=\"#d9a441\"/>\n<rect x=\"210\" y=\"176\" width=\"20\" height=\"26\" fill=\"#c4552d\" rx=\"3\"/>\n<rect x=\"290\" y=\"160\" width=\"220\" height=\"220\" fill=\"#453626\"/>\n<rect x=\"300\" y=\"268\" width=\"200\" height=\"30\" fill=\"#8a5a33\"/>\n<rect x=\"300\" y=\"298\" width=\"200\" height=\"82\" fill=\"#6b4a2e\"/>\n<g>\n<circle cx=\"400\" cy=\"228\" r=\"26\" fill=\"#f2ddc2\"/>\n<path d=\"M374 218 q6 -18 26 -18 q20 0 26 18 l-6 6 q-8 -12 -20 -12 q-12 0 -20 12 z\" fill=\"#3a2f28\"/>\n<path d=\"M388 226 h10\" stroke=\"#3a2f28\" stroke-width=\"2.5\"/>\n<circle cx=\"411\" cy=\"226\" r=\"2.6\" fill=\"#3a2f28\"/>\n<path d=\"M392 243 q8 -5 16 0\" stroke=\"#3a2f28\" stroke-width=\"2\" fill=\"none\" transform=\"rotate(180 400 241)\"/>\n<path d=\"M368 268 q32 -18 64 0 v14 h-64 z\" fill=\"#33506e\"/>\n<\/g>\n<rect x=\"586\" y=\"90\" width=\"64\" height=\"190\" fill=\"#c4552d\" rx=\"4\"/>\n<text x=\"618\" y=\"118\" font-size=\"36\" fill=\"#f7f1e1\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" style=\"writing-mode:vertical-rl;text-orientation:upright\">たばこ<\/text>\n<g>\n<ellipse cx=\"700\" cy=\"428\" rx=\"52\" ry=\"9\" fill=\"#b8a583\"/>\n<polygon points=\"672,430 668,320 700,300 734,320 730,430\" fill=\"#2e3f52\"/>\n<circle cx=\"700\" cy=\"278\" r=\"24\" fill=\"#403225\"/>\n<ellipse cx=\"700\" cy=\"262\" rx=\"34\" ry=\"8\" fill=\"#3a2f28\"/>\n<path d=\"M684 250 a17 14 0 0 1 33 0 z\" fill=\"#3a2f28\"/>\n<\/g>\n<\/svg>", "paras": ["　<ruby>保吉<rt>やすきち<\/rt><\/ruby>はずつと<ruby>以前<rt>いぜん<\/rt><\/ruby>からこの<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>主人<rt>しゅじん<\/rt><\/ruby>を<ruby>見知<rt>みし<\/rt><\/ruby>つてゐる。", "　ずつと<ruby>以前<rt>いぜん<\/rt><\/ruby>から、――<ruby>或<rt>ある<\/rt><\/ruby>いはあの<ruby>海軍<rt>かいぐん<\/rt><\/ruby>の<ruby>学校<rt>がっこう<\/rt><\/ruby>へ<ruby>赴任<rt>ふにん<\/rt><\/ruby>した<ruby>当日<rt>とうじつ<\/rt><\/ruby>だつたかも<ruby>知<rt>し<\/rt><\/ruby>れない。<ruby>彼<rt>かれ<\/rt><\/ruby>はふとこの<ruby>店<rt>みせ<\/rt><\/ruby>へマツチを<ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>買<rt>か<\/rt><\/ruby>ひにはひつた。<ruby>店<rt>みせ<\/rt><\/ruby>には<ruby>小<rt>ちい<\/rt><\/ruby>さい飾り<ruby>窓<rt>かざりまど<\/rt><\/ruby>があり、<ruby>窓<rt>まど<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>には<ruby>大将旗<rt>たいしょうき<\/rt><\/ruby>を<ruby>掲<rt>かか<\/rt><\/ruby>げた<ruby>軍艦<rt>ぐんかん<\/rt><\/ruby><ruby>三笠<rt>みかさ<\/rt><\/ruby>の<ruby>模型<rt>もけい<\/rt><\/ruby>のまはりにキユラソオの<ruby>壜<rt>びん<\/rt><\/ruby>だのココアの<ruby>罐<rt>かん<\/rt><\/ruby>だの<ruby>干<rt>ほ<\/rt><\/ruby>し<ruby>葡萄<rt>ぶだう<\/rt><\/ruby>の<ruby>箱<rt>はこ<\/rt><\/ruby>だのが<ruby>並<rt>なら<\/rt><\/ruby>べてある。が、<ruby>軒先<rt>のきさき<\/rt><\/ruby>に「たばこ」と<ruby>抜<rt>ぬ<\/rt><\/ruby>いた<ruby>赤塗<rt>あかぬ<\/rt><\/ruby>りの<ruby>看板<rt>かんばん<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>てゐるから、<ruby>勿論<rt>もちろん<\/rt><\/ruby>マツチも<ruby>売<rt>う<\/rt><\/ruby>らない<ruby>筈<rt>はず<\/rt><\/ruby>はない。<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>店<rt>みせ<\/rt><\/ruby>を<ruby>覗<rt>のぞ<\/rt><\/ruby>きこみながら、「マツチを<ruby>一<rt>ひと<\/rt><\/ruby>つくれ<ruby>給<rt>たま<\/rt><\/ruby>へ」と<ruby>云<rt>い<\/rt><\/ruby>つた。<ruby>店先<rt>みせさき<\/rt><\/ruby>には<ruby>高<rt>たか<\/rt><\/ruby>い<ruby>勘定台<rt>かんぢやうだい<\/rt><\/ruby>の<ruby>後<rt>うし<\/rt><\/ruby>ろに<ruby>若<rt>わか<\/rt><\/ruby>い<ruby>眇<rt>すがめ<\/rt><\/ruby>の<ruby>男<rt>おとこ<\/rt><\/ruby>が<ruby>一人<rt>ひとり<\/rt><\/ruby>、つまらなさうに<ruby>佇<rt>たたず<\/rt><\/ruby>んでゐる。それが<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>算盤<rt>そろばん<\/rt><\/ruby>を<ruby>竪<rt>たて<\/rt><\/ruby>に<ruby>構<rt>かま<\/rt><\/ruby>へたまま、にこりともせずに<ruby>返事<rt>へんじ<\/rt><\/ruby>をした。", "「これをお<ruby>持<rt>も<\/rt><\/ruby>ちなさい。<ruby>生憎<rt>あいにく<\/rt><\/ruby>マツチを<ruby>切<rt>き<\/rt><\/ruby>らしましたから。」", "　お<ruby>持<rt>も<\/rt><\/ruby>ちなさいと<ruby>云<rt>い<\/rt><\/ruby>ふのは<ruby>煙草<rt>たばこ<\/rt><\/ruby>に添へる<ruby>一番<rt>いちばん<\/rt><\/ruby><ruby>小型<rt>こがた<\/rt><\/ruby>のマツチである。", "「<ruby>貰<rt>もら<\/rt><\/ruby>ふのは気の<ruby>毒<rt>きのどく<\/rt><\/ruby>だ。ぢや<ruby>朝日<rt>あさひ<\/rt><\/ruby>を<ruby>一<rt>ひと<\/rt><\/ruby>つくれ<ruby>給<rt>たま<\/rt><\/ruby>へ。」", "「<ruby>何<rt>なん<\/rt><\/ruby>、かまひません。お<ruby>持<rt>も<\/rt><\/ruby>ちなさい。」", "「いや、まあ<ruby>朝日<rt>あさひ<\/rt><\/ruby>をくれ<ruby>給<rt>たま<\/rt><\/ruby>へ。」", "「お<ruby>持<rt>も<\/rt><\/ruby>ちなさい。これでよろしけりや、――<ruby>入<rt>はい<\/rt><\/ruby>らぬ<ruby>物<rt>もの<\/rt><\/ruby>をお<ruby>買<rt>か<\/rt><\/ruby>ひになるには<ruby>及<rt>およ<\/rt><\/ruby>ばないです。」", "　<ruby>眇<rt>すがめ<\/rt><\/ruby>の<ruby>男<rt>おとこ<\/rt><\/ruby>の<ruby>云<rt>い<\/rt><\/ruby>ふことは<ruby>親切<rt>しんせつ<\/rt><\/ruby>づくなのには違ひ（ちがい）ない。が、その<ruby>声<rt>こえ<\/rt><\/ruby>や<ruby>顔色<rt>かおいろ<\/rt><\/ruby>は<ruby>如何<rt>いか<\/rt><\/ruby>にも<ruby>無愛想<rt>ぶあいそう<\/rt><\/ruby>を<ruby>極<rt>きわ<\/rt><\/ruby>めてゐる。<ruby>素直<rt>すなお<\/rt><\/ruby>に<ruby>貰<rt>もら<\/rt><\/ruby>ふのは<ruby>忌<rt>いま<\/rt><\/ruby>いましい。と<ruby>云<rt>い<\/rt><\/ruby>つて<ruby>店<rt>みせ<\/rt><\/ruby>を飛び<ruby>出<rt>とびだ<\/rt><\/ruby>すのは<ruby>多少<rt>たしょう<\/rt><\/ruby><ruby>相手<rt>あいて<\/rt><\/ruby>に気の<ruby>毒<rt>きのどく<\/rt><\/ruby>である。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はやむを<ruby>得<rt>え<\/rt><\/ruby>ず<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>へ<ruby>一<rt>いち<\/rt><\/ruby><ruby>銭<rt>せん<\/rt><\/ruby>の<ruby>銅貨<rt>どうか<\/rt><\/ruby>を<ruby>一<rt>いち<\/rt><\/ruby><ruby>枚<rt>まい<\/rt><\/ruby><ruby>出<rt>だ<\/rt><\/ruby>した。"], "speech": ["やすきちは、ずっと以前からこの店の主人を見知っている。", "ずっと以前から、――あるいは、あの海軍の学校へ赴任した当日だったかもしれない。彼はふとこの店へ、マッチをひとつ買いにはいった。店には小さい飾り窓があり、窓の中には、大将旗をかかげた軍艦みかさの模型のまわりに、キュラソーの瓶だの、ココアの缶だの、干しぶどうの箱だのが並べてある。が、軒先に「たばこ」と抜いた赤塗りの看板が出ているから、もちろんマッチも売らないはずはない。彼は店をのぞきこみながら、「マッチをひとつくれたまえ」と言った。店先には、高い勘定台の後ろに、若いすがめの男がひとり、つまらなそうにたたずんでいる。それが彼の顔を見ると、そろばんを縦にかまえたまま、にこりともせずに返事をした。", "「これをお持ちなさい。あいにくマッチを切らしましたから。」", "お持ちなさいと言うのは、たばこに添える、いちばん小型のマッチである。", "「もらうのは気の毒だ。じゃ、朝日をひとつくれたまえ。」", "「なに、かまいません。お持ちなさい。」", "「いや、まあ朝日をくれたまえ。」", "「お持ちなさい。これでよろしけりゃ、――いらぬものをお買いになるには及ばないです。」", "すがめの男の言うことは、親切づくなのには違いない。が、その声や顔色は、いかにも無愛想をきわめている。素直にもらうのは、いまいましい。と言って、店を飛び出すのは、多少相手に気の毒である。やすきちは、やむをえず、勘定台の上へ一銭の銅貨を一枚出した。"]}, {"title": "マッチの美しさ", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#f3e9d3\"/>\n<circle cx=\"400\" cy=\"225\" r=\"200\" fill=\"#f7f1e1\" opacity=\".7\"/>\n<g transform=\"translate(390 225) rotate(-6)\">\n<rect x=\"-185\" y=\"-120\" width=\"370\" height=\"240\" fill=\"#f7f1e1\" stroke=\"#c4552d\" stroke-width=\"7\"/>\n<rect x=\"-168\" y=\"-103\" width=\"336\" height=\"206\" fill=\"none\" stroke=\"#33506e\" stroke-width=\"2\"/>\n<g fill=\"#33506e\"><polygon points=\"-150,95 -125,60 -100,95\"/><polygon points=\"-100,95 -75,60 -50,95\"/><polygon points=\"-50,95 -25,60 0,95\"/><polygon points=\"0,95 25,60 50,95\"/><polygon points=\"50,95 75,60 100,95\"/><polygon points=\"100,95 125,60 150,95\"/><\/g>\n<polygon points=\"-60,52 60,52 40,74 -40,74\" fill=\"#26364a\"/>\n<polygon points=\"-6,48 -6,-58 -64,40 z\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"2\"/>\n<polygon points=\"8,48 8,-70 74,42 z\" fill=\"#e8d9b8\" stroke=\"#3a2f28\" stroke-width=\"2\"/>\n<line x1=\"2\" y1=\"52\" x2=\"2\" y2=\"-76\" stroke=\"#3a2f28\" stroke-width=\"3\"/>\n<polygon points=\"2,-76 2,-58 30,-67\" fill=\"#c4552d\"/>\n<text x=\"0\" y=\"-86\" font-size=\"24\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"6\">帆前船印<\/text>\n<text x=\"0\" y=\"112\" font-size=\"14\" fill=\"#33506e\" text-anchor=\"middle\" font-family=\"serif\" letter-spacing=\"3\">SAFETY MATCHES<\/text>\n<\/g>\n<g transform=\"translate(120 380) rotate(12)\"><rect width=\"70\" height=\"8\" fill=\"#e0c9a0\" rx=\"3\"/><circle cx=\"70\" cy=\"4\" r=\"7\" fill=\"#c4552d\"/><\/g>\n<g transform=\"translate(180 400) rotate(-8)\"><rect width=\"70\" height=\"8\" fill=\"#e0c9a0\" rx=\"3\"/><circle cx=\"70\" cy=\"4\" r=\"7\" fill=\"#c4552d\"/><\/g>\n<rect x=\"660\" y=\"60\" width=\"90\" height=\"250\" fill=\"#d9a441\" opacity=\".9\"/>\n<text x=\"705\" y=\"86\" font-size=\"26\" fill=\"#33506e\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" style=\"writing-mode:vertical-rl;text-orientation:upright\" letter-spacing=\"4\">金線サイダア<\/text>\n<g>\n<circle cx=\"648\" cy=\"360\" r=\"30\" fill=\"#f2ddc2\"/>\n<path d=\"M620 350 q4 -22 28 -22 q24 0 28 22 l-8 4 q-6 -12 -20 -12 q-14 0 -20 12 z\" fill=\"#3a2f28\"/>\n<circle cx=\"638\" cy=\"358\" r=\"3\" fill=\"#3a2f28\"/><circle cx=\"660\" cy=\"358\" r=\"3\" fill=\"#3a2f28\"/>\n<ellipse cx=\"649\" cy=\"372\" rx=\"5\" ry=\"3.4\" fill=\"none\" stroke=\"#3a2f28\" stroke-width=\"1.8\"/>\n<circle cx=\"628\" cy=\"368\" r=\"2\" fill=\"#c4552d\" opacity=\".7\"/><circle cx=\"668\" cy=\"366\" r=\"2\" fill=\"#c4552d\" opacity=\".7\"/><circle cx=\"634\" cy=\"345\" r=\"2\" fill=\"#c4552d\" opacity=\".7\"/>\n<\/g>\n<\/svg>", "paras": ["「ぢやそのマツチを<ruby>二<rt>ふた<\/rt><\/ruby>つくれ<ruby>給<rt>たま<\/rt><\/ruby>へ。」", "「<ruby>二<rt>ふた<\/rt><\/ruby>つでも<ruby>三<rt>みっ<\/rt><\/ruby>つでもお<ruby>持<rt>も<\/rt><\/ruby>ちなさい。ですが<ruby>代<rt>だい<\/rt><\/ruby>は<ruby>入<rt>はい<\/rt><\/ruby>りません。」", "　<ruby>其処<rt>そこ<\/rt><\/ruby>へ<ruby>幸<rt>さいわい<\/rt><\/ruby>ひ<ruby>戸口<rt>とぐち<\/rt><\/ruby>に<ruby>下<rt>さ<\/rt><\/ruby>げた<ruby>金線<rt>きんせん<\/rt><\/ruby>サイダアのポスタアの<ruby>蔭<rt>かげ<\/rt><\/ruby>から、<ruby>小僧<rt>こぞう<\/rt><\/ruby>が<ruby>一人<rt>ひとり<\/rt><\/ruby><ruby>首<rt>くび<\/rt><\/ruby>を<ruby>出<rt>だ<\/rt><\/ruby>した。これは<ruby>表情<rt>ひょうじょう<\/rt><\/ruby>の<ruby>朦朧<rt>もうろう<\/rt><\/ruby>とした、<ruby>面皰<rt>にきび<\/rt><\/ruby>だらけの<ruby>小僧<rt>こぞう<\/rt><\/ruby>である。", "「<ruby>檀那<rt>だんな<\/rt><\/ruby>、マツチは<ruby>此処<rt>ここ<\/rt><\/ruby>にありますぜ。」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>内心<rt>ないしん<\/rt><\/ruby><ruby>凱歌<rt>がいか<\/rt><\/ruby>を<ruby>挙<rt>あ<\/rt><\/ruby>げながら、<ruby>大型<rt>おおがた<\/rt><\/ruby>のマツチを<ruby>一<rt>ひと<\/rt><\/ruby><ruby>箱<rt>ばこ<\/rt><\/ruby><ruby>買<rt>か<\/rt><\/ruby>つた。<ruby>代<rt>だい<\/rt><\/ruby>は<ruby>勿論<rt>もちろん<\/rt><\/ruby><ruby>一<rt>いち<\/rt><\/ruby><ruby>銭<rt>せん<\/rt><\/ruby>である。しかし<ruby>彼<rt>かれ<\/rt><\/ruby>はこの<ruby>時<rt>とき<\/rt><\/ruby>ほど、マツチの<ruby>美<rt>うつく<\/rt><\/ruby>しさを<ruby>感<rt>かん<\/rt><\/ruby>じたことはない。<ruby>殊<rt>こと<\/rt><\/ruby>に<ruby>三角<rt>さんかく<\/rt><\/ruby>の<ruby>波<rt>なみ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>帆前船<rt>ほまへせん<\/rt><\/ruby>を<ruby>浮<rt>うか<\/rt><\/ruby>べた<ruby>商標<rt>しょうひょう<\/rt><\/ruby>は<ruby>額縁<rt>がくぶち<\/rt><\/ruby>へ<ruby>入<rt>い<\/rt><\/ruby>れても<ruby>好<rt>い<\/rt><\/ruby>い<ruby>位<rt>くらい<\/rt><\/ruby>である。<ruby>彼<rt>かれ<\/rt><\/ruby>はズボンのポケツトの<ruby>底<rt>そこ<\/rt><\/ruby>へちやんとそのマツチを<ruby>落<rt>おと<\/rt><\/ruby>した<ruby>後<rt>あと<\/rt><\/ruby>、<ruby>得々<rt>とくとく<\/rt><\/ruby>とこの<ruby>店<rt>みせ<\/rt><\/ruby>を<ruby>後<rt>うし<\/rt><\/ruby>ろにした。……"], "speech": ["「じゃ、そのマッチを二つくれたまえ。」", "「二つでも三つでもお持ちなさい。ですが、代はいりません。」", "そこへさいわい、戸口に下げた、金線サイダーのポスターの陰から、小僧がひとり、首を出した。これは表情のもうろうとした、にきびだらけの小僧である。", "「だんな、マッチはここにありますぜ。」", "やすきちは内心がいかをあげながら、大型のマッチをひとはこ買った。代はもちろん一銭である。しかし彼は、この時ほど、マッチの美しさを感じたことはない。ことに、三角の波の上に、ほまえせんを浮かべた商標は、額縁へ入れてもいいくらいである。彼はズボンのポケットの底へ、ちゃんとそのマッチを落とした後、とくとくと、この店を後ろにした。……"]}, {"title": "見慣れた店", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#efe3c8\"/>\n<rect width=\"800\" height=\"30\" fill=\"#6b4a2e\"/>\n<g><rect x=\"420\" y=\"34\" width=\"52\" height=\"34\" fill=\"#7fa87a\" stroke=\"#6b4a2e\" stroke-width=\"2\"/><rect x=\"482\" y=\"34\" width=\"52\" height=\"34\" fill=\"#a8c8a0\" stroke=\"#6b4a2e\" stroke-width=\"2\"/><rect x=\"544\" y=\"34\" width=\"52\" height=\"34\" fill=\"#7fa87a\" stroke=\"#6b4a2e\" stroke-width=\"2\"/><rect x=\"606\" y=\"34\" width=\"52\" height=\"34\" fill=\"#a8c8a0\" stroke=\"#6b4a2e\" stroke-width=\"2\"/><rect x=\"668\" y=\"34\" width=\"52\" height=\"34\" fill=\"#7fa87a\" stroke=\"#6b4a2e\" stroke-width=\"2\"/><rect x=\"730\" y=\"34\" width=\"52\" height=\"34\" fill=\"#a8c8a0\" stroke=\"#6b4a2e\" stroke-width=\"2\"/><\/g>\n<polygon points=\"430,68 790,68 700,240 340,240\" fill=\"#7fa87a\" opacity=\".22\"/>\n<line x1=\"190\" y1=\"30\" x2=\"190\" y2=\"80\" stroke=\"#7a6248\" stroke-width=\"4\"/>\n<ellipse cx=\"190\" cy=\"128\" rx=\"40\" ry=\"52\" fill=\"#c07a56\"/>\n<ellipse cx=\"178\" cy=\"112\" rx=\"10\" ry=\"18\" fill=\"#d99a76\" opacity=\".8\"/>\n<path d=\"M160 100 q30 -14 60 0 M156 128 q34 -12 68 0 M162 156 q28 -10 56 0\" stroke=\"#8a4f34\" stroke-width=\"2\" fill=\"none\"/>\n<rect x=\"470\" y=\"90\" width=\"46\" height=\"330\" fill=\"#8a5a33\"/>\n<circle cx=\"493\" cy=\"140\" r=\"26\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"3\"/>\n<line x1=\"493\" y1=\"140\" x2=\"493\" y2=\"122\" stroke=\"#3a2f28\" stroke-width=\"2.5\"/>\n<line x1=\"493\" y1=\"140\" x2=\"505\" y2=\"146\" stroke=\"#3a2f28\" stroke-width=\"2.5\"/>\n<rect x=\"474\" y=\"188\" width=\"38\" height=\"60\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1.5\"/>\n<text x=\"493\" y=\"218\" font-size=\"22\" fill=\"#c4552d\" text-anchor=\"middle\" font-family=\"serif\">15<\/text>\n<line x1=\"478\" y1=\"228\" x2=\"508\" y2=\"228\" stroke=\"#3a2f28\" stroke-width=\"1\"/><line x1=\"478\" y1=\"236\" x2=\"508\" y2=\"236\" stroke=\"#3a2f28\" stroke-width=\"1\"/>\n<g>\n<rect x=\"60\" y=\"210\" width=\"300\" height=\"10\" fill=\"#6b4a2e\"/><rect x=\"60\" y=\"300\" width=\"300\" height=\"10\" fill=\"#6b4a2e\"/>\n<rect x=\"80\" y=\"168\" width=\"26\" height=\"42\" fill=\"#c4552d\" rx=\"2\"/><rect x=\"114\" y=\"168\" width=\"26\" height=\"42\" fill=\"#c4552d\" rx=\"2\"/>\n<rect x=\"150\" y=\"162\" width=\"30\" height=\"48\" fill=\"#f7f1e1\" stroke=\"#33506e\" stroke-width=\"2\" rx=\"2\"/>\n<path d=\"M158 196 a7 9 0 0 1 14 0 z M160 186 a5 5 0 0 1 10 0 v4 h-10 z\" fill=\"#33506e\"/>\n<rect x=\"192\" y=\"158\" width=\"16\" height=\"52\" fill=\"#5f7d4f\"/><rect x=\"214\" y=\"158\" width=\"16\" height=\"52\" fill=\"#d9a441\"/>\n<rect x=\"246\" y=\"170\" width=\"40\" height=\"40\" fill=\"#b8894a\" rx=\"3\"/>\n<rect x=\"86\" y=\"258\" width=\"34\" height=\"42\" fill=\"#33506e\" rx=\"2\"/><rect x=\"128\" y=\"258\" width=\"34\" height=\"42\" fill=\"#9c5a3c\" rx=\"2\"/>\n<rect x=\"170\" y=\"252\" width=\"18\" height=\"48\" fill=\"#43604a\"/><rect x=\"196\" y=\"252\" width=\"18\" height=\"48\" fill=\"#43604a\"/>\n<rect x=\"228\" y=\"262\" width=\"52\" height=\"38\" fill=\"#f7f1e1\" stroke=\"#c4552d\" stroke-width=\"2\"/>\n<\/g>\n<g stroke=\"#3a2f28\" stroke-width=\"4\" fill=\"none\">\n<circle cx=\"640\" cy=\"376\" r=\"44\"/><circle cx=\"758\" cy=\"376\" r=\"44\"/>\n<path d=\"M640 376 L688 306 L740 306 M688 306 L712 376 M640 376 L676 376\"/>\n<path d=\"M672 300 h30\" stroke-width=\"5\"/>\n<\/g>\n<g><line x1=\"0\" y1=\"330\" x2=\"800\" y2=\"330\" stroke=\"#dbc9a2\" stroke-width=\"2\"/><line x1=\"0\" y1=\"354\" x2=\"800\" y2=\"354\" stroke=\"#dbc9a2\" stroke-width=\"2\"/><line x1=\"0\" y1=\"378\" x2=\"800\" y2=\"378\" stroke=\"#dbc9a2\" stroke-width=\"2\"/><line x1=\"0\" y1=\"402\" x2=\"800\" y2=\"402\" stroke=\"#dbc9a2\" stroke-width=\"2\"/><line x1=\"0\" y1=\"426\" x2=\"800\" y2=\"426\" stroke=\"#dbc9a2\" stroke-width=\"2\"/><\/g>\n<rect x=\"120\" y=\"356\" width=\"80\" height=\"40\" fill=\"#f7f1e1\" stroke=\"#c9b489\" transform=\"rotate(-8 160 376)\"/>\n<rect x=\"240\" y=\"386\" width=\"76\" height=\"38\" fill=\"#f7f1e1\" stroke=\"#c9b489\" transform=\"rotate(6 278 405)\"/>\n<text x=\"160\" y=\"382\" font-size=\"10\" fill=\"#33506e\" text-anchor=\"middle\" transform=\"rotate(-8 160 376)\" font-family=\"serif\">MILK<\/text>\n<\/svg>", "paras": ["　<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>爾来<rt>じらい<\/rt><\/ruby><ruby>半年<rt>はんとし<\/rt><\/ruby>ばかり、<ruby>学校<rt>がっこう<\/rt><\/ruby>へ<ruby>通<rt>かよ<\/rt><\/ruby>ふ<ruby>往復<rt>おうふく<\/rt><\/ruby>に<ruby>度<rt>たび<\/rt><\/ruby>たびこの<ruby>店<rt>みせ<\/rt><\/ruby>へ<ruby>買<rt>か<\/rt><\/ruby>ひ<ruby>物<rt>もの<\/rt><\/ruby>に<ruby>寄<rt>よ<\/rt><\/ruby>つた。もう<ruby>今<rt>いま<\/rt><\/ruby>では<ruby>目<rt>め<\/rt><\/ruby>をつぶつても、はつきりこの<ruby>店<rt>みせ<\/rt><\/ruby>を思ひ<ruby>出<rt>おもひだ<\/rt><\/ruby>すことが<ruby>出来<rt>でき<\/rt><\/ruby>る。<ruby>天井<rt>てんじょう<\/rt><\/ruby>の<ruby>梁<rt>はり<\/rt><\/ruby>からぶら<ruby>下<rt>した<\/rt><\/ruby>つたのは<ruby>鎌倉<rt>かまくら<\/rt><\/ruby>のハムに違ひ（ちがい）ない。<ruby>欄間<rt>らんま<\/rt><\/ruby>の<ruby>色硝子<rt>いろガラス<\/rt><\/ruby>は<ruby>漆喰<rt>しつくひ<\/rt><\/ruby><ruby>塗<rt>ぬ<\/rt><\/ruby>りの<ruby>壁<rt>かべ<\/rt><\/ruby>へ<ruby>緑色<rt>みどりいろ<\/rt><\/ruby>の<ruby>日<rt>ひ<\/rt><\/ruby>の<ruby>光<rt>ひかり<\/rt><\/ruby>を<ruby>映<rt>うつ<\/rt><\/ruby>してゐる。<ruby>板張<rt>いたば<\/rt><\/ruby>りの<ruby>床<rt>ゆか<\/rt><\/ruby>に<ruby>散<rt>ち<\/rt><\/ruby>らかつたのはコンデンスド・ミルクの<ruby>広告<rt>こうこく<\/rt><\/ruby>であらう。<ruby>正面<rt>しょうめん<\/rt><\/ruby>の<ruby>柱<rt>はしら<\/rt><\/ruby>には<ruby>時計<rt>とけい<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>に<ruby>大<rt>おお<\/rt><\/ruby>きい<ruby>日暦<rt>ひごよみ<\/rt><\/ruby>がかかつてゐる。その<ruby>外<rt>ほか<\/rt><\/ruby>飾り<ruby>窓<rt>かざりまど<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>軍艦<rt>ぐんかん<\/rt><\/ruby><ruby>三笠<rt>みかさ<\/rt><\/ruby>も、<ruby>金線<rt>きんせん<\/rt><\/ruby>サイダアのポスタアも、<ruby>椅子<rt>いす<\/rt><\/ruby>も、<ruby>電話<rt>でんわ<\/rt><\/ruby>も、<ruby>自転車<rt>じてんしゃ<\/rt><\/ruby>も、スコツトランドのウイスキイも、アメリカの<ruby>乾<rt>ほ<\/rt><\/ruby>し<ruby>葡萄<rt>ぶだう<\/rt><\/ruby>も、マニラの<ruby>葉巻<rt>はまき<\/rt><\/ruby>も、エヂプトの<ruby>紙巻<rt>かみまき<\/rt><\/ruby>も、<ruby>燻製<rt>くんせい<\/rt><\/ruby>の<ruby>鰊<rt>にしん<\/rt><\/ruby>も、<ruby>牛肉<rt>ぎゅうにく<\/rt><\/ruby>の<ruby>大和煮<rt>やまとに<\/rt><\/ruby>も、<ruby>殆<rt>ほとん<\/rt><\/ruby>ど<ruby>見覚<rt>みおぼ<\/rt><\/ruby>えのないものはない。<ruby>殊<rt>こと<\/rt><\/ruby>に<ruby>高<rt>たか<\/rt><\/ruby>い<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>後<rt>うし<\/rt><\/ruby>ろに<ruby>仏頂面<rt>ぶつちやうづら<\/rt><\/ruby>を<ruby>曝<rt>さら<\/rt><\/ruby>した<ruby>主人<rt>しゅじん<\/rt><\/ruby>は飽き<ruby>飽<rt>あきあ<\/rt><\/ruby>きするほど<ruby>見<rt>み<\/rt><\/ruby><ruby>慣<rt>な<\/rt><\/ruby>れてゐる。いや、<ruby>見<rt>み<\/rt><\/ruby><ruby>慣<rt>な<\/rt><\/ruby>れてゐるばかりではない。<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>如何<rt>いか<\/rt><\/ruby>に<ruby>咳<rt>せき<\/rt><\/ruby>をするか、<ruby>如何<rt>いか<\/rt><\/ruby>に<ruby>小僧<rt>こぞう<\/rt><\/ruby>に<ruby>命令<rt>めいれい<\/rt><\/ruby>をするか、ココアを<ruby>一<rt>いち<\/rt><\/ruby><ruby>罐<rt>かん<\/rt><\/ruby><ruby>買<rt>か<\/rt><\/ruby>ふにしても、「Fry よりはこちらになさい。これはオランダの Droste です」などと、<ruby>如何<rt>いか<\/rt><\/ruby>に<ruby>客<rt>きゃく<\/rt><\/ruby>を<ruby>悩<rt>なや<\/rt><\/ruby>ませるか、――<ruby>主人<rt>しゅじん<\/rt><\/ruby>の<ruby>一挙一動<rt>いっきょいちどう<\/rt><\/ruby>さへ<ruby>悉<rt>ことごと<\/rt><\/ruby>くとうに<ruby>心得<rt>こころえ<\/rt><\/ruby>てゐる。<ruby>心得<rt>こころえ<\/rt><\/ruby>てゐるのは<ruby>悪<rt>わる<\/rt><\/ruby>いことではない。しかし<ruby>退屈<rt>たいくつ<\/rt><\/ruby>なことは<ruby>事実<rt>じじつ<\/rt><\/ruby>である。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>時々<rt>ときどき<\/rt><\/ruby>この<ruby>店<rt>みせ<\/rt><\/ruby>へ<ruby>来<rt>く<\/rt><\/ruby>ると、<ruby>妙<rt>みょう<\/rt><\/ruby>に<ruby>教師<rt>きょうし<\/rt><\/ruby>をしてゐるのも<ruby>久<rt>ひさ<\/rt><\/ruby>しいものだなと<ruby>考<rt>かんが<\/rt><\/ruby>へたりした。（その<ruby>癖<rt>くせ<\/rt><\/ruby><ruby>前<rt>まえ<\/rt><\/ruby>にも<ruby>云<rt>い<\/rt><\/ruby>つた<ruby>通<rt>とお<\/rt><\/ruby>り、<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>教師<rt>きょうし<\/rt><\/ruby>の<ruby>生活<rt>せいかつ<\/rt><\/ruby>はまだ<ruby>一<rt>いち<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>にもならなかつたのである！）"], "speech": ["やすきちはじらい半年ばかり、学校へかよう往復に、たびたびこの店へ買い物に寄った。もう今では、目をつぶっても、はっきりこの店を思い出すことができる。天井の梁からぶら下がったのは、鎌倉のハムに違いない。らんまの色ガラスは、しっくい塗りの壁へ、緑色の日の光を映している。板張りの床に散らかったのは、コンデンスド・ミルクの広告であろう。正面の柱には、時計の下に、大きい日ごよみがかかっている。そのほか、飾り窓の中の軍艦みかさも、金線サイダーのポスターも、椅子も、電話も、自転車も、スコットランドのウイスキーも、アメリカの干しぶどうも、マニラの葉巻も、エジプトの紙巻も、くんせいのにしんも、牛肉のやまとにも、ほとんど見覚えのないものはない。ことに、高い勘定台の後ろに、ぶっちょうづらをさらした主人は、飽き飽きするほど見慣れている。いや、見慣れているばかりではない。彼はいかにせきをするか、いかに小僧に命令をするか、ココアをひとかん買うにしても、「フライよりはこちらになさい。これはオランダのドロステです」などと、いかに客を悩ませるか、――主人の一挙一動さえ、ことごとく、とうに心得ている。心得ているのは悪いことではない。しかし、退屈なことは事実である。やすきちは時々この店へ来ると、妙に、教師をしているのも久しいものだな、と考えたりした。そのくせ前にも言った通り、彼の教師の生活は、まだ一年にもならなかったのである！"]}, {"title": "白猫に似た人", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#f6ecd8\"/>\n<polygon points=\"0,0 240,0 90,450 0,450\" fill=\"#d9a441\" opacity=\".18\"/>\n<polygon points=\"180,0 320,0 200,450 100,450\" fill=\"#d9a441\" opacity=\".12\"/>\n<rect x=\"180\" y=\"266\" width=\"440\" height=\"184\" fill=\"#8a5a33\"/>\n<rect x=\"180\" y=\"258\" width=\"440\" height=\"14\" fill=\"#6b4a2e\"/>\n<g stroke=\"#6b4a2e\" stroke-width=\"3\"><line x1=\"220\" y1=\"286\" x2=\"220\" y2=\"436\"/><line x1=\"310\" y1=\"286\" x2=\"310\" y2=\"436\"/><line x1=\"400\" y1=\"286\" x2=\"400\" y2=\"436\"/><line x1=\"490\" y1=\"286\" x2=\"490\" y2=\"436\"/><line x1=\"580\" y1=\"286\" x2=\"580\" y2=\"436\"/><\/g>\n<g>\n<path d=\"M330 258 q10 -60 70 -62 q60 2 70 62 z\" fill=\"#6e8fae\"/>\n<path d=\"M382 210 l18 0 l12 48 h-42 z\" fill=\"#f7f1e1\"/>\n<circle cx=\"400\" cy=\"164\" r=\"44\" fill=\"#f2ddc2\"/>\n<path d=\"M356 156 q-4 -46 44 -48 q48 2 44 48 q-2 -8 -10 -12 q4 -22 -34 -22 q-38 0 -34 22 q-8 4 -10 12 z\" fill=\"#2e2620\"/>\n<ellipse cx=\"400\" cy=\"112\" rx=\"26\" ry=\"16\" fill=\"#2e2620\"/>\n<ellipse cx=\"357\" cy=\"150\" rx=\"9\" ry=\"16\" fill=\"#2e2620\"/><ellipse cx=\"443\" cy=\"150\" rx=\"9\" ry=\"16\" fill=\"#2e2620\"/>\n<path d=\"M376 168 q7 -6 14 0\" stroke=\"#3a2f28\" stroke-width=\"2.4\" fill=\"none\"/>\n<path d=\"M410 168 q7 -6 14 0\" stroke=\"#3a2f28\" stroke-width=\"2.4\" fill=\"none\"/>\n<circle cx=\"372\" cy=\"182\" r=\"7\" fill=\"#e8 法<rt>ばんぽう<\/rt><\/ruby>を<ruby>支配<rt>しはい<\/rt><\/ruby>する<ruby>変化<rt>へんか<\/rt><\/ruby>はやはりこの<ruby>店<rt>みせ<\/rt><\/ruby>にも<ruby>起<rt>おこ<\/rt><\/ruby>らずにはすまない。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>或<rt>ある<\/rt><\/ruby><ruby>初夏<rt>しょか<\/rt><\/ruby>の<ruby>朝<rt>あさ<\/rt><\/ruby>、この<ruby>店<rt>みせ<\/rt><\/ruby>へ<ruby>煙草<rt>たばこ<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>ひにはひつた。<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>はふだんの<ruby>通<rt>とお<\/rt><\/ruby>りである。<ruby>水<rt>みず<\/rt><\/ruby>を<ruby>撒<rt>ま<\/rt><\/ruby>つた<ruby>床<rt>ゆか<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>にコンデンスド・ミルクの<ruby>広告<rt>こうこく<\/rt><\/ruby>の<ruby>散<rt>ち<\/rt><\/ruby>らかつてゐることも<ruby>変<rt>かわ<\/rt><\/ruby>りはない。が、あの<ruby>眇<rt>すがめ<\/rt><\/ruby>の<ruby>主人<rt>しゅじん<\/rt><\/ruby>の<ruby>代<rt>かわ<\/rt><\/ruby>りに<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>後<rt>うし<\/rt><\/ruby>ろに<ruby>坐<rt>すわ<\/rt><\/ruby>つてゐるのは<ruby>西洋髪<rt>せいようがみ<\/rt><\/ruby>に<ruby>結<rt>ゆ<\/rt><\/ruby>つた<ruby>女<rt>おんな<\/rt><\/ruby>である。<ruby>年<rt>とし<\/rt><\/ruby>はやつと<ruby>十九<rt>じゅうきゅう<\/rt><\/ruby><ruby>位<rt>くらい<\/rt><\/ruby>であらう。En face に<ruby>見<rt>み<\/rt><\/ruby>た<ruby>顔<rt>かお<\/rt><\/ruby>は<ruby>猫<rt>ねこ<\/rt><\/ruby>に<ruby>似<rt>に<\/rt><\/ruby>てゐる。<ruby>日<rt>ひ<\/rt><\/ruby>の<ruby>光<rt>ひかり<\/rt><\/ruby>にずつと<ruby>目<rt>め<\/rt><\/ruby>を<ruby>細<rt>ほそ<\/rt><\/ruby>めた、<ruby>一筋<rt>ひとすじ<\/rt><\/ruby>もまじり<ruby>毛<rt>け<\/rt><\/ruby>のない<ruby>白猫<rt>しろねこ<\/rt><\/ruby>に<ruby>似<rt>に<\/rt><\/ruby>てゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はおやと<ruby>思<rt>おも<\/rt><\/ruby>ひながら、<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>へ<ruby>歩<rt>あゆ<\/rt><\/ruby>み<ruby>寄<rt>よ<\/rt><\/ruby>つた。", "「<ruby>朝日<rt>あさひ<\/rt><\/ruby>を<ruby>二<rt>ふた<\/rt><\/ruby>つくれ<ruby>給<rt>たま<\/rt><\/ruby>へ。」", "「はい。」", "　<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>返事<rt>へんじ<\/rt><\/ruby>は<ruby>羞<rt>はづ<\/rt><\/ruby>かしさうである。のみならず<ruby>出<rt>だ<\/rt><\/ruby>したのも<ruby>朝日<rt>あさひ<\/rt><\/ruby>ではない。<ruby>二<rt>ふた<\/rt><\/ruby>つとも<ruby>箱<rt>ばこ<\/rt><\/ruby>の<ruby>裏側<rt>うらがわ<\/rt><\/ruby>に<ruby>旭日旗<rt>きよくじつき<\/rt><\/ruby>を<ruby>描<rt>えが<\/rt><\/ruby>いた<ruby>三笠<rt>みかさ<\/rt><\/ruby>である。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>思<rt>おも<\/rt><\/ruby>はず<ruby>煙草<rt>たばこ<\/rt><\/ruby>から<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>へ<ruby>目<rt>め<\/rt><\/ruby>を<ruby>移<rt>うつ<\/rt><\/ruby>した。<ruby>同時<rt>どうじ<\/rt><\/ruby>に<ruby>又<rt>また<\/rt><\/ruby><ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>鼻<rt>はな<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>に<ruby>長<rt>なが<\/rt><\/ruby>い<ruby>猫<rt>ねこ<\/rt><\/ruby>の<ruby>髭<rt>ひげ<\/rt><\/ruby>を<ruby>想像<rt>そうぞう<\/rt><\/ruby>した。", "「<ruby>朝日<rt>あさひ<\/rt><\/ruby>を、――こりや<ruby>朝日<rt>あさひ<\/rt><\/ruby>ぢやない。」", "「あら、ほんたうに。――どうもすみません。」", "　<ruby>猫<rt>ねこ<\/rt><\/ruby>――いや、<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>顔<rt>かお<\/rt><\/ruby>をした。この<ruby>瞬間<rt>しゅんかん<\/rt><\/ruby>の<ruby>感情<rt>かんじょう<\/rt><\/ruby>の<ruby>変化<rt>へんか<\/rt><\/ruby>は<ruby>正真正銘<rt>しょうしんしょうめい<\/rt><\/ruby>に<ruby>娘<rt>むすめ<\/rt><\/ruby>じみてゐる。それも<ruby>当世<rt>たうせい<\/rt><\/ruby>のお<ruby>嬢<rt>じょう<\/rt><\/ruby>さんではない。<ruby>五六<rt>ごろく<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby><ruby>来<rt>らい<\/rt><\/ruby><ruby>迹<rt>あと<\/rt><\/ruby>を<ruby>絶<rt>た<\/rt><\/ruby>つた<ruby>硯友社<rt>けんいうしや<\/rt><\/ruby><ruby>趣味<rt>しゅみ<\/rt><\/ruby>の<ruby>娘<rt>むすめ<\/rt><\/ruby>である。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はばら<ruby>銭<rt>せん<\/rt><\/ruby>を<ruby>探<rt>さぐ<\/rt><\/ruby>りながら、「たけくらべ」、<ruby>乙鳥口<rt>つばくろぐち<\/rt><\/ruby>の<ruby>風呂敷<rt>ふろしき<\/rt><\/ruby><ruby>包<rt>つつ<\/rt><\/ruby>み、<ruby>燕子花<rt>かきつばた<\/rt><\/ruby>、<ruby>両国<rt>りょうこく<\/rt><\/ruby>、<ruby>鏑木清方<rt>かぶらぎきよかた<\/rt><\/ruby>、――その<ruby>外<rt>ほか<\/rt><\/ruby>いろいろのものを思ひ<ruby>出<rt>おもひだ<\/rt><\/ruby>した。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>勿論<rt>もちろん<\/rt><\/ruby>この<ruby>間<rt>あいだ<\/rt><\/ruby>も<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>を<ruby>覗<rt>のぞ<\/rt><\/ruby>きこんだなり、<ruby>一生懸命<rt>いっしょうけんめい<\/rt><\/ruby>に<ruby>朝日<rt>あさひ<\/rt><\/ruby>を<ruby>捜<rt>さが<\/rt><\/ruby>してゐる。", "　すると<ruby>奥<rt>おく<\/rt><\/ruby>から<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>き<\/rt><\/ruby>たのは<ruby>例<rt>れい<\/rt><\/ruby>の<ruby>眇<rt>すがめ<\/rt><\/ruby>の<ruby>主人<rt>しゅじん<\/rt><\/ruby>である。<ruby>主人<rt>しゅじん<\/rt><\/ruby>は<ruby>三笠<rt>みかさ<\/rt><\/ruby>を<ruby>一目<rt>ひとめ<\/rt><\/ruby><ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>大抵<rt>たいてい<\/rt><\/ruby><ruby>容子<rt>ようす<\/rt><\/ruby>を<ruby>察<rt>さっ<\/rt><\/ruby>したらしい。けふも<ruby>不相変<rt>あひかはらず<\/rt><\/ruby><ruby>苦<rt>にが<\/rt><\/ruby>り<ruby>切<rt>き<\/rt><\/ruby>つたまま、<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>へ<ruby>手<rt>て<\/rt><\/ruby>を<ruby>入<rt>い<\/rt><\/ruby>れるが<ruby>早<rt>はや<\/rt><\/ruby>いか、<ruby>朝日<rt>あさひ<\/rt><\/ruby>を<ruby>二<rt>ふた<\/rt><\/ruby>つ<ruby>保吉<rt>やすきち<\/rt><\/ruby>へ<ruby>渡<rt>わた<\/rt><\/ruby>した。しかしその<ruby>目<rt>め<\/rt><\/ruby>にはかすかにもしろ、<ruby>頬笑<rt>ほほゑ<\/rt><\/ruby>みらしいものが<ruby>動<rt>うご<\/rt><\/ruby>いてゐる。", "「マツチは？」", "　<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>目<rt>め<\/rt><\/ruby>も<ruby>亦<rt>また<\/rt><\/ruby><ruby>猫<rt>ねこ<\/rt><\/ruby>とすれば、<ruby>喉<rt>のど<\/rt><\/ruby>を<ruby>鳴<rt>な<\/rt><\/ruby>らしさうに<ruby>媚<rt>こび<\/rt><\/ruby>を<ruby>帯<rt>お<\/rt><\/ruby>びてゐる。<ruby>主人<rt>しゅじん<\/rt><\/ruby>は<ruby>返事<rt>へんじ<\/rt><\/ruby>をする<ruby>代<rt>かわ<\/rt><\/ruby>りにちよいと<ruby>唯<rt>ただ<\/rt><\/ruby><ruby>点頭<rt>てんとう<\/rt><\/ruby>した。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>咄嗟<rt>とつさ<\/rt><\/ruby>に（！）<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>へ<ruby>小型<rt>こがた<\/rt><\/ruby>のマツチを<ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>出<rt>だ<\/rt><\/ruby>した。それから――もう<ruby>一度<rt>いちど<\/rt><\/ruby><ruby>羞<rt>はづか<\/rt><\/ruby>しさうに<ruby>笑<rt>わらい<\/rt><\/ruby>つた。", "「どうもすみません。」", "　すまないのは<ruby>何<rt>なん<\/rt><\/ruby>も<ruby>朝日<rt>あさひ<\/rt><\/ruby>を<ruby>出<rt>だ<\/rt><\/ruby>さずに<ruby>三笠<rt>みかさ<\/rt><\/ruby>を<ruby>出<rt>だ<\/rt><\/ruby>したばかりではない。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>二人<rt>ふたり<\/rt><\/ruby>を<ruby>見比<rt>みくら<\/rt><\/ruby>べながら、<ruby>彼<rt>かれ<\/rt><\/ruby><ruby>自身<rt>じしん<\/rt><\/ruby>もいつか<ruby>微笑<rt>びしょう<\/rt><\/ruby>したのを<ruby>感<rt>かん<\/rt><\/ruby>じた。"], "speech": ["けれども、ばんぽうを支配する変化は、やはりこの店にも、起こらずにはすまない。やすきちは、ある初夏の朝、この店へたばこを買いにはいった。店の中は、ふだんの通りである。水をまいた床の上に、コンデンスド・ミルクの広告の散らかっていることも変わりはない。が、あのすがめの主人の代わりに、勘定台の後ろに座っているのは、西洋髪にゆった女である。としは、やっと十九くらいであろう。まともに見た顔は、猫に似ている。日の光に、ずっと目を細めた、ひとすじもまじりげのない、白猫に似ている。やすきちは、おやと思いながら、勘定台の前へ歩み寄った。", "「朝日を二つくれたまえ。」", "「はい。」", "女の返事は、恥ずかしそうである。のみならず、出したのも朝日ではない。二つとも、箱の裏側にきょくじつきをえがいた、みかさである。やすきちは思わず、たばこから女の顔へ目を移した。同時にまた、女の鼻の下に、長い猫のひげを想像した。", "「朝日を、――こりゃ朝日じゃない。」", "「あら、ほんとうに。――どうもすみません。」", "猫――いや、女は赤い顔をした。この瞬間の感情の変化は、しょうしんしょうめいに娘じみている。それも当世のお嬢さんではない。五、六年来、あとを絶った、けんゆうしゃ趣味の娘である。やすきちは、ばら銭をさぐりながら、「たけくらべ」、つばくろぐちの風呂敷包み、かきつばた、両国、かぶらき きよかた、――そのほか、いろいろのものを思い出した。女はもちろん、この間も勘定台の下をのぞきこんだなり、一生懸命に朝日をさがしている。", "すると、奥から出て来たのは、例のすがめの主人である。主人はみかさをひと目見ると、たいてい様子を察したらしい。きょうも、あいかわらず苦りきったまま、勘定台の下へ手を入れるが早いか、朝日を二つ、やすきちへ渡した。しかしその目には、かすかにもしろ、ほほえみらしいものが動いている。", "「マッチは？」", "女の目もまた、猫とすれば、のどを鳴らしそうに、こびを帯びている。主人は、返事をする代わりに、ちょいと、ただうなずいた。女はとっさに、勘定台の上へ、小型のマッチをひとつ出した。それから――もう一度、恥ずかしそうに笑った。", "「どうもすみません。」", "すまないのは、なにも、朝日を出さずにみかさを出したばかりではない。やすきちはふたりを見比べながら、彼自身も、いつか微笑したのを感じた。"]}, {"title": "円髷の細君", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#f3e9d3\"/>\n<g fill=\"none\" stroke=\"#dcc9a4\" stroke-width=\"2\"><path d=\"M-40 0 a60 60 0 0 1 120 0\" /><path d=\"M80 0 a60 60 0 0 1 120 0\" /><path d=\"M200 0 a60 60 0 0 1 120 0\" /><path d=\"M320 0 a60 60 0 0 1 120 0\" /><path d=\"M440 0 a60 60 0 0 1 120 0\" /><path d=\"M560 0 a60 60 0 0 1 120 0\" /><path d=\"M680 0 a60 60 0 0 1 120 0\" /><path d=\"M800 0 a60 60 0 0 1 120 0\" /><path d=\"M-40 54 a60 60 0 0 1 120 0\" /><path d=\"M80 54 a60 60 0 0 1 120 0\" /><path d=\"M200 54 a60 60 0 0 1 120 0\" /><path d=\"M320 54 a60 60 0 0 1 120 0\" /><path d=\"M440 54 a60 60 0 0 1 120 0\" /><path d=\"M560 54 a60 60 0 0 1 120 0\" /><path d=\"M680 54 a60 60 0 0 1 120 0\" /><path d=\"M800 54 a60 60 0 0 1 120 0\" /><path d=\"M-40 108 a60 60 0 0 1 120 0\" /><path d=\"M80 108 a60 60 0 0 1 120 0\" /><path d=\"M200 108 a60 60 0 0 1 120 0\" />< e-width=\"1.6\"/>\n<\/g>\n<text x=\"712\" y=\"70\" font-size=\"22\" fill=\"#8a7a5c\" font-family=\"'Hiragino Mincho ProN',serif\" style=\"writing-mode:vertical-rl;text-orientation:upright\" letter-spacing=\"6\">はにかみや<\/text>\n<\/svg>", "paras": ["　<ruby>女<rt>おんな<\/rt><\/ruby>はその<ruby>後<rt>あと<\/rt><\/ruby>いつ<ruby>来<rt>き<\/rt><\/ruby>て<ruby>見<rt>み<\/rt><\/ruby>ても、<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>後<rt>うし<\/rt><\/ruby>ろに<ruby>坐<rt>すわ<\/rt><\/ruby>つてゐる。<ruby>尤<rt>もっと<\/rt><\/ruby>も<ruby>今<rt>いま<\/rt><\/ruby>では<ruby>最初<rt>さいしょ<\/rt><\/ruby>のやうに<ruby>西洋髪<rt>せいようがみ<\/rt><\/ruby>などには<ruby>結<rt>ゆ<\/rt><\/ruby>つてゐない。ちやんと<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>手絡<rt>てがら<\/rt><\/ruby>をかけた、<ruby>大<rt>おお<\/rt><\/ruby>きい<ruby>円髷<rt>まるまげ<\/rt><\/ruby>に<ruby>変<rt>へん<\/rt><\/ruby>つてゐる。しかし<ruby>客<rt>きゃく<\/rt><\/ruby>に<ruby>対<rt>たい<\/rt><\/ruby>する<ruby>態度<rt>たいど<\/rt><\/ruby>は<ruby>不相変<rt>あいかわらず<\/rt><\/ruby><ruby>妙<rt>みょう<\/rt><\/ruby>にうひうひしい。<ruby>応対<rt>おうたい<\/rt><\/ruby>はつかへる。<ruby>品物<rt>しなもの<\/rt><\/ruby>は間違へ（まちがえ）る。おまけに<ruby>時々<rt>ときどき<\/rt><\/ruby>は<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>顔<rt>かお<\/rt><\/ruby>をする。――<ruby>全然<rt>ぜんぜん<\/rt><\/ruby>お<ruby>上<rt>かみ<\/rt><\/ruby>さんらしい<ruby>面影<rt>おもかげ<\/rt><\/ruby>は<ruby>見<rt>み<\/rt><\/ruby>えない。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はだんだんこの<ruby>女<rt>おんな<\/rt><\/ruby>に<ruby>或<rt>ある<\/rt><\/ruby><ruby>好意<rt>こうい<\/rt><\/ruby>を<ruby>感<rt>かん<\/rt><\/ruby>じ<ruby>出<rt>だ<\/rt><\/ruby>した。と<ruby>云<rt>い<\/rt><\/ruby>つても<ruby>恋愛<rt>れんあい<\/rt><\/ruby>に<ruby>落<rt>お<\/rt><\/ruby>ちた<ruby>訣<rt>わけ<\/rt><\/ruby>ではない。<ruby>唯<rt>ただ<\/rt><\/ruby><ruby>如何<rt>いか<\/rt><\/ruby>にも<ruby>人慣<rt>ひとな<\/rt><\/ruby>れない<ruby>所<rt>ところ<\/rt><\/ruby>に<ruby>気軽<rt>きがる<\/rt><\/ruby>い<ruby>懐<rt>なつか<\/rt><\/ruby>しみを<ruby>感<rt>かん<\/rt><\/ruby>じ<ruby>出<rt>だ<\/rt><\/ruby>したのである。"], "speech": ["女はその後、いつ来て見ても、勘定台の後ろに座っている。もっとも、今では最初のように、西洋髪などにはゆっていない。ちゃんと赤いてがらをかけた、大きいまるまげに変わっている。しかし、客に対する態度は、あいかわらず、妙にういういしい。応対はつかえる。品物は間違える。おまけに時々は、赤い顔をする。――ぜんぜん、おかみさんらしい面影は見えない。やすきちは、だんだんこの女に、ある好意を感じ出した。と言っても、恋愛に落ちたわけではない。ただ、いかにも人慣れないところに、気軽い懐かしみを感じ出したのである。"]}, {"title": "ココアの中の虫", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#f3e9d3\"/>\n<rect x=\"336\" y=\"286\" width=\"330\" height=\"164\" fill=\"#8a5a33\"/><rect x=\"336\" y=\"278\" width=\"330\" height=\"12\" fill=\"#6b4a2e\"/>\n<g>\n<rect x=\"672\" y=\"70\" width=\"112\" height=\"10\" fill=\"#6b4a2e\"/><rect x=\"672\" y=\"180\" width=\"112\" height=\"10\" fill=\"#6b4a2e\"/>\n<rect x=\"684\" y=\"96\" width=\"34\" height=\"84\" fill=\"#c4552d\" rx=\"3\"/><rect x=\"690\" y=\"118\" width=\"22\" height=\"26\" fill=\"#f7f1e1\"/>\n<text x=\"701\" y=\"136\" font-size=\"12\" fill=\"#c4552d\" text-anchor=\"middle\" font-family=\"serif\">FRY<\/text>\n<rect x=\"728\" y=\"96\" width=\"36\" height=\"84\" fill=\"#f7f1e1\" stroke=\"#33506e\" stroke-width=\"2\" rx=\"3\"/>\n<path d=\"M738 160 a9 12 0 0 1 17 0 z M740 146 a6 6 0 0 1 12 0 v6 h-12 z\" fill=\"#33506e\"/>\n<rect x=\"684\" y=\"196\" width=\"34\" height=\"70\" fill=\"#c4552d\" rx=\"3\"/><rect x=\"728\" y=\"196\" width=\"36\" height=\"70\" fill=\"#9c5a3c\" rx=\"3\"/>\n<rect x=\"672\" y=\"276\" width=\"112\" height=\"10\" fill=\"#6b4a2e\"/>\n<\/g>\n<g>\n<polygon points=\"60,450 40,300 90,258 150,268 170,450\" fill=\"#2e3f52\"/>\n<circle cx=\"112\" cy=\"226\" r=\"32\" fill=\"#f2ddc2\"/>\n<ellipse cx=\"106\" cy=\"204\" rx=\"42\" ry=\"9\" fill=\"#3a2f28\"/>\n<path d=\"M88 192 a21 17 0 0 1 40 0 z\" fill=\"#3a2f28\"/>\n<path d=\"M136 220 q6 3 4 8\" stroke=\"#3a2f28\" stroke-width=\"2\" fill=\"none\"/>\n<circle cx=\"128\" cy=\"222\" r=\"2.6\" fill=\"#3a2f28\"/>\n<path d=\"M150 300 q60 -30 96 -18\" stroke=\"#2e3f52\" stroke-width=\"15\" fill=\"none\" stroke-linecap=\"round\"/>\n<g transform=\"translate(246 274)\">\n<ellipse cx=\"0\" cy=\"6\" rx=\"16\" ry=\"12\" fill=\"#f2ddc2\"/>\n<rect x=\"-4\" y=\"-18\" width=\"7\" height=\"20\" rx=\"3.5\" fill=\"#f2ddc2\"/>\n<\/g>\n<path d=\"M60 322 q-24 10 a23 13 0 0 1 47 0\" fill=\"none\" stroke=\"#c4552d\" stroke-width=\"6\"/>\n<path d=\"M540 222 l14 6 M594 222 l-14 6\" stroke=\"#3a2f28\" stroke-width=\"2.6\" fill=\"none\"/>\n<circle cx=\"541\" cy=\"240\" r=\"6\" fill=\"#e8a598\" opacity=\".8\"/><circle cx=\"581\" cy=\"240\" r=\"6\" fill=\"#e8a598\" opacity=\".8\"/>\n<path d=\"M554 252 q7 3 14 0\" stroke=\"#3a2f28\" stroke-width=\"2\" fill=\"none\"/>\n<path d=\"M566 246 l2 6 M572 244 l3 6\" stroke=\"#7ba8c9\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n<path d=\"M470 286 q50 -36 96 -26\" stroke=\"#6e8fae\" stroke-width=\"14\" fill=\"none\" stroke-linecap=\"round\"/>\n<ellipse cx=\"574\" cy=\"262\" rx=\"12\" ry=\"7\" fill=\"#f2ddc2\"/>\n<\/g>\n<\/svg>", "paras": ["　<ruby>或<rt>ある<\/rt><\/ruby><ruby>残暑<rt>ざんしょ<\/rt><\/ruby>の<ruby>厳<rt>きび<\/rt><\/ruby>しい<ruby>午後<rt>ごご<\/rt><\/ruby>、<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>学校<rt>がっこう<\/rt><\/ruby>の<ruby>帰<rt>かえ<\/rt><\/ruby>りがけにこの<ruby>店<rt>みせ<\/rt><\/ruby>へココアを<ruby>買<rt>か<\/rt><\/ruby>ひにはひつた。<ruby>女<rt>おんな<\/rt><\/ruby>はけふも<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>後<rt>うし<\/rt><\/ruby>ろに<ruby>講談倶楽部<rt>かうだんくらぶ<\/rt><\/ruby>か<ruby>何<rt>なん<\/rt><\/ruby>かを<ruby>読<rt>よ<\/rt><\/ruby>んでゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>面皰<rt>にきび<\/rt><\/ruby>の<ruby>多<rt>おお<\/rt><\/ruby>い<ruby>小僧<rt>こぞう<\/rt><\/ruby>に Van Houten はないかと<ruby>尋<rt>たず<\/rt><\/ruby>ねた。", "「<ruby>唯今<rt>ただいま<\/rt><\/ruby>あるのはこればかりですが。」", "　<ruby>小僧<rt>こぞう<\/rt><\/ruby>の<ruby>渡<rt>わた<\/rt><\/ruby>したのは Fry である。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>店<rt>みせ<\/rt><\/ruby>を<ruby>見渡<rt>みわた<\/rt><\/ruby>した。すると<ruby>果物<rt>くだもの<\/rt><\/ruby>の<ruby>罐詰<rt>かんづ<\/rt><\/ruby>めの<ruby>間<rt>あいだ<\/rt><\/ruby>に<ruby>西洋<rt>せいよう<\/rt><\/ruby>の<ruby>尼<rt>あま<\/rt><\/ruby>さんの<ruby>商標<rt>しょうひょう<\/rt><\/ruby>をつけた Droste も<ruby>一<rt>いち<\/rt><\/ruby><ruby>罐<rt>かん<\/rt><\/ruby>まじつてゐる。", "「あすこに Droste もあるぢやないか？」", "　<ruby>小僧<rt>こぞう<\/rt><\/ruby>はちよいとそちらを<ruby>見<rt>み<\/rt><\/ruby>たきり、やはり<ruby>漠然<rt>ばくぜん<\/rt><\/ruby>とした<ruby>顔<rt>かお<\/rt><\/ruby>をしてゐる。", "「ええ、あれもココアです。」", "「ぢやこればかりぢやないぢやないか？」", "「ええ、でもまあこれだけなんです。――お<ruby>上<rt>かみ<\/rt><\/ruby>さん、ココアはこれだけですね？」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>女<rt>おんな<\/rt><\/ruby>をふり<ruby>返<rt>かえ<\/rt><\/ruby>つた。<ruby>心<rt>こころ<\/rt><\/ruby>もち<ruby>目<rt>め<\/rt><\/ruby>を<ruby>細<rt>ほそ<\/rt><\/ruby>めた<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>美<rt>うつく<\/rt><\/ruby>しい<ruby>緑色<rt>みどりいろ<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>をしてゐる。<ruby>尤<rt>もっと<\/rt><\/ruby>もこれは<ruby>不思議<rt>ふしぎ<\/rt><\/ruby>ではない。<ruby>全然<rt>ぜんぜん<\/rt><\/ruby><ruby>欄間<rt>らんま<\/rt><\/ruby>の<ruby>色硝子<rt>いろがらす<\/rt><\/ruby>を<ruby>透<rt>す<\/rt><\/ruby>かした<ruby>午後<rt>ごご<\/rt><\/ruby>の<ruby>日<rt>ひ<\/rt><\/ruby>の<ruby>光<rt>ひかり<\/rt><\/ruby>の<ruby>作用<rt>さよう<\/rt><\/ruby>である。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>雑誌<rt>ざっし<\/rt><\/ruby>を<ruby>肘<rt>ひぢ<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>にしたまま、<ruby>例<rt>れい<\/rt><\/ruby>の<ruby>通<rt>とお<\/rt><\/ruby>りためらひ<ruby>勝<rt>か<\/rt><\/ruby>ちな<ruby>返事<rt>へんじ<\/rt><\/ruby>をした。", "「はあ、それだけだつたと<ruby>思<rt>おも<\/rt><\/ruby>ふけれども。」", "「<ruby>実<rt>じつ<\/rt><\/ruby>は、この Fry のココアの<ruby>中<rt>なか<\/rt><\/ruby>には<ruby>時々<rt>ときどき<\/rt><\/ruby><ruby>虫<rt>むし<\/rt><\/ruby>が<ruby>湧<rt>わ<\/rt><\/ruby>いてゐるんだが、――」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>真面目<rt>まじめ<\/rt><\/ruby>に<ruby>話<rt>はな<\/rt><\/ruby>しかけた。しかし<ruby>実際<rt>じっさい<\/rt><\/ruby><ruby>虫<rt>むし<\/rt><\/ruby>の<ruby>湧<rt>わ<\/rt><\/ruby>いたココアに<ruby>出合<rt>であ<\/rt><\/ruby>つた<ruby>覚<rt>おぼ<\/rt><\/ruby>えのある<ruby>訣<rt>わけ<\/rt><\/ruby>ではない。<ruby>唯<rt>ただ<\/rt><\/ruby><ruby>何<rt>なん<\/rt><\/ruby>でもかう<ruby>云<rt>い<\/rt><\/ruby>ひさへすれば、Van Houten の<ruby>有無<rt>うむ<\/rt><\/ruby>は<ruby>確<rt>たし<\/rt><\/ruby>かめさせる<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>効能<rt>こうのう<\/rt><\/ruby>のあることを<ruby>信<rt>しん<\/rt><\/ruby>じたからである。", "「それもずゐぶん<ruby>大<rt>おお<\/rt><\/ruby>きいやつがあるもんだからね。<ruby>丁度<rt>ちょうど<\/rt><\/ruby>この<ruby>小指<rt>こゆび<\/rt><\/ruby><ruby>位<rt>くらい<\/rt><\/ruby>ある、……」", "　<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>聊<rt>いささ<\/rt><\/ruby>か<ruby>驚<rt>おどろ<\/rt><\/ruby>いたやうに<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>へ<ruby>半身<rt>はんしん<\/rt><\/ruby>をのばした。", "「そつちにもまだありやしないかい？　ああ、その<ruby>後<rt>うし<\/rt><\/ruby>ろの<ruby>戸棚<rt>とだな<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>にも。」", "「<ruby>赤<rt>あか<\/rt><\/ruby>いのばかりです。<ruby>此処<rt>ここ<\/rt><\/ruby>にあるのも。」", "「ぢやこつちには？」", "　<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>吾妻<rt>あづま<\/rt><\/ruby><ruby>下駄<rt>げた<\/rt><\/ruby>を<ruby>突<rt>つつ<\/rt><\/ruby>かけると、<ruby>心配<rt>しんぱい<\/rt><\/ruby>さうに<ruby>店<rt>みせ<\/rt><\/ruby>へ<ruby>捜<rt>さが<\/rt><\/ruby>しに<ruby>来<rt>き<\/rt><\/ruby>た。ぼんやりした<ruby>小僧<rt>こぞう<\/rt><\/ruby>もやむを<ruby>得<rt>え<\/rt><\/ruby>ず<ruby>罐詰<rt>かんづ<\/rt><\/ruby>めの<ruby>間<rt>あいだ<\/rt><\/ruby>などを<ruby>覗<rt>のぞ<\/rt><\/ruby>いて<ruby>見<rt>み<\/rt><\/ruby>てゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>煙草<rt>たばこ<\/rt><\/ruby>へ<ruby>火<rt>ひ<\/rt><\/ruby>をつけた<ruby>後<rt>あと<\/rt><\/ruby>、<ruby>彼<rt>かれ<\/rt><\/ruby><ruby>等<rt>ら<\/rt><\/ruby>へ<ruby>拍車<rt>はくしゃ<\/rt><\/ruby>を加へ（くわえ）るやうに<ruby>考<rt>かんが<\/rt><\/ruby>へ<ruby>考<rt>かんが<\/rt><\/ruby>へしやべりつづけた。", "「<ruby>虫<rt>むし<\/rt><\/ruby>の<ruby>湧<rt>わ<\/rt><\/ruby>いたやつを<ruby>飲<rt>の<\/rt><\/ruby>ませると、<ruby>子供<rt>こども<\/rt><\/ruby>などは<ruby>腹<rt>はら<\/rt><\/ruby>を<ruby>痛<rt>いた<\/rt><\/ruby>めるしね。（<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>或<rt>ある<\/rt><\/ruby><ruby>避暑地<rt>ひしょち<\/rt><\/ruby>の<ruby>貸<rt>か<\/rt><\/ruby>し<ruby>間<rt>ま<\/rt><\/ruby>にたつた<ruby>一人<rt>ひとり<\/rt><\/ruby><ruby>暮<rt>く<\/rt><\/ruby>らしてゐる。）いや、<ruby>子供<rt>こども<\/rt><\/ruby>ばかりぢやない。<ruby>家内<rt>かない<\/rt><\/ruby>も<ruby>一度<rt>いちど<\/rt><\/ruby>ひどい<ruby>目<rt>め<\/rt><\/ruby>に遇つたことがある。（<ruby>勿論<rt>もちろん<\/rt><\/ruby><ruby>妻<rt>つま<\/rt><\/ruby>などを<ruby>持<rt>も<\/rt><\/ruby>つたことはない。）<ruby>何<rt>なに<\/rt><\/ruby>しろ<ruby>用心<rt>ようじん<\/rt><\/ruby>に<ruby>越<rt>こ<\/rt><\/ruby>したことはないんだから。……」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>はふと<ruby>口<rt>くち<\/rt><\/ruby>をとざした。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>前掛<rt>まえか<\/rt><\/ruby>けに<ruby>手<rt>て<\/rt><\/ruby>を<ruby>拭<rt>ふ<\/rt><\/ruby>きながら、<ruby>当惑<rt>とうわく<\/rt><\/ruby>さうに<ruby>彼<rt>かれ<\/rt><\/ruby>を<ruby>眺<rt>なが<\/rt><\/ruby>めてゐる。", "「どうも<ruby>見<rt>み<\/rt><\/ruby>えないやうでございますが。」", "　<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>目<rt>め<\/rt><\/ruby>はおどおどしてゐる。<ruby>口<rt>くち<\/rt><\/ruby>もとも<ruby>無理<rt>むり<\/rt><\/ruby>に<ruby>微笑<rt>びしょう<\/rt><\/ruby>してゐる。<ruby>殊<rt>こと<\/rt><\/ruby>に<ruby>滑稽<rt>こっけい<\/rt><\/ruby>に<ruby>見<rt>み<\/rt><\/ruby>えたのは<ruby>鼻<rt>はな<\/rt><\/ruby>も<ruby>亦<rt>また<\/rt><\/ruby>つぶつぶ<ruby>汗<rt>あせ<\/rt><\/ruby>をかいてゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>女<rt>おんな<\/rt><\/ruby>と<ruby>目<rt>め<\/rt><\/ruby>を<ruby>合<rt>あわ<\/rt><\/ruby>せた<ruby>刹那<rt>せつな<\/rt><\/ruby>に<ruby>突然<rt>とつぜん<\/rt><\/ruby><ruby>悪魔<rt>あくま<\/rt><\/ruby>の乗り<ruby>移<rt>のりうつ<\/rt><\/ruby>るのを<ruby>感<rt>かん<\/rt><\/ruby>じた。この<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>云<rt>い<\/rt><\/ruby>はば<ruby>含羞草<rt>おじぎさう<\/rt><\/ruby>である。<ruby>一定<rt>いってい<\/rt><\/ruby>の<ruby>刺戟<rt>しげき<\/rt><\/ruby>を<ruby>与<rt>あた<\/rt><\/ruby>へさへすれば、<ruby>必<rt>かなら<\/rt><\/ruby>ず<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>思<rt>おも<\/rt><\/ruby>ふ<ruby>通<rt>とお<\/rt><\/ruby>りの<ruby>反応<rt>はんのう<\/rt><\/ruby>を<ruby>呈<rt>てい<\/rt><\/ruby>するのに違ひ（ちがい）ない。しかし<ruby>刺戟<rt>しげき<\/rt><\/ruby>は<ruby>簡単<rt>かんたん<\/rt><\/ruby>である。ぢつと<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>つめても<ruby>好<rt>よ<\/rt><\/ruby>い。<ruby>或<rt>ある<\/rt><\/ruby>いは<ruby>又<rt>また<\/rt><\/ruby><ruby>指先<rt>ゆびさき<\/rt><\/ruby>にさはつても<ruby>好<rt>よ<\/rt><\/ruby>い。<ruby>女<rt>おんな<\/rt><\/ruby>はきつとその<ruby>刺戟<rt>しげき<\/rt><\/ruby>に<ruby>保吉<rt>やすきち<\/rt><\/ruby>の<ruby>暗示<rt>あんじ<\/rt><\/ruby>を<ruby>受<rt>う<\/rt><\/ruby>けとるであらう。<ruby>受<rt>う<\/rt><\/ruby>けとつた<ruby>暗示<rt>あんじ<\/rt><\/ruby>をどうするかは<ruby>勿論<rt>もちろん<\/rt><\/ruby><ruby>未知<rt>みち<\/rt><\/ruby>の<ruby>問題<rt>もんだい<\/rt><\/ruby>である。しかし<ruby>幸<rt>さいわい<\/rt><\/ruby>ひに<ruby>反撥<rt>はんぱつ<\/rt><\/ruby>しなければ、――いや、<ruby>猫<rt>ねこ<\/rt><\/ruby>は<ruby>飼<rt>か<\/rt><\/ruby>つても<ruby>好<rt>い<\/rt><\/ruby>い。が、<ruby>猫<rt>ねこ<\/rt><\/ruby>に<ruby>似<rt>に<\/rt><\/ruby>た<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>為<rt>ため<\/rt><\/ruby>に<ruby>魂<rt>たましい<\/rt><\/ruby>を<ruby>悪魔<rt>あくま<\/rt><\/ruby>に売り<ruby>渡<rt>うりわた<\/rt><\/ruby>すのはどうも<ruby>少<rt>すこ<\/rt><\/ruby>し<ruby>考<rt>かんが<\/rt><\/ruby>へものである。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>吸<rt>す<\/rt><\/ruby>ひかけた<ruby>煙草<rt>たばこ<\/rt><\/ruby>と一しよ（いっしょ）に、<ruby>乗<rt>の<\/rt><\/ruby>り移つた<ruby>悪魔<rt>あくま<\/rt><\/ruby>を<ruby>抛<rt>はふ<\/rt><\/ruby>り<ruby>出<rt>だ<\/rt><\/ruby>した。<ruby>不意<rt>ふい<\/rt><\/ruby>を<ruby>食<rt>くら<\/rt><\/ruby>つた<ruby>悪魔<rt>あくま<\/rt><\/ruby>はとんぼ<ruby>返<rt>かえ<\/rt><\/ruby>る<ruby>拍子<rt>ひょうし<\/rt><\/ruby>に<ruby>小僧<rt>こぞう<\/rt><\/ruby>の<ruby>鼻<rt>はな<\/rt><\/ruby>の<ruby>穴<rt>あな<\/rt><\/ruby>へ<ruby>飛<rt>と<\/rt><\/ruby>びこんだのであらう。<ruby>小僧<rt>こぞう<\/rt><\/ruby>は<ruby>首<rt>くび<\/rt><\/ruby>を<ruby>縮<rt>ちぢ<\/rt><\/ruby>めるが<ruby>早<rt>はや<\/rt><\/ruby>いか、つづけさまに<ruby>大<rt>おお<\/rt><\/ruby>きい<ruby>嚏<rt>くさめ<\/rt><\/ruby>をした。", "「ぢや<ruby>仕<rt>し<\/rt><\/ruby>かたがない。Droste を<ruby>一<rt>ひと<\/rt><\/ruby>つくれ<ruby>給<rt>たま<\/rt><\/ruby>へ。」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>苦笑<rt>くしょう<\/rt><\/ruby>を<ruby>浮<rt>う<\/rt><\/ruby>かべたまま、ポケツトのばら<ruby>銭<rt>せん<\/rt><\/ruby>を探り<ruby>出<rt>さぐりだ<\/rt><\/ruby>した。"], "speech": ["ある残暑の厳しい午後、やすきちは学校の帰りがけに、この店へココアを買いにはいった。女はきょうも、勘定台の後ろに、講談倶楽部か何かを読んでいる。やすきちは、にきびの多い小僧に、ヴァン・ホーテンはないかと尋ねた。", "「ただいまあるのは、こればかりですが。」", "小僧の渡したのは、フライである。やすきちは店を見渡した。すると、果物の缶詰の間に、西洋の尼さんの商標をつけた、ドロステもひとかん、まじっている。", "「あすこに、ドロステもあるじゃないか？」", "小僧はちょいとそちらを見たきり、やはり、ばくぜんとした顔をしている。", "「ええ、あれもココアです。」", "「じゃ、こればかりじゃ、ないじゃないか？」", "「ええ、でも、まあ、これだけなんです。――おかみさん、ココアはこれだけですね？」", "やすきちは、女をふり返った。心もち目を細めた女は、美しい緑色の顔をしている。もっとも、これは不思議ではない。ぜんぜん、らんまの色ガラスを透かした、午後の日の光の作用である。女は雑誌をひじの下にしたまま、例の通り、ためらいがちな返事をした。", "「はあ、それだけだったと思うけれども。」", "「実は、このフライのココアの中には、時々、虫がわいているんだが、――」", "やすきちは、まじめに話しかけた。しかし実際、虫のわいたココアに出会った覚えのあるわけではない。ただ、なんでも、こう言いさえすれば、ヴァン・ホーテンの有無は確かめさせる上に、効能のあることを信じたからである。", "「それも、ずいぶん大きいやつがあるもんだからね。ちょうど、この小指くらいある、……」", "女はいささか驚いたように、勘定台の上へ、半身をのばした。", "「そっちにも、まだありゃしないかい？　ああ、その後ろの戸棚の中にも。」", "「赤いのばかりです。ここにあるのも。」", "「じゃ、こっちには？」", "女は、あずまげたをつっかけると、心配そうに店へさがしに来た。ぼんやりした小僧も、やむをえず、缶詰の間などをのぞいて見ている。やすきちは、たばこへ火をつけた後、彼らに拍車を加えるように、考え考え、しゃべりつづけた。", "「虫のわいたやつを飲ませると、子供などは腹を痛めるしね。彼は、ある避暑地の貸し間に、たったひとり暮らしている。いや、子供ばかりじゃない。家内も一度、ひどい目にあったことがある。もちろん、妻などを持ったことはない。なにしろ用心に越したことはないんだから。……", "やすきちは、ふと口をとざした。女は前掛けに手をふきながら、当惑そうに彼をながめている。", "「どうも、見えないようでございますが。」", "女の目は、おどおどしている。口もとも、無理に微笑している。ことにこっけいに見えたのは、鼻もまた、つぶつぶ汗をかいている。やすきちは、女と目を合わせたせつなに、突然、悪魔の乗り移るのを感じた。この女は、言わば、おじぎそうである。一定の刺激を与えさえすれば、必ず彼の思う通りの反応をていするのに違いない。しかし、刺激は簡単である。じっと顔を見つめてもいい。あるいはまた、指先にさわってもいい。女はきっとその刺激に、やすきちの暗示を受け取るであろう。受け取った暗示をどうするかは、もちろん未知の問題である。しかし、さいわいに反発しなければ、――いや、猫は飼ってもいい。が、猫に似た女のために、魂を悪魔に売り渡すのは、どうも少し考えものである。やすきちは、吸いかけたたばこと一緒に、乗り移った悪魔をほうり出した。不意を食った悪魔は、とんぼがえる拍子に、小僧の鼻の穴へ飛びこんだのであろう。小僧は首を縮めるが早いか、つづけさまに、大きいくしゃみをした。", "「じゃ、しかたがない。ドロステをひとつくれたまえ。」", "やすきちは苦笑を浮かべたまま、ポケットのばら銭をさぐり出した。"]}, {"title": "ゼンマイ珈琲", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#efe3c8\"/>\n<rect x=\"470\" y=\"60\" width=\"270\" height=\"390\" fill=\"#f5d9a0\"/>\n<rect x=\"454\" y=\"50\" width=\"16\" height=\"400\" fill=\"#6b4a2e\"/><rect x=\"740\" y=\"50\" width=\"16\" height=\"400\" fill=\"#6b4a2e\"/>\n<rect x=\"454\" y=\"44\" width=\"302\" height=\"12\" fill=\"#6b4a2e\"/>\n<g>\n<rect x=\"80\" y=\"90\" width=\"90\" height=\"130\" fill=\"#2b241d\" rx=\"6\"/>\n<circle cx=\"105\" cy=\"112\" r=\"13\" fill=\"#6b5d4a\"/><circle cx=\"145\" cy=\"112\" r=\"13\" fill=\"#6b5d4a\"/>\n<rect x=\"112\" y=\"132\" width=\"26\" height=\"34\" fill=\"#443a2e\" rx=\"4\"/>\n<polygon points=\"118,166 132,166 136,186 114,186\" fill=\"#2b241d\"/>\n<path d=\"M170 150 q40 30 34 70\" stroke=\"#2b241d\" stroke-width=\"4\" fill=\"none\"/>\n<rect x=\"76\" y=\"228\" width=\"98 \" height=\"26\" fill=\"#8a5a33\"/>\n<polygon points=\"84,228 166,228 158,212 92,212\" fill=\"#e8dfc9\" stroke=\"#3a2f28\" stroke-width=\"1.6\"/>\n<line x1=\"125\" y1=\"214\" x2=\"125\" y2=\"226\" stroke=\"#3a2f28\" stroke-width=\"1.4\"/>\n<\/g>\n<g>\n<polygon points=\"230,450 216,306 252,272 296,282 306,450\" fill=\"#2e3f52\"/>\n<circle cx=\"262\" cy=\"240\" r=\"30\" fill= =\"#3a2f28\" stroke-width=\"2\"/>\n<text y=\"-2\" font-size=\"21\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\">ゼンマイ珈琲つて<\/text>\n<text y=\"24\" font-size=\"21\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\">あるんですか？<\/text>\n<\/g>\n<g transform=\"translate(320 96)\" opacity=\".95\">\n<circle r=\"15\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1.6\"/>\n<ellipse cx=\"0\" cy=\"34\" rx=\"17\" ry=\"24\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1.6\"/>\n<ellipse cx=\"-24\" cy=\"26\" rx=\"16\" ry=\"9\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1.6\" transform=\"rotate(-24)\"/>\n<ellipse cx=\"24\" cy=\"26\" rx=\"16\" ry=\"9\" fill=\"#f7f1e1\" stroke=\"#3a2f28\" stroke-width=\"1.6\" transform=\"rotate(24)\"/>\n<circle cx=\"0\" cy=\"-26\" r=\"9\" fill=\"none\" stroke=\"#d9a441\" stroke-width=\"3\"/>\n<path d=\"M-5 2 q-4 4 -1 7\" stroke=\"#3a2f28\" stroke-width=\"1.6\" fill=\"none\"/>\n<circle cx=\"6\" cy=\"-3\" r=\"1.6\" fill=\"#3a2f28\"/>\n<\/g>\n<ellipse cx=\"286\" cy=\"60\" rx=\"26\" ry=\"34\" fill=\"#c07a56\"/>\n<line x1=\"286\" y1=\"10\" x2=\"286\" y2=\"28\" stroke=\"#7a6248\" stroke-width=\"3\"/>\n<\/svg>", "paras": ["　その<ruby>後<rt>あと<\/rt><\/ruby>も<ruby>彼<rt>かれ<\/rt><\/ruby>はこの<ruby>女<rt>おんな<\/rt><\/ruby>と<ruby>度<rt>たび<\/rt><\/ruby>たび<ruby>同<rt>おな<\/rt><\/ruby>じやうな<ruby>交渉<rt>こうしょう<\/rt><\/ruby>を<ruby>重<rt>かさ<\/rt><\/ruby>ねた。が、<ruby>悪魔<rt>あくま<\/rt><\/ruby>に乗り<ruby>移<rt>のりうつ<\/rt><\/ruby>られた<ruby>記憶<rt>きおく<\/rt><\/ruby>は<ruby>仕合<rt>しあわ<\/rt><\/ruby>せと<ruby>外<rt>ほか<\/rt><\/ruby>には<ruby>持<rt>も<\/rt><\/ruby>つてゐない。いや、<ruby>一度<rt>いちど<\/rt><\/ruby>などはふとしたはずみに<ruby>天使<rt>てんし<\/rt><\/ruby>の<ruby>来<rt>き<\/rt><\/ruby>たのを<ruby>感<rt>かん<\/rt><\/ruby>じたことさへある。", "　<ruby>或<rt>ある<\/rt><\/ruby><ruby>秋<rt>あき<\/rt><\/ruby>も<ruby>深<rt>ふか<\/rt><\/ruby>まつた<ruby>午後<rt>ごご<\/rt><\/ruby>、<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>煙草<rt>たばこ<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>つた<ruby>次手<rt>ついで<\/rt><\/ruby>にこの<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>電話<rt>でんわ<\/rt><\/ruby>を<ruby>借用<rt>しゃくよう<\/rt><\/ruby>した。<ruby>主人<rt>しゅじん<\/rt><\/ruby>は<ruby>日<rt>ひ<\/rt><\/ruby>の<ruby>当<rt>あた<\/rt><\/ruby>つた<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>に空気ポンプ（くうきぽんぷ）を<ruby>動<rt>うご<\/rt><\/ruby>かしながら、<ruby>自転車<rt>じてんしゃ<\/rt><\/ruby>の<ruby>修繕<rt>しゅうぜん<\/rt><\/ruby>に<ruby>取<rt>と<\/rt><\/ruby>りかかつてゐる。<ruby>小僧<rt>こぞう<\/rt><\/ruby>もけふは<ruby>使<rt>つかい<\/rt><\/ruby>ひに<ruby>出<rt>で<\/rt><\/ruby>たらしい。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>不相変<rt>あひかはらず<\/rt><\/ruby><ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>に<ruby>受取<rt>うけと<\/rt><\/ruby>りか<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>整理<rt>せいり<\/rt><\/ruby>してゐる。かう<ruby>云<rt>い<\/rt><\/ruby>ふ<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>光景<rt>こうけい<\/rt><\/ruby>はいつ<ruby>見<rt>み<\/rt><\/ruby>ても<ruby>悪<rt>わる<\/rt><\/ruby>いものではない。<ruby>何処<rt>どこ<\/rt><\/ruby>か<ruby>阿蘭陀<rt>オランダ<\/rt><\/ruby>の<ruby>風俗画<rt>ふうぞくが<\/rt><\/ruby>じみた、もの<ruby>静<rt>しず<\/rt><\/ruby>かな<ruby>幸福<rt>こうふく<\/rt><\/ruby>に<ruby>溢<rt>あふ<\/rt><\/ruby>れてゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>女<rt>おんな<\/rt><\/ruby>のすぐ<ruby>後<rt>うし<\/rt><\/ruby>ろに<ruby>受話器<rt>じゅわき<\/rt><\/ruby>を<ruby>耳<rt>みみ<\/rt><\/ruby>へ<ruby>当<rt>あ<\/rt><\/ruby>てたまま、<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>愛蔵<rt>あいぞう<\/rt><\/ruby>する<ruby>写真<rt>しゃしん<\/rt><\/ruby><ruby>版<rt>ばん<\/rt><\/ruby>の De Hooghe の<ruby>一<rt>いち<\/rt><\/ruby><ruby>枚<rt>まい<\/rt><\/ruby>を思ひ<ruby>出<rt>おもひだ<\/rt><\/ruby>した。", "　しかし<ruby>電話<rt>でんわ<\/rt><\/ruby>はいつになつても、<ruby>容易<rt>ようい<\/rt><\/ruby>に<ruby>先方<rt>せんぽう<\/rt><\/ruby>へ<ruby>通<rt>つう<\/rt><\/ruby>じないらしい。のみならず<ruby>交換手<rt>こうかんしゅ<\/rt><\/ruby>もどうしたのか、<ruby>一二<rt>いちに<\/rt><\/ruby><ruby>度<rt>ど<\/rt><\/ruby>「<ruby>何<rt>なん<\/rt><\/ruby><ruby>番<rt>ばん<\/rt><\/ruby>へ？」を繰り<ruby>返<rt>くりかえ<\/rt><\/ruby>した<ruby>後<rt>あと<\/rt><\/ruby>は<ruby>全然<rt>ぜんぜん<\/rt><\/ruby><ruby>沈黙<rt>ちんもく<\/rt><\/ruby>を<ruby>守<rt>まも<\/rt><\/ruby>つてゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>何度<rt>なんど<\/rt><\/ruby>もベルを<ruby>鳴<rt>な<\/rt><\/ruby>らした。が、<ruby>受話器<rt>じゅわき<\/rt><\/ruby>は<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>耳<rt>みみ<\/rt><\/ruby>へぶつぶつ<ruby>云<rt>い<\/rt><\/ruby>ふ<ruby>音<rt>おと<\/rt><\/ruby>を<ruby>伝<rt>つた<\/rt><\/ruby>へるだけである。かうなればもう De Hooghe などを思ひ<ruby>出<rt>おもひだ<\/rt><\/ruby>してゐる<ruby>場合<rt>ばあい<\/rt><\/ruby>ではない。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はまづポケツトから Spargo の「<ruby>社会主義<rt>しゃかいしゅぎ<\/rt><\/ruby><ruby>早<rt>はや<\/rt><\/ruby>わかり」を<ruby>出<rt>だ<\/rt><\/ruby>した。<ruby>幸<rt>さいわい<\/rt><\/ruby>ひ<ruby>電話<rt>でんわ<\/rt><\/ruby>には<ruby>見台<rt>けんだい<\/rt><\/ruby>のやうに<ruby>蓋<rt>ふた<\/rt><\/ruby>のなぞへになつた<ruby>箱<rt>ばこ<\/rt><\/ruby>もついてゐる。<ruby>彼<rt>かれ<\/rt><\/ruby>はその<ruby>箱<rt>ばこ<\/rt><\/ruby>に<ruby>本<rt>ほん<\/rt><\/ruby>を<ruby>載<rt>の<\/rt><\/ruby>せると、<ruby>目<rt>め<\/rt><\/ruby>は<ruby>活字<rt>かつじ<\/rt><\/ruby>を<ruby>拾<rt>ひろ<\/rt><\/ruby>ひながら、<ruby>手<rt>て<\/rt><\/ruby>は<ruby>出来<rt>でき<\/rt><\/ruby>るだけゆつくりと<ruby>強情<rt>ごうじょう<\/rt><\/ruby>にベルを<ruby>鳴<rt>な<\/rt><\/ruby>らし<ruby>出<rt>だ<\/rt><\/ruby>した。これは<ruby>横着<rt>おうちゃく<\/rt><\/ruby>な<ruby>交換手<rt>こうかんしゅ<\/rt><\/ruby>に<ruby>対<rt>たい<\/rt><\/ruby>する<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>戦法<rt>せんぽう<\/rt><\/ruby>の<ruby>一<rt>ひと<\/rt><\/ruby>つである。いつか<ruby>銀座<rt>ぎんざ<\/rt><\/ruby><ruby>尾張町<rt>をはりちやう<\/rt><\/ruby>の<ruby>自働<rt>じどう<\/rt><\/ruby><ruby>電話<rt>でんわ<\/rt><\/ruby>へはひつた<ruby>時<rt>とき<\/rt><\/ruby>にはやはりベルを<ruby>鳴<rt>な<\/rt><\/ruby>らし<ruby>鳴<rt>な<\/rt><\/ruby>らし、とうとう「<ruby>佐橋甚五郎<rt>さばしじんごらう<\/rt><\/ruby>」を<ruby>完全<rt>かんぜん<\/rt><\/ruby>に<ruby>一<rt>いち<\/rt><\/ruby><ruby>篇<rt>へん<\/rt><\/ruby><ruby>読<rt>よ<\/rt><\/ruby>んでしまつた。けふも<ruby>交換手<rt>こうかんしゅ<\/rt><\/ruby>の<ruby>出<rt>で<\/rt><\/ruby>ない<ruby>中<rt>うち<\/rt><\/ruby>は<ruby>断<rt>だん<\/rt><\/ruby>じてベルの<ruby>手<rt>て<\/rt><\/ruby>をやめないつもりである。", "　さんざん<ruby>交換手<rt>こうかんしゅ<\/rt><\/ruby>と<ruby>喧嘩<rt>けんか<\/rt><\/ruby>した<ruby>挙句<rt>あげく<\/rt><\/ruby>、やつと<ruby>電話<rt>でんわ<\/rt><\/ruby>をかけ<ruby>終<rt>おわ<\/rt><\/ruby>つたのは<ruby>二十<rt>にじゅう<\/rt><\/ruby><ruby>分<rt>ふん<\/rt><\/ruby>ばかりの<ruby>後<rt>あと<\/rt><\/ruby>である。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<r ruby>感<rt>かん<\/rt><\/ruby>じた。<ruby>天使<rt>てんし<\/rt><\/ruby>はハムのぶら<ruby>下<rt>した<\/rt><\/ruby>つた<ruby>天井<rt>てんじょう<\/rt><\/ruby>のあたりを<ruby>飛揚<rt>ひよう<\/rt><\/ruby>したまま、<ruby>何<rt>なん<\/rt><\/ruby>にも<ruby>知<rt>し<\/rt><\/ruby>らぬ<ruby>二人<rt>ふたり<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>へ<ruby>祝福<rt>しゅくふく<\/rt><\/ruby>を<ruby>授<rt>さず<\/rt><\/ruby>けてゐるのに違ひ（ちがい）ない。<ruby>尤<rt>もっと<\/rt><\/ruby>も<ruby>燻製<rt>くんせい<\/rt><\/ruby>の<ruby>鯡<rt>にしん<\/rt><\/ruby>の<ruby>匂<rt>におい<\/rt><\/ruby>に<ruby>顔<rt>かお<\/rt><\/ruby>だけはちよいとしかめてゐる。――<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>突然<rt>とつぜん<\/rt><\/ruby><ruby>燻製<rt>くんせい<\/rt><\/ruby>の<ruby>鯡<rt>にしん<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>ひ<ruby>忘<rt>わす<\/rt><\/ruby>れたことを思ひ<ruby>出<rt>おもひだ<\/rt><\/ruby>した。<ruby>鯡<rt>にしん<\/rt><\/ruby>は<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>鼻<rt>はな<\/rt><\/ruby>の<ruby>先<rt>さき<\/rt><\/ruby>に<ruby>浅<rt>あさ<\/rt><\/ruby>ましい<ruby>形骸<rt>けいがい<\/rt><\/ruby>を<ruby>重<rt>かさ<\/rt><\/ruby>ねてゐる。", "「おい、<ruby>君<rt>きみ<\/rt><\/ruby>、この<ruby>鯡<rt>にしん<\/rt><\/ruby>をくれ<ruby>給<rt>たま<\/rt><\/ruby>へ。」", "　<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>忽<rt>たちま<\/rt><\/ruby>ち<ruby>振<rt>ふ<\/rt><\/ruby>り<ruby>返<rt>かえ<\/rt><\/ruby>つた。<ruby>振<rt>ふ<\/rt><\/ruby>り<ruby>返<rt>かえ<\/rt><\/ruby>つたのは<ruby>丁度<rt>ちょうど<\/rt><\/ruby>ゼンマイの<ruby>八百屋<rt>やおや<\/rt><\/ruby>にあることを<ruby>察<rt>さっ<\/rt><\/ruby>した<ruby>時<rt>とき<\/rt><\/ruby>である。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>勿論<rt>もちろん<\/rt><\/ruby>その<ruby>話<rt>はなし<\/rt><\/ruby>を<ruby>聞<rt>き<\/rt><\/ruby>かれたと<ruby>思<rt>おも<\/rt><\/ruby>つたのに違ひ（ちがい）ない。<ruby>猫<rt>ねこ<\/rt><\/ruby>に<ruby>似<rt>に<\/rt><\/ruby>た<ruby>顔<rt>かお<\/rt><\/ruby>は<ruby>目<rt>め<\/rt><\/ruby>を<ruby>挙<rt>あ<\/rt><\/ruby>げたと<ruby>思<rt>おも<\/rt><\/ruby>ふと見る<ruby>見<rt>みるみ<\/rt><\/ruby>る<ruby>羞<rt>はず<\/rt><\/ruby>かしさうに<ruby>染<rt>そ<\/rt><\/ruby>まり<ruby>出<rt>だ<\/rt><\/ruby>した。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>前<rt>まえ<\/rt><\/ruby>にも<ruby>云<rt>い<\/rt><\/ruby>ふ<ruby>通<rt>とお<\/rt><\/ruby>り、<ruby>女<rt>おんな<\/rt><\/ruby>が<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>赤<rt>あか<\/rt><\/ruby>めるのには<ruby>今<rt>いま<\/rt><\/ruby>までにも<ruby>度<rt>たび<\/rt><\/ruby>たび<ruby>出合<rt>であ<\/rt><\/ruby>つてゐる。けれどもまだこの<ruby>時<rt>とき<\/rt><\/ruby>ほど、まつ<ruby>赤<rt>か<\/rt><\/ruby>になつたのを<ruby>見<rt>み<\/rt><\/ruby>たことはない。", "「は、<ruby>鯡<rt>にしん<\/rt><\/ruby>を？」", "　<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>小声<rt>こごえ<\/rt><\/ruby>に問ひ<ruby>返<rt>とひかえ<\/rt><\/ruby>した。", "「ええ、<ruby>鯡<rt>にしん<\/rt><\/ruby>を。」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>も<ruby>前後<rt>ぜんご<\/rt><\/ruby>にこの<ruby>時<rt>とき<\/rt><\/ruby>だけは<ruby>甚<rt>はなは<\/rt><\/ruby>だ<ruby>殊勝<rt>しゆしよう<\/rt><\/ruby>に<ruby>返事<rt>へんじ<\/rt><\/ruby>をした。"], "speech": ["その後も、彼はこの女と、たびたび同じような交渉を重ねた。が、悪魔に乗り移られた記憶は、しあわせと、ほかには持っていない。いや、一度などは、ふとしたはずみに、天使の来たのを感じたことさえある。", "ある秋も深まった午後、やすきちは、たばこを買ったついでに、この店の電話を借用した。主人は日の当たった店の前に、空気ポンプを動かしながら、自転車の修繕に取りかかっている。小僧も、きょうは使いに出たらしい。女はあいかわらず、勘定台の前に、受取か何か整理している。こういう店の光景は、いつ見ても悪いものではない。どこか、オランダの風俗画じみた、もの静かな幸福にあふれている。やすきちは、女のすぐ後ろに、受話器を耳へ当てたまま、彼の愛蔵する写真版の、デ・ホーヘの一枚を思い出した。", "しかし、電話はいつになっても、容易に先方へ通じないらしい。のみならず、交換手もどうしたのか、いち、にど、「何番へ？」を繰り返した後は、ぜんぜん、沈黙を守っている。やすきちは、何度もベルを鳴らした。が、受話器は彼の耳へ、ぶつぶつ言う音を伝えるだけである。こうなれば、もう、デ・ホーヘなどを思い出している場合ではない。やすきちは、まずポケットから、スパーゴの「社会主義早わかり」を出した。さいわい、電話には、けんだいのように、ふたのなぞえになった箱もついている。彼はその箱に本を載せると、目は活字を拾いながら、手はできるだけゆっくりと、強情にベルを鳴らし出した。これは、横着な交換手に対する、彼の戦法のひとつである。いつか、銀座おわりちょうの自動電話へはいった時には、やはりベルを鳴らし鳴らし、とうとう「さばし じんごろう」を、完全に一篇読んでしまった。きょうも、交換手の出ないうちは、断じて、ベルの手をやめないつもりである。", "さんざん、交換手とけんかしたあげく、やっと電話をかけ終わったのは、二十分ばかりの後である。やすきちは、礼を言うために、後ろの勘定台をふり返った。すると、そこには誰もいない。女はいつか、店の戸口に、何か主人と話している。主人はまだ、秋のひなたに、自転車の修繕をつづけているらしい。やすきちは、そちらへ歩き出そうとした。が、思わず足を止めた。女は彼に背を向けたまま、こんなことを主人に尋ねている。", "「さっきね、あなた、ゼンマイ珈琲とかって、お客があったんですがね、ゼンマイ珈琲って、あるんですか？」", "「ゼンマイ珈琲？」", "主人の声は、細君にも、客に対するような無愛想である。", "「玄米珈琲の、聞き違えだろう。」", "「ゲンマイ珈琲？　ああ、玄米からこしらえた珈琲。――なんだか、おかしいと思っていた。ゼンマイって、八百屋にあるものでしょう？」", "やすきちは、ふたりの後ろ姿をながめた。同時にまた、天使の来ているのを感じた。天使は、ハムのぶら下がった天井のあたりを、ひようしたまま、なんにも知らぬふたりの上へ、祝福を授けているのに違いない。もっとも、くんせいの、にしんのにおいに、顔だけは、ちょいとしかめている。――やすきちは突然、くんせいのにしんを、買い忘れたことを思い出した。にしんは彼の鼻の先に、あさましい形骸を重ねている。", "「おい、君、このにしんをくれたまえ。」", "女は、たちまちふり返った。ふり返ったのは、ちょうど、ゼンマイの八百屋にあることを察した時である。女はもちろん、その話を聞かれたと思ったのに違いない。猫に似た顔は、目をあげたと思うと、見る見る、恥ずかしそうに染まり出した。やすきちは、前にも言う通り、女が顔を赤らめるのには、今までにも、たびたび出会っている。けれども、まだこの時ほど、まっかになったのを見たことはない。", "「は、にしんを？」", "女は小声に、問い返した。", "「ええ、にしんを。」", "やすきちも、前後にこの時だけは、はなはだ殊勝に、返事をした。"]}, {"title": "ゐない冬", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#e5e1d6\"/>\n<rect x=\"540\" y=\"70\" width=\"200\" height=\"180\" fill=\"#cdd4d8\" stroke=\"#6b4a2e\" stroke-width=\"6\"/>\n<line x1=\"640\" y1=\"70\" x2=\"640\" y2=\"250\" stroke=\"#6b4a2e\" stroke-width=\"5\"/>\n<line x1=\"540\" y1=\"160\" x2=\"740\" y2=\"160\" stroke=\"#6b4a2e\" stroke-width=\"5\"/>\n<path d=\"M560 130 q40 -30 76 -6 M600 200 q30 -24 60 -4\" stroke=\"#5c554a\" stroke-width=\"3.5\" fill=\"none\"/>\n<g fill=\"#fff\"><circle cx=\"548\" cy=\"80\" r=\"2.4\"/><circle cx=\"585\" cy=\"133\" r=\"3.4\"/><circle cx=\"622\" cy=\"186\" r=\"4.4\"/><circle cx=\"659\" cy=\"239\" r=\"2.4\"/><circle cx=\"696\" cy=\"132\" r=\"3.4\"/><circle cx=\"733\" cy=\"185\" r=\"4.4\"/><circle cx=\"580\" cy=\"238\" r=\"2.4\"/><circle cx=\"617\" cy=\"131\" r=\"3.4\"/><circle cx=\"654\" cy=\"184\" r=\"4.4\"/><circle cx=\"691\" cy=\"237\" r=\"2.4\"/><circle cx=\"728\" cy=\"130\" r=\"3.4\"/><circle cx=\"575\" cy=\"183\" r=\"4.4\"/><circle cx=\"612\" cy=\"236\" r=\"2.4\"/><circle cx=\"649\" cy=\"129\" r=\"3.4\"/><circle cx=\"686\" cy=\"182\" r=\"4.4\"/><circle cx=\"723\" cy=\"235\" r=\"2.4\"/><\/g>\n<g fill=\"#f7f5f0\" opacity=\".8\"><circle cx=\"40\" cy=\"50\" r=\"2.2\"/><circle cx=\"137\" cy=\"121\" r=\"2.2\"/><circle cx=\"234\" cy=\"192\" r=\"2.2\"/><circle cx=\"331\" cy=\"263\" r=\"2.2\"/><circle cx=\"428\" cy=\"334\" r=\"2.2\"/><circle cx=\"45\" cy=\"75\" r=\"2.2\"/><circle cx=\"142\" cy=\"146\" r=\"2.2\"/><circle cx=\"239\" cy=\"217\" r=\"2.2\"/><circle cx=\"336\" cy=\"288\" r=\"2.2\"/><circle cx=\"433\" cy=\"359\" r=\"2.2\"/><circle cx=\"50\" cy=\"100\" r=\"2.2\"/><circle cx=\"147\" cy=\"171\" r=\"2.2\"/><circle cx=\"244\" cy=\"242\" r=\"2.2\"/><circle cx=\"341\" cy=\"313\" r=\"2.2\"/><\/g>\n<g>\n<rect x=\"200\" y=\"180\" width=\"130\" height=\"180\" rx=\"14\" fill=\"#33302b\"/>\n<rect x=\"222\" y=\"260\" width=\"86\" height=\"56\" rx=\"6\" fill=\"#1f1d19\"/>\n<rect x=\"240\" y=\"272\" width=\"50\" height=\"32\" rx=\"4\" fill=\"#d97a3c\" opacity=\".95\"/>\n<rect x=\"248\" y=\"278\" width=\"34\" height=\"20\" rx=\"3\" fill=\"#d9a441\" opacity=\".85\"/>\n<rect x=\"252\" y=\"120\" width=\"26\" height=\"70\" fill=\"#33302b\"/>\n<rect x=\"252\" y=\"104\" width=\"120\" height=\"22\" fill=\"#33302b\"/>\n<rect x=\"196\" y=\"352\" width=\"26\" height=\"20\" fill=\"#26231f\"/><rect x=\"308\" y=\"352\" width=\"26\" height=\"20\" fill=\"#26231f\"/>\n<ellipse cx=\"265\" cy=\"392\" rx=\"86\" ry=\"10\" fill=\"#c9c3b4\"/>\n<\/g>\n<g>\n<ellipse cx=\"440\" cy=\"400 \" rx=\"60\" ry=\"10\" fill=\"#c9c3b4\"/>\n<path d=\"M394 396 q-4 -74 24 -96 q22 -16 44 -2 q26 18 22 98 z\" fill=\"#33506e\" opacity=\".92\"/>\n<circle cx=\"436\" cy=\"272\" r=\"27\" fill=\"#f2ddc2\"/>\n<ellipse cx=\"430\" cy=\"254\" rx=\"34\" ry=\"8\" fill=\"#3a2f28\"/>\n<path d=\"M416 244 a17 14 0 0 1 33 0 z\" fill=\"#3a2f28\"/>\n<path d=\"M424 276 h9\" stroke=\"#3a2f28\" stroke-width=\"2.2\"/>\n<circle cx=\"446\" cy=\"275\" r=\"2.4\" fill=\"#3a2f28\"/>\n<path d=\"M428 288 q8 3 16 -1\" stroke=\"#3a2f28\" stroke-width=\"2\" fill=\"none\" transform=\"rotate(178 436 287)\"/>\n<path d=\"M400 330 q36 18 72 0\" stroke=\"#33506e\" stroke-width=\"13\" fill=\"none\" stroke-linecap=\"round\"/>\n<\/g>\n<text x=\"106\" y=\"90\" font-size=\"22\" fill=\"#8a8272\" font-family=\"'Hiragino Mincho ProN',serif\" style=\"writing-mode:vertical-rl;text-orientation:upright\" letter-spacing=\"7\">冬ざれ<\/text>\n<\/svg>", "paras": ["　かう<ruby>云<rt>い<\/rt><\/ruby>ふ<ruby>出来事<rt>できごと<\/rt><\/ruby>のあつた<ruby>後<rt>のち<\/rt><\/ruby>、<ruby>二月<rt>ふたつき<\/rt><\/ruby>ばかりたつた<ruby>頃<rt>ころ<\/rt><\/ruby>であらう、<ruby>確<rt>たし<\/rt><\/ruby>か<ruby>翌年<rt>よくとし<\/rt><\/ruby>の<ruby>正月<rt>しょうがつ<\/rt><\/ruby>のことである。<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>何処<rt>どこ<\/rt><\/ruby>へどうしたのか、ぱつたり<ruby>姿<rt>すがた<\/rt><\/ruby>を<ruby>隠<rt>かく<\/rt><\/ruby>してしまつた。それも<ruby>三日<rt>みっか<\/rt><\/ruby>や<ruby>五日<rt>いつか<\/rt><\/ruby>ではない。いつ<ruby>買<rt>か<\/rt><\/ruby>ひ<ruby>物<rt>もの<\/rt><\/ruby>にはひつて<ruby>見<rt>み<\/rt><\/ruby>ても、<ruby>古<rt>ふる<\/rt><\/ruby>いストオヴを<ruby>据<rt>す<\/rt><\/ruby>ゑた<ruby>店<rt>みせ<\/rt><\/ruby>には<ruby>例<rt>れい<\/rt><\/ruby>の<ruby>眇<rt>すがめ<\/rt><\/ruby>の<ruby>主人<rt>しゅじん<\/rt><\/ruby>が<ruby>一人<rt>ひとり<\/rt><\/ruby>、<ruby>退屈<rt>たいくつ<\/rt><\/ruby>さうに<ruby>坐<rt>すわ<\/rt><\/ruby>つてゐるばかりである。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はちよいともの<ruby>足<rt>た<\/rt><\/ruby>らなさを<ruby>感<rt>かん<\/rt><\/ruby>じた。<ruby>又<rt>また<\/rt><\/ruby><ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>見<rt>み<\/rt><\/ruby>えない<ruby>理由<rt>りゆう<\/rt><\/ruby>にいろいろ<ruby>想像<rt>そうぞう<\/rt><\/ruby>を加へ（くわえ）などもした。が、わざわざ<ruby>無愛想<rt>ぶあいそう<\/rt><\/ruby>な<ruby>主人<rt>しゅじん<\/rt><\/ruby>に「お<ruby>上<rt>かみ<\/rt><\/ruby>さんは？」と<ruby>尋<rt>たず<\/rt><\/ruby>ねる<ruby>心<rt>こころ<\/rt><\/ruby>もちにもならない。<ruby>又<rt>また<\/rt><\/ruby><ruby>実際<rt>じっさい<\/rt><\/ruby><ruby>主人<rt>しゅじん<\/rt><\/ruby>は<ruby>勿論<rt>もちろん<\/rt><\/ruby>あのはにかみ<ruby>屋<rt>や<\/rt><\/ruby>の<ruby>女<rt>おんな<\/rt><\/ruby>にも、「<ruby>何々<rt>なになに<\/rt><\/ruby>をくれ<ruby>給<rt>たま<\/rt><\/ruby>へ」と<ruby>云<rt>い<\/rt><\/ruby>ふ<ruby>外<rt>ほか<\/rt><\/ruby>には<ruby>挨拶<rt>あいさつ<\/rt><\/ruby>さへ<ruby>交<rt>かは<\/rt><\/ruby>したことはなかつたのである。", "　その<ruby>内<rt>うち<\/rt><\/ruby>に<ruby>冬<rt>ふゆ<\/rt><\/ruby>ざれた<ruby>路<rt>みち<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>にも、たまに<ruby>一日<rt>いちにち<\/rt><\/ruby>か<ruby>二日<rt>ふつか<\/rt><\/ruby>づつ<ruby>暖<rt>あたたか<\/rt><\/ruby>い<ruby>日<rt>ひ<\/rt><\/ruby>かげがさすやうになつた。けれども<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>せない。<ruby>店<rt>みせ<\/rt><\/ruby>はやはり<ruby>主人<rt>しゅじん<\/rt><\/ruby>のまはりに<ruby>荒涼<rt>くわうりやう<\/rt><\/ruby>とした<ruby>空気<rt>くうき<\/rt><\/ruby>を漂はせてゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>はいつか<ruby>少<rt>すこ<\/rt><\/ruby>しづつ<ruby>女<rt>おんな<\/rt><\/ruby>のゐないことを<ruby>忘<rt>わす<\/rt><\/ruby>れ<ruby>出<rt>だ<\/rt><\/ruby>した。……"], "speech": ["こういう出来事のあった後、ふたつきばかりたった頃であろう、確か、翌年の正月のことである。女は、どこへどうしたのか、ぱったり、姿を隠してしまった。それも、みっかや、いつかではない。いつ買い物にはいって見ても、古いストーブをすえた店には、例のすがめの主人がひとり、退屈そうに座っているばかりである。やすきちは、ちょいと、もの足らなさを感じた。また、女の見えない理由に、いろいろ、想像を加えなどもした。が、わざわざ、無愛想な主人に、「おかみさんは？」と尋ねる心もちにもならない。また実際、主人はもちろん、あのはにかみやの女にも、「なになにをくれたまえ」と言うほかには、挨拶さえかわしたことは、なかったのである。", "そのうちに、冬ざれた道の上にも、たまに、いちにちかふつかずつ、暖かい日かげがさすようになった。けれども、女は顔を見せない。店はやはり、主人のまわりに、荒涼とした空気をただよわせている。やすきちは、いつか少しずつ、女のいないことを忘れ出した。……"]}, {"title": "あばばばば", "art": "<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect width=\"800\" height=\"450\" fill=\"#1f2a44\"/>\n<circle cx=\"620\" cy=\"104\" r=\"86\" fill=\"#f2ecd9\" opacity=\".14\"/>\n<circle cx=\"620\" cy=\"104\" r=\"55\" fill=\"#f2ecd9\"/>\n<path d=\"M480 92 q80 -18 180 -2 M520 130 q90 14 170 2\" stroke=\"#33506e\" stroke-width=\"10\" fill=\"none\" opacity=\".8\"/>\n<rect y=\"386\" width=\"800\" height=\"64\" fill=\"#141b2c\"/>\n<g>\n<rect x=\"30\" y=\"120\" width=\"250\" height=\"266\" fill=\"#2b2416\"/>\n<rect x=\"52\" y=\"150\" width=\"206\" height=\"180\" fill=\"#f5c96a\"/>\n<g stroke=\"#2b2416\" stroke-width=\"7\"><line x1=\"120\" y1=\"150\" x2=\"120\" y2=\"330\"/><line x1=\"190\" y1=\"150\" x2=\"190\" y2=\"330\"/><line x1=\"52\" y1=\"240\" x2=\"258\" y2=\"240\"/><\/g>\n<rect x=\"66\" y=\"168\" width=\"16\" height=\"52\" fill=\"#b3543a\"/><rect x=\"90\" y=\"176\" width=\"14\" height=\"44\" fill=\"#43604a\"/>\n<rect x=\"132\" y=\"256\" width=\"20\" height=\"60\" fill=\"#9c5a3c\"/><rect x=\"160\" y=\"262\" width=\"16\" height=\"54\" fill=\"#43604a\"/>\n<rect x=\"24\" y=\"104\" width=\"262\" height=\"20\" fill=\"#1a1610\"/>\n<polygon points=\"52,330 258,330 420,450 20,450\" fill=\"#f5c96a\" opacity=\".3\"/>\n<\/g>\n<g>\n<path d=\"M368 450 q-6 -88 26 -118 q16 -14 38 -8 q30 10 30 126 z\" fill=\"#3a2f35\"/>\n<path d=\"M400 328 q-24 -22 -12 -48 M446 336 q26 -18 20 -46\" stroke=\"#3a2f35\" stroke-width=\"15\" fill=\"none\" stroke-linecap=\"round\"/>\n<circle cx=\"424\" cy=\"296\" r=\"25\" fill=\"#e8c9a0\"/>\n<path d=\"M402 290 q-4 -24 22 -26 q26 2 22 26 q-4 -8 -10 -10 q2 -12 -12 -12 q-14 0 -12 12 q-6 2 -10 10 z\" fill=\"#2e2620\"/>\n<circle cx=\"426\" cy=\"270\" r=\"11\" fill=\"#2e2620\"/>\n<path d=\"M414 296 q4 -4 8 0 M430 296 q4 -4 8 0\" stroke=\"#5c4a38\" stroke-width=\"2\" fill=\"none\"/>\n<path d=\"M416 306 q8 6 16 0\" stroke=\"#5c4a38\" stroke-width=\"2.2\" fill=\"none\"/>\n<g transform=\"translate(424 232)\">\n<circle r=\"17\" fill=\"#f2e3c8\"/>\n<path d=\"M-17 4 a17 17 0 0 0 34 0 q0 16 -17 16 q-17 0 -17 -16 z\" fill=\"#e8d9b8\"/>\n<circle cx=\"-5\" cy=\"-2\" r=\"1.8\" fill=\"#2e2620\"/><circle cx=\"5\" cy=\"-2\" r=\"1.8\" fill=\"#2e2620\"/>\n<ellipse cx=\"0\" cy=\"6\" rx=\"4.5\" ry=\"3.5\" fill=\"none\" stroke=\"#2e2620\" stroke-width=\"1.5\"/>\n<\/g>\n<\/g>\n<path id=\"arc\" d=\"M300 180 q160 -90 330 -10\" fill=\"none\"/>\n<text font-size=\"34\" fill=\"#f2ecd9\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"2\"><textPath href=\"#arc\">あばばばばばば、ばあ！<\/textPath><\/text>\n<g>\n<polygon points=\"660,450 654,346 676,326 700,334 706,450\" fill=\"#10151f\"/>\n<circle cx=\"682\" cy=\"306\" r=\"21\" fill=\"#10151f\"/>\n<ellipse cx=\"678\" cy=\"290\" rx=\"27\" ry=\"7\" fill=\"#0a0e16\"/>\n<path d=\"M668 281 a14 12 0 0 1 27 0 z\" fill=\"#0a0e16\"/>\n<polygon points=\"660,450 610,450 648,392\" fill=\"#0a0e16\" opacity=\".6\"/>\n<\/g>\n<g fill=\"#f2ecd9\" opacity=\".8\"><circle cx=\"60\" cy=\"20\" r=\"1.4\"/><circle cx=\"191\" cy=\"81\" r=\"1.4\"/><circle cx=\"322\" cy=\"142\" r=\"1.4\"/><circle cx=\"453\" cy=\"53\" r=\"1.4\"/><circle cx=\"584\" cy=\"114\" r=\"1.4\"/><circle cx=\"715\" cy=\"25\" r=\"1.4\"/><circle cx=\"146\" cy=\"86\" r=\"1.4\"/><circle cx=\"277\" cy=\"147\" r=\"1.4\"/><circle cx=\"408\" cy=\"58\" r=\"1.4\"/><circle cx=\"539\" cy=\"119\" r=\"1.4\"/><circle cx=\"670\" cy=\"30\" r=\"1.4\"/><circle cx=\"101\" cy=\"91\" r=\"1.4\"/><\/g>\n<\/svg>", "paras": ["　すると<ruby>二<rt>に<\/rt><\/ruby><ruby>月<rt>がつ<\/rt><\/ruby>の<ruby>末<rt>すえ<\/rt><\/ruby>の<ruby>或<rt>ある<\/rt><\/ruby><ruby>夜<rt>よる<\/rt><\/ruby>、<ruby>学校<rt>がっこう<\/rt><\/ruby>の<ruby>英吉利<rt>イギリス<\/rt><\/ruby><ruby>語<rt>ご<\/rt><\/ruby><ruby>講演会<rt>こうえんかい<\/rt><\/ruby>をやつと切り<ruby>上<rt>きりあ<\/rt><\/ruby>げた<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>生暖<rt>なまあたたか<\/rt><\/ruby>い<ruby>南風<rt>なんぷう<\/rt><\/ruby>に<ruby>吹<rt>ふ<\/rt><\/ruby>かれながら、<ruby>格別<rt>かくべつ<\/rt><\/ruby><ruby>買<rt>か<\/rt><\/ruby>ひ<ruby>物<rt>もの<\/rt><\/ruby>をする<ruby>気<rt>き<\/rt><\/ruby>もなしにふとこの<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>を<ruby>通<rt>とお<\/rt><\/ruby>りかかつた。<ruby>店<rt>みせ<\/rt><\/ruby>には<ruby>電燈<rt>でんとう<\/rt><\/ruby>のともつた<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>西洋<rt>せいよう<\/rt><\/ruby><ruby>酒<rt>しゅ<\/rt><\/ruby>の罎や<ruby>罐詰<rt>かんづ<\/rt><\/ruby>めなどがきらびやかに<ruby>並<rt>なら<\/rt><\/ruby>んでゐる。これは<ruby>勿論<rt>もちろん<\/rt><\/ruby><ruby>不思議<rt>ふしぎ<\/rt><\/ruby>ではない。しかしふと<ruby>気<rt>き<\/rt><\/ruby>がついて<ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>には<ruby>女<rt>おんな<\/rt><\/ruby>が<ruby>一人<rt>ひとり<\/rt><\/ruby>、<ruby>両手<rt>りょうて<\/rt><\/ruby>に<ruby>赤子<rt>あかご<\/rt><\/ruby>を抱へ（かかえ）たまま、<ruby>多愛<rt>たわい<\/rt><\/ruby>もないことをしやべつてゐる。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>店<rt>みせ<\/rt><\/ruby>から<ruby>往来<rt>おうらい<\/rt><\/ruby>へさした、<ruby>幅<rt>はば<\/rt><\/ruby>の<ruby>広<rt>ひろ<\/rt><\/ruby>い<ruby>電燈<rt>でんとう<\/rt><\/ruby>の<ruby>光<rt>ひか<\/rt><\/ruby>りに<ruby>忽<rt>たちま<\/rt><\/ruby>ちその<ruby>若<rt>わか<\/rt><\/ruby>い<ruby>母<rt>はは<\/rt><\/ruby>の<ruby>誰<rt>だれ<\/rt><\/ruby>であるかを<ruby>発見<rt>はっけん<\/rt><\/ruby>した。", "「あばばばばばば、ばあ！」", "　<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>店<rt>みせ<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>を<ruby>歩<rt>ある<\/rt><\/ruby>き<ruby>歩<rt>ある<\/rt><\/ruby>き、<ruby>面白<rt>おもしろ<\/rt><\/ruby>さうに<ruby>赤子<rt>あかご<\/rt><\/ruby>をあやしてゐる。それが<ruby>赤子<rt>あかご<\/rt><\/ruby>を<ruby>揺<rt>ゆ<\/rt><\/ruby>り<ruby>上<rt>あ<\/rt><\/ruby>げる<ruby>拍子<rt>ひょうし<\/rt><\/ruby>に<ruby>偶然<rt>ぐうぜん<\/rt><\/ruby><ruby>保吉<rt>やすきち<\/rt><\/ruby>と<ruby>目<rt>め<\/rt><\/ruby>を<ruby>合<rt>あわ<\/rt><\/ruby>はした。<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>咄嗟<rt>とっさ<\/rt><\/ruby>に<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>目<rt>め<\/rt><\/ruby>の<ruby>逡巡<rt>しゅんじゅん<\/rt><\/ruby>する<ruby>容子<rt>ようす<\/rt><\/ruby>を<ruby>想像<rt>そうぞう<\/rt><\/ruby>した。それから<ruby>夜目<rt>よめ<\/rt><\/ruby>にも<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>の<ruby>赤<rt>あか<\/rt><\/ruby>くなる<ruby>容子<rt>ようす<\/rt><\/ruby>を<ruby>想像<rt>そうぞう<\/rt><\/ruby>した。しかし<ruby>女<rt>おんな<\/rt><\/ruby>は<ruby>澄<rt>す<\/rt><\/ruby>ましてゐる。<ruby>目<rt>め<\/rt><\/ruby>も<ruby>静<rt>しず<\/rt><\/ruby>かに<ruby>頬笑<rt>ほほえ<\/rt><\/ruby>んでゐれば、<ruby>顔<rt>かお<\/rt><\/ruby>も<ruby>嬌羞<rt>けうしう<\/rt><\/ruby>などは<ruby>浮<rt>うか<\/rt><\/ruby>べてゐない。のみならず<ruby>意外<rt>いがい<\/rt><\/ruby>な<ruby>一瞬<rt>いっしゅん<\/rt><\/ruby><ruby>間<rt>かん<\/rt><\/ruby>の<ruby>後<rt>あと<\/rt><\/ruby>、揺り<ruby>上<rt>ゆりあ<\/rt><\/ruby>げた<ruby>赤子<rt>あかご<\/rt><\/ruby>へ<ruby>目<rt>め<\/rt><\/ruby>を<ruby>落<rt>おと<\/rt><\/ruby>すと、<ruby>人前<rt>ひとまえ<\/rt><\/ruby>も<ruby>羞<rt>は<\/rt><\/ruby>ぢずに繰り<ruby>返<rt>くりかえ<\/rt><\/ruby>した。", "「あばばばばばば、ばあ！」", "　<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>女<rt>おんな<\/rt><\/ruby>を<ruby>後<rt>うし<\/rt><\/ruby>ろにしながら、<ruby>我<rt>われ<\/rt><\/ruby><ruby>知<rt>し<\/rt><\/ruby>らずにやにや笑ひ（わらい）<ruby>出<rt>だ<\/rt><\/ruby>した。<ruby>女<rt>おんな<\/rt><\/ruby>はもう「あの<ruby>女<rt>おんな<\/rt><\/ruby>」ではない。<ruby>度胸<rt>どきょう<\/rt><\/ruby>の<ruby>好<rt>い<\/rt><\/ruby>い<ruby>母<rt>はは<\/rt><\/ruby>の<ruby>一人<rt>ひとり<\/rt><\/ruby>である。<ruby>一<rt>ひと<\/rt><\/ruby>たび<ruby>子<rt>こ<\/rt><\/ruby>の<ruby>為<rt>ため<\/rt><\/ruby>になつたが<ruby>最後<rt>さいご<\/rt><\/ruby>、<ruby>古来<rt>こらい<\/rt><\/ruby><ruby>如何<rt>いか<\/rt><\/ruby>なる<ruby>悪事<rt>あくじ<\/rt><\/ruby>をも<ruby>犯<rt>おか<\/rt><\/ruby>した、<ruby>恐<rt>おそ<\/rt><\/ruby>ろしい「<ruby>母<rt>はは<\/rt><\/ruby>」の<ruby>一人<rt>ひとり<\/rt><\/ruby>である。この<ruby>変化<rt>へんか<\/rt><\/ruby>は<ruby>勿論<rt>もちろん<\/rt><\/ruby><ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>為<rt>ため<\/rt><\/ruby>にはあらゆる<ruby>祝福<rt>しゅくふく<\/rt><\/ruby>を<ruby>与<rt>あた<\/rt><\/ruby>へても<ruby>好<rt>よ<\/rt><\/ruby>い。しかし<ruby>娘<rt>むすめ<\/rt><\/ruby>じみた<ruby>細君<rt>さいくん<\/rt><\/ruby>の<ruby>代<rt>かわ<\/rt><\/ruby>りに<ruby>図々<rt>づうづう<\/rt><\/ruby>しい<ruby>母<rt>はは<\/rt><\/ruby>を<ruby>見出<rt>みいだ<\/rt><\/ruby>したのは、……<ruby>保吉<rt>やすきち<\/rt><\/ruby>は<ruby>歩<rt>あゆ<\/rt><\/ruby>みつづけたまま、<ruby>茫然<rt>ぼうぜん<\/rt><\/ruby>と<ruby>家々<rt>いえいえ<\/rt><\/ruby>の<ruby>空<rt>そら<\/rt><\/ruby>を<ruby>見上<rt>みあ<\/rt><\/ruby>げた。<ruby>空<rt>そら<\/rt><\/ruby>には<ruby>南風<rt>みなみかぜ<\/rt><\/ruby>の<ruby>渡<rt>わた<\/rt><\/ruby>る<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>円<rt>まる<\/rt><\/ruby>い<ruby>春<rt>はる<\/rt><\/ruby>の<ruby>月<rt>つき<\/rt><\/ruby>が<ruby>一<rt>ひと<\/rt><\/ruby>つ、<ruby>白<rt>しろ<\/rt><\/ruby>じろとかすかにかかつてゐる。……", "（<ruby>大正<rt>たいしょう<\/rt><\/ruby><ruby>十二<rt>じゅうに<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby><ruby>十一<rt>じゅういち<\/rt><\/ruby><ruby>月<rt>がつ<\/rt><\/ruby>）"], "speech": ["すると、にがつの末のある夜、学校のイギリス語講演会を、やっと切り上げたやすきちは、なまあたたかい南風に吹かれながら、格別、買い物をする気もなしに、ふと、この店の前を通りかかった。店には、電燈のともった中に、西洋酒の瓶や缶詰などが、きらびやかに並んでいる。これはもちろん、不思議ではない。しかし、ふと気がついて見ると、店の前には女がひとり、両手に赤子を抱えたまま、たわいもないことを、しゃべっている。やすきちは、店から往来へさした、幅の広い電燈の光りに、たちまち、その若い母の、誰であるかを発見した。", "「あばばばばばば、ばあ！」", "女は、店の前を歩き歩き、面白そうに、赤子をあやしている。それが、赤子を揺り上げる拍子に、偶然、やすきちと目を合わした。やすきちは、とっさに、女の目の、しゅんじゅんする様子を想像した。それから、夜目にも、女の顔の赤くなる様子を想像した。しかし、女は澄ましている。目も静かに、ほほえんでいれば、顔も、きょうしゅうなどは浮かべていない。のみならず、意外な一瞬間の後、揺り上げた赤子へ目を落とすと、人前もはじずに、繰り返した。", "「あばばばばばば、ばあ！」", "やすきちは、女を後ろにしながら、我知らず、にやにや笑い出した。女はもう、「あの女」ではない。度胸のいい、母のひとりである。ひとたび、子のためになったが最後、古来、いかなる悪事をも犯した、恐ろしい「母」のひとりである。この変化は、もちろん、女のためには、あらゆる祝福を与えてもいい。しかし、娘じみた細君の代わりに、ずうずうしい母を見出したのは、……やすきちは、歩みつづけたまま、ぼうぜんと、家々の空を見上げた。空には、南風の渡る中に、円い春の月がひとつ、白じろと、かすかにかかっている。……", "大正十二年、十一月。"]}];
const $ = s => document.querySelector(s);
let cur = 0, playing = false, token = 0;
const synth = window.speechSynthesis;

function voices() {
  const v = synth ? synth.getVoices().filter(v => v.lang && v.lang.startsWith('ja')) : [];
  return v;
}
function fillVoices() {
  const sel = $('#voice'); const v = voices();
  sel.innerHTML = v.length ? '' : '<option>日本語音声なし</option>';
  // 落ち着いた声を優先: O-Ren > Otoya > Kyoko > その他
  const rank = n => /o.?ren/i.test(n) ? 0 : /otoya/i.test(n) ? 1 : /kyoko/i.test(n) ? 2 : 3;
  v.sort((a, b) => rank(a.name) - rank(b.name));
  v.forEach((vo, i) => {
    const o = document.createElement('option');
    o.value = vo.name; o.textContent = vo.name;
    if (i === 0) o.selected = true;
    sel.appendChild(o);
  });
}
if (synth) { fillVoices(); synth.onvoiceschanged = fillVoices; }

function render(i, keepPlaying) {
  cur = i;
  const sc = SCENES[i];
  const art = $('#art');
  art.classList.add('fade');
  setTimeout(() => { art.innerHTML = sc.art; art.classList.remove('fade'); }, 220);
  const t = $('#text');
  t.innerHTML = sc.paras.length
    ? sc.paras.map((p, j) => `<p data-j="${j}">${p}</p>`).join('')
    : '<div class="placeholder">▶ 朗読開始 を押すと、挿絵つきで自動朗読が始まります（← → で手めくりもできます）</div>';
  t.scrollTop = 0;
  $('#scenetitle').textContent = (i === 0 ? '' : '第' + i + '場　') + sc.title;
  $('#counter').textContent = (i + 1) + ' / ' + SCENES.length;
  if (keepPlaying && playing) speakScene(i);
}

function chunks(text) {
  const out = []; let buf = '';
  for (const ch of text) {
    buf += ch;
    if ('。！？'.includes(ch)) { out.push(buf); buf = ''; }
  }
  if (buf.trim()) out.push(buf);
  // 閉じ括弧を前の文へ
  return out.reduce((a, s) => {
    if (a.length && /^[」）』…‥]/.test(s.trim())) a[a.length - 1] += s; else a.push(s);
    return a;
  }, []);
}

function speak(text) {
  return new Promise(res => {
    const u = new SpeechSynthesisUtterance(text);
    const name = $('#voice').value;
    const vo = voices().find(v => v.name === name) || voices()[0];
    if (vo) u.voice = vo;
    u.lang = 'ja-JP';
    u.rate = +$('#rate').value;
    u.pitch = +$('#pitch').value;
    u.volume = +$('#vol').value;
    u.onend = res; u.onerror = res;
    synth.speak(u);
  });
}

async function speakScene(i) {
  const my = ++token;
  const sc = SCENES[i];
  const paras = [...document.querySelectorAll('#text p')];
  for (let j = 0; j < sc.speech.length; j++) {
    if (my !== token || !playing) return;
    paras.forEach(p => p.classList.remove('reading'));
    if (paras[j]) { paras[j].classList.add('reading'); paras[j].scrollIntoView({block: 'center'}); }
    for (const c of chunks(sc.speech[j])) {
      if (my !== token || !playing) return;
      await speak(c);
    }
    await new Promise(r => setTimeout(r, 300));
  }
  paras.forEach(p => p.classList.remove('reading'));
  if (my !== token || !playing) return;
  if ($('#auto').checked && i < SCENES.length - 1) {
    await new Promise(r => setTimeout(r, 900));
    if (my !== token || !playing) return;
    render(i + 1, true);
  } else if (i >= SCENES.length - 1) {
    playing = false; $('#play').textContent = '▶ 朗読開始';
  }
}

$('#play').onclick = () => {
  if (!synth) { alert('このブラウザは音声合成に対応していません'); return; }
  if (playing) { playing = false; token++; synth.cancel(); $('#play').textContent = '▶ 朗読開始'; return; }
  playing = true; $('#play').textContent = '⏸ 一時停止';
  synth.cancel();
  speakScene(cur);
};
$('#stop').onclick = () => { playing = false; token++; if (synth) synth.cancel();
  $('#play').textContent = '▶ 朗読開始';
  document.querySelectorAll('#text p').forEach(p => p.classList.remove('reading')); };
$('#prev').onclick = () => { if (cur > 0) { token++; if (synth) synth.cancel(); render(cur - 1, true); } };
$('#next').onclick = () => { if (cur < SCENES.length - 1) { token++; if (synth) synth.cancel(); render(cur + 1, true); } };
$('#ruby').onchange = e => document.body.classList.toggle('noruby', !e.target.checked);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') $('#prev').click();
  if (e.key === 'ArrowRight') $('#next').click();
  if (e.key === ' ') { e.preventDefault(); $('#play').click(); }
});
render(0, false);
</script>
</body>
</html>
