t>かね<\/rt><\/ruby>ではなくて、<ruby>貝殻<rt>かいがら<\/rt><\/ruby>でありました。お<ruby>婆<rt>ばあ<\/rt><\/ruby>さんは、<ruby>騙<rt>だま<\/rt><\/ruby>されたと<ruby>思<rt>おも<\/rt><\/ruby>うと<ruby>怒<rt>おこ<\/rt><\/ruby>って、<ruby>家<rt>うち<\/rt><\/ruby>から飛び<ruby>出<rt>とびだ<\/rt><\/ruby>して<ruby>見<rt>み<\/rt><\/ruby>ましたが、もはや、その<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>影<rt>かげ<\/rt><\/ruby>は、どちらにも<ruby>見<rt>み<\/rt><\/ruby>えなかったのであります。"],"speech":["ご","","ほんとうにおだやかなばんでありました。おじいさんとおばあさんは、とをしめてねてしまいました。","まよなかごろであります。とん、とん、とだれかとをたたくものがありました。としよりのものですからみみさとく、そのおとをききつけて、だれだろうとおもいました。","「どなた？」と、おばあさんはいいました。","けれどもそれにはこたえがなく、つづけて、とん、とん、ととをたたきました。","おばあさんはおきてきて、とをさいもくにあけてそとをのぞきました。すると、ひとりのいろのしろいおんながとぐちにたっていました。","おんなはろうそくをかいにきたのです。おばあさんは、すこしでもおかねがもうかるなら、けっしていやなかおつきをしませんでした。","おばあさんは、ろうそくのばこをだしておんなにみせました。そのとき、おばあさんはびっくりしました。おんなのながいくろいかみがびっしょりとみずにぬれてつきのひかりにかがやいていたからであります。おんなはばこのなかから、まっかなろうそくを取りとりあげました。そして、じっとそれにみいっていましたが、やがてぜにをはらってそのあかいろうそくをもってかえっていきました。","おばあさんは、あかりのところで、よくそのぜにをしらべてみますと、それはおかねではなくて、かいがらでありました。おばあさんは、だまされたとおもうとおこって、うちから飛びとびだしてみましたが、もはや、そのおんなのかげは、どちらにもみえなかったのであります。"]},{"t":"赤い蝋燭のたたり","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#0c1816\"/><path d=\"M-10 360 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0 q25 -26 50 0\" fill=\"none\" stroke=\"#2f5f5c\" stroke-width=\"7\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M-10 410 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0 q28 -20 56 0\" fill=\"none\" stroke=\"#26504c\" stroke-width=\"5\" opacity=\"0.85\" stroke-linecap=\"round\"/><polygon points=\"0,380 90,320 190,380 300,330 410,380 520,336 640,380 760,330 800,360 800,450 0,450\" fill=\"#12211d\" opacity=\"0.95\"/><polygon points=\"480,360 700,360 690,25 >とちゅう<\/rt><\/ruby>で<ruby>沖合<rt>おきあい<\/rt><\/ruby>にあった<ruby>頃<rt>ころ<\/rt><\/ruby>であります。","「この<ruby>大<rt>だい<\/rt><\/ruby><ruby>暴風<rt>ぼうふう<\/rt><\/ruby><ruby>雨<rt>う<\/rt><\/ruby>では、とてもあの<ruby>船<rt>ふね<\/rt><\/ruby>は<ruby>助<rt>たす<\/rt><\/ruby>かるまい」と、お<ruby>爺<rt>じい<\/rt><\/ruby>さんと、お<ruby>婆<rt>ばあ<\/rt><\/ruby>さんは、ふるふると<ruby>震<rt>ふる<\/rt><\/ruby>えながら<ruby>話<rt>はなし<\/rt><\/ruby>をしていました。","　<ruby>夜<rt>よる<\/rt><\/ruby>が<ruby>明<rt>あ<\/rt><\/ruby>けると<ruby>沖<rt>おき<\/rt><\/ruby>は<ruby>真暗<rt>まっくら<\/rt><\/ruby>で<ruby>物凄<rt>ものすご<\/rt><\/ruby>い<ruby>景色<rt>けしき<\/rt><\/ruby>でありました。その<ruby>夜<rt>よる<\/rt><\/ruby>、<ruby>難船<rt>なんせん<\/rt><\/ruby>をした<ruby>船<rt>ふね<\/rt><\/ruby>は、数えきれない<ruby>程<rt>かぞえきれないほど<\/rt><\/ruby>でありました。","　<ruby>不思議<rt>ふしぎ<\/rt><\/ruby>なことに、<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>が、<ruby>山<rt>やま<\/rt><\/ruby>のお<ruby>宮<rt>みや<\/rt><\/ruby>に<ruby>点<rt>とも<\/rt><\/ruby>った<ruby>晩<rt>ばん<\/rt><\/ruby>は、どんなに<ruby>天気<rt>てんき<\/rt><\/ruby>がよくても<ruby>忽<rt>たちま<\/rt><\/ruby>ち<ruby>大<rt>おお<\/rt><\/ruby>あらしになりました。それから、<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>は、<ruby>不吉<rt>ふきつ<\/rt><\/ruby>ということになりました。<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>の<ruby>年<rt>とし<\/rt><\/ruby>より<ruby>夫婦<rt>ふうふ<\/rt><\/ruby>は、<ruby>神<rt>かみ<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>の<ruby>罰<rt>ばつ<\/rt><\/ruby>が<ruby>当<rt>あた<\/rt><\/ruby>ったのだといって、それぎり<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>をやめてしまいました。","　しかし、<ruby>何処<rt>どこ<\/rt><\/ruby>からともなく、<ruby>誰<rt>だれ<\/rt><\/ruby>が、お<ruby>宮<rt>みや<\/rt><\/ruby>に<ruby>上<rt>あ<\/rt><\/ruby>げるものか、<ruby>毎晩<rt>まいばん<\/rt><\/ruby>、<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>が<ruby>点<rt>とぼ<\/rt><\/ruby>りました。<ruby>昔<rt>むかし<\/rt><\/ruby>は、このお<ruby>宮<rt>みや<\/rt><\/ruby>にあがった<ruby>絵<rt>え<\/rt><\/ruby>の<ruby>描<rt>えが<\/rt><\/ruby>いた<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>の<ruby>燃<rt>も<\/rt><\/ruby>えさしを<ruby>持<rt>も<\/rt><\/ruby>ってさえいれば、<ruby>決<rt>けっ<\/rt><\/ruby>して<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>では<ruby>災難<rt>さいなん<\/rt><\/ruby>に<ruby>罹<rt>かか<\/rt><\/ruby>らなかったものが、<ruby>今度<rt>こんど<\/rt><\/ruby>は、<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ただけでも、その<ruby>者<rt>もの<\/rt><\/ruby>はきっと<ruby>災難<rt>さいなん<\/rt><\/ruby>に<ruby>罹<rt>かか<\/rt><\/ruby>って、<ruby>海<rt>うみ<\/rt><\/ruby>に<ruby>溺<rt>おぼ<\/rt><\/ruby>れて<ruby>死<rt>し<\/rt><\/ruby>んだのであります。","　<ruby>忽<rt>たちま<\/rt><\/ruby>ち、この<ruby>噂<rt>うわさ<\/rt><\/ruby>が<ruby>世間<rt>せけん<\/rt><\/ruby>に<ruby>伝<rt>つた<\/rt><\/ruby>わると、もはや<ruby>誰<rt>だれ<\/rt><\/ruby>も、<ruby>山<rt>やま<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>のお<ruby>宮<rt>みや<\/rt><\/ruby>に<ruby>参詣<rt>さんけい<\/rt><\/ruby>する<ruby>者<rt>もの<\/rt><\/ruby>がなくなりました。こうして、<ruby>昔<rt>むかし<\/rt><\/ruby>、あらたかであった<ruby>神<rt>かみ<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>は、<ruby>今<rt>いま<\/rt><\/ruby>は、<ruby>町<rt>まち<\/rt><\/ruby>の<ruby>鬼門<rt>きもん<\/rt><\/ruby>となってしまいました。そして、こんなお<ruby>宮<rt>みや<\/rt><\/ruby>が、この<ruby>町<rt>まち<\/rt><\/ruby>になければいいのにと<ruby>怨<rt>うら<\/rt><\/ruby>まぬものはなかったのであります。","　<ruby>船乗<rt>ふなの<\/rt><\/ruby>りは、<ruby>沖<rt>おき<\/rt><\/ruby>から、お<ruby>宮<rt>みや<\/rt><\/ruby>のある<ruby>山<rt>やま<\/rt><\/ruby>を<ruby>眺<rt>なが<\/rt><\/ruby>めて<ruby>怖<rt>おそ<\/rt><\/ruby>れました。<ruby>夜<rt>よる<\/rt><\/ruby>になると、<ruby>北<rt>きた<\/rt><\/ruby>の<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>は<ruby>永<rt>とこしえ<\/rt><\/ruby>に<ruby>物凄<rt>ものすご<\/rt><\/ruby>うございました。はてしもなく、<ruby>何方<rt>どっち<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>まわしても<ruby>高<rt>たか<\/rt><\/ruby>い<ruby>波<rt>なみ<\/rt><\/ruby>がうねうねとうねっています。そして、<ruby>岩<rt>いわ<\/rt><\/ruby>に<ruby>砕<rt>くだ<\/rt><\/ruby>けては、<ruby>白<rt>しろ<\/rt><\/ruby>い<ruby>泡<rt>あわ<\/rt><\/ruby>が立ち<ruby>上<rt>たちのぼ<\/rt><\/ruby>っています。<ruby>月<rt>つき<\/rt><\/ruby>が<ruby>雲間<rt>くもま<\/rt><\/ruby>から<ruby>洩<rt>も<\/rt><\/ruby>れて<ruby>波<rt>なみ<\/rt><\/ruby>の<ruby>面<rt>めん<\/rt><\/ruby>を<ruby>照<rt>て<\/rt><\/ruby>らした<ruby>時<rt>とき<\/rt><\/ruby>は、まことに<ruby>気味<rt>きみ<\/rt><\/ruby><ruby>悪<rt>わる<\/rt><\/ruby>うございました。","　<ruby>真暗<rt>まっくら<\/rt><\/ruby>な、<ruby>星<rt>ほし<\/rt><\/ruby>も<ruby>見<rt>み<\/rt><\/ruby>えない、<ruby>雨<rt>あめ<\/rt><\/ruby>の<ruby>降<rt>ふ<\/rt><\/ruby>る<ruby>晩<rt>ばん<\/rt><\/ruby>に、<ruby>波<rt>なみ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>から、<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>の<ruby>光<rt>ひか<\/rt><\/ruby>りが、<ruby>漂<rt>ただよ<\/rt><\/ruby>って、だんだん<ruby>高<rt>たか<\/rt><\/ruby>く<ruby>登<rt>のぼ<\/rt><\/ruby>って、<ruby>山<rt>やま<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>のお<ruby>宮<rt>みや<\/rt><\/ruby>をさして、ちらちらと<ruby>動<rt>うご<\/rt><\/ruby>いて<ruby>行<rt>い<\/rt><\/ruby>くのを<ruby>見<rt>み<\/rt><\/ruby>た<ruby>者<rt>もの<\/rt><\/ruby>があります。","　<ruby>幾<rt>いく<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>も<ruby>経<rt>た<\/rt><\/ruby>たずして、その<ruby>下<rt>した<\/rt><\/ruby>の<ruby>町<rt>まち<\/rt><\/ruby>は<ruby>亡<rt>ほろ<\/rt><\/ruby>びて、<ruby>失<rt>なく<\/rt><\/ruby>なってしまいました。"],"speech":["そのよるのことであります。きゅうにそらのもようがかわって、ちかごろにないだいぼうふううとなりました。ちょうどやしが、むすめをおりのなかにいれて、ふねにのせてみなみのほうのくにへいくとちゅうでおきあいにあったころであります。","「このだいぼうふううでは、とてもあのふねはたすかるまい」と、おじいさんと、おばあさんは、ふるふるとふるえながらはなしをしていました。","よるがあけるとおきはまっくらでものすごいけしきでありました。そのよる、なんせんをしたふねは、数えきれないかぞえきれないほどでありました。","ふしぎなことに、あかいろうそくが、やまのおみやにともったばんは、どんなにてんきがよくてもたちまちおおあらしになりました。それから、あかいろうそくは、ふきつということになりました。ろうそくやのとしよりふうふは、かみさまのばつがあたったのだといって、それぎりろうそくやをやめてしまいました。","しかし、どこからともなく、だれが、おみやにあげるものか、まいばん、あかいろうそくがとぼりました。むかしは、このおみやにあがったえのえがいたろうそくのもえさしをもってさえいれば、けっしてうみのうえではさいなんにかからなかったものが、こんどは、あかいろうそくをみただけでも、そのものはきっとさいなんにかかって、うみにおぼれてしんだのであります。","たちまち、このうわさがせけんにつたわると、もはやだれも、やまのうえのおみやにさんけいするものがなくなりました。こうして、むかし、あらたかであったかみさまは、いまは、まちのきもんとなってしまいました。そして、こんなおみやが、このまちになければいいのにとうらまぬものはなかったのであります。","ふなのりは、おきから、おみやのあるやまをながめておそれました。よるになると、きたのうみのうえはとこしえにものすごうございました。はてしもなく、どっちをみまわしてもたかいなみがうねうねとうねっています。そして、いわにくだけては、しろいあわが立ちたちのぼっています。つきがくもまからもれてなみのめんをてらしたときは、まことにきみわるうございました。","まっくらな、ほしもみえない、あめのふるばんに、なみのうえから、ろうそくのひかりが、ただよって、だんだんたかくのぼって、やまのうえのおみやをさして、ちらちらとうごいていくのをみたものがあります。","いくねんもたたずして、そのしたのまちはほろびて、なくなってしまいました。"]}]}];
const $ = s => document.querySelector(s);
let W = null, cur = 0, playing = false, token = 0;
const synth = window.speechSynthesis;
const sleep = ms => new Promise(r => setTimeout(r, ms));

function voices() {
  return synth ? synth.getVoices().filter(v => v.lang && v.lang.startsWith('ja')) : [];
}
function fillVoices() {
  const sel = $('#voice'); const v = voices();
  sel.innerHTML = v.length ? '' : '<option>日本語音声なし</option>';
  const rank = n => /o.?ren/i.test(n) ? 0 : /otoya/i.test(n) ? 1 : /kyoko/i.test(n) ? 2 : 3;
  v.sort((a, b) => rank(a.name) - rank(b.name));
  v.forEach((vo, i) => {
    const o = document.createElement('option');
    o.value = vo.name; o.textContent = vo.name; if (i === 0) o.selected = true;
    sel.appendChild(o);
  });
}
if (synth) { fillVoices(); synth.onvoiceschanged = fillVoices; }

/* ---------- 一覧 ---------- */
function renderHome() {
  const g = $('#grid'); g.innerHTML = '';
  LIB.forEach((w, i) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<div class="cv">${w.cover}</div><div class="meta"><div class="t">${w.title}</div>` +
      `<div class="a">${w.author} ・ 朗読 約${w.mins}分 ・ ${w.scenes.length - 1}場</div></div>`;
    d.onclick = () => openWork(i);
    g.appendChild(d);
  });
}
function goHome() {
  stopAll();
  W = null;
  $('#home').style.display = 'block'; $('#player').style.display = 'none';
  $('#back').style.display = 'none'; $('#play').style.display = 'none'; $('#stop').style.display = 'none';
  $('#ttl').textContent = '紙芝居朗読ライブラリ'; $('#counter').textContent = '';
  history.replaceState(null, '', location.pathname);
}
function fitArt() {
  const s = $('#stage'), b = $('#artbox');
  if (!s.clientWidth) return;
  const w = Math.floor(Math.min(s.clientWidth - 20, (s.clientHeight - 8) * 16 / 9));
  b.style.width = w + 'px';
  b.style.height = Math.round(w * 9 / 16) + 'px';
}
window.addEventListener('resize', fitArt);

function openWork(i, autoplay) {
  W = LIB[i]; cur = 0;
  $('#home').style.display = 'none'; $('#player').style.display = 'flex';
  $('#back').style.display = ''; $('#play').style.display = ''; $('#stop').style.display = '';
  $('#ttl').textContent = W.title + '　' + W.author;
  history.replaceState(null, '', '#w=' + W.id);
  const dots = $('#dots'); dots.innerHTML = '';
  W.scenes.forEach((s, j) => {
    const sp = document.createElement('span');
    sp.title = s.t; sp.onclick = () => { token++; if (synth) synth.cancel(); render(j, true); };
    dots.appendChild(sp);
  });
  render(0, false);
  requestAnimationFrame(fitArt);
  if (autoplay) $('#play').click();
}

/* ---------- 場面 ---------- */
function render(i, keepPlaying) {
  cur = i;
  const sc = W.scenes[i];
  const art = $('#art');
  art.classList.add('fade');
  setTimeout(() => { art.innerHTML = sc.art; art.classList.remove('fade'); }, 260);
  const t = $('#text');
  t.innerHTML = sc.paras.length
    ? sc.paras.map((p, j) => `<p data-j="${j}" class="${/^[「（]/.test(p.replace(/<[^>]+>/g, '').trim()) ? 'serifu' : ''}">${p}</p>`).join('')
    : '<div class="placeholder">▶ 朗読開始 で挿絵つきの自動朗読が始まります（← → で手めくり）</div>';
  t.scrollTop = 0;
  $('#scenetitle').textContent = (i === 0 ? '表紙' : '第' + i + '場　' + sc.t);
  $('#counter').textContent = (i + 1) + ' / ' + W.scenes.length;
  document.querySelectorAll('#dots span').forEach((d, j) => d.classList.toggle('on', j === i));
  if (keepPlaying && playing) speakScene(i);
}

/* ---------- 朗読(失敗検知つき) ---------- */
function speak(text) {
  return new Promise(res => {
    const u = new SpeechSynthesisUtterance(text);
    const vo = voices().find(v => v.name === $('#voice').value) || voices()[0];
    if (vo) u.voice = vo;
    u.lang = 'ja-JP';
    u.rate = +$('#rate').value; u.pitch = +$('#pitch').value; u.volume = +$('#vol').value;
    const t0 = performance.now();
    let settled = false;
    const done = () => { if (settled) return; settled = true; clearTimeout(wd); res(performance.now() - t0); };
    u.onend = done; u.onerror = done;
    const wd = setTimeout(() => { synth.cancel(); done(); }, 90000);
    synth.speak(u);
  });
}
function chunks(text) {
  const out = []; let buf = '';
  for (const ch of text) { buf += ch; if ('。！？'.includes(ch)) { out.push(buf); buf = ''; } }
  if (buf.trim()) out.push(buf);
  return out.reduce((a, s) => {
    if (a.length && /^[」）』…‥]/.test(s.trim())) a[a.length - 1] += s; else a.push(s);
    return a;
  }, []);
}
async function speakChunk(c, my) {
  const core = c.replace(/[\s、。「」！？…‥―（）]/g, '');
  const min = Math.min(700, Math.max(280, core.length * 45));
  for (let attempt = 0; attempt < 3; attempt++) {
    const ms = await speak(c);
    if (my !== token || !playing) return 'aborted';
    if (ms >= min || core.length <= 2) return 'ok';
    synth.cancel(); await sleep(350);
    try { synth.resume(); } catch (e) {}
  }
  return 'dead';
}
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 6000);
}
function stopAll() {
  playing = false; token++; if (synth) synth.cancel();
  $('#play').textContent = '▶ 朗読開始';
  document.querySelectorAll('#text p').forEach(p => p.classList.remove('reading'));
}
async function speakScene(i) {
  const my = ++token;
  await sleep(260);
  if (my !== token || !playing) return;
  const sc = W.scenes[i];
  const paras = [...document.querySelectorAll('#text p')];
  for (let j = 0; j < sc.speech.length; j++) {
    if (my !== token || !playing) return;
    paras.forEach(p => p.classList.remove('reading'));
    if (paras[j]) { paras[j].classList.add('reading'); paras[j].scrollIntoView({block: 'center'}); }
    for (const c of chunks(sc.speech[j])) {
      if (my !== token || !playing) return;
      const r = await speakChunk(c, my);
      if (r === 'aborted') return;
      if (r === 'dead') { stopAll(); $('#play').textContent = '▶ 再開'; toast('音声が停止しました。▶ 再開 を押してください'); return; }
    }
    await sleep(280);
  }
  paras.forEach(p => p.classList.remove('reading'));
  if (my !== token || !playing) return;
  if ($('#auto').checked && i < W.scenes.length - 1) {
    await sleep(900);
    if (my !== token || !playing) return;
    render(i + 1, true);
  } else if (i >= W.scenes.length - 1) {
    playing = false; $('#play').textContent = '▶ 朗読開始';
    toast('おしまい　―― ' + W.title + ' ――');
  }
}
setInterval(() => { if (playing && synth && synth.speaking) { try { synth.resume(); } catch (e) {} } }, 8000);

/* ---------- 操作 ---------- */
$('#play').onclick = () => {
  if (!synth) { toast('このブラウザは音声合成に対応していません'); return; }
  if (playing) { stopAll(); return; }
  playing = true; $('#play').textContent = '⏸ 一時停止';
  synth.cancel();
  speakScene(cur);
};
$('#stop').onclick = stopAll;
$('#back').onclick = goHome;
$('#prev').onclick = () => { if (W && cur > 0) { token++; if (synth) synth.cancel(); render(cur - 1, true); } };
$('#next').onclick = () => { if (W && cur < W.scenes.length - 1) { token++; if (synth) synth.cancel(); render(cur + 1, true); } };
$('#ruby').onchange = e => document.body.classList.toggle('noruby', !e.target.checked);
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft') $('#prev').click();
  if (e.key === 'ArrowRight') $('#next').click();
  if (e.key === ' ' && W) { e.preventDefault(); $('#play').click(); }
  if (e.key === 'Escape') goHome();
});

renderHome();
const m = location.hash.match(/#w=([a-z]+)/);
if (m) { const i = LIB.findIndex(w => w.id === m[1]); if (i >= 0) openWork(i); }
</script>
