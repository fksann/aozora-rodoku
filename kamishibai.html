0\" y=\"360\" width=\"800\" height=\"90\" fill=\"#c9b489\" rx=\"0\" opacity=\"0.6\"/><polygon points=\"0,360 60,300 120,360 180,290 260,360 330,300 400,360 470,296 560,360 640,306 730,360 800,300 800,450 0,450\" fill=\"#8a7050\" opacity=\"0.9\"/><rect x=\"70\" y=\"322\" width=\"12\" height=\"18\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.9\"/><rect x=\"200\" y=\"322\" width=\"12\" height=\"18\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.9\"/><rect x=\"330\" y=\"322\" width=\"12\" height=\"18\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.9\"/><rect x=\"460\" y=\"322\" width=\"12\" height=\"18\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.9\"/><rect x=\"590\" y=\"322\" width=\"12\" height=\"18\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.9\"/><rect x=\"720\" y=\"322\" width=\"12\" height=\"18\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.9\"/><polygon points=\"377.2,400 383.2,330.4 392.8,311.2 408.4,311.2 416.8,330.4 422.8,400\" fill=\"#26364a\" opacity=\"1\"/><circle cx=\"400\" cy=\"296.8\" r=\"15.6\" fill=\"#26364a\" opacity=\"1\"/><circle cx=\"660\" cy=\"90\" r=\"68.0\" fill=\"#e8dcc0\" opacity=\"0.13\"/><circle cx=\"660\" cy=\"90\" r=\"40\" fill=\"#e8dcc0\" opacity=\"1\"/><g fill=\"#e8dcc0\" opacity=\"0.7\"><circle cx=\"189\" cy=\"107\" r=\"1.2\"/><circle cx=\"326\" cy=\"36\" r=\"1.9\"/><circle cx=\"463\" cy=\"125\" r=\"2.5999999999999996\"/><circle cx=\"600\" cy=\"54\" r=\"1.2\"/><circle cx=\"737\" cy=\"143\" r=\"1.9\"/><circle cx=\"134\" cy=\"72\" r=\"2.5999999999999996\"/><circle cx=\"271\" cy=\"161\" r=\"1.2\"/><circle cx=\"408\" cy=\"90\" r=\"1.9\"/><circle cx=\"545\" cy=\"19\" r=\"2.5999999999999996\"/><circle cx=\"682\" cy=\"108\" r=\"1.2\"/><\/g><\/svg>","paras":["　メロスは<ruby>激怒<rt>げきど<\/rt><\/ruby>した。<ruby>必<rt>かなら<\/rt><\/ruby>ず、かの<ruby>邪智暴虐<rt>じゃちぼうぎゃく<\/rt><\/ruby>の<ruby>王<rt>おう<\/rt><\/ruby>を<ruby>除<rt>のぞ<\/rt><\/ruby>かなければならぬと<ruby>決意<rt>けつい<\/rt><\/ruby>した。メロスには<ruby>政治<rt>せいじ<\/rt><\/ruby>がわからぬ。メロスは、<ruby>村<rt>むら<\/rt><\/ruby>の<ruby>牧人<rt>ぼくじん<\/rt><\/ruby>である。<ruby>笛<rt>ふえ<\/rt><\/ruby>を<ruby>吹<rt>ふ<\/rt><\/ruby>き、<ruby>羊<rt>ひつじ<\/rt><\/ruby>と<ruby>遊<rt>あそ<\/rt><\/ruby>んで<ruby>暮<rt>くら<\/rt><\/ruby>して<ruby>来<rt>き<\/rt><\/ruby>た。けれども<ruby>邪悪<rt>じゃあく<\/rt><\/ruby>に<ruby>対<rt>たい<\/rt><\/ruby>しては、<ruby>人<rt>ひと<\/rt><\/ruby><ruby>一<rt>いち<\/rt><\/ruby><ruby>倍<rt>ばい<\/rt><\/ruby>に<ruby>敏感<rt>びんかん<\/rt><\/ruby>であった。きょう<ruby>未明<rt>みめい<\/rt><\/ruby>メロスは<ruby>村<rt>むら<\/rt><\/ruby>を<ruby>出発<rt>しゅっぱつ<\/rt><\/ruby>し、<ruby>野<rt>の<\/rt><\/ruby>を<ruby>越<rt>こ<\/rt><\/ruby>え<ruby>山越<rt>やまご<\/rt><\/ruby>え、<ruby>十<rt>じゅう<\/rt><\/ruby><ruby>里<rt>り<\/rt><\/ruby>はなれた<ruby>此<rt>こ<\/rt><\/ruby>のシラクスの<ruby>市<rt>し<\/rt><\/ruby>にやって<ruby>来<rt>き<\/rt><\/ruby>た。メロスには<ruby>父<rt>ちち<\/rt><\/ruby>も、<ruby>母<rt>はは<\/rt><\/ruby>も<ruby>無<rt>な<\/rt><\/ruby>い。<ruby>女房<rt>にょうぼう<\/rt><\/ruby>も<ruby>無<rt>な<\/rt><\/ruby>い。<ruby>十六<rt>じゅうろく<\/rt><\/ruby>の、<ruby>内気<rt>うちき<\/rt><\/ruby>な<ruby>妹<rt>いもうと<\/rt><\/ruby>と<ruby>二人<rt>ふたり<\/rt><\/ruby><ruby>暮<rt>くら<\/rt><\/ruby>しだ。この<ruby>妹<rt>いもうと<\/rt><\/ruby>は、<ruby>村<rt>むら<\/rt><\/ruby>の<ruby>或<rt>あ<\/rt><\/ruby>る<ruby>律気<rt>りちぎ<\/rt><\/ruby>な<ruby>一<rt>いち<\/rt><\/ruby><ruby>牧人<rt>ぼくじん<\/rt><\/ruby>を、<ruby>近々<rt>ちかじか<\/rt><\/ruby>、<ruby>花婿<rt>はなむこ<\/rt><\/ruby>として<ruby>迎<rt>むか<\/rt><\/ruby>える<ruby>事<rt>こと<\/rt><\/ruby>になっていた。<ruby>結婚式<rt>けっこんしき<\/rt><\/ruby>も<ruby>間近<rt>まじか<\/rt><\/ruby>かなのである。メロスは、それゆえ、<ruby>花嫁<rt>はなよめ<\/rt><\/ruby>の<ruby>衣裳<rt>いしょう<\/rt><\/ruby>やら<ruby>祝宴<rt>しゅくえん<\/rt><\/ruby>の<ruby>御馳走<rt>ごちそう<\/rt><\/ruby>やらを<ruby>買<rt>か<\/rt><\/ruby>いに、はるばる<ruby>市<rt>し<\/rt><\/ruby>にやって<ruby>来<rt>き<\/rt><\/ruby>たのだ。<ruby>先<rt>ま<\/rt><\/ruby>ず、その<ruby>品々<rt>しなじな<\/rt><\/ruby>を買い<ruby>集<rt>かいあつ<\/rt><\/ruby>め、それから<ruby>都<rt>と<\/rt><\/ruby>の<ruby>大路<rt>おおじ<\/rt><\/ruby>をぶらぶら<ruby>歩<rt>ある<\/rt><\/ruby>いた。メロスには<ruby>竹馬<rt>ちくば<\/rt><\/ruby>の<ruby>友<rt>とも<\/rt><\/ruby>があった。セリヌンティウスである。<ruby>今<rt>いま<\/rt><\/ruby>は<ruby>此<rt>これ<\/rt><\/ruby>のシラクスの<ruby>市<rt>し<\/rt><\/ruby>で、<ruby>石工<rt>せっこう<\/rt><\/ruby>をしている。その<ruby>友<rt>とも<\/rt><\/ruby>を、これから<ruby>訪<rt>たず<\/rt><\/ruby>ねてみるつもりなのだ。<ruby>久<rt>ひさ<\/rt><\/ruby>しく<ruby>逢<rt>あ<\/rt><\/ruby>わなかったのだから、<ruby>訪<rt>たず<\/rt><\/ruby>ねて<ruby>行<rt>い<\/rt><\/ruby>くのが<ruby>楽<rt>たの<\/rt><\/ruby>しみである。<ruby>歩<rt>ある<\/rt><\/ruby>いているうちにメロスは、まちの<ruby>様子<rt>ようす<\/rt><\/ruby>を<ruby>怪<rt>あや<\/rt><\/ruby>しく<ruby>思<rt>おも<\/rt><\/ruby>った。ひっそりしている。もう<ruby>既<rt>すで<\/rt><\/ruby>に<ruby>日<rt>ひ<\/rt><\/ruby>も<ruby>落<rt>お<\/rt><\/ruby>ちて、まちの<ruby>暗<rt>くら<\/rt><\/ruby>いのは<ruby>当<rt>あた<\/rt><\/ruby>りまえだが、けれども、なんだか、<ruby>夜<rt>よる<\/rt><\/ruby>のせいばかりでは<ruby>無<rt>な<\/rt><\/ruby>く、<ruby>市<rt>し<\/rt><\/ruby><ruby>全体<rt>ぜんたい<\/rt><\/ruby>が、やけに<ruby>寂<rt>さび<\/rt><\/ruby>しい。のんきなメロスも、だんだん<ruby>不安<rt>ふあん<\/rt><\/ruby>になって<ruby>来<rt>き<\/rt><\/ruby>た。<ruby>路<rt>みち<\/rt><\/ruby>で<ruby>逢<rt>あ<\/rt><\/ruby>った若い<ruby>衆<rt>わかいしゅ<\/rt><\/ruby>をつかまえて、<ruby>何<rt>なん<\/rt><\/ruby>かあったのか、<ruby>二<rt>に<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>まえに<ruby>此<rt>こ<\/rt><\/ruby>の<ruby>市<rt>し<\/rt><\/ruby>に<ruby>来<rt>き<\/rt><\/ruby>たときは、<ruby>夜<rt>よる<\/rt><\/ruby>でも<ruby>皆<rt>みな<\/rt><\/ruby>が<ruby>歌<rt>うた<\/rt><\/ruby>をうたって、まちは<ruby>賑<rt>にぎ<\/rt><\/ruby>やかであった<ruby>筈<rt>はず<\/rt><\/ruby>だが、と<ruby>質問<rt>しつもん<\/rt><\/ruby>した。若い<ruby>衆<rt>わかいしゅ<\/rt><\/ruby>は、<ruby>首<rt>くび<\/rt><\/ruby>を<ruby>振<rt>ふ<\/rt><\/ruby>って<ruby>答<rt>こた<\/rt><\/ruby>えなかった。しばらく<ruby>歩<rt>ある<\/rt><\/ruby>いて<ruby>老爺<rt>ろうや<\/rt><\/ruby>に<ruby>逢<rt>あ<\/rt><\/ruby>い、こんどはもっと、<ruby>語勢<rt>ごせい<\/rt><\/ruby>を<ruby>強<rt>つよ<\/rt><\/ruby>くして<ruby>質問<rt>しつもん<\/rt><\/ruby>した。<ruby>老爺<rt>ろうや<\/rt><\/ruby>は<ruby>答<rt>こた<\/rt><\/ruby>えなかった。メロスは<ruby>両手<rt>りょうて<\/rt><\/ruby>で<ruby>老爺<rt>ろうや<\/rt><\/ruby>のからだをゆすぶって<ruby>質問<rt>しつもん<\/rt><\/ruby>を<ruby>重<rt>かさ<\/rt><\/ruby>ねた。<ruby>老爺<rt>ろうや<\/rt><\/ruby>は、あたりをはばかる<ruby>低声<rt>ていせい<\/rt><\/ruby>で、わずか<ruby>答<rt>こた<\/rt><\/ruby>えた。","「<ruby>王様<rt>おうさま<\/rt><\/ruby>は、<ruby>人<rt>ひと<\/rt><\/ruby>を<ruby>殺<rt>ころ<\/rt><\/ruby>します。」","「なぜ<ruby>殺<rt>ころ<\/rt><\/ruby>すのだ。」","「<ruby>悪心<rt>あくしん<\/rt><\/ruby>を<ruby>抱<rt>いだ<\/rt><\/ruby>いている、というのですが、<ruby>誰<rt>だれ<\/rt><\/ruby>もそんな、<ruby>悪心<rt>あくしん<\/rt><\/ruby>を<ruby>持<rt>も<\/rt><\/ruby>っては<ruby>居<rt>お<\/rt><\/ruby>りませぬ。」","「たくさんの<ruby>人<rt>ひと<\/rt><\/ruby>を<ruby>殺<rt>ころ<\/rt><\/ruby>したのか。」","「はい、はじめは<ruby>王様<rt>おうさま<\/rt><\/ruby>の<ruby>妹婿<rt>いもうとむこ<\/rt><\/ruby>さまを。それから、<ruby>御自身<rt>ごじしん<\/rt><\/ruby>のお<ruby>世嗣<rt>よつぎ<\/rt><\/ruby>を。それから、<ruby>妹<rt>いもうと<\/rt><\/ruby>さまを。それから、<ruby>妹<rt>いもうと<\/rt><\/ruby>さまの<ruby>御子<rt>みこ<\/rt><\/ruby>さまを。それから、<ruby>皇后<rt>こうごう<\/rt><\/ruby>さまを。それから、<ruby>賢臣<rt>けんしん<\/rt><\/ruby>のアレキス<ruby>様<rt>さま<\/rt><\/ruby>を。」","「おどろいた。<ruby>国王<rt>こくおう<\/rt><\/ruby>は<ruby>乱心<rt>らんしん<\/rt><\/ruby>か。」","「いいえ、<ruby>乱心<rt>らんしん<\/rt><\/ruby>ではございませぬ。<ruby>人<rt>ひと<\/rt><\/ruby>を、<ruby>信<rt>しん<\/rt><\/ruby>ずる<ruby>事<rt>こと<\/rt><\/ruby>が<ruby>出来<rt>でき<\/rt><\/ruby>ぬ、というのです。このごろは、<ruby>臣下<rt>しんか<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>をも、お<ruby>疑<rt>うたが<\/rt><\/ruby>いになり、<ruby>少<rt>すこ<\/rt><\/ruby>しく<ruby>派手<rt>はで<\/rt><\/ruby>な<ruby>暮<rt>くら<\/rt><\/ruby>しをしている<ruby>者<rt>もの<\/rt><\/ruby>には、<ruby>人質<rt>ひとじち<\/rt><\/ruby>ひとりずつ差し<ruby>出<rt>さしだ<\/rt><\/ruby>すことを<ruby>命<rt>めい<\/rt><\/ruby>じて<ruby>居<rt>お<\/rt><\/ruby>ります。<ruby>御<rt>ご<\/rt><\/ruby><ruby>命令<rt>めいれい<\/rt><\/ruby>を<ruby>拒<rt>こば<\/rt><\/ruby>めば<ruby>十字架<rt>じゅうじか<\/rt><\/ruby>にかけられて、<ruby>殺<rt>ころ<\/rt><\/ruby>されます。きょうは、<ruby>六<rt>ろく<\/rt><\/ruby><ruby>人<rt>にん<\/rt><\/ruby><ruby>殺<rt>ころ<\/rt><\/ruby>されました。」","　<ruby>聞<rt>き<\/rt><\/ruby>いて、メロスは<ruby>激怒<rt>げきど<\/rt><\/ruby>した。「<ruby>呆<rt>あき<\/rt><\/ruby>れた<ruby>王<rt>おう<\/rt><\/ruby>だ。<ruby>生<rt>い<\/rt><\/ruby>かして<ruby>置<rt>お<\/rt><\/ruby>けぬ。」"],"speech":["メロスはげきどした。かならず、かのじゃちぼうぎゃくのおうをのぞかなければならぬとけついした。メロスにはせいじがわからぬ。メロスは、むらのぼくじんである。ふえをふき、ひつじとあそんでくらしてきた。けれどもじゃあくにたいしては、ひといちばいにびんかんであった。きょうみめいメロスはむらをしゅっぱつし、のをこえやまごえ、じゅうりはなれたこのシラクスのしにやってきた。メロスにはちちも、ははもない。にょうぼうもない。じゅうろくの、うちきないもうととふたりくらしだ。このいもうとは、むらのあるりちぎないちぼくじんを、ちかじか、はなむことしてむかえることになっていた。けっこんしきもまじかかなのである。メロスは、それゆえ、はなよめのいしょうやらしゅくえんのごちそうやらをかいに、はるばるしにやってきたのだ。まず、そのしなじなを買いかいあつめ、それからとのおおじをぶらぶらあるいた。メロスにはちくばのともがあった。セリヌンティウスである。いまはこれのシラクスのしで、せっこうをしている。そのともを、これからたずねてみるつもりなのだ。ひさしくあわなかったのだから、たずねていくのがたのしみである。あるいているうちにメロスは、まちのようすをあやしくおもった。ひっそりしている。もうすでにひもおちて、まちのくらいのはあたりまえだが、けれども、なんだか、よるのせいばかりではなく、しぜんたいが、やけにさびしい。のんきなメロスも、だんだんふあんになってきた。みちであった若いわかいしゅをつかまえて、なんかあったのか、にねんまえにこのしにきたときは、よるでもみながうたをうたって、まちはにぎやかであったはずだが、としつもんした。若いわかいしゅは、くびをふってこたえなかった。しばらくあるいてろうやにあい、こんどはもっと、ごせいをつよくしてしつもんした。ろうやはこたえなかった。メロスはりょうてでろうやのからだをゆすぶってしつもんをかさねた。ろうやは、あたりをはばかるていせいで、わずかこたえた。","「おうさまは、ひとをころします。」","「なぜころすのだ。」","「あくしんをいだいている、というのですが、だれもそんな、あくしんをもってはおりませぬ。」","「たくさんのひとをころしたのか。」","「はい、はじめはおうさまのいもうとむこさまを。それから、ごじしんのおよつぎを。それから、いもうとさまを。それから、いもうとさまのみこさまを。それから、こうごうさまを。それから、けんしんのアレキスさまを。」","「おどろいた。こくおうはらんしんか。」","「いいえ、らんしんではございませぬ。ひとを、しんずることができぬ、というのです。このごろは、しんかのこころをも、おうたがいになり、すこしくはでなくらしをしているものには、ひとじちひとりずつ差しさしだすことをめいじております。ごめいれいをこばめばじゅうじかにかけられて、ころされます。きょうは、ろくにんころされました。」","きいて、メロスはげきどした。「あきれたおうだ。いかしておけぬ。」"]},{"t":"王城の問答","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#2a2233\"/><rect x=\"0\" y=\"0\" width=\"800\" height=\"450\" fill=\"#2a2233\" rx=\"0\" opacity=\"1\"/><rect x=\"90\" y=\"0\" width=\"26\" height=\"450\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><rect x=\"210\" y=\"0\" width=\"26\" height=\"450\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><rect x=\"330\" y=\"0\" width=\"26\" height=\"450\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><rect x=\"450\" y=\"0\" width=\"26\" height=\"450\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><rect x=\"570\" y=\"0\" width=\"26\" height=\"450\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><rect x=\"690\" y=\"0\" width=\"26\" height=\"450\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><rect x=\"490\" y=\"130\" width=\"190\" height=\"320\" fill=\"#6e2a34\" rx=\"0\" opacity=\"0.8\"/><polygon points=\"490,130 680,130 660,80 510,80\" fill=\"#6e2a34\" opacity=\"0.8\"/><g transform=\"translate(585 260)\"><rect x=\"-44\" y=\"0\" width=\"88\" height=\"60\" fill=\"#1d1826\"/><circle cx=\"0\" cy=\"-24\" r=\"15\" fill=\"#40364a\"/><path d=\"M-30 40 q0 -50 30 -50 q30 0 30 50 z\" fill=\"#40364a\"/><path d=\"M-16 -34 h32 l-4 -12 h-24 z\" fill=\"#d9a441\"/><\/g><polygon points=\"195.3,430 201.8,354.6 212.2,333.8 229.1,333.8 238.2,354.6 244.7,430\" fill=\"#c4552d\" opacity=\"1\"/><circle cx=\"220\" cy=\"318.2\" r=\"16.900000000000002\" fill=\"#c4552d\" opacity=\"1\"/><line x1=\"238\" y1=\"348\" x2=\"262\" y2=\"368\" stroke=\"#c9c2b4\" stroke-width=\"4\" opacity=\"1\" stroke-linecap=\"round\"/><\/svg>","paras":["　メロスは、<ruby>単純<rt>たんじゅん<\/rt><\/ruby>な<ruby>男<rt>おとこ<\/rt><\/ruby>であった。買い<ruby>物<rt>かいもの<\/rt><\/ruby>を、<ruby>背負<rt>せお<\/rt><\/ruby>ったままで、のそのそ<ruby>王城<rt>おうじょう<\/rt><\/ruby>にはいって<ruby>行<rt>い<\/rt><\/ruby>った。たちまち<ruby>彼<rt>かれ<\/rt><\/ruby>は、<ruby>巡邏<rt>じゅんら<\/rt><\/ruby>の<ruby>警吏<rt>けいり<\/rt><\/ruby>に<ruby>捕縛<rt>ほばく<\/rt><\/ruby>された。<ruby>調<rt>しら<\/rt><\/ruby>べられて、メロスの<ruby>懐中<rt>かいちゅう<\/rt><\/ruby>からは<ruby>短剣<rt>たんけん<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>き<\/rt><\/ruby>たので、<ruby>騒<rt>さわ<\/rt><\/ruby>ぎが<ruby>大<rt>おお<\/rt><\/ruby>きくなってしまった。メロスは、<ruby>王<rt>おう<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>に引き<ruby>出<rt>ひきだ<\/rt><\/ruby>された。","「この<ruby>短刀<rt>たんとう<\/rt><\/ruby>で<ruby>何<rt>なん<\/rt><\/ruby>をするつもりであったか。<ruby>言<rt>い<\/rt><\/ruby>え！」<ruby>暴君<rt>ぼうくん<\/rt><\/ruby>ディオニスは<ruby>静<rt>しず<\/rt><\/ruby>かに、けれども<ruby>威厳<rt>いげん<\/rt><\/ruby>を<ruby>以<rt>もっ<\/rt><\/ruby>て<ruby>問<rt>と<\/rt><\/ruby>いつめた。その<ruby>王<rt>おう<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>は<ruby>蒼白<rt>そうはく<\/rt><\/ruby>で、<ruby>眉間<rt>みけん<\/rt><\/ruby>の<ruby>皺<rt>しわ<\/rt><\/ruby>は、刻み<ruby>込<rt>きざみこ<\/rt><\/ruby>まれたように<ruby>深<rt>ぶか<\/rt><\/ruby>かった。","「<ruby>市<rt>し<\/rt><\/ruby>を<ruby>暴君<rt>ぼうくん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>から<ruby>救<rt>すく<\/rt><\/ruby>うのだ。」とメロスは<ruby>悪<rt>わる<\/rt><\/ruby>びれずに<ruby>答<rt>こた<\/rt><\/ruby>えた。","「おまえがか？」<ruby>王<rt>おう<\/rt><\/ruby>は、<ruby>憫笑<rt>びんしょう<\/rt><\/ruby>した。「<ruby>仕方<rt>しかた<\/rt><\/ruby>の<ruby>無<rt>な<\/rt><\/ruby>いやつじゃ。おまえには、わしの<ruby>孤独<rt>こどく<\/rt><\/ruby>がわからぬ。」","「<ruby>言<rt>ゆ<\/rt><\/ruby>うな！」とメロスは、いきり<ruby>立<rt>た<\/rt><\/ruby>って<ruby>反駁<rt>はんばく<\/rt><\/ruby>した。「<ruby>人<rt>ひと<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>疑<rt>うたが<\/rt><\/ruby>うのは、<ruby>最<rt>もっと<\/rt><\/ruby>も<ruby>恥<rt>は<\/rt><\/ruby>ずべき<ruby>悪徳<rt>あくとく<\/rt><\/ruby>だ。<ruby>王<rt>おう<\/rt><\/ruby>は、<ruby>民<rt>みん<\/rt><\/ruby>の<ruby>忠誠<rt>ちゅうせい<\/rt><\/ruby>をさえ<ruby>疑<rt>うたが<\/rt><\/ruby>って<ruby>居<rt>い<\/rt><\/ruby>られる。」","「<ruby>疑<rt>うたが<\/rt><\/ruby>うのが、<ruby>正当<rt>せいとう<\/rt><\/ruby>の<ruby>心構<rt>こころがま<\/rt><\/ruby>えなのだと、わしに<ruby>教<rt>おし<\/rt><\/ruby>えてくれたのは、おまえたちだ。<ruby>人<rt>ひと<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>は、あてにならない。<ruby>人間<rt>にんげん<\/rt><\/ruby>は、もともと<ruby>私慾<rt>しよく<\/rt><\/ruby>のかたまりさ。<ruby>信<rt>しん<\/rt><\/ruby>じては、ならぬ。」<ruby>暴君<rt>ぼうくん<\/rt><\/ruby>は<ruby>落着<rt>おちつ<\/rt><\/ruby>いて<ruby>呟<rt>つぶや<\/rt><\/ruby>き、ほっと<ruby>溜息<rt>ためいき<\/rt><\/ruby>をついた。「わしだって、<ruby>平和<rt>へいわ<\/rt><\/ruby>を<ruby>望<rt>のぞ<\/rt><\/ruby>んでいるのだが。」","「なんの<ruby>為<rt>ため<\/rt><\/ruby>の<ruby>平和<rt>へいわ<\/rt><\/ruby>だ。<ruby>自分<rt>じぶん<\/rt><\/ruby>の<ruby>地位<rt>ちい<\/rt><\/ruby>を<ruby>守<rt>まも<\/rt><\/ruby>る<ruby>為<rt>ため<\/rt><\/ruby>か。」こんどはメロスが<ruby>嘲笑<rt>ちょうしょう<\/rt><\/ruby>した。「<ruby>罪<rt>つみ<\/rt><\/ruby>の<ruby>無<rt>な<\/rt><\/ruby>い<ruby>人<rt>ひと<\/rt><\/ruby>を<ruby>殺<rt>ころ<\/rt><\/ruby>して、<ruby>何<rt>なん<\/rt><\/ruby>が<ruby>平和<rt>へいわ<\/rt><\/ruby>だ。」","「だまれ、<ruby>下賤<rt>げせん<\/rt><\/ruby>の<ruby>者<rt>もの<\/rt><\/ruby>。」<ruby>王<rt>おう<\/rt><\/ruby>は、さっと<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>挙<rt>あ<\/rt><\/ruby>げて<ruby>報<rt>むく<\/rt><\/ruby>いた。「<ruby>口<rt>くち<\/rt><\/ruby>では、どんな<ruby>清<rt>きよ<\/rt><\/ruby>らかな<ruby>事<rt>こと<\/rt><\/ruby>でも<ruby>言<rt>い<\/rt><\/ruby>える。わしには、<ruby>人<rt>ひと<\/rt><\/ruby>の<ruby>腹<rt>ふく<\/rt><\/ruby><ruby>綿<rt>わた<\/rt><\/ruby>の<ruby>奥底<rt>おくそこ<\/rt><\/ruby>が見え<ruby>透<rt>みえす<\/rt><\/ruby>いてならぬ。おまえだって、いまに、<ruby>磔<rt>はりつけ<\/rt><\/ruby>になってから、<ruby>泣<rt>な<\/rt><\/ruby>いて<ruby>詫<rt>わ<\/rt><\/ruby>びたって<ruby>聞<rt>き<\/rt><\/ruby>かぬぞ。」","「ああ、<ruby>王<rt>おう<\/rt><\/ruby>は<ruby>悧巧<rt> >し<\/rt><\/ruby>にセリヌンティウスという<ruby>石工<rt>せっこう<\/rt><\/ruby>がいます。<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>無二<rt>むに<\/rt><\/ruby>の<ruby>友人<rt>ゆうじん<\/rt><\/ruby>だ。あれを、<ruby>人質<rt>ひとじち<\/rt><\/ruby>としてここに<ruby>置<rt>お<\/rt><\/ruby>いて<ruby>行<rt>い<\/rt><\/ruby>こう。<ruby>私<rt>わたくし<\/rt><\/ruby>が<ruby>逃<rt>に<\/rt><\/ruby>げてしまって、<ruby>三<rt>みっ<\/rt><\/ruby><ruby>日<rt>か<\/rt><\/ruby><ruby>目<rt>め<\/rt><\/ruby>の<ruby>日暮<rt>ひぐれ<\/rt><\/ruby>まで、ここに<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>こ<\/rt><\/ruby>なかったら、あの<ruby>友人<rt>ゆうじん<\/rt><\/ruby>を絞め<ruby>殺<rt>しめころ<\/rt><\/ruby>して<ruby>下<rt>くだ<\/rt><\/ruby>さい。たのむ、そうして<ruby>下<rt>くだ<\/rt><\/ruby>さい。」","　それを<ruby>聞<rt>き<\/rt><\/ruby>いて<ruby>王<rt>おう<\/rt><\/ruby>は、<ruby>残虐<rt>ざんぎゃく<\/rt><\/ruby>な<ruby>気持<rt>きもち<\/rt><\/ruby>で、そっと<ruby>北叟笑<rt>ほくそえ<\/rt><\/ruby>んだ。<ruby>生意気<rt>なまいき<\/rt><\/ruby>なことを<ruby>言<rt>ゆ<\/rt><\/ruby>うわい。どうせ<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>こ<\/rt><\/ruby>ないにきまっている。この<ruby>嘘<rt>うそ<\/rt><\/ruby>つきに<ruby>騙<rt>だま<\/rt><\/ruby>された<ruby>振<rt>ふ<\/rt><\/ruby>りして、<ruby>放<rt>はな<\/rt><\/ruby>してやるのも<ruby>面白<rt>おもしろ<\/rt><\/ruby>い。そうして<ruby>身代<rt>みがわ<\/rt><\/ruby>りの<ruby>男<rt>おとこ<\/rt><\/ruby>を、<ruby>三<rt>みっ<\/rt><\/ruby><ruby>日<rt>か<\/rt><\/ruby><ruby>目<rt>め<\/rt><\/ruby>に<ruby>殺<rt>ころ<\/rt><\/ruby>してやるのも<ruby>気味<rt>きみ<\/rt><\/ruby>がいい。<ruby>人<rt>ひと<\/rt><\/ruby>は、これだから<ruby>信<rt>しん<\/rt><\/ruby>じられぬと、わしは<ruby>悲<rt>かな<\/rt><\/ruby>しい<ruby>顔<rt>かお<\/rt><\/ruby>して、その<ruby>身代<rt>みがわ<\/rt><\/ruby>りの<ruby>男<rt>おとこ<\/rt><\/ruby>を<ruby>磔刑<rt>たっけい<\/rt><\/ruby>に<ruby>処<rt>しょ<\/rt><\/ruby>してやるのだ。世の<ruby>中<rt>よのなか<\/rt><\/ruby>の、<ruby>正直<rt>しょうじき<\/rt><\/ruby><ruby>者<rt>もの<\/rt><\/ruby>とかいう<ruby>奴輩<rt>やつばら<\/rt><\/ruby>にうんと<ruby>見<rt>み<\/rt><\/ruby>せつけてやりたいものさ。","「<ruby>願<rt>ねが<\/rt><\/ruby>いを、<ruby>聞<rt>き<\/rt><\/ruby>いた。その<ruby>身代<rt>みがわ<\/rt><\/ruby>りを<ruby>呼<rt>よ<\/rt><\/ruby>ぶがよい。<ruby>三<rt>みっ<\/rt><\/ruby><ruby>日<rt>か<\/rt><\/ruby><ruby>目<rt>め<\/rt><\/ruby>には<ruby>日没<rt>にちぼつ<\/rt><\/ruby>までに<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>こ<\/rt><\/ruby>い。おくれたら、その<ruby>身代<rt>みがわ<\/rt><\/ruby>りを、きっと<ruby>殺<rt>ころ<\/rt><\/ruby>すぞ。ちょっとおくれて<ruby>来<rt>く<\/rt><\/ruby>るがいい。おまえの<ruby>罪<rt>つみ<\/rt><\/ruby>は、<ruby>永遠<rt>えいえん<\/rt><\/ruby>にゆるしてやろうぞ。」","「なに、<ruby>何<rt>なん<\/rt><\/ruby>をおっしゃる。」","「はは。いのちが<ruby>大事<rt>だいじ<\/rt><\/ruby>だったら、おくれて<ruby>来<rt>こ<\/rt><\/ruby>い。おまえの<ruby>心<rt>こころ<\/rt><\/ruby>は、わかっているぞ。」","　メロスは<ruby>口惜<rt>くや<\/rt><\/ruby>しく、<ruby>地団駄<rt>じだんだ<\/rt><\/ruby><ruby>踏<rt>ふ<\/rt><\/ruby>んだ。ものも<ruby>言<rt>い<\/rt><\/ruby>いたくなくなった。","　<ruby>竹馬<rt>ちくば<\/rt><\/ruby>の<ruby>友<rt>とも<\/rt><\/ruby>、セリヌンティウスは、<ruby>深夜<rt>しんや<\/rt><\/ruby>、<ruby>王城<rt>おうじょう<\/rt><\/ruby>に<ruby>召<rt>め<\/rt><\/ruby>された。<ruby>暴君<rt>ぼうくん<\/rt><\/ruby>ディオニスの<ruby>面前<rt>めんぜん<\/rt><\/ruby>で、<ruby>佳<rt>よ<\/rt><\/ruby>き<ruby>友<rt>とも<\/rt><\/ruby>と<ruby>佳<rt>よ<\/rt><\/ruby>き<ruby>友<rt>とも<\/rt><\/ruby>は、<ruby>二<rt>に<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>ぶりで<ruby>相<rt>あい<\/rt><\/ruby><ruby>逢<rt>お<\/rt><\/ruby>うた。メロスは、<ruby>友<rt>とも<\/rt><\/ruby>に<ruby>一切<rt>いっさい<\/rt><\/ruby>の<ruby>事情<rt>じじょう<\/rt><\/ruby>を<ruby>語<rt>かた<\/rt><\/ruby>った。セリヌンティウスは<ruby>無言<rt>むごん<\/rt><\/ruby>で<ruby>首肯<rt>うなず<\/rt><\/ruby>き、メロスをひしと<ruby>抱<rt>だ<\/rt><\/ruby>きしめた。<ruby>友<rt>とも<\/rt><\/ruby>と<ruby>友<rt>とも<\/rt><\/ruby>の<ruby>間<rt>あいだ<\/rt><\/ruby>は、それでよかった。セリヌンティウスは、<ruby>縄<rt>なわ<\/rt><\/ruby><ruby>打<rt>う<\/rt><\/ruby>たれた。メロスは、すぐに<ruby>出発<rt>しゅっぱつ<\/rt><\/ruby>した。<ruby>初夏<rt>しょか<\/rt><\/ruby>、<ruby>満天<rt>まんてん<\/rt><\/ruby>の<ruby>星<rt>ほし<\/rt><\/ruby>である。"],"speech":["メロスは、たんじゅんなおとこであった。買いかいものを、せおったままで、のそのそおうじょうにはいっていった。たちまちかれは、じゅんらのけいりにほばくされた。しらべられて、メロスのかいちゅうからはたんけんがでてきたので、さわぎがおおきくなってしまった。メロスは、おうのまえに引きひきだされた。","「このたんとうでなんをするつもりであったか。いえ！」ぼうくんディオニスはしずかに、けれどもいげんをもってといつめた。そのおうのかおはそうはくで、みけんのしわは、刻みきざみこまれたようにぶかかった。","「しをぼうくんのてからすくうのだ。」とメロスはわるびれずにこたえた。","「おまえがか？」おうは、びんしょうした。「しかたのないやつじゃ。おまえには、わしのこどくがわからぬ。」","「ゆうな！」とメロスは、いきりたってはんばくした。「ひとのこころをうたがうのは、もっともはずべきあくとくだ。おうは、みんのちゅうせいをさえうたがっていられる。」","「うたがうのが、せいとうのこころがまえなのだと、わしにおしえてくれたのは、おまえたちだ。ひとのこころは、あてにならない。にんげんは、もともとしよくのかたまりさ。しんじては、ならぬ。」ぼうくんはおちついてつぶやき、ほっとためいきをついた。「わしだって、へいわをのぞんでいるのだが。」","「なんのためのへいわだ。じぶんのちいをまもるためか。」こんどはメロスがちょうしょうした。「つみのないひとをころして、なんがへいわだ。」","「だまれ、げせんのもの。」おうは、さっとかおをあげてむくいた。「くちでは、どんなきよらかなことでもいえる。わしには、ひとのふくわたのおくそこが見えみえすいてならぬ。おまえだって、いまに、はりつけになってから、ないてわびたってきかぬぞ。」","「ああ、おうはりこうだ。うぬぼれているがよい。わたくしは、ちゃんとしぬるかくごでいるのに。いのちごいなどけっしてしない。ただ、――」といいかけて、メロスはあしもとにしせんをおとししゅんじためらい、「ただ、わたくしにじょうをかけたいつもりなら、しょけいまでにみっかかんのにちげんをあたえてください。たったひとりのいもうとに、ていしゅをもたせてやりたいのです。みっかのうちに、わたくしはむらでけっこんしきをあげさせ、かならず、ここへかえってきます。」","「ばかな。」とぼうくんは、しわがれたこえでひくくわらった。「とんでもないうそをゆうわい。にがしたことりがかえってくるというのか。」","「そうです。かえってくるのです。」メロスはひっしで言いいいはった。「わたくしはやくそくをまもります。わたくしを、みっかかんだけゆるしてください。いもうとが、わたくしのかえりをまっているのだ。そんなにわたくしをしんじられないならば、よろしい、このしにセリヌンティウスというせっこうがいます。わたくしのむにのゆうじんだ。あれを、ひとじちとしてここにおいていこう。わたくしがにげてしまって、みっかめのひぐれまで、ここにかえってこなかったら、あのゆうじんを絞めしめころしてください。たのむ、そうしてください。」","それをきいておうは、ざんぎゃくなきもちで、そっとほくそえんだ。なまいきなことをゆうわい。どうせかえってこないにきまっている。このうそつきにだまされたふりして、はなしてやるのもおもしろい。そうしてみがわりのおとこを、みっかめにころしてやるのもきみがいい。ひとは、これだからしんじられぬと、わしはかなしいかおして、そのみがわりのおとこをたっけいにしょしてやるのだ。世のよのなかの、しょうじきものとかいうやつばらにうんとみせつけてやりたいものさ。","「ねがいを、きいた。そのみがわりをよぶがよい。みっかめにはにちぼつまでにかえってこい。おくれたら、そのみがわりを、きっところすぞ。ちょっとおくれてくるがいい。おまえのつみは、えいえんにゆるしてやろうぞ。」","「なに、なんをおっしゃる。」","「はは。いのちがだいじだったら、おくれてこい。おまえのこころは、わかっているぞ。」","メロスはくやしく、じだんだふんだ。ものもいいたくなくなった。","ちくばのとも、セリヌンティウスは、しんや、おうじょうにめされた。ぼうくんディオニスのめんぜんで、よきともとよきともは、にねんぶりであいおうた。メロスは、ともにいっさいのじじょうをかたった。セリヌンティウスはむごんでうなずき、メロスをひしとだきしめた。ともととものあいだは、それでよかった。セリヌンティウスは、なわうたれた。メロスは、すぐにしゅっぱつした。しょか、まんてんのほしである。"]},{"t":"妹の婚礼","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3d4a5c\"/><polygon points=\"0,340 200,300 420,336 640,296 800,330 800,450 0,450\" fill=\"#3f5a44\" opacity=\"1\"/><rect x=\"300\" y=\"310\" width=\"150\" height=\"90\" fill=\"#e8dcc0\" rx=\"0\" opacity=\"1\"/><polygon points=\"290,310 460,310 436,284 314,284\" fill=\"#6e4a34\" opacity=\"1\"/><rect x=\"314\" y=\"328\" width=\"26\" height=\"30\" fill=\"#d9a441\" rx=\"0\" opacity=\"1\"/><rect x=\"356\" y=\"328\" width=\"26\" height=\"30\" fill=\"#d9a441\" rx=\"0\" opacity=\"1\"/><rect x=\"398\" y=\"328\" width=\"26\" height=\"30\" fill=\"#d9a441\" rx=\"0\" opacity=\"1\"/><rect x=\"359.0\" y=\"356\" width=\"32\" height=\"44\" fill=\"#3a2f28\" rx=\"2\" opacity=\"0.85\"/><line x1=\"60\" y1=\"40\" x2=\"44\" y2=\"90\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"150\" y1=\"70\" x2=\"134\" y2=\"120\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"240\" y1=\"100\" x2=\"224\" y2=\"150\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"330\" y1=\"130\" x2=\"314\" y2=\"180\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"420\" y1=\"40\" x2=\"404\" y2=\"90\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"510\" y1=\"70\" x2=\"494\" y2=\"120\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"600\" y1=\"100\" x2=\"584\" y2=\"150\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"690\" y1=\"130\" x2=\"674\" y2=\"180\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><line x1=\"780\" y1=\"40\" x2=\"764\" y2=\"90\" stroke=\"#8ca8c9\" stroke-width=\"2\" opacity=\"0.55\" stroke-linecap=\"round\"/><polygon points=\"211.95,402 216.7,346.9 224.3,331.7 236.65,331.7 243.3,346.9 248.05,402\" fill=\"#26364a\" opacity=\"1\"/><circle cx=\"230\" cy=\"320.3\" r=\"12.35\" fill=\"#26364a\" opacity=\"1\"/><polygon points=\"502.9,404 507.4,351.8 514.6,337.4 526.3,337.4 532.6,351.8 537.1,404\" fill=\"#6e2a34\" opacity=\"1\"/><circle cx=\"520\" cy=\"326.6\" r=\"11.700000000000001\" fill=\"#6e2a34\" opacity=\"1\"/><polygon points=\"544.8,402 548.8,355.6 555.2,342.8 565.6,342.8 571.2,355.6 575.2,402\" fill=\"#8a5a6e\" opacity=\"1\"/><circle cx=\"560\" cy=\"333.2\" r=\"10.4\" fill=\"#8a5a6e\" opacity=\"1\"/><circle cx=\ 、ぶるんと<ruby>両腕<rt>りょううで<\/rt><\/ruby>を<ruby>大<rt>おお<\/rt><\/ruby>きく<ruby>振<rt>ふ<\/rt><\/ruby>って、<ruby>雨中<rt>うちゅう<\/rt><\/ruby>、<ruby>矢<rt>や<\/rt><\/ruby>の<ruby>如<rt>ごと<\/rt><\/ruby>く走り<ruby>出<rt>はしりで<\/rt><\/ruby>た。"],"speech":["メロスはそのよる、いっすいもせずじゅうりのみちをいそぎにいそいで、むらへとうちゃくしたのは、あくるひのごぜん、ひはすでにたかくのぼって、むらびとたちはのにでてしごとをはじめていた。メロスのじゅうろくのいもうとも、きょうはあにのかわりにようぐんのばんをしていた。よろめいてあるいてくるあにの、ひろうこんぱいのすがたをみつけておどろいた。そうして、うるさくあににしつもんをあびせた。","「なんでもない。」メロスはむりにわらおうとつとめた。「しにようじをのこしてきた。またすぐしにいかなければならぬ。あす、おまえのけっこんしきをあげる。はやいほうがよかろう。」","いもうとはほおをあからめた。","「うれしいか。きれいないしょうもかってきた。さあ、これからいって、むらのひとたちにしらせてこい。けっこんしきは、あすだと。」","メロスは、また、よろよろとあるきだし、いえへかえってかみがみのさいだんをかざり、しゅくえんのせきをととのえ、まもなくゆかに倒れたおれふし、こきゅうもせぬくらいのふかいねむりにおちてしまった。","めがさめたのはよるだった。メロスはおきてすぐ、はなむこのいえをおとずれた。そうして、すこしじじょうがあるから、けっこんしきをあすにしてくれ、とたのんだ。むこのぼくじんはおどろき、それはいけない、こちらにはいまだなんのしたくもできていない、ぶどうのきせつまでまってくれ、とこたえた。メロスは、まつことはできぬ、どうかあすにしてくれたまえ、とさらにおしてたのんだ。むこのぼくじんもがんきょうであった。なかなかしょうだくしてくれない。よあけまでぎろんをつづけて、やっと、どうにかむこをなだめ、すかして、説きときふせた。けっこんしきは、まひるにおこなわれた。しんろうしんぷの、かみがみへのせんせいがすんだころ、くろくもがそらをおおい、ぽつりぽつりあめがふりだし、やがてしゃじくをながすようなおおあめとなった。しゅくえんにれっせきしていたむらびとたちは、なんかふきつなものをかんじたが、それでも、めいめいきもちをひきたて、せまいいえのなかで、むんむん蒸しむしあついのもこらえ、ようきにうたをうたい、てをうった。メロスも、まんめんにきしょくをたたえ、しばらくは、おうとのあのやくそくをさえわすれていた。しゅくえんは、よるにはいっていよいよみだれはなやかになり、ひとびとは、そとのごううをまったくきにしなくなった。メロスは、いっしょうこのままここにいたい、とおもった。このよいひとたちとしょうがいくらしていきたいとねがったが、いまは、じぶんのからだで、じぶんのものではない。ままならぬことである。メロスは、わがみにむちうち、ついにしゅっぱつをけついした。あすのにちぼつまでには、まだじゅうぶんのときがある。ちょっとひとねむりして、それからすぐにしゅっぱつしよう、とかんがえた。そのころには、あめもこぶりになっていよう。すこしでもながくこのいえにぐずぐずとどまっていたかった。メロスほどのおとこにも、やはりみれんのじょうというものはある。こよいぼうぜん、かんきによっているらしいはなよめにちかより、","「おめでとう。わたくしはつかれてしまったから、ちょっとごめんこうむってねむりたい。めがさめたら、すぐにしにでかける。たいせつなようじがあるのだ。わたくしがいなくても、もうおまえにはやさしいていしゅがあるのだから、けっしてさびしいことはない。おまえのあにの、いちばんきらいなものは、ひとをうたがうことと、それから、うそをつくことだ。おまえも、それは、しっているね。ていしゅとのあいだに、どんなひみつでもつくってはならぬ。おまえにいいたいのは、それだけだ。おまえのあには、たぶんえらいおとこなのだから、おまえもそのほこりをもっていろ。」","はなよめは、ゆめみここちでうなずいた。メロスは、それからはなむこのかたをたたいて、","「したくのないのはおたがいさまさ。わたくしのいえにも、たからといっては、いもうととひつじだけだ。ほかには、なんもない。ぜんぶあげよう。もうひとつ、メロスのおとうとになったことをほこってくれ。」","はなむこはもみてして、てれていた。メロスはわらってむらびとたちにもえしゃくして、えんせきから立ちたちさり、ひつじこやにもぐりこんで、しんだようにふかくねむった。","めがさめたのは翌るあくるひのはくめいのころである。メロスは跳ねはねおき、なむさん、ねすごしたか、いや、まだまだだいじょうぶ、これからすぐにしゅっぱつすれば、やくそくのこくげんまでにはじゅうふんかんにあう。きょうはぜひとも、あのおうに、ひとのしんじつのそんするところをみせてやろう。そうしてわらってはりつけのだいにのぼってやる。メロスは、ゆうゆうとみしたくをはじめた。あめも、いくぶんこぶりになっているようすである。みしたくはできた。さて、メロスは、ぶるんとりょううでをおおきくふって、うちゅう、やのごとく走りはしりでた。"]},{"t":"氾濫の川","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3d4a5c\"/><polygon points=\"0,220 800,140 800,450 0,450\" fill=\"#26364a\" opacity=\"1\"/><path d=\"M-10 240 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0 q32 -22 64 0\" fill=\"none\" stroke=\"#5b7c9e\" stroke-width=\"7\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M-10 300 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0 q30 -26 60 0\" fill=\"none\" stroke=\"#4a6b8c\" stroke-width=\"8\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M-10 370 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0 q33 -20 66 0\" fill=\"none\" stroke=\"#5b7c9e\" stroke-width=\"6\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M80 200 q60 -30 130 -10\" fill=\"none\" stroke=\"#e8dcc0\" stroke-width=\"3\" opacity=\"0.5\" stroke-linecap=\"round\"/><polygon points=\"107.1,196 137.0,156.9 150.8,147.7 125.5,193.7\" fill=\"#c4552d\" opacity=\"1\"/><polygon points=\"169.2,145.4 189.9,177.6 203.7,179.9 180.7,143.1\" fill=\"#c4552d\" opacity=\"1\"/><polygon points=\"141.6,150.0 153.1,108.60000000000001 178.4,113.2 173.8,152.3\" fill=\"#c4552d\" opacity=\"1\"/><polygon points=\"150.8,115.5 120.9,129.3 116.30000000000001,138.5 148.5,124.7\" fill=\"#c4552d\" opacity=\"1\"/><polygon points=\"173.8,115.5 201.4,104.0 206.0,113.2 178.4,124.7\" fill=\"#c4552d\" opacity=\"1\"/><circle cx=\"178.4\" cy=\"99.4\" r=\"12.649999999999999\" fill=\"#c4552d\" opacity=\"1\"/><path d=\"M480 70 q108.0 -14 240 -2\" fill=\"none\" stroke=\"#5c6e84\" stroke-width=\"12\" opacity=\"0.9\" stroke-linecap=\"round\"/><path d=\"M420 110 q90.0 -14 200 -2\" fill=\"none\" stroke=\"#5c6e84\" stroke-width=\"9\" opacity=\"0.7\" stroke-linecap=\"round\"/><\/svg>","paras":["　<ruby>私<rt>わたくし<\/rt><\/ruby>は、<ruby>今宵<rt>こよい<\/rt><\/ruby>、<ruby>殺<rt>ころ<\/rt><\/ruby>される。<ruby>殺<rt>ころ<\/rt><\/ruby>される<ruby>為<rt>ため<\/rt><\/ruby>に<ruby>走<rt>はし<\/rt><\/ruby>るのだ。<ruby>身代<rt>みがわ<\/rt><\/ruby>りの<ruby>友<rt>とも<\/rt><\/ruby>を<ruby>救<rt>すく<\/rt><\/ruby>う<ruby>為<rt>ため<\/rt><\/ruby>に<ruby>走<rt>はし<\/rt><\/ruby>るのだ。<ruby>王<rt>おう<\/rt><\/ruby>の<ruby>奸佞<rt>かんねい<\/rt><\/ruby><ruby>邪智<rt>じゃち<\/rt><\/ruby>を打ち<ruby>破<rt>うちやぶ<\/rt><\/ruby>る<ruby>為<rt>ため<\/rt><\/ruby>に<ruby>走<rt>はし<\/rt><\/ruby>るのだ。<ruby>走<rt>はし<\/rt><\/ruby>らなければならぬ。そうして、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>殺<rt>ころ<\/rt><\/ruby>される。<ruby>若<rt>わか<\/rt><\/ruby>い<ruby>時<rt>とき<\/rt><\/ruby>から<ruby>名誉<rt>めいよ<\/rt><\/ruby>を<ruby>守<rt>まも<\/rt><\/ruby>れ。さらば、ふるさと。<ruby>若<rt>わか<\/rt><\/ruby>いメロスは、つらかった。<ruby>幾度<rt>いくど<\/rt><\/ruby>か、<ruby>立<rt>た<\/rt><\/ruby>ちどまりそうになった。えい、えいと<ruby>大声<rt>おおごえ<\/rt><\/ruby><ruby>挙<rt>あ<\/rt><\/ruby>げて<ruby>自身<rt>じしん<\/rt><\/ruby>を<ruby>叱<rt>しか<\/rt><\/ruby>りながら<ruby>走<rt>はし<\/rt><\/ruby>った。<ruby>村<rt>むら<\/rt><\/ruby>を<ruby>出<rt>で<\/rt><\/ruby>て、<ruby>野<rt>の<\/rt><\/ruby>を<ruby>横切<rt>よこぎ<\/rt><\/ruby>り、<ruby>森<rt>もり<\/rt><\/ruby>をくぐり<ruby>抜<rt>ぬ<\/rt><\/ruby>け、<ruby>隣村<rt>りんそん<\/rt><\/ruby>に<ruby>着<rt>つ<\/rt><\/ruby>いた<ruby>頃<rt>ころ<\/rt><\/ruby>には、<ruby>雨<rt>あめ<\/rt><\/ruby>も<ruby>止<rt>や<\/rt><\/ruby>み、<ruby>日<rt>ひ<\/rt><\/ruby>は<ruby>高<rt>たか<\/rt><\/ruby>く<ruby>昇<rt>のぼ<\/rt><\/ruby>って、そろそろ<ruby>暑<rt>あつ<\/rt><\/ruby>くなって<ruby>来<rt>き<\/rt><\/ruby>た。メロスは<ruby>額<rt>ひたい<\/rt><\/ruby>の<ruby>汗<rt>あせ<\/rt><\/ruby>をこぶしで<ruby>払<rt>はら<\/rt><\/ruby>い、ここまで<ruby>来<rt>く<\/rt><\/ruby>れば<ruby>大丈夫<rt>だいじょうぶ<\/rt><\/ruby>、もはや<ruby>故郷<rt>こきょう<\/rt><\/ruby>への<ruby>未練<rt>みれん<\/rt><\/ruby>は<ruby>無<rt>な<\/rt><\/ruby>い。<ruby>妹<rt>いもうと<\/rt><\/ruby>たちは、きっと<ruby>佳<rt>よ<\/rt><\/ruby>い<ruby>夫婦<rt>ふうふ<\/rt><\/ruby>になるだろう。<ruby>私<rt>わたくし<\/rt><\/ruby>には、いま、なんの<ruby>気<rt>き<\/rt><\/ruby>がかりも<ruby>無<rt>な<\/rt><\/ruby>い<ruby>筈<rt>はず<\/rt><\/ruby>だ。まっすぐに<ruby>王城<rt>おうじょう<\/rt><\/ruby>に行き<ruby>着<rt>いきつ<\/rt><\/ruby>けば、それでよいのだ。そんなに<ruby>急<rt>いそ<\/rt><\/ruby>ぐ<ruby>必要<rt>ひつよう<\/rt><\/ruby>も<ruby>無<rt>な<\/rt><\/ruby>い。ゆっくり<ruby>歩<rt>ある<\/rt><\/ruby>こう、と<ruby>持<rt>も<\/rt><\/ruby>ちまえの<ruby>呑気<rt>のんき<\/rt><\/ruby>さを取り<ruby>返<rt>とりかえ<\/rt><\/ruby>し、<ruby>好<rt>す<\/rt><\/ruby>きな<ruby>小歌<rt>こうた<\/rt><\/ruby>をいい<ruby>声<rt>こえ<\/rt><\/ruby>で歌い<ruby>出<rt>うたいだ<\/rt><\/ruby>した。ぶらぶら<ruby>歩<rt>ある<\/rt><\/ruby>いて<ruby>二<rt>に<\/rt><\/ruby><ruby>里<rt>り<\/rt><\/ruby><ruby>行<rt>い<\/rt><\/ruby>き<ruby>三<rt>さん<\/rt><\/ruby><ruby>里<rt>り<\/rt><\/ruby><ruby>行<rt>い<\/rt><\/ruby>き、そろそろ<ruby>全<rt>ぜん<\/rt><\/ruby><ruby>里程<rt>りてい<\/rt><\/ruby>の<ruby>半<rt>なか<\/rt><\/ruby>ばに<ruby>到達<rt>とうたつ<\/rt><\/ruby>した<ruby>頃<rt>ころ<\/rt><\/ruby>、<ruby>降<rt>ふ<\/rt><\/ruby>って<ruby>湧<rt>わ<\/rt><\/ruby>いた<ruby>災難<rt>さいなん<\/rt><\/ruby>、メロスの<ruby>足<rt>あし<\/rt><\/ruby>は、はたと、とまった。<ruby>見<rt>み<\/rt><\/ruby>よ、<ruby>前方<rt>ぜんぽう<\/rt><\/ruby>の<ruby>川<rt>かわ<\/rt><\/ruby>を。きのうの<ruby>豪雨<rt>ごうう<\/rt><\/ruby>で<ruby>山<rt>やま<\/rt><\/ruby>の<ruby>水源地<rt>すいげんち<\/rt><\/ruby>は<ruby>氾濫<rt>はんらん<\/rt><\/ruby>し、<ruby>濁流<rt>だくりゅう<\/rt><\/ruby><ruby>滔々<rt>とうとう<\/rt><\/ruby>と<ruby>下流<rt>かりゅう<\/rt><\/ruby>に<ruby>集<rt>たか<\/rt><\/ruby>り、<ruby>猛勢<rt>もうせい<\/rt><\/ruby><ruby>一挙<rt>いっきょ<\/rt><\/ruby>に<ruby>橋<rt>はし<\/rt><\/ruby>を<ruby>破壊<rt>はかい<\/rt><\/ruby>し、どうどうと<ruby>響<rt>ひび<\/rt><\/ruby>きをあげる<ruby>激流<rt>げきりゅう<\/rt><\/ruby>が、<ruby>木葉微塵<rt>こっぱみじん<\/rt><\/ruby>に<ruby>橋桁<rt>はしげた<\/rt><\/ruby>を跳ね<ruby>飛<rt>はねと<\/rt><\/ruby>ばしていた。<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>茫然<rt>ぼうぜん<\/rt><\/ruby>と、<ruby>立<rt>た<\/rt><\/ruby>ちすくんだ。あちこちと<ruby>眺<rt>なが<\/rt><\/ruby>めまわし、また、<ruby>声<rt>こえ<\/rt><\/ruby>を<ruby>限<rt>かぎ<\/rt><\/ruby>りに<ruby>呼<rt>よ<\/rt><\/ruby>びたててみたが、<ruby>繋舟<rt>けいしゅう<\/rt><\/ruby>は<ruby>残<rt>のこ<\/rt><\/ruby>らず<ruby>浪<rt>なみ<\/rt><\/ruby>に<ruby>浚<rt>さら<\/rt><\/ruby>われて<ruby>影<rt>かげ<\/rt><\/ruby>なく、<ruby>渡<rt>わたし<\/rt><\/ruby><ruby>守<rt>まも<\/rt><\/ruby>りの<ruby>姿<rt>すがた<\/rt><\/ruby>も<ruby>見<rt>み<\/rt><\/ruby>えない。<ruby>流<rt>なが<\/rt><\/ruby>れはいよいよ、ふくれ<ruby>上<rt>あが<\/rt><\/ruby>り、<ruby>海<rt>うみ<\/rt><\/ruby>のようになっている。メロスは<ruby>川岸<rt>かわぎし<\/rt><\/ruby>にうずくまり、<ruby>男泣<rt>おとこな<\/rt><\/ruby>きに<ruby>泣<rt>な<\/rt><\/ruby>きながらゼウスに<ruby>手<rt>て<\/rt><\/ruby>を<ruby>挙<rt>あ<\/rt><\/ruby>げて<ruby>哀願<rt>あいがん<\/rt><\/ruby>した。「ああ、<ruby>鎮<rt>しず<\/rt><\/ruby>めたまえ、荒れ<ruby>狂<rt>あれくる<\/rt><\/ruby>う<ruby>流<rt>なが<\/rt><\/ruby>れを！　<ruby>時<rt>とき<\/rt><\/ruby>は<ruby>刻々<rt>こっこく<\/rt><\/ruby>に<ruby>過<rt>す<\/rt><\/ruby>ぎて<ruby>行<rt>い<\/rt><\/ruby>きます。<ruby>太陽<rt>たいよう<\/rt><\/ruby>も<ruby>既<rt>すで<\/rt><\/ruby>に<ruby>真昼<rt>まひる<\/rt><\/ruby><ruby>時<rt>とき<\/rt><\/ruby>です。あれが<ruby>沈<rt>しず<\/rt><\/ruby>んでしまわぬうちに、<ruby>王城<rt>おうじょう<\/rt><\/ruby>に行き<ruby>着<rt>いきつ<\/rt><\/ruby>くことが<ruby>出来<rt>でき<\/rt><\/ruby>なかったら、あの<ruby>佳<rt>よ<\/rt><\/ruby>い<ruby>友達<rt>ともだち<\/rt><\/ruby>が、<ruby>私<rt>わたくし<\/rt><\/ruby>のために<ruby>死<rt>し<\/rt><\/ruby>ぬのです。」","　<ruby>濁流<rt>だくりゅう<\/rt><\/ruby>は、メロスの<ruby>叫<rt>さけ<\/rt><\/ruby>びをせせら<ruby>笑<rt>わら<\/rt><\/ruby>う<ruby>如<rt>ごと<\/rt><\/ruby>く、ますます<ruby>激<rt>はげ<\/rt><\/ruby>しく躍り<ruby>狂<rt>おどりくる<\/rt><\/ruby>う。<ruby>浪<rt>なみ<\/rt><\/ruby>は<ruby>浪<rt>なみ<\/rt><\/ruby>を<ruby>呑<rt>の<\/rt><\/ruby>み、<ruby>捲<rt>ま<\/rt><\/ruby>き、<ruby>煽<rt>あお<\/rt><\/ruby>り<ruby>立<rt>た<\/rt><\/ruby>て、そうして<ruby>時<rt>とき<\/rt><\/ruby>は、<ruby>刻<rt>こく<\/rt><\/ruby><ruby>一刻<rt>いっこく<\/rt><\/ruby>と<ruby>消<rt>き<\/rt><\/ruby>えて<ruby>行<rt>い<\/rt><\/ruby>く。<ruby>今<rt>いま<\/rt><\/ruby>はメロスも<ruby>覚悟<rt>かくご<\/rt><\/ruby>した。<ruby>泳<rt>およ<\/rt><\/ruby>ぎ<ruby>切<rt>き<\/rt><\/ruby>るより<ruby>他<rt>ほか<\/rt><\/ruby>に<ruby>無<rt>な<\/rt><\/ruby>い。ああ、<ruby>神々<rt>かみがみ<\/rt><\/ruby>も<ruby>照覧<rt>しょうらん<\/rt><\/ruby>あれ！　<ruby>濁流<rt>だくりゅう<\/rt><\/ruby>にも<ruby>負<rt>ま<\/rt><\/ruby>けぬ<ruby>愛<rt>あい<\/rt><\/ruby>と<ruby>誠<rt>まこと<\/rt><\/ruby>の<ruby>偉大<rt>いだい<\/rt><\/ruby>な<ruby>力<rt>ちから<\/rt><\/ruby>を、いまこそ<ruby>発揮<rt>はっき<\/rt><\/ruby>して<ruby>見<rt>み<\/rt><\/ruby>せる。メロスは、ざんぶと<ruby>流<rt>なが<\/rt><\/ruby>れに飛び<ruby>込<rt>とびこ<\/rt><\/ruby>み、<ruby>百<rt>ひゃく<\/rt><\/ruby><ruby>匹<rt>ひき<\/rt><\/ruby>の<ruby>大蛇<rt>おろち<\/rt><\/ruby>のようにのた<ruby>打<rt>う<\/rt><\/ruby>ち荒れ<ruby>狂<rt>あれくる<\/rt><\/ruby>う<ruby>浪<rt>なみ<\/rt><\/ruby>を<ruby>相手<rt>あいて<\/rt><\/ruby>に、<ruby>必死<rt>ひっし<\/rt><\/ruby>の<ruby>闘争<rt>とうそう<\/rt><\/ruby>を<ruby>開始<rt>かいし<\/rt><\/ruby>した。<ruby>満身<rt>まんしん<\/rt><\/ruby>の<ruby>力<rt>ちから<\/rt><\/ruby>を<ruby>腕<rt>うで<\/rt><\/ruby>にこめて、押し<ruby>寄<rt>おしよ<\/rt><\/ruby>せ<ruby>渦巻<rt>うずま<\/rt><\/ruby>き<ruby>引<rt>ひ<\/rt><\/ruby>きずる<ruby>流<rt>なが<\/rt><\/ruby>れを、なんのこれしきと<ruby>掻<rt>か<\/rt><\/ruby>きわけ<ruby>掻<rt>か<\/rt><\/ruby>きわけ、めくらめっぽう<ruby>獅子<rt>しし<\/rt><\/ruby><ruby>奮迅<rt>ふんじん<\/rt><\/ruby>の<ruby>人<rt>ひと<\/rt><\/ruby>の<ruby>子<rt>こ<\/rt><\/ruby>の<ruby>姿<rt>すがた<\/rt><\/ruby>には、<ruby>神<rt>かみ<\/rt><\/ruby>も<ruby>哀<rt>あわ<\/rt><\/ruby>れと<ruby>思<rt>おも<\/rt><\/ruby>ったか、ついに<ruby>憐愍<rt>れんびん<\/rt><\/ruby>を<ruby>垂<rt>た<\/rt><\/ruby>れてくれた。押し<ruby>流<rt>おしなが<\/rt><\/ruby>されつつも、<ruby>見事<rt>みごと<\/rt><\/ruby>、<ruby>対岸<rt>たいがん<\/rt><\/ruby>の<ruby>樹木<rt>じゅもく<\/rt><\/ruby>の<ruby>幹<rt>みき<\/rt><\/ruby>に、すがりつく<ruby>事<rt>こと<\/rt><\/ruby>が<ruby>出来<rt>でき<\/rt><\/ruby>たのである。ありがたい。メロスは<ruby>馬<rt>うま<\/rt><\/ruby>のように<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>胴震<rt>どうぶる<\/rt><\/ruby>いを<ruby>一<rt>ひと<\/rt><\/ruby>つして、すぐにまた<ruby>先<rt>さ<\/rt><\/ruby>きを<ruby>急<rt>いそ<\/rt><\/ruby>いだ。<ruby>一刻<rt>いっこく<\/rt><\/ruby>といえども、むだには<ruby>出来<rt>でき<\/rt><\/ruby>ない。<ruby>陽<rt>ひ<\/rt><\/ruby>は<ruby>既<rt>すで<\/rt><\/ruby>に<ruby>西<rt>にし<\/rt><\/ruby>に<ruby>傾<rt>かたむ<\/rt><\/ruby>きかけている。ぜいぜい<ruby>荒<rt>あら<\/rt><\/ruby>い<ruby>呼吸<rt>こきゅう<\/rt><\/ruby>をしながら<ruby>峠<rt>とうげ<\/rt><\/ruby>をのぼり、のぼり<ruby>切<rt>き<\/rt><\/ruby>って、ほっとした<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>突然<rt>とつぜん<\/rt><\/ruby>、<ruby>目<rt>め<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>に<ruby>一隊<rt>いったい<\/rt><\/ruby>の<ruby>山賊<rt>さんぞく<\/rt><\/ruby>が躍り<ruby>出<rt>おどりで<\/rt><\/ruby>た。"],"speech":["わたくしは、こよい、ころされる。ころされるためにはしるのだ。みがわりのともをすくうためにはしるのだ。おうのかんねいじゃちを打ちうちやぶるためにはしるのだ。はしらなければならぬ。そうして、わたくしはころされる。わかいときからめいよをまもれ。さらば、ふるさと。わかいメロスは、つらかった。いくどか、たちどまりそうになった。えい、えいとおおごえあげてじしんをしかりながらはしった。むらをでて、のをよこぎり、もりをくぐりぬけ、りんそんについたころには、あめもやみ、ひはたかくのぼって、そろそろあつくなってきた。メロスはひたいのあせをこぶしではらい、ここまでくればだいじょうぶ、もはやこきょうへのみれんはない。いもうとたちは、きっとよいふうふになるだろう。わたくしには、いま、なんのきがかりもないはずだ。まっすぐにおうじょうに行きいきつけば、それでよいのだ。そんなにいそぐひつようもない。ゆっくりあるこう、ともちまえののんきさを取りとりかえし、すきなこうたをいいこえで歌いうたいだした。ぶらぶらあるいてにりいきさんりいき、そろそろぜんりていのなかばにとうたつしたころ、ふってわいたさいなん、メロスのあしは、はたと、とまった。みよ、ぜんぽうのかわを。きのうのごううでやまのすいげんちははんらんし、だくりゅうとうとうとかりゅうにたかり、もうせいいっきょにはしをはかいし、どうどうとひびきをあげるげきりゅうが、こっぱみじんにはしげたを跳ねはねとばしていた。かれはぼうぜんと、たちすくんだ。あちこちとながめまわし、また、こえをかぎりによびたててみたが、けいしゅうはのこらずなみにさらわれてかげなく、わたしまもりのすがたもみえない。ながれはいよいよ、ふくれあがり、うみのようになっている。メロスはかわぎしにうずくまり、おとこなきになきながらゼウスにてをあげてあいがんした。「ああ、しずめたまえ、荒れあれくるうながれを！ときはこっこくにすぎていきます。たいようもすでにまひるときです。あれがしずんでしまわぬうちに、おうじょうに行きいきつくことができなかったら、あのよいともだちが、わたくしのためにしぬのです。」","だくりゅうは、メロスのさけびをせせらわらうごとく、ますますはげしく躍りおどりくるう。なみはなみをのみ、まき、あおりたて、そうしてときは、こくいっこくときえていく。いまはメロスもかくごした。およぎきるよりほかにない。ああ、かみがみもしょうらんあれ！だくりゅうにもまけぬあいとまことのいだいなちからを、いまこそはっきしてみせる。メロスは、ざんぶとながれに飛びとびこみ、ひゃくひきのおろちのようにのたうち荒れあれくるうなみをあいてに、ひっしのとうそうをかいしした。まんしんのちからをうでにこめて、押しおしよせうずまきひきずるながれを、なんのこれしきとかきわけかきわけ、めくらめっぽうししふんじんのひとのこのすがたには、かみもあわれとおもったか、ついにれんびんをたれてくれた。押しおしながされつつも、みごと、たいがんのじゅもくのみきに、すがりつくことができたのである。ありがたい。メロスはうまのようにおおきなどうぶるいをひとつして、すぐにまたさきをいそいだ。いっこくといえども、むだにはできない。ひはすでににしにかたむきかけている。ぜいぜいあらいこきゅうをしながらとうげをのぼり、のぼりきって、ほっとしたとき、とつぜん、めのまえにいったいのさんぞくが躍りおどりでた。"]},{"t":"山賊との戦い","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#8a6a4a\"/><polygon points=\"0,300 180,180 360,280 560,160 800,270 800,450 0,450\" fill=\"#4a3f36\" opacity=\"1\"/><circle cx=\"680\" cy=\"90\" r=\"44\" fill=\"#d98a4a\ \/rt><\/ruby><ruby>世界<rt>せかい<\/rt><\/ruby>の<ruby>定法<rt>じょうほう<\/rt><\/ruby>ではなかったか。ああ、<ruby>何<rt>なん<\/rt><\/ruby>もかも、ばかばかしい。<ruby>私<rt>わたくし<\/rt><\/ruby>は、<ruby>醜<rt>みにく<\/rt><\/ruby>い<ruby>裏切<rt>うらぎ<\/rt><\/ruby>り<ruby>者<rt>しゃ<\/rt><\/ruby>だ。どうとも、<ruby>勝手<rt>かって<\/rt><\/ruby>にするがよい。やんぬる<ruby>哉<rt>かな<\/rt><\/ruby>。――<ruby>四肢<rt>しし<\/rt><\/ruby>を投げ<ruby>出<rt>なげだ<\/rt><\/ruby>して、うとうと、まどろんでしまった。"],"speech":["「まて。」","「なんをするのだ。わたくしはひのしずまぬうちにおうじょうへいかなければならぬ。はなせ。」","「どっこいはなさぬ。もちものぜんぶをおいていけ。」","「わたくしにはいのちのほかにはなんもない。その、たったひとつのいのちも、これからおうにくれてやるのだ。」","「その、いのちがほしいのだ。」","「さては、おうのめいれいで、ここでわたくしを待ちまちぶせしていたのだな。」","さんぞくたちは、ものもいわずいっせいにこんぼうをふりあげた。メロスはひょいと、からだを折りおりまげ、あすかのごとくみじかかのひとりにおそいかかり、そのこんぼうを奪いうばいとって、","「気のきのどくだがせいぎのためだ！」ともうぜんいちげき、たちまち、さんにんを殴りなぐりたおし、のこるもののひるむすきに、さっさとはしってとうげをくだった。いっきにとうげを駈けかけおりたが、さすがにひろうし、おりからごごのしゃくねつのたいようがまともに、かっとてってきて、メロスはいくどとなくめまいをかんじ、これではならぬ、ときを取りとりなおしては、よろよろに、さんほあるいて、ついに、がくりとひざをおった。立ちたちのぼることができぬのだ。てんをあおいで、くやしなきになきだした。ああ、あ、だくりゅうをおよぎきり、さんぞくをさんにんも撃ちうちたおしいだてん、ここまでとっぱしてきたメロスよ。しんのゆうしゃ、メロスよ。いま、ここで、つかれきってうごけなくなるとはじょうない。あいするともは、おまえをしんじたばかりに、やがてころされなければならぬ。おまえは、きたいのふしんのにんげん、まさしくおうのおもうつぼだぞ、とじぶんをしかってみるのだが、ぜんしんなえて、もはやいもむしほどにもぜんしんかなわぬ。ろぼうのそうげんにごろりとねころがった。しんたいひろうすれば、せいしんもともにやられる。もう、どうでもいいという、ゆうしゃにふにあいなふてくされたこんじょうが、こころのすみにすくった。わたくしは、これほどどりょくしたのだ。やくそくをやぶるこころは、みじんもなかった。かみもしょうらん、わたくしはせいいっぱいにつとめてきたのだ。うごけなくなるまではしってきたのだ。わたくしはふしんのとではない。ああ、できることならわたくしのむねをたちわって、しんくのしんぞうをおめにかけたい。あいとしんじつのけつえきだけでうごいているこのしんぞうをみせてやりたい。けれどもわたくしは、このだいじなときに、せいもねもつきたのだ。わたくしは、よくよくふこうなおとこだ。わたくしは、きっとわらわれる。わたくしのいっかもわらわれる。わたくしはともをあざむいた。ちゅうとでたおれるのは、はじめからなんもしないのとおなじことだ。ああ、もう、どうでもいい。これが、わたくしのさだまったうんめいなのかもしれない。セリヌンティウスよ、ゆるしてくれ。きみは、いつでもわたくしをしんじた。わたくしもきみを、あざむかなかった。わたしたちは、ほんとうによいともとともであったのだ。いちどだって、くらいぎわくのくもを、おたがいむねにやどしたことはなかった。いまだって、きみはわたくしをむしんにまっているだろう。ああ、まっているだろう。ありがとう、セリヌンティウス。よくもわたくしをしんじてくれた。それをおもえば、たまらない。ともととものあいだのしんじつは、このよでいちばんほこるべきたからなのだからな。セリヌンティウス、わたくしははしったのだ。きみをあざむくつもりは、みじんもなかった。しんじてくれ！わたくしはいそぎにいそいでここまできたのだ。だくりゅうをとっぱした。さんぞくのかこみからも、するりとぬけていっきにとうげを駈けかけおりてきたのだ。わたくしだから、できたのだよ。ああ、このうえ、わたくしにのぞみたもうな。ほうっておいてくれ。どうでも、いいのだ。わたくしはまけたのだ。だらしがない。わらってくれ。おうはわたくしに、ちょっとおくれてこい、とみみうちした。おくれたら、みがわりをころして、わたくしをたすけてくれるとやくそくした。わたくしはおうのひれつをにくんだ。けれども、いまになってみると、わたくしはおうのいうままになっている。わたくしは、おくれていくだろう。おうは、ひとりがてんしてわたくしをわらい、そうしてこともなくわたくしをほうめんするだろう。そうなったら、わたくしは、しぬよりつらい。わたくしは、えいえんにうらぎりしゃだ。ちじょうでもっとも、ふめいよのじんしゅだ。セリヌンティウスよ、わたくしもしぬぞ。きみといっしょにしなせてくれ。きみだけはわたくしをしんじてくれるにちがいない。いや、それもわたくしの、ひとりよがりか？ああ、もういっそ、あくとくしゃとして生きいきのびてやろうか。むらにはわたくしのいえがある。ひつじもいる。いもうとふうふは、まさかわたくしをむらから追いおいだすようなことはしないだろう。まさよしだの、しんじつだの、あいだの、かんがえてみれば、くだらない。ひとをころしてじぶんがいきる。それがにんげんせかいのじょうほうではなかったか。ああ、なんもかも、ばかばかしい。わたくしは、みにくいうらぎりしゃだ。どうとも、かってにするがよい。やんぬるかな。――ししを投げなげだして、うとうと、まどろんでしまった。"]},{"t":"湧き水と再起","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1d2e26\"/><polygon points=\"0,280 220,220 430,300 640,230 800,290 800,450 0,450\" fill=\"#2f4a3a\" opacity=\"1\"/><circle cx=\"360\" cy=\"380\" r=\"60\" fill=\"#5b8c9e\" opacity=\"0.9\"/><circle cx=\"360\" cy=\"380\" r=\"44\" fill=\"#7ba8b8\" opacity=\"0.9\"/><circle cx=\"340\" cy=\"366\" r=\"3\" fill=\"#d8ecf0\" opacity=\"0.9\"/><circle cx=\"356\" cy=\"376\" r=\"3\" fill=\"#d8ecf0\" opacity=\"0.9\"/><circle cx=\"372\" cy=\"366\" r=\"3\" fill=\"#d8ecf0\" opacity=\"0.9\"/><circle cx=\"388\" cy=\"376\" r=\"3\" fill=\"#d8ecf0\" opacity=\"0.9\"/><g transform=\"translate(280 372)\"><circle cx=\"0\" cy=\"-52\" r=\"11\" fill=\"#c4552d\"/><path d=\"M-8 -44 q-14 22 -6 44 l26 0 q6 -24 -6 -44 z\" fill=\"#c4552d\"/><path d=\"M4 -36 q22 4 34 18\" stroke=\"#c4552d\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\"/><\/g><g fill=\"#cfe0d8\" opacity=\"0.6\"><circle cx=\"507\" cy=\"113\" r=\"1.2\"/><circle cx=\"644\" cy=\"22\" r=\"1.9\"/><circle cx=\"41\" cy=\"111\" r=\"2.5999999999999996\"/><circle cx=\"178\" cy=\"20\" r=\"1.2\"/><circle cx=\"315\" cy=\"109\" r=\"1.9\"/><circle cx=\"452\" cy=\"18\" r=\"2.5999999999999996\"/><circle cx=\"589\" cy=\"107\" r=\"1.2\"/><circle cx=\"726\" cy=\"16\" r=\"1.9\"/><circle cx=\"123\" cy=\"105\" r=\"2.5999999999999996\"/><circl \/rt><\/ruby>をからかっても、メロスは<ruby>来<rt>き<\/rt><\/ruby>ます、とだけ<ruby>答<rt>こた<\/rt><\/ruby>え、<ruby>強<rt>つよ<\/rt><\/ruby>い<ruby>信念<rt>しんねん<\/rt><\/ruby>を<ruby>持<rt>も<\/rt><\/ruby>ちつづけている<ruby>様子<rt>ようす<\/rt><\/ruby>でございました。」","「それだから、<ruby>走<rt>はし<\/rt><\/ruby>るのだ。<ruby>信<rt>しん<\/rt><\/ruby>じられているから<ruby>走<rt>はし<\/rt><\/ruby>るのだ。間に<ruby>合<rt>まにあ<\/rt><\/ruby>う、間に<ruby>合<rt>まにあ<\/rt><\/ruby>わぬは<ruby>問題<rt>もんだい<\/rt><\/ruby>でないのだ。<ruby>人<rt>ひと<\/rt><\/ruby>の<ruby>命<rt>いのち<\/rt><\/ruby>も<ruby>問題<rt>もんだい<\/rt><\/ruby>でないのだ。<ruby>私<rt>わたくし<\/rt><\/ruby>は、なんだか、もっと<ruby>恐<rt>おそ<\/rt><\/ruby>ろしく<ruby>大<rt>おお<\/rt><\/ruby>きいものの<ruby>為<rt>ため<\/rt><\/ruby>に<ruby>走<rt>はし<\/rt><\/ruby>っているのだ。ついて<ruby>来<rt>こ<\/rt><\/ruby>い！　フィロストラトス。」","「ああ、あなたは<ruby>気<rt>き<\/rt><\/ruby>が<ruby>狂<rt>くる<\/rt><\/ruby>ったか。それでは、うんと<ruby>走<rt>はし<\/rt><\/ruby>るがいい。ひょっとしたら、間に<ruby>合<rt>まにあ<\/rt><\/ruby>わぬものでもない。<ruby>走<rt>はし<\/rt><\/ruby>るがいい。」","　<ruby>言<rt>ゆ<\/rt><\/ruby>うにや<ruby>及<rt>およ<\/rt><\/ruby>ぶ。まだ<ruby>陽<rt>ひ<\/rt><\/ruby>は<ruby>沈<rt>しず<\/rt><\/ruby>まぬ。<ruby>最後<rt>さいご<\/rt><\/ruby>の<ruby>死力<rt>しりょく<\/rt><\/ruby>を<ruby>尽<rt>つく<\/rt><\/ruby>して、メロスは<ruby>走<rt>はし<\/rt><\/ruby>った。メロスの<ruby>頭<rt>あたま<\/rt><\/ruby>は、からっぽだ。<ruby>何<rt>なん<\/rt><\/ruby><ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>考<rt>かんが<\/rt><\/ruby>えていない。ただ、わけのわからぬ<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>力<rt>ちから<\/rt><\/ruby>にひきずられて<ruby>走<rt>はし<\/rt><\/ruby>った。<ruby>陽<rt>ひ<\/rt><\/ruby>は、ゆらゆら<ruby>地平線<rt>ちへいせん<\/rt><\/ruby>に<ruby>没<rt>ぼっ<\/rt><\/ruby>し、まさに<ruby>最後<rt>さいご<\/rt><\/ruby>の<ruby>一<rt>いち<\/rt><\/ruby><ruby>片<rt>へん<\/rt><\/ruby>の<ruby>残光<rt>ざんこう<\/rt><\/ruby>も、<ruby>消<rt>き<\/rt><\/ruby>えようとした<ruby>時<rt>とき<\/rt><\/ruby>、メロスは<ruby>疾風<rt>しっぷう<\/rt><\/ruby>の<ruby>如<rt>ごと<\/rt><\/ruby>く<ruby>刑場<rt>けいじょう<\/rt><\/ruby>に<ruby>突入<rt>とつにゅう<\/rt><\/ruby>した。間に<ruby>合<rt>まにあ<\/rt><\/ruby>った。","「<ruby>待<rt>ま<\/rt><\/ruby>て。その<ruby>人<rt>ひと<\/rt><\/ruby>を<ruby>殺<rt>ころ<\/rt><\/ruby>してはならぬ。メロスが<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>た。<ruby>約束<rt>やくそく<\/rt><\/ruby>のとおり、いま、<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>た。」と<ruby>大声<rt>おおごえ<\/rt><\/ruby>で<ruby>刑場<rt>けいじょう<\/rt><\/ruby>の<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>にむかって<ruby>叫<rt>さけ<\/rt><\/ruby>んだつもりであったが、<ruby>喉<rt>のど<\/rt><\/ruby>がつぶれて<ruby>嗄<rt>しわが<\/rt><\/ruby>れた<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>幽<rt>かす<\/rt><\/ruby>かに<ruby>出<rt>で<\/rt><\/ruby>たばかり、<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>は、ひとりとして<ruby>彼<rt>かれ<\/rt><\/ruby>の<ruby>到着<rt>とうちゃく<\/rt><\/ruby>に<ruby>気<rt>き<\/rt><\/ruby>がつかない。すでに<ruby>磔<rt>はりつけ<\/rt><\/ruby>の<ruby>柱<rt>はしら<\/rt><\/ruby>が<ruby>高々<rt>たかだか<\/rt><\/ruby>と<ruby>立<rt>た<\/rt><\/ruby>てられ、<ruby>縄<rt>なわ<\/rt><\/ruby>を<ruby>打<rt>う<\/rt><\/ruby>たれたセリヌンティウスは、<ruby>徐々<rt>じょじょ<\/rt><\/ruby>に釣り<ruby>上<rt>つりあ<\/rt><\/ruby>げられてゆく。メロスはそれを<ruby>目撃<rt>もくげき<\/rt><\/ruby>して<ruby>最後<rt>さいご<\/rt><\/ruby>の<ruby>勇<rt>いさむ<\/rt><\/ruby>、<ruby>先刻<rt>せんこく<\/rt><\/ruby>、<ruby>濁流<rt>だくりゅう<\/rt><\/ruby>を<ruby>泳<rt>およ<\/rt><\/ruby>いだように<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>を<ruby>掻<rt>か<\/rt><\/ruby>きわけ、<ruby>掻<rt>か<\/rt><\/ruby>きわけ、","「<ruby>私<rt>わたくし<\/rt><\/ruby>だ、<ruby>刑吏<rt>けいり<\/rt><\/ruby>！　<ruby>殺<rt>ころ<\/rt><\/ruby>されるのは、<ruby>私<rt>わたくし<\/rt><\/ruby>だ。メロスだ。<ruby>彼<rt>かれ<\/rt><\/ruby>を<ruby>人質<rt>ひとじち<\/rt><\/ruby>にした<ruby>私<rt>わたくし<\/rt><\/ruby>は、ここにいる！」と、かすれた<ruby>声<rt>こえ<\/rt><\/ruby>で<ruby>精<rt>せい<\/rt><\/ruby><ruby>一<rt>いっ<\/rt><\/ruby>ぱいに<ruby>叫<rt>さけ<\/rt><\/ruby>びながら、ついに<ruby>磔<rt>はりつけ<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>に<ruby>昇<rt>のぼ<\/rt><\/ruby>り、釣り<ruby>上<rt>つりあ<\/rt><\/ruby>げられてゆく<ruby>友<rt>とも<\/rt><\/ruby>の<ruby>両足<rt>りょうあし<\/rt><\/ruby>に、<ruby>齧<rt>かじ<\/rt><\/ruby>りついた。<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>は、どよめいた。あっぱれ。ゆるせ、と<ruby>口々<rt>くちぐち<\/rt><\/ruby>にわめいた。セリヌンティウスの<ruby>縄<rt>なわ<\/rt><\/ruby>は、ほどかれたのである。","「セリヌンティウス。」メロスは<ruby>眼<rt>め<\/rt><\/ruby>に<ruby>涙<rt>なみだ<\/rt><\/ruby>を<ruby>浮<rt>うか<\/rt><\/ruby>べて<ruby>言<rt>い<\/rt><\/ruby>った。「<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>れ。ちから<ruby>一<rt>いっ<\/rt><\/ruby>ぱいに<ruby>頬<rt>ほお<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>れ。<ruby>私<rt>わたくし<\/rt><\/ruby>は、<ruby>途中<rt>とちゅう<\/rt><\/ruby>で<ruby>一度<rt>いちど<\/rt><\/ruby>、<ruby>悪<rt>わる<\/rt><\/ruby>い<ruby>夢<rt>ゆめ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>た。<ruby>君<rt>きみ<\/rt><\/ruby>が<ruby>若<rt>も<\/rt><\/ruby>し<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>ってくれなかったら、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>君<rt>きみ<\/rt><\/ruby>と<ruby>抱擁<rt>ほうよう<\/rt><\/ruby>する<ruby>資格<rt>しかく<\/rt><\/ruby>さえ<ruby>無<rt>な<\/rt><\/ruby>いのだ。<ruby>殴<rt>なぐ<\/rt><\/ruby>れ。」","　セリヌンティウスは、すべてを<ruby>察<rt>さっ<\/rt><\/ruby>した<ruby>様子<rt>ようす<\/rt><\/ruby>で<ruby>首肯<rt>うなず<\/rt><\/ruby>き、<ruby>刑場<rt>けいじょう<\/rt><\/ruby><ruby>一<rt>いっ<\/rt><\/ruby>ぱいに鳴り<ruby>響<rt>なりひび<\/rt><\/ruby>くほど<ruby>音<rt>おと<\/rt><\/ruby><ruby>高<rt>たか<\/rt><\/ruby>くメロスの<ruby>右頬<rt>みぎほお<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>った。<ruby>殴<rt>なぐ<\/rt><\/ruby>ってから<ruby>優<rt>やさ<\/rt><\/ruby>しく<ruby>微笑<rt>ほほえ<\/rt><\/ruby>み、"],"speech":["「ちょうどいま、あのほうがしけいになるところです。ああ、あなたはおそかった。おうらみもうします。ほんのすこし、もうちょっとでも、はやかったなら！」","「いや、まだひはしずまぬ。」メロスはむねの張りはりさけるおもいで、あかくおおきいゆうひばかりをみつめていた。はしるよりほかはない。","「やめてください。はしるのは、やめてください。いまはごじぶんのおいのちがだいじです。あのかたは、あなたをしんじておりました。けいじょうに引きひきだされても、へいきでいました。おうさまが、さんざんあのほうをからかっても、メロスはきます、とだけこたえ、つよいしんねんをもちつづけているようすでございました。」","「それだから、はしるのだ。しんじられているからはしるのだ。間にまにあう、間にまにあわぬはもんだいでないのだ。ひとのいのちももんだいでないのだ。わたくしは、なんだか、もっとおそろしくおおきいもののためにはしっているのだ。ついてこい！フィロストラトス。」","「ああ、あなたはきがくるったか。それでは、うんとはしるがいい。ひょっとしたら、間にまにあわぬものでもない。はしるがいい。」","ゆうにやおよぶ。まだひはしずまぬ。さいごのしりょくをつくして、メロスははしった。メロスのあたまは、からっぽだ。なんひとつかんがえていない。ただ、わけのわからぬおおきなちからにひきずられてはしった。ひは、ゆらゆらちへいせんにぼっし、まさにさいごのいちへんのざんこうも、きえようとしたとき、メロスはしっぷうのごとくけいじょうにとつにゅうした。間にまにあった。","「まて。そのひとをころしてはならぬ。メロスがかえってきた。やくそくのとおり、いま、かえってきた。」とおおごえでけいじょうのぐんしゅうにむかってさけんだつもりであったが、のどがつぶれてしわがれたこえがかすかにでたばかり、ぐんしゅうは、ひとりとしてかれのとうちゃくにきがつかない。すでにはりつけのはしらがたかだかとたてられ、なわをうたれたセリヌンティウスは、じょじょに釣りつりあげられてゆく。メロスはそれをもくげきしてさいごのいさむ、せんこく、だくりゅうをおよいだようにぐんしゅうをかきわけ、かきわけ、","「わたくしだ、けいり！ころされるのは、わたくしだ。メロスだ。かれをひとじちにしたわたくしは、ここにいる！」と、かすれたこえでせいいっぱいにさけびながら、ついにはりつけだいにのぼり、釣りつりあげられてゆくとものりょうあしに、かじりついた。ぐんしゅうは、どよめいた。あっぱれ。ゆるせ、とくちぐちにわめいた。セリヌンティウスのなわは、ほどかれたのである。","「セリヌンティウス。」メロスはめになみだをうかべていった。「わたくしをなぐれ。ちからいっぱいにほおをなぐれ。わたくしは、とちゅうでいちど、わるいゆめをみた。きみがもしわたくしをなぐってくれなかったら、わたくしはきみとほうようするしかくさえないのだ。なぐれ。」","セリヌンティウスは、すべてをさっしたようすでうなずき、けいじょういっぱいに鳴りなりひびくほどおとたかくメロスのみぎほおをなぐった。なぐってからやさしくほほえみ、"]},{"t":"信実の証","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#b8845a\"/><rect x=\"0\" y=\"370\" width=\"800\" height=\"80\" fill=\"#4a2a2a\" rx=\"0\" opacity=\"0.8\"/><g fill=\"#241820\"><circle cx=\"50\" cy=\"404\" r=\"12\"/><circle cx=\"108\" cy=\"414\" r=\"12\"/><circle cx=\"166\" cy=\"424\" r=\"12\"/><circle cx=\"224\" cy=\"404\" r=\"12\"/><circle cx=\"282\" cy=\"414\" r=\"12\"/><circle cx=\"340\" cy=\"424\" r=\"12\"/><circle cx=\"398\" cy=\"404\" r=\"12\"/><circle cx=\"456\" cy=\"414\" r=\"12\"/><circle cx=\"514\" cy=\"424\" r=\"12\"/><circle cx=\"572\" cy=\"404\" r=\"12\"/><circle cx=\"630\" cy=\"414\" r=\"12\"/><circle cx=\"688\" cy=\"424\" r=\"12\"/><circle cx=\"746\" cy=\"404\" r=\"12\"/><\/g><g transform=\"translate(370 392)\"><circle cx=\"-20\" cy=\"-88\" r=\"12\" fill=\"#26364a\"/><path d=\"M-34 0 q-4 -62 14 -74 l14 8 l-6 66 z\" fill=\"#26364a\"/><\/g><g transform=\"translate(430 392)\"><circle cx=\"20\" cy=\"-88\" r=\"12\" fill=\"#6e4a34\"/><path d=\"M34 0 q4 -62 -14 -74 l-14 8 l6 66 z\" fill=\"#6e4a34\"/><\/g><path d=\"M356 322 q44 -28 88 0\" fill=\"none\" stroke=\"#8a5a3c\" stroke-width=\"9\" opacity=\"0.9\" stroke-linecap=\"round\"/><polygon points=\"604.8,396 608.8,349.6 615.2,336.8 625.6,336.8 631.2,349.6 635.2,396\" fill=\"#8a3a4a\" opacity=\"1\"/><circle cx=\"620\" cy=\"327.2\" r=\"10.4\" fill=\"#8a3a4a\" opacity=\"1\"/><rect x=\"596\" y=\"320\" width=\"50\" height=\"30\" fill=\"#c4552d\" rx=\"3\" opacity=\"0.95\"/><circle cx=\"160\" cy=\"120\" r=\"48\" fill=\"#d98a4a\" opacity=\"0.93\"/><circle cx=\"160\" cy=\"120\" r=\"60.0\" fill=\"none\" stroke=\"#d98a4a\" stroke-width=\"2.5\" opacity=\".35\"/><path d=\"M420 80 q108.0 -14 240 -2\" fill=\"none\" stroke=\"#c9a06a\" stroke-width=\"9\" opacity=\"0.7\" stroke-linecap=\"round\"/><\/svg>","paras":["「メロス、<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>れ。<ruby>同<rt>おな<\/rt><\/ruby>じくらい<ruby>音<rt>おと<\/rt><\/ruby><ruby>高<rt>たか<\/rt><\/ruby>く<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>頬<rt>ほお<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>れ。<ruby>私<rt>わたくし<\/rt><\/ruby>はこの<ruby>三<rt>みっ<\/rt><\/ruby><ruby>日<rt>か<\/rt><\/ruby>の<ruby>間<rt>あいだ<\/rt><\/ruby>、たった<ruby>一度<rt>いちど<\/rt><\/ruby>だけ、ちらと<ruby>君<rt>きみ<\/rt><\/ruby>を<ruby>疑<rt>うたが<\/rt><\/ruby>った。<ruby>生<rt>うま<\/rt><\/ruby>れて、はじめて<ruby>君<rt>きみ<\/rt><\/ruby>を<ruby>疑<rt>うたが<\/rt><\/ruby>った。<ruby>君<rt>きみ<\/rt><\/ruby>が<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>ってくれなければ、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>君<rt>きみ<\/rt><\/ruby>と<ruby>抱擁<rt>ほうよう<\/rt><\/ruby>できない。」","　メロスは<ruby>腕<rt>うで<\/rt><\/ruby>に<ruby>唸<rt>うな<\/rt><\/ruby>りをつけてセリヌンティウスの<ruby>頬<rt>ほお<\/rt><\/ruby>を<ruby>殴<rt>なぐ<\/rt><\/ruby>った。","「ありがとう、<ruby>友<rt>とも<\/rt><\/ruby>よ。」<ruby>二人<rt>ふたり<\/rt><\/ruby><ruby>同時<rt>どうじ<\/rt><\/ruby>に<ruby>言<rt>い<\/rt><\/ruby>い、ひしと抱き<ruby>合<rt>だきあ<\/rt><\/ruby>い、それから嬉し<ruby>泣<rt>うれしな<\/rt><\/ruby>きにおいおい<ruby>声<rt>こえ<\/rt><\/ruby>を<ruby>放<rt>はな<\/rt><\/ruby>って<ruby>泣<rt>な<\/rt><\/ruby>いた。","　<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>からも、<ruby>歔欷<rt>きょき<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>聞<rt>きこ<\/rt><\/ruby>えた。<ruby>暴君<rt>ぼうくん<\/rt><\/ruby>ディオニスは、<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>の<ruby>背後<rt>はいご<\/rt><\/ruby>から<ruby>二人<rt>ふたり<\/rt><\/ruby>の<ruby>様<rt>さま<\/rt><\/ruby>を、まじまじと<ruby>見<rt>み<\/rt><\/ruby>つめていたが、やがて<ruby>静<rt>しず<\/rt><\/ruby>かに<ruby>二人<rt>ふたり<\/rt><\/ruby>に<ruby>近<rt>ちか<\/rt><\/ruby>づき、<ruby>顔<rt>かお<\/rt><\/ruby>をあからめて、こう<ruby>言<rt>い<\/rt><\/ruby>った。","「おまえらの<ruby>望<rt>のぞ<\/rt><\/ruby>みは<ruby>叶<rt>かな<\/rt><\/ruby>ったぞ。おまえらは、わしの<ruby>心<rt>こころ<\/rt><\/ruby>に<ruby>勝<rt>か<\/rt><\/ruby>ったのだ。<ruby>信実<rt>しんじつ<\/rt><\/ruby>とは、<ruby>決<rt>けっ<\/rt><\/ruby>して<ruby>空虚<rt>くうきょ<\/rt><\/ruby>な<ruby>妄想<rt>もうそう<\/rt><\/ruby>ではなかった。どうか、わしをも<ruby>仲間<rt>なかま<\/rt><\/ruby>に<ruby>入<rt>い<\/rt><\/ruby>れてくれまいか。どうか、わしの<ruby>願<rt>ねが<\/rt><\/ruby>いを聞き<ruby>入<rt>ききい<\/rt><\/ruby>れて、おまえらの<ruby>仲間<rt>なかま<\/rt><\/ruby>の<ruby>一人<rt>ひとり<\/rt><\/ruby>にしてほしい。」","　どっと<ruby>群衆<rt>ぐんしゅう<\/rt><\/ruby>の<ruby>間<rt>あいだ<\/rt><\/ruby>に、<ruby>歓声<rt>かんせい<\/rt><\/ruby>が<ruby>起<rt>おこ<\/rt><\/ruby>った。","「<ruby>万歳<rt>ばんざい<\/rt><\/ruby>、<ruby>王様<rt>おうさま<\/rt><\/ruby><ruby>万歳<rt>ばんざい<\/rt><\/ruby>。」","　ひとりの<ruby>少女<rt>しょうじょ<\/rt><\/ruby>が、<ruby>緋<rt>ひ<\/rt><\/ruby>のマントをメロスに<ruby>捧<rt>ささ<\/rt><\/ruby>げた。メロスは、まごついた。<ruby>佳<rt>よ<\/rt><\/ruby>き<ruby>友<rt>とも<\/rt><\/ruby>は、<ruby>気<rt>き<\/rt><\/ruby>をきかせて<ruby>教<rt>おし<\/rt><\/ruby>えてやった。","「メロス、<ruby>君<rt>きみ<\/rt><\/ruby>は、まっぱだかじゃないか。<ruby>早<rt>はや<\/rt><\/ruby>くそのマントを<ruby>着<rt>き<\/rt><\/ruby>るがいい。この<ruby>可愛<rt>かわい<\/rt><\/ruby>い<ruby>娘<rt>むすめ<\/rt><\/ruby>さんは、メロスの<ruby>裸体<rt>らたい<\/rt><\/ruby>を、<ruby>皆<rt>みな<\/rt><\/ruby>に<ruby>見<rt>み<\/rt><\/ruby>られるのが、たまらなく<ruby>口惜<rt>くちお<\/rt><\/ruby>しいのだ。」","　<ruby>勇者<rt>ゆうしゃ<\/rt><\/ruby>は、ひどく<ruby>赤面<rt>せきめん<\/rt><\/ruby>した。","（<ruby>古<rt>こ<\/rt><\/ruby><ruby>伝説<rt>でんせつ<\/rt><\/ruby>と、シルレルの<ruby>詩<rt>し<\/rt><\/ruby>から。）"],"speech":["「メロス、わたくしをなぐれ。おなじくらいおとたかくわたくしのほおをなぐれ。わたくしはこのみっかのあいだ、たったいちどだけ、ちらときみをうたがった。うまれて、はじめてきみをうたがった。きみがわたくしをなぐってくれなければ、わたくしはきみとほうようできない。」","メロスはうでにうなりをつけてセリヌンティウスのほおをなぐった。","「ありがとう、ともよ。」ふたりどうじにいい、ひしと抱きだきあい、それから嬉しうれしなきにおいおいこえをはなってないた。","ぐんしゅうのなかからも、きょきのこえがきこえた。ぼうくんディオニスは、ぐんしゅうのはいごからふたりのさまを、まじまじとみつめていたが、やがてしずかにふたりにちかづき、かおをあからめて、こういった。","「おまえらののぞみはかなったぞ。おまえらは、わしのこころにかったのだ。しんじつとは、けっしてくうきょなもうそうではなかった。どうか、わしをもなかまにいれてくれまいか。どうか、わしのねがいを聞きききいれて、おまえらのなかまのひとりにしてほしい。」","どっとぐんしゅうのあいだに、かんせいがおこった。","「ばんざい、おうさまばんざい。」","ひとりのしょうじょが、ひのマントをメロスにささげた。メロスは、まごついた。よきともは、きをきかせておしえてやった。","「メロス、きみは、まっぱだかじゃないか。はやくそのマントをきるがいい。このかわいいむすめさんは、メロスのらたいを、みなにみられるのが、たまらなくくちおしいのだ。」","ゆうしゃは、ひどくせきめんした。","（こでんせつと、シルレルのしから。）"]}]},{"id":"gon","title":"ごん狐","author":"新美南吉","mins":12,"cover":"<svg viewBox=\"0 0 800 450\" xmlns さまが、おられたそうです。","　その<ruby>中山<rt>なかやま<\/rt><\/ruby>から、<ruby>少<rt>すこ<\/rt><\/ruby>しはなれた<ruby>山<rt>やま<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に、「ごん<ruby>狐<rt>ぎつね<\/rt><\/ruby>」という<ruby>狐<rt>きつね<\/rt><\/ruby>がいました。ごんは、<ruby>一人<rt>ひとり<\/rt><\/ruby>ぼっちの<ruby>小狐<rt>こぎつね<\/rt><\/ruby>で、しだの<ruby>一<rt>いっ<\/rt><\/ruby>ぱいしげった<ruby>森<rt>もり<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>穴<rt>あな<\/rt><\/ruby>をほって<ruby>住<rt>す<\/rt><\/ruby>んでいました。そして、<ruby>夜<rt>よる<\/rt><\/ruby>でも<ruby>昼<rt>ひる<\/rt><\/ruby>でも、あたりの<ruby>村<rt>むら<\/rt><\/ruby>へ<ruby>出<rt>で<\/rt><\/ruby>てきて、いたずらばかりしました。はたけへ<ruby>入<rt>はい<\/rt><\/ruby>って<ruby>芋<rt>いも<\/rt><\/ruby>をほりちらしたり、<ruby>菜種<rt>なたね<\/rt><\/ruby>がらの、ほしてあるのへ<ruby>火<rt>ひ<\/rt><\/ruby>をつけたり、<ruby>百姓家<rt>ひゃくしょうや<\/rt><\/ruby>の<ruby>裏手<rt>うらて<\/rt><\/ruby>につるしてあるとんがらしをむしりとって、いったり、いろんなことをしました。"],"speech":["いち","","これは、わたしがちいさいときに、むらのもへいというおじいさんからきいたおはなしです。","むかしは、わたしたちのむらのちかくの、なかやまというところにちいさなおしろがあって、なかやまさまというおとのさまが、おられたそうです。","そのなかやまから、すこしはなれたやまのなかに、「ごんぎつね」というきつねがいました。ごんは、ひとりぼっちのこぎつねで、しだのいっぱいしげったもりのなかにあなをほってすんでいました。そして、よるでもひるでも、あたりのむらへでてきて、いたずらばかりしました。はたけへはいっていもをほりちらしたり、なたねがらの、ほしてあるのへひをつけたり、ひゃくしょうやのうらてにつるしてあるとんがらしをむしりとって、いったり、いろんなことをしました。"]},{"t":"うなぎ事件","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#e8e0c4\"/><polygon points=\"0,260 800,240 800,450 0,450\" fill=\"#5b8c9e\" opacity=\"1\"/><path d=\"M-10 280 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0\" fill=\"none\" stroke=\"#7ba8b8\" stroke-width=\"4\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M-10 340 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0\" fill=\"none\" stroke=\"#7ba8b8\" stroke-width=\"3\" opacity=\"0.7\" stroke-linecap=\"round\"/><path d=\"M40 262 q6 -44 -2 -72 q12 26 8 72 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M92 262 q6 -44 -2 -72 q12 26 8 72 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M144 262 q6 -44 -2 -72 q12 26 8 72 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M196 262 q6 -44 -2 -72 q12 26 8 72 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M248 262 q6 -44 -2 -72 q12 26 8 72 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><g transform=\"translate(470 300)\"><circle cx=\"0\" cy=\"-58\" r=\"13\" fill=\"#5c4a38\"/><path d=\"M-18 0 q-4 -46 18 -50 q22 4 18 50 z\" fill=\"#5c4a38\"/><path d=\"M-14 -40 q-20 10 -26 28\" stroke=\"#5c4a38\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\"/><\/g><path d=\"M410 320 q-14 10 -6 22 q10 8 4 18\" fill=\"none\" stroke=\"#3a4a52\" stroke-width=\"7\" opacity=\"0.95\" stroke-linecap=\"round\"/><g transform=\"translate(150 256) scale(1.05 1.05)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#c87137\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#c87137\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#c87137\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#c87137\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#c87137\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#c87137\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#c87137\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#c87137\"/><\/g><\/svg>","paras":["　<ruby>或<rt>ある<\/rt><\/ruby><ruby>秋<rt>あき<\/rt><\/ruby>のことでした。<ruby>二<rt>に<\/rt><\/ruby>、<ruby>三<rt>みっ<\/rt><\/ruby><ruby>日<rt>か<\/rt><\/ruby><ruby>雨<rt>う<\/rt><\/ruby>がふりつづいたその<ruby>間<rt>あいだ<\/rt><\/ruby>、ごんは、<ruby>外<rt>そと<\/rt><\/ruby>へも<ruby>出<rt>で<\/rt><\/ruby>られなくて<ruby>穴<rt>あな<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>にしゃがんでいました。","　<ruby>雨<rt>あめ<\/rt><\/ruby>があがると、ごんは、ほっとして<ruby>穴<rt>あな<\/rt><\/ruby>からはい<ruby>出<rt>で<\/rt><\/ruby>ました。<ruby>空<rt>そら<\/rt><\/ruby>はからっと<ruby>晴<rt>は<\/rt><\/ruby>れていて、<ruby>百舌鳥<rt>もず<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>がきんきん、ひびいていました。","　ごんは、<ruby>村<rt>むら<\/rt><\/ruby>の<ruby>小川<rt>おがわ<\/rt><\/ruby>の<ruby>堤<rt>つつみ<\/rt><\/ruby>まで<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>き<\/rt><\/ruby>ました。あたりの、すすきの<ruby>穂<rt>ほ<\/rt><\/ruby>には、まだ<ruby>雨<rt>あめ<\/rt><\/ruby>のしずくが<ruby>光<rt>ひか<\/rt><\/ruby>っていました。<ruby>川<rt>かわ<\/rt><\/ruby>は、いつもは<ruby>水<rt>みず<\/rt><\/ruby>が<ruby>少<rt>すくな<\/rt><\/ruby>いのですが、<ruby>三<rt>みっ<\/rt><\/ruby><ruby>日<rt>か<\/rt><\/ruby>もの<ruby>雨<rt>あめ<\/rt><\/ruby>で、<ruby>水<rt>みず<\/rt><\/ruby>が、どっとましていました。ただのときは<ruby>水<rt>みず<\/rt><\/ruby>につかることのない、<ruby>川<rt>かわ<\/rt><\/ruby>べりのすすきや、<ruby>萩<rt>はぎ<\/rt><\/ruby>の<ruby>株<rt>かぶ<\/rt><\/ruby>が、<ruby>黄<rt>き<\/rt><\/ruby>いろくにごった<ruby>水<rt>みず<\/rt><\/ruby>に<ruby>横<rt>よこ<\/rt><\/ruby>だおしになって、もまれています。ごんは<ruby>川下<rt>かわしも<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へと、ぬかるみみちを<ruby>歩<rt>ある<\/rt><\/ruby>いていきました。","　ふと<ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>川<rt>かわ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>人<rt>ひと<\/rt><\/ruby>がいて、<ruby>何<rt>なん<\/rt><\/ruby>かやっています。ごんは、<ruby>見<rt>み<\/rt><\/ruby>つからないように、そうっと<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>深<rt>ふか<\/rt><\/ruby>いところへ<ruby>歩<rt>ある<\/rt><\/ruby>きよって、そこからじっとのぞいてみました。","「<ruby>兵十<rt>ひょうじゅう<\/rt><\/ruby>だな」と、ごんは<ruby>思<rt>おも<\/rt><\/ruby>いました。<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>はぼろぼろの<ruby>黒<rt>くろ<\/rt><\/ruby>いきものをまくし<ruby>上<rt>あ<\/rt><\/ruby>げて、<ruby>腰<rt>こし<\/rt><\/ruby>のところまで<ruby>水<rt>みず<\/rt><\/ruby>にひたりながら、<ruby>魚<rt>さかな<\/rt><\/ruby>をとる、はりきりという、<ruby>網<rt>あみ<\/rt><\/ruby>をゆすぶっていました。はちまきをした<ruby>顔<rt>かお<\/rt><\/ruby>の横っちょう（よこっちょ）に、まるい<ruby>萩<rt>はぎ<\/rt><\/ruby>の<ruby>葉<rt>は<\/rt><\/ruby>が<ruby>一<rt>いち<\/rt><\/ruby>まい、<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>黒子<rt>ほくろ<\/rt><\/ruby>みたいにへばりついていました。","　しばらくすると、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は、はりきり<ruby>網<rt>もう<\/rt><\/ruby>の<ruby>一<rt>いち<\/rt><\/ruby>ばんうしろの、<ruby>袋<rt>ふくろ<\/rt><\/ruby>のようになったところを、<ruby>水<rt>みず<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>からもちあげました。その<ruby>中<rt>なか<\/rt><\/ruby>には、<ruby>芝<rt>しば<\/rt><\/ruby>の<ruby>根<rt>ね<\/rt><\/ruby>や、<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>葉<rt>は<\/rt><\/ruby>や、くさった<ruby>木<rt>き<\/rt><\/ruby>ぎれなどが、ごちゃごちゃはいっていましたが、でもところどころ、<ruby>白<rt>しろ<\/rt><\/ruby>いものがきらきら<ruby>光<rt>ひか<\/rt><\/ruby>っています。それは、ふというなぎの<ruby>腹<rt>はら<\/rt><\/ruby>や、<ruby>大<rt>おお<\/rt><\/ruby>きなきすの<ruby>腹<rt>はら<\/rt><\/ruby>でした。<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は、びくの<ruby>中<rt>なか<\/rt><\/ruby>へ、そのうなぎやきすを、ごみと<ruby>一<rt>いっ<\/rt><\/ruby>しょにぶちこみました。そして、また、<ruby>袋<rt>ふくろ<\/rt><\/ruby>の<ruby>口<rt>くち<\/rt><\/ruby>をしばって、<ruby>水<rt>みず<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へ<ruby>入<rt>い<\/rt><\/ruby>れました。","　<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>はそれから、びくをもって<ruby>川<rt>かわ<\/rt><\/ruby>から<ruby>上<rt>あが<\/rt><\/ruby>りびくを<ruby>土手<rt>どて<\/rt><\/ruby>においといて、<ruby>何<rt>なん<\/rt><\/ruby>をさがしにか、<ruby>川上<rt>かわかみ<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へかけていきました。","　<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>がいなくなると、ごんは、ぴょいと<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>からとび<ruby>出<rt>だ<\/rt><\/ruby>して、びくのそばへかけつけました。ちょいと、いたずらがしたくなったのです。ごんはびくの<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>魚<rt>さかな<\/rt><\/ruby>をつかみ<ruby>出<rt>だ<\/rt><\/ruby>しては、はりきり<ruby>網<rt>もう<\/rt><\/ruby>のかかっているところより<ruby>下手<rt>しもて<\/rt><\/ruby>の<ruby>川<rt>かわ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>を<ruby>目<rt>め<\/rt><\/ruby>がけて、ぽんぽんなげこみました。どの<ruby>魚<rt>さかな<\/rt><\/ruby>も、「とぼん」と<ruby>音<rt>おと<\/rt><\/ruby>を<ruby>立<rt>た<\/rt><\/ruby>てながら、にごった<ruby>水<rt>みず<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へもぐりこみました。","　<ruby>一<rt>いち<\/rt><\/ruby>ばんしまいに、<ruby>太<rt>ふと<\/rt><\/ruby>いうなぎをつかみにかかりましたが、<ruby>何<rt>なに<\/rt><\/ruby>しろぬるぬるとすべりぬけるので、<ruby>手<rt>て<\/rt><\/ruby>ではつかめません。ごんはじれったくなって、<ruby>頭<rt>あたま<\/rt><\/ruby>をびくの<ruby>中<rt>なか<\/rt><\/ruby>につッこんで、うなぎの<ruby>頭<rt>あたま<\/rt><\/ruby>を<ruby>口<rt>くち<\/rt><\/ruby>にくわえました。うなぎは、キュッと<ruby>言<rt>い<\/rt><\/ruby>ってごんの<ruby>首<rt>くび<\/rt><\/ruby>へまきつきました。そのとたんに<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>が、<ruby>向<rt>むこ<\/rt><\/ruby>うから、","「うわアぬすと<ruby>狐<rt>きつね<\/rt><\/ruby>め」と、どなりたてました。ごんは、びっくりしてとびあがりました。うなぎをふりすててにげようとしましたが、うなぎは、ごんの<ruby>首<rt>くび<\/rt><\/ruby>にまきついたままはなれません。ごんはそのまま<ruby>横<rt>よこ<\/rt><\/ruby>っとびにとび<ruby>出<rt>だ<\/rt><\/ruby>して<ruby>一<rt>いっ<\/rt><\/ruby>しょうけんめいに、にげていきました。","　ほら<ruby>穴<rt>あな<\/rt><\/ruby>の<ruby>近<rt>ちか<\/rt><\/ruby>くの、はんの<ruby>木<rt>き<\/rt><\/ruby>の<ruby>下<rt>もと<\/rt><\/ruby>でふりかえって<ruby>見<rt>み<\/rt><\/ruby>ましたが、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は<ruby>追<rt>お<\/rt><\/ruby>っかけては<ruby>来<rt>き<\/rt><\/ruby>ませんでした。","　ごんは、ほっとして、うなぎの<ruby>頭<rt>あたま<\/rt><\/ruby>をかみくだき、やっとはずして<ruby>穴<rt>あな<\/rt><\/ruby>のそとの、<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>葉<rt>は<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>にのせておきました。",""],"speech":["あるあきのことでした。に、みっかうがふりつづいたそのあいだ、ごんは、そとへもでられなくてあなのなかにしゃがんでいました。","あめがあがると、ごんは、ほっとしてあなからはいでました。そらはからっとはれていて、もずのこえがきんきん、ひびいていました。","ごんは、むらのおがわのつつみまででてきました。あたりの、すすきのほには、まだあめのしずくがひかっていました。かわは、いつもはみずがすくないのですが、みっかものあめで、みずが、どっとましていました。ただのときはみずにつかることのない、かわべりのすすきや、はぎのかぶが、きいろくにごったみずによこだおしになって、もまれています。ごんはかわしものほうへと、ぬかるみみちをあるいていきました。","ふとみると、かわのなかにひとがいて、なんかやっています。ごんは、みつからないように、そうっとくさのふかいところへあるきよって、そこからじっとのぞいてみました。","「ひょうじゅうだな」と、ごんはおもいました。へいじゅうはぼろぼろのくろいきものをまくしあげて、こしのところまでみずにひたりながら、さかなをとる、はりきりという、あみをゆすぶっていました。はちまきをしたかおの横っちょう（よこっちょ）に、まるいはぎのはがいちまい、おおきなほくろみたいにへばりついていました。","しばらくすると、へいじゅうは、はりきりもうのいちばんうしろの、ふくろのようになったところを、みずのなかからもちあげました。そのなかには、しばのねや、くさのはや、くさったきぎれなどが、ごちゃごちゃはいっていましたが、でもところどころ、しろいものがきらきらひかっています。それは、ふというなぎのはらや、おおきなきすのはらでした。へいじゅうは、びくのなかへ、そのうなぎやきすを、ごみといっしょにぶちこみました。そして、また、ふくろのくちをしばって、みずのなかへいれました。","へいじゅうはそれから、びくをもってかわからあがりびくをどてにおいといて、なんをさがしにか、かわかみのほうへかけていきました。","へいじゅうがいなくなると、ごんは、ぴょいとくさのなかからとびだして、びくのそばへかけつけました。ちょいと、いたずらがしたくなったのです。ごんはびくのなかのさかなをつかみだしては、はりきりもうのかかっているところよりしもてのかわのなかをめがけて、ぽんぽんなげこみました。どのさかなも、「とぼん」とおとをたてながら、にごっ rt>し<\/rt><\/ruby>んじゃったにちがいない。ああ、うなぎが<ruby>食<rt>た<\/rt><\/ruby>べたい、うなぎが<ruby>食<rt>た<\/rt><\/ruby>べたいとおもいながら、<ruby>死<rt>し<\/rt><\/ruby>んだんだろう。ちょッ、あんないたずらをしなけりゃよかった。」",""],"speech":["に","","とおかほどたって、ごんが、やすけというおひゃくしょうのいえのうらをとおりかかりますと、そこの、いちじくのきのかげで、やすけのかないが、おはぐろをつけていました。かじやのしんべえのいえのうらをとおると、しんべえのかないがかみをすいていました。ごんは、","「ふふん、むらになんかあるんだな」と、おもいました。","「なんだろう、あきまつりかな。まつりなら、たいこやふえのおとがしそうなものだ。それにだいいち、おみやにのぼりがたつはずだが」","こんなことをかんがえながらやってきますと、いつのまにか、ひょうにあかいいどのある、へいじゅうのいえのまえへきました。そのちいさな、こわれかけたいえのなかには、おおぜいのひとがあつまっていました。よそいきのきものをきて、こしにてぬぐいをさげたりしたおんなたちが、ひょうのかまどでひをたいています。おおきななべのなかでは、なんかぐずぐずにえていました。","「ああ、そうしきだ」と、ごんはおもいました。","「へいじゅうのいえのだれがしんだんだろう」","おひるがすぎると、ごんは、むらのぼちへいって、ろくじぞうさんのかげにかくれていました。いいおてんきで、とおくむこうには、おしろのやねがわらがひかっています。ぼちには、ひがんばなが、あかいきれのようにさきつづいていました。と、むらのほうから、カーン、カーン、と、かねがなってきました。そうしきのでるあいずです。","やがて、しろいきものをきたそうれつのものたちがやってくるのがちらちらみえはじめました。はなしごえもちかくなりました。そうれつはぼちへはいってきました。ひとびとがかよったあとには、ひがんはなが、ふみおられていました。","ごんはのびあがってみました。へいじゅうが、しろいかみしもをつけて、いはいをささげています。いつもは、あかいさつまいもみたいなげんきのいいかおが、きょうはなんだかしおれていました。","「ははん、しんだのはへいじゅうのおっかあだ」","ごんはそうおもいながら、あたまをひっこめました。","そのばん、ごんは、あなのなかでかんがえました。","「へいじゅうのおっははは、とこについていて、うなぎがたべたいといったにちがいない。それでへいじゅうがはりきりもうをもちだしたんだ。ところが、わしがいたずらをして、うなぎをとってきてしまった。だからへいじゅうは、おっははにうなぎをたべさせることができなかった。そのままおっははは、しんじゃったにちがいない。ああ、うなぎがたべたい、うなぎがたべたいとおもいながら、しんだんだろう。ちょッ、あんないたずらをしなけりゃよかった。」",""]},{"t":"つぐないの栗","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#ece4cc\"/><rect x=\"430\" y=\"290\" width=\"220\" height=\"130\" fill=\"#e0d0a8\" rx=\"0\" opacity=\"1\"/><polygon points=\"420,290 660,290 636,264 444,264\" fill=\"#6b4a2e\" opacity=\"1\"/><rect x=\"524.0\" y=\"376\" width=\"32\" height=\"44\" fill=\"#3a2f28\" rx=\"2\" opacity=\"0.85\"/><rect x=\"452\" y=\"320\" width=\"40\" height=\"40\" fill=\"#8a5a33\" rx=\"0\" opacity=\"1\"/><path d=\"M-10 414 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 0 q20 -6 40 >いま<\/rt><\/ruby>まで、おっ<ruby>母<rt>はは<\/rt><\/ruby>と<ruby>二人<rt>ふたり<\/rt><\/ruby>きりで、<ruby>貧<rt>まず<\/rt><\/ruby>しいくらしをしていたもので、おっ<ruby>母<rt>はは<\/rt><\/ruby>が<ruby>死<rt>し<\/rt><\/ruby>んでしまっては、もう<ruby>一人<rt>ひとり<\/rt><\/ruby>ぼっちでした。","「おれと<ruby>同<rt>おな<\/rt><\/ruby>じ<ruby>一人<rt>ひとり<\/rt><\/ruby>ぼっちの<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>か」","　こちらの<ruby>物置<rt>ものおき<\/rt><\/ruby>の<ruby>後<rt>うしろ<\/rt><\/ruby>から<ruby>見<rt>み<\/rt><\/ruby>ていたごんは、そう<ruby>思<rt>おも<\/rt><\/ruby>いました。","　ごんは<ruby>物置<rt>ものおき<\/rt><\/ruby>のそばをはなれて、<ruby>向<rt>むこ<\/rt><\/ruby>うへいきかけますと、どこかで、いわしを<ruby>売<rt>う<\/rt><\/ruby>る<ruby>声<rt>こえ<\/rt><\/ruby>がします。","「いわしのやすうりだアい。いきのいいいわしだアい」","　ごんは、その、いせいのいい<ruby>声<rt>こえ<\/rt><\/ruby>のする<ruby>方<rt>ほう<\/rt><\/ruby>へ<ruby>走<rt>はし<\/rt><\/ruby>っていきました。と、<ruby>弥助<rt>やすけ<\/rt><\/ruby>のおかみさんが、<ruby>裏戸<rt>うらど<\/rt><\/ruby><ruby>口<rt>くち<\/rt><\/ruby>から、","「いわしをおくれ。」と<ruby>言<rt>い<\/rt><\/ruby>いました。いわし<ruby>売<rt>うり<\/rt><\/ruby>は、いわしのかごをつんだ<ruby>車<rt>くるま<\/rt><\/ruby>を、<ruby>道<rt>みち<\/rt><\/ruby>ばたにおいて、ぴかぴか<ruby>光<rt>ひか<\/rt><\/ruby>るいわしを<ruby>両手<rt>りょうて<\/rt><\/ruby>でつかんで、<ruby>弥助<rt>やすけ<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へもってはいりました。ごんはそのすきまに、かごの<ruby>中<rt>なか<\/rt><\/ruby>から、<ruby>五<rt>ご<\/rt><\/ruby>、<ruby>六<rt>ろく<\/rt><\/ruby>ぴきのいわしをつかみ<ruby>出<rt>だ<\/rt><\/ruby>して、もと<ruby>来<rt>き<\/rt><\/ruby>た<ruby>方<rt>ほう<\/rt><\/ruby>へかけだしました。そして、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>裏口<rt>うらぐち<\/rt><\/ruby>から、<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へいわしを<ruby>投<rt>な<\/rt><\/ruby>げこんで、<ruby>穴<rt>あな<\/rt><\/ruby>へ<ruby>向<rt>むか<\/rt><\/ruby>ってかけもどりました。<ruby>途中<rt>とちゅう<\/rt><\/ruby>の<ruby>坂<rt>さか<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>でふりかえって<ruby>見<rt>み<\/rt><\/ruby>ますと、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>がまだ、<ruby>井戸<rt>いど<\/rt><\/ruby>のところで<ruby>麦<rt>むぎ<\/rt><\/ruby>をといでいるのが<ruby>小<rt>ちい<\/rt><\/ruby>さく<ruby>見<rt>み<\/rt><\/ruby>えました。","　ごんは、うなぎのつぐないに、まず<ruby>一<rt>ひと<\/rt><\/ruby>つ、いいことをしたと<ruby>思<rt>おも<\/rt><\/ruby>いました。","　つぎの<ruby>日<rt>ひ<\/rt><\/ruby>には、ごんは<ruby>山<rt>やま<\/rt><\/ruby>で<ruby>栗<rt>くり<\/rt><\/ruby>をどっさりひろって、それをかかえて、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>へいきました。<ruby>裏口<rt>うらぐち<\/rt><\/ruby>からのぞいて<ruby>見<rt>み<\/rt><\/ruby>ますと、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は、<ruby>午飯<rt>ひるめし<\/rt><\/ruby>をたべかけて、<ruby>茶椀<rt>ちゃわん<\/rt><\/ruby>をもったまま、ぼんやりと<ruby>考<rt>かんが<\/rt><\/ruby>えこんでいました。へんなことには<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>の<ruby>頬<rt>ほっ<\/rt><\/ruby>ぺたに、かすり<ruby>傷<rt>きず<\/rt><\/ruby>がついています。どうしたんだろうと、ごんが<ruby>思<rt>おも<\/rt><\/ruby>っていますと、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>がひとりごとをいいました。","「<ruby>一<rt>いち<\/rt><\/ruby>たいだれが、いわしなんかをおれの<ruby>家<rt>いえ<\/rt><\/ruby>へほうりこんでいったんだろう。おかげでおれは、<ruby>盗人<rt>ぬすびと<\/rt><\/ruby>と<ruby>思<rt>おも<\/rt><\/ruby>われて、いわし<ruby>屋<rt>や<\/rt><\/ruby>のやつに、ひどい<ruby>目<rt>め<\/rt><\/ruby>にあわされた」と、ぶつぶつ<ruby>言<rt>い<\/rt><\/ruby>っています。","　ごんは、これはしまったと<ruby>思<rt>おも<\/rt><\/ruby>いました。かわいそうに<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は、いわし<ruby>屋<rt>や<\/rt><\/ruby>にぶんなぐられて、あんな<ruby>傷<rt>きず<\/rt><\/ruby>までつけられたのか。","　ごんはこうおもいながら、そっと<ruby>物置<rt>ものおき<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へまわってその<ruby>入口<rt>いりぐち<\/rt><\/ruby>に、<ruby>栗<rt>くり<\/rt><\/ruby>をおいてかえりました。","　つぎの<ruby>日<rt>ひ<\/rt><\/ruby>も、そのつぎの<ruby>日<rt>ひ<\/rt><\/ruby>もごんは、<ruby>栗<rt>くり<\/rt><\/ruby>をひろっては、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>へもって<ruby>来<rt>き<\/rt><\/ruby>てやりました。そのつぎの<ruby>日<rt>ひ<\/rt><\/ruby>には、<ruby>栗<rt>くり<\/rt><\/ruby>ばかりでなく、まつたけも<ruby>二<rt>に<\/rt><\/ruby>、<ruby>三<rt>さん<\/rt><\/ruby>ぼんもっていきました。",""],"speech":["さん","","へいじゅうが、あかいいどのところで、むぎをといでいました。","へいじゅうはいままで、おっははとふたりきりで、まずしいくらしをしていたもので、おっははがしんでしまっては、もうひとりぼっちでした。","「おれとおなじひとりぼっちのへいじゅうか」","こちらのものおきのうしろからみていたごんは、そうおもいました。","ごんはものおきのそばをはなれて、むこうへいきかけますと、どこかで、いわしをうるこえがします。","「いわしのやすうりだアい。いきのいいいわしだアい」","ごんは、その、いせいのいいこえのするほうへはしっていきました。と、やすけのおかみさんが、うらどくちから、","「いわしをおくれ。」といいました。いわしうりは、いわしのかごをつんだくるまを、みちばたにおいて、ぴかぴかひかるいわしをりょうてでつかんで、やすけのいえのなかへもってはいりました。ごんはそのすきまに、かごのなかから、ご、ろくぴきのいわしをつかみだして、もときたほうへかけだしました。そして、へいじゅうのいえのうらぐちから、いえのなかへいわしをなげこんで、あなへむかってかけもどりました。とちゅうのさかのうえでふりかえってみますと、へいじゅうがまだ、いどのところでむぎをといでいるのがちいさくみえました。","ごんは、うなぎのつぐないに、まずひとつ、いいことをしたとおもいました。","つぎのひには、ごんはやまでくりをどっさりひろって、それをかかえて、へいじゅうのいえへいきました。うらぐちからのぞいてみますと、へいじゅうは、ひるめしをたべかけて、ちゃわんをもったまま、ぼんやりとかんがえこんでいました。へんなことにはへいじゅうのほっぺたに、かすりきずがついています。どうしたんだろうと、ごんがおもっていますと、へいじゅうがひとりごとをいいました。","「いちたいだれが、いわしなんかをおれのいえへほうりこんでいったんだろう。おかげでおれは、ぬすびととおもわれて、いわしやのやつに、ひどいめにあわされた」と、ぶつぶついっています。","ごんは、これはしまったとおもいました。かわいそうにへいじゅうは、いわしやにぶんなぐられて、あんなきずまでつけられたのか。","ごんはこうおもいながら、そっとものおきのほうへまわってそのいりぐちに、くりをおいてかえりました。","つぎのひも、そのつぎのひもごんは、くりをひろっては、へいじゅうのいえへもってきてやりました。そのつぎのひには、くりばかりでなく、まつたけもに、さんぼんもっていきました。",""]},{"t":"月夜の話し声","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#242e3d\"/><circle cx=\"620\" cy=\"90\" r=\"95.2\" fill=\"#f2ecd9\" opacity=\"0.13\"/><circle cx=\"620\" cy=\"90\" r=\"56\" fill=\"#f2ecd9\" opacity=\"1\"/><rect x=\"0\" y=\"360\" width=\"800\" height=\"90\" fill=\"#3d4436\" rx=\"0\" opacity=\"0.8\"/><polygon points=\"0,380 800,360 800,450 0,450\" fill=\"#5a5240\" opacity=\"1\"/><polygon points=\"341.95,386 346.7,330.9 354.3,315.7 366.65,315.7 373.3,330.9 378.05,386\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"360\" cy=\"304.3\" r=\"12.35\" fill=\"#3a3226\" opacity=\"1\"/><polygon points=\"401.95,384 406.7,328.9 414.3,313.7 426.65,313.7 433.3,328.9 438.05,384\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"420\" cy=\"302.3\" r=\"12.35\" fill=\"#4a3f2e\" opacity=\"1\"/><g transform=\"translate(200 400) scale(1 1)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#c87137\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#c87137\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#c87137\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#c87137\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#c87137\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#c87137\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\
