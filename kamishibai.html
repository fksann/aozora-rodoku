rt><\/ruby>の<ruby>向<rt>むこ<\/rt><\/ruby>うから、だれか<ruby>来<rt>く<\/rt><\/ruby>るようです。<ruby>話声<rt>わせい<\/rt><\/ruby>が<ruby>聞<rt>きこ<\/rt><\/ruby>えます。チンチロリン、チンチロリンと<ruby>松虫<rt>まつむし<\/rt><\/ruby>が<ruby>鳴<rt>な<\/rt><\/ruby>いています。","　ごんは、<ruby>道<rt>みち<\/rt><\/ruby>の<ruby>片<rt>かた<\/rt><\/ruby>がわにかくれて、じっとしていました。<ruby>話声<rt>わせい<\/rt><\/ruby>はだんだん<ruby>近<rt>ちか<\/rt><\/ruby>くなりました。それは、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>と<ruby>加助<rt>かすけ<\/rt><\/ruby>というお<ruby>百姓<rt>ひゃくしょう<\/rt><\/ruby>でした。","「そうそう、なあ<ruby>加助<rt>かすけ<\/rt><\/ruby>」と、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>がいいました。","「ああん？」","「おれあ、このごろ、とてもふしぎなことがあるんだ」","「<ruby>何<rt>なん<\/rt><\/ruby>が？」","「おっ<ruby>母<rt>はは<\/rt><\/ruby>が<ruby>死<rt>し<\/rt><\/ruby>んでからは、だれだか<ruby>知<rt>し<\/rt><\/ruby>らんが、おれに<ruby>栗<rt>くり<\/rt><\/ruby>やまつたけなんかを、まいにちまいにちくれるんだよ」","「ふうん、だれが？」","「それがわからんのだよ。おれの<ruby>知<rt>し<\/rt><\/ruby>らんうちに、おいていくんだ」","　ごんは、ふたりのあとをつけていきました。","「ほんとかい？」","「ほんとだとも。うそと<ruby>思<rt>おも<\/rt><\/ruby>うなら、あした<ruby>見<rt>み<\/rt><\/ruby>に<ruby>来<rt>こ<\/rt><\/ruby>いよ。その<ruby>栗<rt>くり<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>せてやるよ」","「へえ、へんなこともあるもんだなア」","　それなり、<ruby>二人<rt>ふたり<\/rt><\/ruby>はだまって<ruby>歩<rt>ある<\/rt><\/ruby>いていきました。","　<ruby>加助<rt>かすけ<\/rt><\/ruby>がひょいと、<ruby>後<rt>うしろ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ました。ごんはびくっとして、<ruby>小<rt>ちい<\/rt><\/ruby>さくなってたちどまりました。<ruby>加助<rt>かすけ<\/rt><\/ruby>は、ごんには<ruby>気<rt>き<\/rt><\/ruby>がつかないで、そのままさっさとあるきました。<ruby>吉兵衛<rt>きちべえ<\/rt><\/ruby>というお<ruby>百姓<rt>ひゃくしょう<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>まで<ruby>来<rt>く<\/rt><\/ruby>ると、<ruby>二人<rt>ふたり<\/rt><\/ruby>はそこへはいっていきました。ポンポンポンポンと<ruby>木魚<rt>もくぎょ<\/rt><\/ruby>の<ruby>音<rt>おと<\/rt><\/ruby>がしています。<ruby>窓<rt>まど<\/rt><\/ruby>の<ruby>障子<rt>しょうじ<\/rt><\/ruby>にあかりがさしていて、<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>坊主頭<rt>ぼうずあたま<\/rt><\/ruby>がうつって<ruby>動<rt>うご<\/rt><\/ruby>いていました。ごんは、","「おねんぶつがあるんだな」と<ruby>思<rt>おも<\/rt><\/ruby>いながら<ruby>井戸<rt>いど<\/rt><\/ruby>のそばにしゃがんでいました。しばらくすると、また<ruby>三<rt>さん<\/rt><\/ruby><ruby>人<rt>にん<\/rt><\/ruby>ほど、<ruby>人<rt>ひと<\/rt><\/ruby>がつれだって<ruby>吉兵衛<rt>きちべえ<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>へはいっていきました。お<ruby>経<rt>きょう<\/rt><\/ruby>を<ruby>読<rt>よ<\/rt><\/ruby>む<ruby>声<rt>こえ<\/rt><\/ruby>がきこえて<ruby>来<rt>き<\/rt><\/ruby>ました。",""],"speech":["よん","","つきのいいばんでした。ごんは、ぶらぶらあそびにでかけました。なかやまさまのおしろのしたをとおってすこしいくと、ほそいみちのむこうから、だれかくるようです。わせいがきこえます。チンチロリン、チンチロリンとまつむしがないています。","ごんは、みちのかたがわにかくれて、じっとしていました。わせいはだんだんちかくなりました。それは、へいじゅうとかすけというおひゃくしょうでした。","「そうそう、なあかすけ」と、へいじゅうがいいました。","「ああん？」","「おれあ、このごろ、とてもふしぎなことがあるんだ」","「なんが？」","「おっははがしんでからは、だれだかしらんが、おれにくりやまつたけなんかを、まいにちまいにちくれるんだよ」","「ふうん、だれが？」","「それがわからんのだよ。おれのしらんうちに、おいていくんだ」","ごんは、ふたりのあとをつけていきました。","「ほんとかい？」","「ほんとだとも。うそとおもうなら、あしたみにこいよ。そのくりをみせてやるよ」","「へえ、へんなこともあるもんだなア」","それなり、ふたりはだまってあるいていきました。","かすけがひょいと、うしろをみました。ごんはびくっとして、ちいさくなってたちどまりました。かすけは、ごんにはきがつかないで、そのままさっさとあるきました。きちべえというおひゃくしょうのいえまでくると、ふたりはそこへはいっていきました。ポンポンポンポンともくぎょのおとがしています。まどのしょうじにあかりがさしていて、おおきなぼうずあたまがうつってうごいていました。ごんは、","「おねんぶつがあるんだな」とおもいながらいどのそばにしゃがんでいました。しばらくすると、またさんにんほど、ひとがつれだってきちべえのいえへはいっていきました。おきょうをよむこえがきこえてきました。",""]},{"t":"神さまのしわざ","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#242e3d\"/><circle cx=\"160\" cy=\"90\" r=\"74.8\" fill=\"#f2ecd9\" opacity=\"0.13\"/><circle cx=\"160\" cy=\"90\" r=\"44\" fill=\"#f2ecd9\" opacity=\"1\"/><rect x=\"0\" y=\"370\" width=\"800\" height=\"80\" fill=\"#3d4436\" rx=\"0\" opacity=\"0.8\"/><g transform=\"translate(560 380)\"><rect x=\"-30\" y=\"-46\" width=\"60\" height=\"46\" fill=\"#5a5240\"/><rect x=\"-38\" y=\"-58\" width=\"76\" height=\"12\" fill=\"#3a3226\"/><path d=\"M-20 -58 l0 -26 l40 0 l0 26\" stroke=\"#3a3226\" stroke-width=\"6\" fill=\"none\"/><\/g><polygon points=\"341.95,396 346.7,340.9 354.3,325.7 366.65,325.7 373.3,340.9 378.05,396\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"360\" cy=\"314.3\" r=\"12.35\" fill=\"#3a3226\" opacity=\"1\"/><polygon points=\"401.95,394 406.7,338.9 414.3,323.7 426.65,323.7 433.3,338.9 438.05,394\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"420\" cy=\"312.3\" r=\"12.35\" fill=\"#4a3f2e\" opacity=\"1\"/><g transform=\"translate(660 404) scale(-0.9 0.9)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#c87137\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#c87137\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#c87137\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#c87137\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#c87137\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#c87137\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#c87137\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#c87137\"/><\/g><g fill=\"#e8e2d0\" opacity=\"0.75\"><circle cx=\"454\" cy=\"82\" r=\"1.2\"/><circle cx=\"591\" cy=\"171\" r=\"1.9\"/><circle cx=\"728\" cy=\"80\" r=\"2.5999999999999996\"/><circle cx=\"125\" cy=\"169\" r=\"1.2\"/><circle cx=\"262\" cy=\"78\" r=\"1.9\"/><circle cx=\"399\" cy=\"167\" r=\"2.5999999999999996\"/><circle cx=\"536\" cy=\"76\" r=\"1.2\"/><circle cx=\"673\" cy=\"165\" r=\"1.9\"/><circle cx=\"70\" cy=\"74\" r=\"2.5999999999999996\"/><circle cx=\"207\" cy=\"163\" r=\"1.2\"/><circle cx=\"344\" cy=\"72\" r=\"1.9\"/><circle cx=\"481\" cy=\"161\" r=\"2.5999999999999996\"/><\/g><\/svg>","paras":["<ruby>五<rt>ご<\/rt><\/ruby>","","　ごんは、おねんぶつがすむまで、<ruby>井戸<rt>いど<\/rt><\/ruby>のそばにしゃがんでいました。<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>と<ruby>加助<rt>かすけ<\/rt><\/ruby>は、また<ruby>一<rt>いっ<\/rt><\/ruby>しょにかえっていきます。ごんは、<ruby>二人<rt>ふたり<\/rt><\/ruby>の<ruby>話<rt>はなし<\/rt><\/ruby>をきこうと<ruby>思<rt>おも<\/rt><\/ruby>って、ついていきました。<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>の<ruby>影法師<rt>かげぼうし<\/rt><\/ruby>をふみふみいきました。","　お<ruby>城<rt>しろ<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>まで<ruby>来<rt>き<\/rt><\/ruby>たとき、<ruby>加助<rt>かすけ<\/rt><\/ruby>が<ruby>言<rt>い<\/rt><\/ruby>い<ruby>出<rt>だ<\/rt><\/ruby>しました。","「さっきの<ruby>話<rt>はなし<\/rt><\/ruby>は、きっと、そりゃあ、<ruby>神<rt>かみ<\/rt><\/ruby>さまのしわざだぞ」","「えっ？」と、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>はびっくりして、<ruby>加助<rt>かすけ<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ました。","「おれは、あれからずっと<ruby>考<rt>かんが<\/rt><\/ruby>えていたが、どうも、そりゃ、<ruby>人間<rt>にんげん<\/rt><\/ruby>じゃない、<ruby>神<rt>かみ<\/rt><\/ruby>さまだ、<ruby>神<rt>かみ<\/rt><\/ruby>さまが、お<ruby>前<rt>まえ<\/rt><\/ruby>がたった<ruby>一人<rt>ひとり<\/rt><\/ruby>になったのをあわれに<ruby>思<rt>おも<\/rt><\/ruby>わっしゃって、いろんなものをめぐんで<ruby>下<rt>くだ<\/rt><\/ruby>さるんだよ」","「そうかなあ」","「そうだとも。だから、まいにち<ruby>神<rt>かみ<\/rt><\/ruby>さまにお<ruby>礼<rt>れい<\/rt><\/ruby>を<ruby>言<rt>ゆ<\/rt><\/ruby>うがいいよ」","「うん」","　ごんは、へえ、こいつはつまらないなと<ruby>思<rt>おも<\/rt><\/ruby>いました。おれが、<ruby>栗<rt>くり<\/rt><\/ruby>や<ruby>松<rt>まつ<\/rt><\/ruby>たけを<ruby>持<rt>も<\/rt><\/ruby>っていってやるのに、そのおれにはお<ruby>礼<rt>れい<\/rt><\/ruby>をいわないで、<ruby>神<rt>かみ<\/rt><\/ruby>さまにお<ruby>礼<rt>れい<\/rt><\/ruby>をいうんじゃア、おれは、引き<ruby>合<rt>ひきあ<\/rt><\/ruby>わないなあ。",""],"speech":["ご","","ごんは、おねんぶつがすむまで、いどのそばにしゃがんでいました。へいじゅうとかすけは、またいっしょにかえっていきます。ごんは、ふたりのはなしをきこうとおもって、ついていきました。へいじゅうのかげぼうしをふみふみいきました。","おしろのまえまできたとき、かすけがいいだしました。","「さっきのはなしは、きっと、そりゃあ、かみさまのしわざだぞ」","「えっ？」と、へいじゅうはびっくりして、かすけのかおをみました。","「おれは、あれからずっとかんがえていたが、どうも、そりゃ、にんげんじゃない、かみさまだ、かみさまが、おまえがたったひとりになったのをあわれにおもわっしゃって、いろんなものをめぐんでくださるんだよ」","「そうかなあ」","「そうだとも。だから、まいにちかみさまにおれいをゆうがいいよ」","「うん」","ごんは、へえ、こいつはつまらないなとおもいました。おれが、くりやまつたけをもっていってやるのに、そのおれにはおれいをいわないで、かみさまにおれいをいうんじゃア、おれは、引きひきあわないなあ。",""]},{"t":"火縄銃","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#5c5444\"/><rect x=\"80\" y=\"120\" width=\"300\" height=\"330\" fill=\"#3a3226\" rx=\"0\" opacity=\"1\"/><rect x=\"110\" y=\"150\" width=\"240\" height=\"300\" fill=\"#8a7050\" rx=\"0\" opacity=\"0.5\"/><polygon points=\"537.2,420 543.2,350.4 552.8,331.2 568.4,331.2 576.8,350.4 582.8,420\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"560\" cy=\"316.8\" r=\"15.6\" fill=\"#4a3f2e\" opacity=\"1\"/><line x1=\"512\" y1=\"330\" x2=\"588\" y2=\"356\" stroke=\"#26231e\" stroke-width=\"7\" opacity=\"1\" stroke-linecap=\"round\"/><g transform=\"translate(300 430) scale(-1.05 1.05)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#c87137\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#c87137\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#c87137\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#c87137\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#c87137\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#c87137\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#c87137\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#c87137\"/><\/g><circle cx=\"200\" cy=\"436\" r=\"5\" fill=\"#8a5a33\" opacity=\"1\"/><circle cx=\"212\" cy=\"430\" r=\"5\" fill=\"#8a5a33\" opacity=\"1\"/><circle cx=\"224\" cy=\"436\" r=\"5\" fill=\"#8a5a33\" opacity=\"1\"/><circle cx=\"236\" cy=\"430\" r=\"5\" fill=\"#8a5a33\" opacity=\"1\"/><path d=\"M560 300 q10 -40 -8 -70 q22 24 18 70 z\" fill=\"#8ca8c9\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.75\" stroke-linecap=\"round\"/><\/svg>","paras":["<ruby>六<rt>ろく<\/rt><\/ruby>","","　そのあくる<ruby>日<rt>ひ<\/rt><\/ruby>もごんは、<ruby>栗<rt>くり<\/rt><\/ruby>をもって、<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>へ<ruby>出<rt>で<\/rt><\/ruby>かけました。<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は<ruby>物置<rt>ものおき<\/rt><\/ruby>で<ruby>縄<rt>なわ<\/rt><\/ruby>をなっていました。それでごんは<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>裏口<rt>うらぐち<\/rt><\/ruby>から、こっそり<ruby>中<rt>なか<\/rt><\/ruby>へはいりました。","　そのとき<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は、ふと<ruby>顔<rt>かお<\/rt><\/ruby>をあげました。と<ruby>狐<rt>きつね<\/rt><\/ruby>が<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へはいったではありませんか。こないだうなぎをぬすみやがったあのごん<ruby>狐<rt>きつね<\/rt><\/ruby>めが、またいたずらをしに<ruby>来<rt>き<\/rt><\/ruby>たな。","「ようし。」","　<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は<ruby>立<rt>た<\/rt><\/ruby>ちあがって、<ruby>納屋<rt>なや<\/rt><\/ruby>にかけてある<ruby>火縄銃<rt>ひなわじゅう<\/rt><\/ruby>をとって、<ruby>火薬<rt>かやく<\/rt><\/ruby>をつめました。","　そして<ruby>足音<rt>あしおと<\/rt><\/ruby>をしのばせてちかよって、<ruby>今<rt>こん<\/rt><\/ruby><ruby>戸口<rt>ここう<\/rt><\/ruby>を<ruby>出<rt>で<\/rt><\/ruby>ようとするごんを、ドンと、うちました。ごんは、ばたりとたおれました。<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>はかけよって<ruby>来<rt>き<\/rt><\/ruby>ました。<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>土間<rt>どま<\/rt><\/ruby>に<ruby>栗<rt>くり<\/rt><\/ruby>が、かためておいてあるのが<ruby>目<rt>め<\/rt><\/ruby>につきました。","「おや」と<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は、びっくりしてごんに<ruby>目<rt>め<\/rt><\/ruby>を<ruby>落<rt>おと<\/rt><\/ruby>しました。","「ごん、お<ruby>前<rt>まい<\/rt><\/ruby>だったのか。いつも<ruby>栗<rt>くり<\/rt><\/ruby>をくれたのは」","　ごんは、ぐったりと<ruby>目<rt>め<\/rt><\/ruby>をつぶったまま、うなずきました。","　<ruby>兵十<rt>へいじゅう<\/rt><\/ruby>は<ruby>火縄銃<rt>ひなわじゅう<\/rt><\/ruby>をばたりと、とり<ruby>落<rt>おと<\/rt><\/ruby>しました。<ruby>青<rt>あお<\/rt><\/ruby>い<ruby>煙<rt>けむり<\/rt><\/ruby>が、まだ<ruby>筒口<rt>つつぐち<\/rt><\/ruby>から<ruby>細<rt>ほそ<\/rt><\/ruby>く<ruby>出<rt>で<\/rt><\/ruby>ていました。"],"speech":["ろく","","そのあくるひもごんは、くりをもって、へいじゅうのいえへでかけました。へいじゅうはものおきでなわをなっていました。それでごんはいえのうらぐちから、こっそりなかへはいりました。","そのときへいじゅうは、ふとかおをあげました。ときつねがいえのなかへはいったではありませんか。こないだうなぎをぬすみやがったあのごんきつねめが、またいたずらをしにきたな。","「ようし。」","へいじゅうはたちあがって、なやにかけてあるひなわじゅうをとって、かやくをつめました。","そしてあしおとをしのばせてちかよって、こんここうをでようとするごんを、ドンと、うちました。ごんは、ばたりとたおれました。へいじゅうはかけよってきました。いえのなかをみると、どまにくりが、かためておいてあるのがめにつきました。","「おや」とへいじゅうは、びっくりしてごんにめをおとしました。","「ごん、おまいだったのか。いつもくりをくれたのは」","ごんは、ぐったりとめをつぶったまま、うなずきました。","へいじゅうはひなわじゅうをばたりと、とりおとしました。あおいけむりが、まだつつぐちからほそくでていました。"]}]},{"id":"tebukuro","title":"手袋を買いに","author":"新美南吉","mins":9,"cover":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#4a6b8c\"/><rect x=\"16\" y=\"16\" width=\"768\" height=\"418\" fill=\"none\" stroke=\"#d9913f\" stroke-width=\"4\"/><rect x=\"27\" y=\"27\" width=\"746\" height=\"396\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"1.5\"/><rect x=\"0\" y=\"340\" width=\"800\" height=\"110\" fill=\"#ffffff\" rx=\"0\" opacity=\"0.95\"/><g fill=\"#ffffff\" opacity=\"0.9\"><circle cx=\"294\" cy=\"158\" r=\"1.6\"/><circle cx=\"421\" cy=\ "/><circle cx=\"308\" cy=\"78\" r=\"3.6\"/><circle cx=\"435\" cy=\"161\" r=\"1.6\"/><circle cx=\"562\" cy=\"244\" r=\"2.6\"/><circle cx=\"689\" cy=\"327\" r=\"3.6\"/><circle cx=\"36\" cy=\"410\" r=\"1.6\"/><circle cx=\"163\" cy=\"73\" r=\"2.6\"/><circle cx=\"290\" cy=\"156\" r=\"3.6\"/><\/g><circle cx=\"660\" cy=\"90\" r=\"40\" fill=\"#e8dcc0\" opacity=\"0.93\"/><circle cx=\"660\" cy=\"90\" r=\"50.0\" fill=\"none\" stroke=\"#e8dcc0\" stroke-width=\"2.5\" opacity=\".35\"/><\/svg>","paras":["　<ruby>寒<rt>さむ<\/rt><\/ruby>い<ruby>冬<rt>ふゆ<\/rt><\/ruby>が<ruby>北方<rt>ほっぽう<\/rt><\/ruby>から、<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>親子<rt>おやこ<\/rt><\/ruby>の<ruby>棲<rt>す<\/rt><\/ruby>んでいる<ruby>森<rt>もり<\/rt><\/ruby>へもやって<ruby>来<rt>き<\/rt><\/ruby>ました。","　<ruby>或朝<rt>あるあさ<\/rt><\/ruby><ruby>洞穴<rt>ほらあな<\/rt><\/ruby>から<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>ようとしましたが、","「あっ」と<ruby>叫<rt>さけ<\/rt><\/ruby>んで<ruby>眼<rt>め<\/rt><\/ruby>を<ruby>抑<rt>おさ<\/rt><\/ruby>えながら<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>のところへころげて<ruby>来<rt>き<\/rt><\/ruby>ました。","「<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん、<ruby>眼<rt>め<\/rt><\/ruby>に<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>刺<rt>さ<\/rt><\/ruby>さった、ぬいて<ruby>頂戴<rt>ちょうだい<\/rt><\/ruby><ruby>早<rt>はや<\/rt><\/ruby>く<ruby>早<rt>はや<\/rt><\/ruby>く」と<ruby>言<rt>い<\/rt><\/ruby>いました。","　<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>がびっくりして、あわてふためきながら、<ruby>眼<rt>め<\/rt><\/ruby>を<ruby>抑<rt>おさ<\/rt><\/ruby>えている<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>を恐る<ruby>恐<rt>おそるおそ<\/rt><\/ruby>るとりのけて<ruby>見<rt>み<\/rt><\/ruby>ましたが、<ruby>何<rt>なん<\/rt><\/ruby>も<ruby>刺<rt>さ<\/rt><\/ruby>さってはいませんでした。<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は<ruby>洞穴<rt>ほらあな<\/rt><\/ruby>の<ruby>入口<rt>いりぐち<\/rt><\/ruby>から<ruby>外<rt>そと<\/rt><\/ruby>へ<ruby>出<rt>で<\/rt><\/ruby>て<ruby>始<rt>はじ<\/rt><\/ruby>めてわけが<ruby>解<rt>わか<\/rt><\/ruby>りました。<ruby>昨夜<rt>さくや<\/rt><\/ruby>のうちに、<ruby>真白<rt>まっしろ<\/rt><\/ruby>な<ruby>雪<rt>ゆき<\/rt><\/ruby>がどっさり<ruby>降<rt>ふ<\/rt><\/ruby>ったのです。その<ruby>雪<rt>ゆき<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>からお<ruby>陽<rt>ひ<\/rt><\/ruby>さまがキラキラと<ruby>照<rt>てら<\/rt><\/ruby>していたので、<ruby>雪<rt>ゆき<\/rt><\/ruby>は<ruby>眩<rt>まぶ<\/rt><\/ruby>しいほど<ruby>反射<rt>はんしゃ<\/rt><\/ruby>していたのです。<ruby>雪<rt>ゆき<\/rt><\/ruby>を<ruby>知<rt>し<\/rt><\/ruby>らなかった<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>は、あまり<ruby>強<rt>つよ<\/rt><\/ruby>い<ruby>反射<rt>はんしゃ<\/rt><\/ruby>をうけたので、<ruby>眼<rt>め<\/rt><\/ruby>に<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>刺<rt>さ<\/rt><\/ruby>さったと<ruby>思<rt>おも<\/rt><\/ruby>ったのでした。","　<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>は<ruby>遊<rt>あそ<\/rt><\/ruby>びに<ruby>行<rt>い<\/rt><\/ruby>きました。<ruby>真綿<rt>まわた<\/rt><\/ruby>のように<ruby>柔<rt>やわら<\/rt><\/ruby>かい<ruby>雪<rt>ゆき<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>を<ruby>駈<rt>か<\/rt><\/ruby>け<ruby>廻<rt>まわ<\/rt><\/ruby>ると、<ruby>雪<rt>ゆき<\/rt><\/ruby>の<ruby>粉<rt>こ<\/rt><\/ruby>が、しぶきのように飛び<ruby>散<rt>とびち<\/rt><\/ruby>って<ruby>小<rt>ちい<\/rt><\/ruby>さい<ruby>虹<rt>にじ<\/rt><\/ruby>がすっと<ruby>映<rt>うつ<\/rt><\/ruby>るのでした。","　すると<ruby>突然<rt>とつぜん<\/rt><\/ruby>、うしろで、","「どたどた、ざーっ」と<ruby>物凄<rt>ものすご<\/rt><\/ruby>い<ruby>音<rt>おと<\/rt><\/ruby>がして、パン<ruby>粉<rt>ぱんこ<\/rt><\/ruby>のような<ruby>粉雪<rt>こなゆき<\/rt><\/ruby>が、ふわーっと<ruby>子狐<rt>こぎつね<\/rt><\/ruby>におっかぶさって<ruby>来<rt>き<\/rt><\/ruby>ました。<ruby>子狐<rt>こぎつね<\/rt><\/ruby>はびっくりして、<ruby>雪<rt>ゆき<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>にころがるようにして<ruby>十<rt>じゅう<\/rt><\/ruby><ruby>米<rt>メートル<\/rt><\/ruby>も<ruby>向<rt>む<\/rt><\/ruby>こうへ<ruby>逃<rt>に<\/rt><\/ruby>げました。<ruby>何<rt>なん<\/rt><\/ruby>だろうと<ruby>思<rt>おも<\/rt><\/ruby>ってふり<ruby>返<rt>かえ<\/rt><\/ruby>って<ruby>見<rt>み<\/rt><\/ruby>ましたが<ruby>何<rt>なん<\/rt><\/ruby>もいませんでした。それは<ruby>樅<rt>もみ<\/rt><\/ruby>の<ruby>枝<rt>えだ<\/rt><\/ruby>から<ruby>雪<rt>ゆき<\/rt><\/ruby>がなだれ<ruby>落<rt>お<\/rt><\/ruby>ちたのでした。まだ<ruby>枝<rt>えだ<\/rt><\/ruby>と<ruby>枝<rt>えだ<\/rt><\/ruby>の<ruby>間<rt>あいだ<\/rt><\/ruby>から<ruby>白<rt>しろ<\/rt><\/ruby>い<ruby>絹糸<rt>きぬいと<\/rt><\/ruby>のように<ruby>雪<rt>ゆき<\/rt><\/ruby>がこぼれていました。","　<ruby>間<rt>ま<\/rt><\/ruby>もなく<ruby>洞穴<rt>ほらあな<\/rt><\/ruby>へ<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>た<ruby>子狐<rt>こぎつね<\/rt><\/ruby>は、","「お<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん、お<ruby>手々<rt>てて<\/rt><\/ruby>が<ruby>冷<rt>つめ<\/rt><\/ruby>たい、お<ruby>手々<rt>てて<\/rt><\/ruby>がちんちんする」と<ruby>言<rt>い<\/rt><\/ruby>って、<ruby>濡<rt>ぬ<\/rt><\/ruby>れて<ruby>牡丹色<rt>ぼたんいろ<\/rt><\/ruby>になった<ruby>両手<rt>りょうて<\/rt><\/ruby>を<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>にさしだしました。<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は、その<ruby>手<rt>て<\/rt><\/ruby>に、は――っと<ruby>息<rt>いき<\/rt><\/ruby>をふっかけて、ぬくとい<ruby>母<rt>かあ<\/rt><\/ruby>さんの<ruby>手<rt>て<\/rt><\/ruby>でやんわり<ruby>包<rt>つつ<\/rt><\/ruby>んでやりながら、","「もうすぐ<ruby>暖<rt>あたたか<\/rt><\/ruby>くなるよ、<ruby>雪<rt>ゆき<\/rt><\/ruby>をさわると、すぐ<ruby>暖<rt>あたたか<\/rt><\/ruby>くなるもんだよ」といいましたが、かあいい<ruby>坊<rt>ぼう<\/rt><\/ruby>やの<ruby>手<rt>て<\/rt><\/ruby>に<ruby>霜焼<rt>しもやけ<\/rt><\/ruby>ができてはかわいそうだから、<ruby>夜<rt>よる<\/rt><\/ruby>になったら、<ruby>町<rt>まち<\/rt><\/ruby>まで<ruby>行<rt>い<\/rt><\/ruby>って、<ruby>坊<rt>ぼう<\/rt><\/ruby>やのお<ruby>手々<rt>てて<\/rt><\/ruby>にあうような<ruby>毛糸<rt>けいと<\/rt><\/ruby>の<ruby>手袋<rt>てぶくろ<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>ってやろうと<ruby>思<rt>おも<\/rt><\/ruby>いました。"],"speech":["さむいふゆがほっぽうから、きつねのおやこのすんでいるもりへもやってきました。","あるあさほらあなからこどものきつねがでようとしましたが、","「あっ」とさけんでめをおさえながらかあさんきつねのところへころげてきました。","「かあちゃん、めになんかささった、ぬいてちょうだいはやくはやく」といいました。","かあさんきつねがびっくりして、あわてふためきながら、めをおさえているこどものてを恐るおそるおそるとりのけてみましたが、なんもささってはいませんでした。かあさんきつねはほらあなのいりぐちからそとへでてはじめてわけがわかりました。さくやのうちに、まっしろなゆきがどっさりふったのです。そのゆきのうえからおひさまがキラキラとてらしていたので、ゆきはまぶしいほどはんしゃしていたのです。ゆきをしらなかったこどものきつねは、あまりつよいはんしゃをうけたので、めになんかささったとおもったのでした。","こどものきつねはあそびにいきました。まわたのようにやわらかいゆきのうえをかけまわると、ゆきのこが、しぶきのように飛びとびちってちいさいにじがすっとうつるのでした。","するととつぜん、うしろで、","「どたどた、ざーっ」とものすごいおとがして、パンぱんこのようなこなゆきが、ふわーっとこぎつねにおっかぶさってきました。こぎつねはびっくりして、ゆきのなかにころがるようにしてじゅうメートルもむこうへにげました。なんだろうとおもってふりかえってみましたがなんもいませんでした。それはもみのえだからゆきがなだれおちたのでした。まだえだとえだのあいだからしろいきぬいとのようにゆきがこぼれていました。","まもなくほらあなへかえってきたこぎつねは、","「おかあちゃん、おててがつめたい、おててがちんちんする」といって、ぬれてぼたんいろになったりょうてをかあさんきつねのまえにさしだしました。かあさんきつねは、そのてに、は――っといきをふっかけて、ぬくといかあさんのてでやんわりつつんでやりながら、","「もうすぐあたたかくなるよ、ゆきをさわると、すぐあたたかくなるもんだよ」といいましたが、かあいいぼうやのてにしもやけができてはかわいそうだから、よるになったら、まちまでいって、ぼうやのおててにあうようなけいとのてぶくろをかってやろうとおもいました。"]},{"t":"町の灯","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1f2a44\"/><rect x=\"0\" y=\"330\" width=\"800\" height=\"120\" fill=\"#dce8f0\" rx=\"0\" opacity=\"0.9\"/><polygon points=\"0,340 300,300 560,336 800,310 800,450 0,450\" fill=\"#26364a\" opacity=\"1\"/><circle cx=\"480\" cy=\"322\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"516\" cy=\"314\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"552\" cy=\"306\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"588\" cy=\"322\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"624\" cy=\"314\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"660\" cy=\"306\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"696\" cy=\"322\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"732\" cy=\"314\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"768\" cy=\"306\" r=\"3.5\" fill=\"#d9a441\" opacity=\"0.95\"/><g transform=\"translate(220 420) scale(1.15 1.15)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#d9913f\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#d9913f\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#d9913f\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#d9913f\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#d9913f\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#d9913f\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#d9913f\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#d9913f\"/><\/g><g transform=\"translate(310 428) scale(0.75 0.75)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#e8b45a\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#e8b45a\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#e8b45a\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#e8b45a\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#e8b45a\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#e8b45a\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#e8b45a\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#e8b45a\"/><\/g><g fill=\"#e8ecf4\" opacity=\"0.8\"><circle cx=\"348\" cy=\"200\" r=\"1.2\"/><circle cx=\"485\" cy=\"89\" r=\"1.9\"/><circle cx=\"622\" cy=\"178\" r=\"2.5999999999999996\"/><circle cx=\"759\" cy=\"67\" r=\"1.2\"/><circle cx=\"156\" cy=\"156\" r=\"1.9\"/><circle cx=\"293\" cy=\"45\" r=\"2.5999999999999996\"/><circle cx=\"430\" cy=\"134\" r=\"1.2\"/><circle cx=\"567\" cy=\"23\" r=\"1.9\"/><circle cx=\"704\" cy=\"112\" r=\"2.5999999999999996\"/><circle cx=\"101\" cy=\"201\" r=\"1.2\"/><circle cx=\"238\" cy=\"90\" r=\"1.9\"/><circle cx=\"375\" cy=\"179\" r=\"2.5999999999999996\"/><circle cx=\"512\" cy=\"68\" r=\"1.2\"/><circle cx=\"649\" cy=\"157\" r=\"1.9\"/><circle cx=\"46\" cy=\"46\" r=\"2.5999999999999996\"/><circle cx=\"183\" cy=\"135\" r=\"1.2\"/><\/g><\/svg>","paras":["　<ruby>暗<rt>くら<\/rt><\/ruby>い<ruby>暗<rt>くら<\/rt><\/ruby>い<ruby>夜<rt>よる<\/rt><\/ruby>が<ruby>風呂敷<rt>ふろしき<\/rt><\/ruby>のような<ruby>影<rt>かげ<\/rt><\/ruby>をひろげて<ruby>野原<rt>のはら<\/rt><\/ruby>や<ruby>森<rt>もり<\/rt><\/ruby>を<ruby>包<rt>つつ<\/rt><\/ruby>みにやって<ruby>来<rt>き<\/rt><\/ruby>ましたが、<ruby>雪<rt>ゆき<\/rt><\/ruby>はあまり<ruby>白<rt>しろ<\/rt><\/ruby>いので、<ruby>包<rt>つつ<\/rt><\/ruby>んでも<ruby>包<rt>つつ<\/rt><\/ruby>んでも<ruby>白<rt>しろ<\/rt><\/ruby>く<ruby>浮<rt>うか<\/rt><\/ruby>びあがっていました。","　<ruby>親子<rt>おやこ<\/rt><\/ruby>の<ruby>銀狐<rt>ぎんぎつね<\/rt><\/ruby>は<ruby>洞穴<rt>ほらあな<\/rt><\/ruby>から<ruby>出<rt>で<\/rt><\/ruby>ました。<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>はお<ruby>母<rt>かあ<\/rt><\/ruby>さんのお<ruby>腹<rt>なか<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>へはいりこんで、そこからまんまるな<ruby>眼<rt>め<\/rt><\/ruby>をぱちぱちさせながら、あっちやこっちを<ruby>見<rt>み<\/rt><\/ruby>ながら<ruby>歩<rt>ある<\/rt><\/ruby>いて<ruby>行<rt>い<\/rt><\/ruby>きました。","　やがて、<ruby>行手<rt>ゆくて<\/rt><\/ruby>にぽっつりあかりが<ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>見<rt>み<\/rt><\/ruby>え<ruby>始<rt>はじ<\/rt><\/ruby>めました。それを<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>が<ruby>見<rt>み<\/rt><\/ruby>つけて、","「<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん、お<ruby>星<rt>ほし<\/rt><\/ruby>さまは、あんな<ruby>低<rt>ひく<\/rt><\/ruby>いところにも<ruby>落<rt>お<\/rt><\/ruby>ちてるのねえ」とききました。","「あれはお<ruby>星<rt>ほし<\/rt><\/ruby>さまじゃないのよ」と<ruby>言<rt>い<\/rt><\/ruby>って、その<ruby>時<rt>とき<\/rt><\/ruby><ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>足<rt>あし<\/rt><\/ruby>はすくんでしまいました。","「あれは<ruby>町<rt>まち<\/rt><\/ruby>の<ruby>灯<rt>ひ<\/rt><\/ruby>なんだよ」","　その<ruby>町<rt>まち<\/rt><\/ruby>の<ruby>灯<rt>あかり<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>た<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は、ある<ruby>時<rt>とき<\/rt><\/ruby><ruby>町<rt>まち<\/rt><\/ruby>へお<ruby>友達<rt>ともだち<\/rt><\/ruby>と<ruby>出<rt>で<\/rt><\/ruby>かけて<ruby>行<rt>い<\/rt><\/ruby>って、とんだめにあったことを<ruby>思出<rt>おもいだ<\/rt><\/ruby>しました。およしなさいっていうのもきかないで、お<ruby>友達<rt>ともだち<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>が、<ruby>或<rt>あ<\/rt><\/ruby>る<ruby>家<rt>いえ<\/rt><\/ruby>の<ruby>家鴨<rt>あひる<\/rt><\/ruby>を<ruby>盗<rt>ぬす<\/rt><\/ruby>もうとしたので、お<ruby>百姓<rt>ひゃくしょう<\/rt><\/ruby>に<ruby>見<rt>み<\/rt><\/ruby>つかって、さんざ<ruby>追<rt>お<\/rt><\/ruby>いまくられて、<ruby>命<rt>いのち<\/rt><\/ruby>からがら<ruby>逃<rt>に<\/rt><\/ruby>げたことでした。"],"speech":["くらいくらいよるがふろしきのようなかげをひろげてのはらやもりをつつみにやってきましたが、ゆきはあまりしろいので、つつんでもつつんでもしろくうかびあがっていました。","おやこのぎんぎつねはほらあなからでました。こどものほうはおかあさんのおなかのしたへはいりこんで、そこからまんまるなめをぱちぱちさせながら、あっちやこっちをみながらあるいていきました。","やがて、ゆくてにぽっつりあかりがひとつみえはじめました。それをこどものきつねがみつけて、","「かあちゃん、おほしさまは、あんなひくいところにもおちてるのねえ」とききました。","「あれはおほしさまじゃないのよ」といって、そのときかあさんきつねのあしはすくんでしまいました。","「あれはまちのひなんだよ」","そのまちのあかりをみたとき、かあさんきつねは、あるときまちへおともだちとでかけていって、とんだめにあったことをおもいだしました。およしなさいっていうのもきかないで、おともだちのきつねが、あるいえのあひるをぬすもうとしたので、おひゃくしょうにみつかって、さんざおいまくられて、いのちからがらにげたことでした。"]},{"t":"人間の手","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#b8ccdc\"/><circle cx=\"400\" cy=\"210\" r=\"150\" fill=\"#dce8f0\" opacity=\"0.35\"/><g transform=\"translate(320 240)\"><ellipse cx=\"0\" cy=\"0\" rx=\"42\" ry=\"34\" fill=\"#d9913f\"/><ellipse cx=\"-22\" cy=\"-30\" rx=\"8\" ry=\"14\" fill=\"#d9913f\"/><ellipse cx=\"-7\" cy=\"-30\" rx=\"8\" ry=\"14\" fill=\"#d9913f\"/><ellipse cx=\"8\" cy=\"-30\" rx=\"8\" ry=\"14\" fill=\"#d9913f\"/><ellipse cx=\"23\" cy=\"-30\" rx=\"8\" ry=\"14\" fill=\"#d9913f\"/><ellipse cx=\"0\" cy=\"6\" rx=\"20\" ry=\"14\" fill=\"#f7f1e1\"/><\/g><g transform=\"translate(480 240)\"><path d=\"M-20 34 q-8 -40 6 -58 q6 -8 14 -6 q22 4 22 30 q0 22 -10 36 z\" fill=\"#f2ddc2\"/><rect x=\"-14\" y=\"-44\" width=\"9\" height=\"26\" rx=\"4.5\" fill=\"#f2ddc2\"/><rect x=\"-3\" y=\"-44\" width=\"9\" height=\"26\" rx=\"4.5\" fill=\"#f2ddc2\"/><rect x=\"8\" y=\"-44\" width=\"9\" height=\"26\" rx=\"4.5\" fill=\"#f2ddc2\"/><rect x=\"19\" y=\"-44\" width=\"9\" height=\"26\" rx=\"4.5\" fill=\"#f2ddc2\"/><\/g><path d=\"M368 240 q30 -20 60 0\" fill=\"none\" stroke=\"#5c6e84\" stroke-width=\"3\" opacity=\"0.7\" stroke-linecap=\"round\"/><text x=\"400\" y=\"96\" font-size=\"20\" fill=\"#3f4c5c\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"2\" opacity=\"1\">こっちの手を、出しちゃいけないよ<\/text><g fill=\"#ffffff\" opacity=\"0.5\"><circle cx=\"649\" cy=\"343\" r=\"1.6\"/><circle cx=\"776\" cy=\"426\" r=\"2.6\"/><circle cx=\"123\" cy=\"89\" r=\"3.6\"/><circle cx=\"250\" cy=\"172\" r=\"1.6\"/><circle cx=\"377\" cy=\"255\" r=\"2.6\"/><circle cx=\"504\" cy=\"338\" r=\"3.6\"/><circle cx=\"631\" cy=\"421\" r=\"1.6\"/><circle cx=\"758\" cy=\"84\" r=\"2.6\"/><circle cx=\"105\" cy=\"167\" r=\"3.6\"/><circle cx=\"232\" cy=\"250\" r=\"1.6\"/><circle cx=\"359\" cy=\"333\" r=\"2.6\"/><circle cx=\"486\" cy=\"416\" r=\"3.6\"/><circle cx=\"613\" cy=\"79\" r=\"1.6\"/><circle cx=\"740\" cy=\"162\" r=\"2.6\"/><circle cx=\"87\" cy=\"245\" r=\"3.6\"/><circle cx=\"214\" cy=\"328\" r=\"1.6\"/><circle cx=\"341\" cy=\"411\" r=\"2.6\"/><circle cx=\"468\" cy=\"74\" r=\"3.6\"/><\/g><\/svg>","paras":["「<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん<ruby>何<rt>なん<\/rt><\/ruby>してんの、<ruby>早<rt>はや<\/rt><\/ruby>く<ruby>行<rt>い<\/rt><\/ruby>こうよ」と<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>がお<ruby>腹<rt>なか<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>から<ruby>言<rt>い<\/rt><\/ruby>うのでしたが、<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>はどうしても<ruby>足<rt>あし<\/rt><\/ruby>がすすまないのでした。そこで、しかたがないので、<ruby>坊<rt>ぼう<\/rt><\/ruby>やだけを<ruby>一人<rt>ひとり<\/rt><\/ruby>で<ruby>町<rt>まち<\/rt><\/ruby>まで<ruby>行<rt>い<\/rt><\/ruby>かせることになりました。","「<ruby>坊<rt>ぼう<\/rt><\/ruby>やお<ruby>手々<rt>てて<\/rt><\/ruby>を<ruby>片方<rt>かたほう<\/rt><\/ruby>お<ruby>出<rt>だ<\/rt><\/ruby>し」とお<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>がいいました。その<ruby>手<rt>て<\/rt><\/ruby>を、<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>はしばらく<ruby>握<rt>にぎ<\/rt><\/ruby>っている<ruby>間<rt>あいだ<\/rt><\/ruby>に、<ruby>可愛<rt>かわ<\/rt><\/ruby>いい<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>にしてしまいました。<ruby>坊<rt>ぼう<\/rt><\/ruby>やの<ruby>狐<rt>きつね<\/rt><\/ruby>はその<ruby>手<rt>て<\/rt><\/ruby>をひろげたり<ruby>握<rt>にぎ<\/rt><\/ruby>ったり、<ruby>抓<rt>つね<\/rt><\/ruby>って<ruby>見<rt>み<\/rt><\/ruby>たり、<ruby>嗅<rt>か<\/rt><\/ruby>いで<ruby>見<rt>み<\/rt><\/ruby>たりしました。","「<ruby>何<rt>なん<\/rt><\/ruby>だか<ruby>変<rt>へん<\/rt><\/ruby>だな<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん、これなあに？」と<ruby>言<rt>い<\/rt><\/ruby>って、<ruby>雪<rt>ゆき<\/rt><\/ruby>あかりに、またその、<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>に<ruby>変<rt>か<\/rt><\/ruby>えられてしまった<ruby>自分<rt>じぶん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>をしげしげと<ruby>見<rt>み<\/rt><\/ruby>つめました。","「それは<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>よ。いいかい<ruby>坊<rt>ぼう<\/rt><\/ruby>や、<ruby>町<rt>まち<\/rt><\/ruby>へ<ruby>行<rt>い<\/rt><\/ruby>ったらね、たくさん<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>家<rt>いえ<\/rt><\/ruby>があるからね、まず<ruby>表<rt>ひょう<\/rt><\/ruby>に<ruby>円<rt>まる<\/rt><\/ruby>いシャッポの<ruby>看板<rt>かんばん<\/rt><\/ruby>のかかっている<ruby>家<rt>いえ<\/rt><\/ruby>を<ruby>探<rt>さが<\/rt><\/ruby>すんだよ。それが<ruby>見<rt>み<\/rt><\/ruby>つかったらね、トントンと<ruby>戸<rt>と<\/rt><\/ruby>を<ruby>叩<rt>たた<\/rt><\/ruby>いて、<ruby>今晩<rt>こんばん<\/rt><\/ruby>はって<ruby>言<rt>い<\/rt><\/ruby>うんだよ。そうするとね、<ruby>中<rt>なか<\/rt><\/ruby>から<ruby>人間<rt>にんげん<\/rt><\/ruby>が、すこうし<ruby>戸<rt>と<\/rt><\/ruby>をあけるからね、その<ruby>戸<rt>と<\/rt><\/ruby>の<ruby>隙間<rt>すきま<\/rt><\/ruby>から、こっちの<ruby>手<rt>て<\/rt><\/ruby>、ほらこの<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>をさし<ruby>入<rt>い<\/rt><\/ruby>れてね、この<ruby>手<rt>て<\/rt><\/ruby>にちょうどいい<ruby>手袋<rt>てぶくろ<\/rt><\/ruby><ruby>頂戴<rt>ちょうだい<\/rt><\/ruby>って<ruby>言<rt>い<\/rt><\/ruby>うんだよ、わかったね、<ruby>決<rt>けっ<\/rt><\/ruby>して、こっちのお<ruby>手々<rt>てて<\/rt><\/ruby>を<ruby>出<rt>だ<\/rt><\/ruby>しちゃ<ruby>駄目<rt>だめ<\/rt><\/ruby>よ」と<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は<ruby>言<rt>い<\/rt><\/ruby>いきかせました。","「どうして？」と<ruby>坊<rt>ぼう<\/rt><\/ruby>やの<ruby>狐<rt>きつね<\/rt><\/ruby>はききかえしました。","「<ruby>人間<rt>にんげん<\/rt><\/ruby>はね、<ruby>相手<rt>あいて<\/rt><\/ruby>が<ruby>狐<rt>きつね<\/rt><\/ruby>だと<ruby>解<rt>わか<\/rt><\/ruby>ると、<ruby>手袋<rt>てぶくろ<\/rt><\/ruby>を<ruby>売<rt>う<\/rt><\/ruby>ってくれないんだよ、それどころか、<ruby>掴<rt>つか<\/rt><\/ruby>まえて<ruby>檻<rt>おり<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へ<ruby>入<rt>い<\/rt><\/ruby>れちゃうんだよ、<ruby>人間<rt>にんげん<\/rt><\/ruby>ってほんとに<ruby>恐<rt>こわ<\/rt><\/ruby>いものなんだよ」","「ふーん」","「<ruby>決<rt>けっ<\/rt><\/ruby>して、こっちの<ruby>手<rt>て<\/rt><\/ruby>を<ruby>出<rt>だ<\/rt><\/ruby>しちゃいけないよ、こっちの<ruby>方<rt>ほう<\/rt><\/ruby>、ほら<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>をさしだすんだよ」と<ruby>言<rt>い<\/rt><\/ruby>って、<ruby>母<rt>かあ<\/rt><\/ruby>さんの<ruby>狐<rt>きつね<\/rt><\/ruby>は、<ruby>持<rt>も<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>た<ruby>二<rt>ふた<\/rt><\/ruby>つの<ruby>白銅貨<rt>はくどうか<\/rt><\/ruby>を、<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へ<ruby>握<rt>にぎ<\/rt><\/ruby>らせてやりました。"],"speech":["「かあちゃんなんしてんの、はやくいこうよ」とこどものきつねがおなかのしたからいうのでしたが、かあさんきつねはどうしてもあしがすすまないのでした。そこで、しかたがないので、ぼうやだけをひとりでまちまでいかせることになりました。","「ぼうやおててをかたほうおだし」とおかあさんきつねがいいました。そのてを、かあさんきつねはしばらくにぎっているあいだに、かわいいにんげんのこどものてにしてしまいました。ぼうやのきつねはそのてをひろげたりにぎったり、つねってみたり、かいでみたりしました。","「なんだかへんだなかあちゃん、これなあに？」といって、ゆきあかりに、またその、にんげんのてにかえられてしまったじぶんのてをしげしげとみつめました。","「それはにんげんのてよ。いいかいぼうや、まちへいったらね、たくさんにんげんのいえがあるからね、まずひょうにまるいシャッポのかんばんのかかっているいえをさがすんだよ。それがみつかったらね、トントンととをたたいて、こんばんはっていうんだよ。そうするとね、なかからにんげんが、すこうしとをあけるからね、そのとのすきまから、こっちのて、ほらこのにんげんのてをさしいれてね、このてにちょうどいいてぶくろちょうだいっていうんだよ、わかったね、けっして、こっちのおててをだしちゃだめよ」とかあさんきつねはいいきかせました。","「どうして？」とぼうやのきつねはききかえしました。","「にんげんはね、あいてがきつねだとわかると、てぶくろをうってくれないんだよ、それどころか、つかまえておりのなかへいれちゃうんだよ、にんげんってほんとにこわいものなんだよ」","「ふーん」","「けっして、こっちのてをだしちゃいけないよ、こっちのほう、ほらにんげんのてのほうをさしだすんだよ」といって、かあさんのきつねは、もってきたふたつのはくどうかを、にんげんのてのほうへにぎらせてやりました。"]},{"t":"帽子屋の戸","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1f2a44\"/><rect x=\"240\" y=\"210\" width=\"320\" height=\"220\" fill=\"#5a4a3c\" rx=\"0\" opacity=\"1\"/><polygon points=\"230,210 570,210 546,184 254,184\" fill=\"#3a3226\" opacity=\"1\"/><rect x=\"300\" y=\"300\" width=\"200\" height=\"130\" fill=\"#26231e\" rx=\"0\" opacity=\"1\"/><rect x=\"388\" y=\"300\" width=\"24\" height=\"130\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.95\"/><circle cx=\"400\" cy=\"360\" r=\"60\" fill=\"#d9a441\" opacity=\"0.2\"/><ellipse cx=\"330\" cy=\"256\" rx=\"30\" ry=\"14\" fill=\"#f7f1e1\"/><rect x=\"300\" y=\"252\" width=\"60\" height=\"8\" fill=\"#f7f1e1\"/><text x=\"330\" y=\"240\" font-size=\"15\" fill=\"#e8dcc0\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"2\" opacity=\"1\">帽子屋<\/text><g transform=\"translate(410 442) scale(0.95 0.95)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 っ<\/rt><\/ruby>つになり、はては<ruby>十<rt>じゅう<\/rt><\/ruby>にもふえました。<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>子供<rt>こども<\/rt><\/ruby>はそれを<ruby>見<rt>み<\/rt><\/ruby>て、<ruby>灯<rt>あかり<\/rt><\/ruby>には、<ruby>星<rt>ほし<\/rt><\/ruby>と<ruby>同<rt>おな<\/rt><\/ruby>じように、<ruby>赤<rt>あか<\/rt><\/ruby>いのや<ruby>黄<rt>き<\/rt><\/ruby>いのや<ruby>青<rt>あお<\/rt><\/ruby>いのがあるんだなと<ruby>思<rt>おも<\/rt><\/ruby>いました。やがて<ruby>町<rt>まち<\/rt><\/ruby>にはいりましたが<ruby>通<rt>とお<\/rt><\/ruby>りの<ruby>家々<rt>いえいえ<\/rt><\/ruby>はもうみんな<ruby>戸<rt>と<\/rt><\/ruby>を<ruby>閉<rt>し<\/rt><\/ruby>めてしまって、<ruby>高<rt>たか<\/rt><\/ruby>い<ruby>窓<rt>まど<\/rt><\/ruby>から<ruby>暖<rt>あたた<\/rt><\/ruby>かそうな<ruby>光<rt>ひかり<\/rt><\/ruby>が、<ruby>道<rt>みち<\/rt><\/ruby>の<ruby>雪<rt>ゆき<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>落<rt>お<\/rt><\/ruby>ちているばかりでした。","　けれど<ruby>表<rt>ひょう<\/rt><\/ruby>の<ruby>看板<rt>かんばん<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>には<ruby>大<rt>たい<\/rt><\/ruby>てい<ruby>小<rt>ちい<\/rt><\/ruby>さな<ruby>電燈<rt>でんとう<\/rt><\/ruby>がともっていましたので、<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>子<rt>こ<\/rt><\/ruby>は、それを<ruby>見<rt>み<\/rt><\/ruby>ながら、<ruby>帽子<rt>ぼうし<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>を<ruby>探<rt>さが<\/rt><\/ruby>して<ruby>行<rt>い<\/rt><\/ruby>きました。<ruby>自転車<rt>じてんしゃ<\/rt><\/ruby>の<ruby>看板<rt>かんばん<\/rt><\/ruby>や、<ruby>眼鏡<rt>めがね<\/rt><\/ruby>の<ruby>看板<rt>かんばん<\/rt><\/ruby>やその<ruby>他<rt>た<\/rt><\/ruby>いろんな<ruby>看板<rt>かんばん<\/rt><\/ruby>が、あるものは、<ruby>新<rt>あたら<\/rt><\/ruby>しいペンキで<ruby>画<rt>か<\/rt><\/ruby>かれ、<ruby>或<rt>あ<\/rt><\/ruby>るものは、<ruby>古<rt>ふる<\/rt><\/ruby>い<ruby>壁<rt>かべ<\/rt><\/ruby>のようにはげていましたが、<ruby>町<rt>まち<\/rt><\/ruby>に<ruby>始<rt>はじ<\/rt><\/ruby>めて<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>き<\/rt><\/ruby>た<ruby>子狐<rt>こぎつね<\/rt><\/ruby>にはそれらのものがいったい<ruby>何<rt>なん<\/rt><\/ruby>であるか<ruby>分<rt>わか<\/rt><\/ruby>らないのでした。","　とうとう<ruby>帽子<rt>ぼうし<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>がみつかりました。お<ruby>母<rt>かあ<\/rt><\/ruby>さんが<ruby>道々<rt>みちみち<\/rt><\/ruby>よく<ruby>教<rt>おし<\/rt><\/ruby>えてくれた、<ruby>黒<rt>くろ<\/rt><\/ruby>い<ruby>大<rt>おお<\/rt><\/ruby>きなシルクハットの<ruby>帽子<rt>ぼうし<\/rt><\/ruby>の<ruby>看板<rt>かんばん<\/rt><\/ruby>が、<ruby>青<rt>あお<\/rt><\/ruby>い<ruby>電燈<rt>でんとう<\/rt><\/ruby>に<ruby>照<rt>てら<\/rt><\/ruby>されてかかっていました。","　<ruby>子狐<rt>こぎつね<\/rt><\/ruby>は<ruby>教<rt>おし<\/rt><\/ruby>えられた<ruby>通<rt>とお<\/rt><\/ruby>り、トントンと<ruby>戸<rt>と<\/rt><\/ruby>を<ruby>叩<rt>たた<\/rt><\/ruby>きました。","「<ruby>今晩<rt>こんばん<\/rt><\/ruby>は」","　すると、<ruby>中<rt>なか<\/rt><\/ruby>では<ruby>何<rt>なん<\/rt><\/ruby>かことこと<ruby>音<rt>おと<\/rt><\/ruby>がしていましたがやがて、<ruby>戸<rt>と<\/rt><\/ruby>が<ruby>一<rt>いち<\/rt><\/ruby><ruby>寸<rt>すん<\/rt><\/ruby>ほどゴロリとあいて、<ruby>光<rt>ひかり<\/rt><\/ruby>の<ruby>帯<rt>おび<\/rt><\/ruby>が<ruby>道<rt>みち<\/rt><\/ruby>の<ruby>白<rt>しろ<\/rt><\/ruby>い<ruby>雪<rt>ゆき<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>長<rt>なが<\/rt><\/ruby>く<ruby>伸<rt>の<\/rt><\/ruby>びました。","　<ruby>子狐<rt>こぎつね<\/rt><\/ruby>はその<ruby>光<rt>ひかり<\/rt><\/ruby>がまばゆかったので、めんくらって、まちがった<ruby>方<rt>ほう<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>を、――お<ruby>母<rt>かあ<\/rt><\/ruby>さまが<ruby>出<rt>だ<\/rt><\/ruby>しちゃいけないと<ruby>言<rt>い<\/rt><\/ruby>ってよく<ruby>聞<rt>き<\/rt><\/ruby>かせた<ruby>方<rt>ほう<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>をすきまからさしこんでしまいました。","「このお<ruby>手々<rt>てて<\/rt><\/ruby>にちょうどいい<ruby>手袋<rt>てぶくろ<\/rt><\/ruby><ruby>下<rt>くだ<\/rt><\/ruby>さい」","　すると<ruby>帽子<rt>ぼうし<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>さんは、おやおやと<ruby>思<rt>おも<\/rt><\/ruby>いました。<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>です。<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>が<ruby>手袋<rt>てぶくろ<\/rt><\/ruby>をくれと<ruby>言<rt>い<\/rt><\/ruby>うのです。これはきっと<ruby>木<rt>こ<\/rt><\/ruby>の<ruby>葉<rt>は<\/rt><\/ruby>で<ruby>買<rt>か<\/rt><\/ruby>いに<ruby>来<rt>き<\/rt><\/ruby>たんだなと<ruby>思<rt>おも<\/rt><\/ruby>いました。そこで、","「<ruby>先<rt>さき<\/rt><\/ruby>にお<ruby>金<rt>かね<\/rt><\/ruby>を<ruby>下<rt>くだ<\/rt><\/ruby>さい」と<ruby>言<rt>い<\/rt><\/ruby>いました。<ruby>子狐<rt>こぎつね<\/rt><\/ruby>はすなおに、<ruby>握<rt>にぎ<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>た<ruby>白<rt>しろ<\/rt><\/ruby><ruby>銅貨<rt>どうか<\/rt><\/ruby>を<ruby>二<rt>ふた<\/rt><\/ruby>つ<ruby>帽子<rt>ぼうし<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>さんに<ruby>渡<rt>わた<\/rt><\/ruby>しました。<ruby>帽子<rt>ぼうし<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>さんはそれを<ruby>人差指<rt>ひとさしゆび<\/rt><\/ruby>のさきにのっけて、カチ<ruby>合<rt>あわ<\/rt><\/ruby>せて<ruby>見<rt>み<\/rt><\/ruby>ると、チンチンとよい<ruby>音<rt>おと<\/rt><\/ruby>がしましたので、これは木の<ruby>葉<rt>このは<\/rt><\/ruby>じゃない、ほんとのお<ruby>金<rt>かね<\/rt><\/ruby>だと<ruby>思<rt>おも<\/rt><\/ruby>いましたので、<ruby>棚<rt>たな<\/rt><\/ruby>から<ruby>子供<rt>こども<\/rt><\/ruby><ruby>用<rt>よう<\/rt><\/ruby>の<ruby>毛糸<rt>けいと<\/rt><\/ruby>の<ruby>手袋<rt>てぶくろ<\/rt><\/ruby>をとり<ruby>出<rt>だ<\/rt><\/ruby>して<ruby>来<rt>き<\/rt><\/ruby>て<ruby>子狐<rt>こぎつね<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>に<ruby>持<rt>も<\/rt><\/ruby>たせてやりました。<ruby>子狐<rt>こぎつね<\/rt><\/ruby>は、お<ruby>礼<rt>れい<\/rt><\/ruby>を<ruby>言<rt>い<\/rt><\/ruby>ってまた、もと<ruby>来<rt>き<\/rt><\/ruby>た<ruby>道<rt>みち<\/rt><\/ruby>を<ruby>帰<rt>かえ<\/rt><\/ruby>り<ruby>始<rt>はじ<\/rt><\/ruby>めました。","「お<ruby>母<rt>かあ<\/rt><\/ruby>さんは、<ruby>人間<rt>にんげん<\/rt><\/ruby>は<ruby>恐<rt>おそ<\/rt><\/ruby>ろしいものだって<ruby>仰有<rt>おっしゃ<\/rt><\/ruby>ったがちっとも<ruby>恐<rt>おそ<\/rt><\/ruby>ろしくないや。だって<ruby>僕<rt>ぼく<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>てもどうもしなかったもの」と<ruby>思<rt>おも<\/rt><\/ruby>いました。けれど<ruby>子狐<rt>こぎつね<\/rt><\/ruby>はいったい<ruby>人間<rt>にんげん<\/rt><\/ruby>なんてどんなものか<ruby>見<rt>み<\/rt><\/ruby>たいと<ruby>思<rt>おも<\/rt><\/ruby>いました。"],"speech":["こどものきつねは、まちのひをめあてに、ゆきあかりののはらをよちよちやっていきました。はじめのうちはひとつきりだったあかりがふたつになりみっつになり、はてはじゅうにもふえました。きつねのこどもはそれをみて、あかりには、ほしとおなじように、あかいのやきいのやあおいのがあるんだなとおもいました。やがてまちにはいりましたがとおりのいえいえはもうみんなとをしめてしまって、たかいまどからあたたかそうなひかりが、みちのゆきのうえにおちているばかりでした。","けれどひょうのかんばんのうえにはたいていちいさなでんとうがともっていましたので、きつねのこは、それをみながら、ぼうしやをさがしていきました。じてんしゃのかんばんや、めがねのかんばんやそのたいろんなかんばんが、あるものは、あたらしいペンキでかかれ、あるものは、ふるいかべのようにはげていましたが、まちにはじめてでてきたこぎつねにはそれらのものがいったいなんであるかわからないのでした。","とうとうぼうしやがみつかりました。おかあさんがみちみちよくおしえてくれた、くろいおおきなシルクハットのぼうしのかんばんが、あおいでんとうにてらされてかかっていました。","こぎつねはおしえられたとおり、トントンととをたたきました。","「こんばんは」","すると、なかではなんかことことおとがしていましたがやがて、とがいちすんほどゴロリとあいて、ひかりのおびがみちのしろいゆきのうえにながくのびました。","こぎつねはそのひかりがまばゆかったので、めんくらって、まちがったほうのてを、――おかあさまがだしちゃいけないといってよくきかせたほうのてをすきまからさしこんでしまいました。","「このおててにちょうどいいてぶくろください」","するとぼうしやさんは、おやおやとおもいました。きつねのてです。きつねのてがてぶくろをくれというのです。これはきっとこのはでかいにきたんだなとおもいました。そこで、","「さきにおかねをください」といいました。こぎつねはすなおに、にぎってきたしろどうかをふたつぼうしやさんにわたしました。ぼうしやさんはそれをひとさしゆびのさきにのっけて、カチあわせてみると、チンチンとよいおとがしましたので、これは木のこのはじゃない、ほんとのおかねだとおもいましたので、たなからこどもようのけいとのてぶくろをとりだしてきてこぎつねのてにもたせてやりました。こぎつねは、おれいをいってまた、もときたみちをかえりはじめました。","「おかあさんは、にんげんはおそろしいものだっておっしゃったがちっともおそろしくないや。だってぼくのてをみてもどうもしなかったもの」とおもいました。けれどこぎつねはいったいにんげんなんてどんなものかみたいとおもいました。"]},{"t":"母の唄","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1f2a44\"/><rect x=\"280\" y=\"240\" width=\"260\" height=\"200\" fill=\"#4a3f36\" rx=\"0\" opacity=\"1\"/><polygon points=\"270,240 550,240 526,214 294,214\" fill=\"#302a22\" opacity=\"1\"/><rect x=\"330\" y=\"300\" width=\"160\" height=\"110\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.95\"/><g fill=\"#5c4a38\"><path d=\"M370 410 q0 -60 30 -60 q26 0 26 60 z\"/><circle cx=\"398\" cy=\"342\" r=\"16\"/><circle cx=\"428\" cy=\"368\" r=\"10\"/><path d=\"M414 410 q0 -34 16 -34 q14 0 14 34 z\"/><\/g><text x=\"540\" y=\"280\" font-size=\"16\" fill=\"#e8dcc0\" opacity=\".9\" font-family=\"serif\">♪<\/text><text x=\"568\" y=\"260\" font-size=\"18\" fill=\"#e8dcc0\" opacity=\".9\" font-family=\"serif\">♪<\/text><text x=\"596\" y=\"240\" font-size=\"20\" fill=\"#e8dcc0\" opacity=\".9\" font-family=\"serif\">♪<\/text><text x=\"624\" y=\"220\" font-size=\"22\" fill=\"#e8dcc0\" opacity=\".9\" font-family=\"serif\">♪<\/text><g transform=\"translate(240 448) scale(-0.9 0.9)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#e8b45a\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#e8b45a\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#e8b45a\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#e8b45a\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#e8b45a\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#e8b45a\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#e8b45a\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#e8b45a\"/><\/g><g fill=\"#ffffff\" opacity=\"0.9\"><circle cx=\"153\" cy=\"71\" r=\"1.6\"/><circle cx=\"280\" cy=\"154\" r=\"2.6\"/><circle cx=\"407\" cy=\"237\" r=\"3.6\"/><circle cx=\"534\" cy=\"320\" r=\"1.6\"/><circle cx=\"661\" cy=\"403\" r=\"2.6\"/><circle cx=\"788\" cy=\"66\" r=\"3.6\"/><circle cx=\"135\" cy=\"149\" r=\"1.6\"/><circle cx=\"262\" cy=\"232\" r=\"2.6\"/><circle cx=\"389\" cy=\"315\" r=\"3.6\"/><circle cx=\"516\" cy=\"398\" r=\"1.6\"/><circle cx=\"643\" cy=\"61\" r=\"2.6\"/><circle cx=\"770\" cy=\"144\" r=\"3.6\"/><circle cx=\"117\" cy=\"227\" r=\"1.6\"/><circle cx=\"244\" cy=\"310\" r=\"2.6\"/><circle cx=\"371\" cy=\"393\" r=\"3.6\"/><circle cx=\"498\" cy=\"56\" r=\"1.6\"/><circle cx=\"625\" cy=\"139\" r=\"2.6\"/><circle cx=\"752\" cy=\"222\" r=\"3.6\"/><circle cx=\"99\" cy=\"305\" r=\"1.6\"/><circle cx=\"226\" cy=\"388\" r=\"2.6\"/><\/g><circle cx=\"110\" cy=\"80\" r=\"61.199999999999996\" fill=\"#f2ecd9\" opacity=\"0.13\"/><circle cx=\"110\" cy=\"80\" r=\"36\" fill=\"#f2ecd9\" opacity=\"1\"/><\/svg>","paras":["　ある<ruby>窓<rt>まど<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>を<ruby>通<rt>とお<\/rt><\/ruby>りかかると、<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>がしていました。<ruby>何<rt>なん<\/rt><\/ruby>というやさしい、<ruby>何<rt>なん<\/rt><\/ruby>という<ruby>美<rt>うつく<\/rt><\/ruby>しい、<ruby>何<rt>なん<\/rt><\/ruby>と<ruby>言<rt>い<\/rt><\/ruby>うおっとりした<ruby>声<rt>こえ<\/rt><\/ruby>なんでしょう。","","「ねむれ　ねむれ","<ruby>母<rt>はは<\/rt><\/ruby>の<ruby>胸<rt>むね<\/rt><\/ruby>に、","ねむれ　ねむれ","<ruby>母<rt>はは<\/rt><\/ruby>の<ruby>手<rt>て<\/rt><\/ruby>に――」","","　<ruby>子狐<rt>こぎつね<\/rt><\/ruby>はその<ruby>唄声<rt>うたごえ<\/rt><\/ruby>は、きっと<ruby>人間<rt>にんげん<\/rt><\/ruby>のお<ruby>母<rt>かあ<\/rt><\/ruby>さんの<ruby>声<rt>こえ<\/rt><\/ruby>にちがいないと<ruby>思<rt>おも<\/rt><\/ruby>いました。だって、<ruby>子狐<rt>こぎつね<\/rt><\/ruby>が<ruby>眠<rt>ねむ<\/rt><\/ruby>る<ruby>時<rt>とき<\/rt><\/ruby>にも、やっぱり<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は、あんなやさしい<ruby>声<rt>こえ<\/rt><\/ruby>でゆすぶってくれるからです。","　するとこんどは、<ruby>子供<rt>こども<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>がしました。","「<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん、こんな<ruby>寒<rt>さむ<\/rt><\/ruby>い<ruby>夜<rt>よる<\/rt><\/ruby>は、<ruby>森<rt>もり<\/rt><\/ruby>の<ruby>子狐<rt>こぎつね<\/rt><\/ruby>は<ruby>寒<rt>さむ<\/rt><\/ruby>い<ruby>寒<rt>さむ<\/rt><\/ruby>いって<ruby>啼<rt>な<\/rt><\/ruby>いてるでしょうね」","　すると<ruby>母<rt>かあ<\/rt><\/ruby>さんの<ruby>声<rt>こえ<\/rt><\/ruby>が、","「<ruby>森<rt>もり<\/rt><\/ruby>の<ruby>子狐<rt>こぎつね<\/rt><\/ruby>もお<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>のお<ruby>唄<rt>うた<\/rt><\/ruby>をきいて、<ruby>洞穴<rt>ほらあな<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>で<ruby>眠<rt>ねむ<\/rt><\/ruby>ろうとしているでしょうね。さあ<ruby>坊<rt>ぼう<\/rt><\/ruby>やも<ruby>早<rt>はや<\/rt><\/ruby>くねんねしなさい。<ruby>森<rt>もり<\/rt><\/ruby>の<ruby>子狐<rt>こぎつね<\/rt><\/ruby>と<ruby>坊<rt>ぼう<\/rt><\/ruby>やとどっちが<ruby>早<rt>はや<\/rt><\/ruby>くねんねするか、きっと<ruby>坊<rt>ぼう<\/rt><\/ruby>やの<ruby>方<rt>ほう<\/rt><\/ruby>が<ruby>早<rt>はや<\/rt><\/ruby>くねんねしますよ」","　それをきくと<ruby>子狐<rt>こぎつね<\/rt><\/ruby>は<ruby>急<rt>きゅう<\/rt><\/ruby>にお<ruby>母<rt>かあ<\/rt><\/ruby>さんが<ruby>恋<rt>こい<\/rt><\/ruby>しくなって、お<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>待<rt>ま<\/rt><\/ruby>っている<ruby>方<rt>ほう<\/rt><\/ruby>へ<ruby>跳<rt>と<\/rt><\/ruby>んで<ruby>行<rt>い<\/rt><\/ruby>きました。"],"speech":["あるまどのしたをとおりかかると、にんげんのこえがしていました。なんというやさしい、なんといううつくしい、なんというおっとりしたこえなんでしょう。","","「ねむれねむれ","ははのむねに、","ねむれねむれ","ははのてに――」","","こぎつねはそのうたごえは、きっとにんげんのおかあさんのこえにちがいないとおもいました。だって、こぎつねがねむるときにも、やっぱりかあさんきつねは、あんなやさしいこえでゆすぶってくれるからです。","するとこんどは、こどものこえがしました。","「かあちゃん、こんなさむいよるは、もりのこぎつねはさむいさむいってないてるでしょうね」","するとかあさんのこえが、","「もりのこぎつねもおかあさんきつねのおうたをきいて、ほらあなのなかでねむろうとしているでしょうね。さあぼうやもはやくねんねしなさい。もりのこぎつねとぼうやとどっちがはやくねんねするか、きっとぼうやのほうがはやくねんねしますよ」","それをきくとこぎつねはきゅうにおかあさんがこいしくなって、おかあさんきつねのまっているほうへとんでいきました。"]},{"t":"帰り道","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#2a3a54\"/><rect x=\"0\" y=\"330\" width=\"800\" height=\"120\" fill=\"#dce8f0\" rx=\"0\" opacity=\"0.95\"/><circle cx=\"620\" cy=\"100\" r=\"88.39999999999999\" fill=\"#f2ecd9\" opacity=\"0.13\"/><circle cx=\"620\" cy=\"100\" r=\"52\" fill=\"#f2ecd9\" opacity=\"1\"/><g transform=\"translate(330 400) scale(1.2 1.2)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#d9913f\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#d9913f\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#d9913f\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#d9913f\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#d9913f\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#d9913f\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#d9913f\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#d9913f\"/><\/g><g transform=\"translate(430 410) scale(0.8 0.8)\"><path d=\"M-38 0 q-26 -10 -22 -34 q3 -18 20 -20 q-6 26 10 40 z\" fill=\"#e8b45a\"/><circle cx=\"-52\" cy=\"-46\" r=\"9\" fill=\"#f7f1e1\"/><ellipse cx=\"-6\" cy=\"-24\" rx=\"30\" ry=\"24\" fill=\"#e8b45a\"/><circle cx=\"20\" cy=\"-48\" r=\"15\" fill=\"#e8b45a\"/><polygon points=\"30,-46 46,-40 32,-36\" fill=\"#e8b45a\"/><polygon points=\"10,-58 6,-76 20,-62\" fill=\"#e8b45a\"/><polygon points=\"26,-58 34,-74 36,-58\" fill=\"#e8b45a\"/><circle cx=\"24\" cy=\"-49\" r=\"1.8\" fill=\"#3a2f28\"/><rect x=\"-16\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#e8b45a\"/><rect x=\"4\" y=\"-10\" width=\"7\" height=\"12\" fill=\"#e8b45a\"/><\/g><ellipse cx=\"200\" cy=\"424\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"240\" cy=\"434\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"280\" cy=\"424\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"320\" cy=\"434\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"360\" cy=\"424\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"400\" cy=\"434\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"440\" cy=\"424\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><ellipse cx=\"480\" cy=\"434\" rx=\"5\" ry=\"3\" fill=\"#8ca8c9\" opacity=\".8\"/><polygon points=\"0,330 260,296 520,330 800,304 800,360 0,368\" fill=\"#26364a\" opacity=\"0.9\"/><g fill=\"#e8ecf4\" opacity=\"0.8\"><circle cx=\"136\" cy=\"76\" r=\"1.2\"/><circle cx=\"273\" cy=\"165\" r=\"1.9\"/><circle cx=\"410\" cy=\"64\" r=\"2.5999999999999996\"/><circle cx=\"547\" cy=\"153\" r=\"1.2\"/><circle cx=\"684\" cy=\"52\" r=\"1.9\"/><circle cx=\"81\" cy=\"141\" r=\"2.5999999999999996\"/><circle cx=\"218\" cy=\"40\" r=\"1.2\"/><circle cx=\"355\" cy=\"129\" r=\"1.9\"/><circle cx=\"492\" cy=\"28\" r=\"2.5999999999999996\"/><circle cx=\"629\" cy=\"117\" r=\"1.2\"/><circle cx=\"766\" cy=\"16\" r=\"1.9\"/><circle cx=\"163\" cy=\"105\" r=\"2.5999999999999996\"/><circle cx=\"300\" cy=\"194\" r=\"1.2\"/><circle cx=\"437\" cy=\"93\" r=\"1.9\"/><\/g><\/svg>","paras":["　お<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は、<ruby>心配<rt>しんぱい<\/rt><\/ruby>しながら、<ruby>坊<rt>ぼう<\/rt><\/ruby>やの<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>く<\/rt><\/ruby>るのを、<ruby>今<rt>いま<\/rt><\/ruby>か<ruby>今<rt>いま<\/rt><\/ruby>かとふるえながら<ruby>待<rt>ま<\/rt><\/ruby>っていましたので、<ruby>坊<rt>ぼう<\/rt><\/ruby>やが<ruby>来<rt>く<\/rt><\/ruby>ると、<ruby>暖<rt>あたたか<\/rt><\/ruby>い<ruby>胸<rt>むね<\/rt><\/ruby>に<ruby>抱<rt>だ<\/rt><\/ruby>きしめて<ruby>泣<rt>な<\/rt><\/ruby>きたいほどよろこびました。","　<ruby>二<rt>に<\/rt><\/ruby><ruby>匹<rt>ひき<\/rt><\/ruby>の<ruby>狐<rt>きつね<\/rt><\/ruby>は<ruby>森<rt>もり<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へ<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>行<rt>い<\/rt><\/ruby>きました。<ruby>月<rt>つき<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>たので、<ruby>狐<rt>きつね<\/rt><\/ruby>の<ruby>毛<rt>け<\/rt><\/ruby>なみが<ruby>銀色<rt>ぎんいろ<\/rt><\/ruby>に<ruby>光<rt>ひか<\/rt><\/ruby>り、その<ruby>足<rt>あし<\/rt><\/ruby>あとには、コバルトの<ruby>影<rt>かげ<\/rt><\/ruby>がたまりました。","「<ruby>母<rt>かあ<\/rt><\/ruby>ちゃん、<ruby>人間<rt>にんげん<\/rt><\/ruby>ってちっとも<ruby>恐<rt>こわ<\/rt><\/ruby>かないや」","「どうして？」","「<ruby>坊<rt>ぼう<\/rt><\/ruby>、<ruby>間違<rt>まちが<\/rt><\/ruby>えてほんとうのお<ruby>手々<rt>てて<\/rt><\/ruby><ruby>出<rt>だ<\/rt><\/ruby>しちゃったの。でも<ruby>帽子<rt>ぼうし<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>さん、<ruby>掴<rt>つか<\/rt><\/ruby>まえやしなかったもの。ちゃんとこんないい<ruby>暖<rt>あたたか<\/rt><\/ruby>い<ruby>手袋<rt>てぶくろ<\/rt><\/ruby>くれたもの」","と<ruby>言<rt>い<\/rt><\/ruby>って<ruby>手袋<rt>てぶくろ<\/rt><\/ruby>のはまった<ruby>両手<rt>りょうて<\/rt><\/ruby>をパンパンやって<ruby>見<rt>み<\/rt><\/ruby>せました。お<ruby>母<rt>かあ<\/rt><\/ruby>さん<ruby>狐<rt>きつね<\/rt><\/ruby>は、","「まあ！」とあきれましたが、「ほんとうに<ruby>人間<rt>にんげん<\/rt><\/ruby>はいいものかしら。ほんとうに<ruby>人間<rt>にんげん<\/rt><\/ruby>はいいものかしら」とつぶやきました。"],"speech":["おかあさんきつねは、しんぱいしながら、ぼうやのきつねのかえってくるのを、いまかいまかとふるえながらまっていましたので、ぼうやがくると、あたたかいむねにだきしめてなきたいほどよろこびました。","にひきのきつねはもりのほうへかえっていきました。つきがでたので、きつねのけなみがぎんいろにひかり、そのあしあとには、コバルトのかげがたまりました。","「かあちゃん、にんげんってちっともこわかないや」","「どうして？」","「ぼう、まちがえてほんとうのおててだしちゃったの。でもぼうしやさん、つかまえやしなかったもの。ちゃんとこんないいあたたかいてぶくろくれたもの」","といっててぶくろのはまったりょうてをパンパンやってみせました。おかあさんきつねは、","「まあ！」とあきれましたが、「ほんとうににんげんはいいものかしら。ほんとうににんげんはいいものかしら」とつぶやきました。"]}]},{"id":"chumon","title":"注文の多い料理店","author":"宮沢賢治","mins":14,"cover":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3d4436\"/><rect x=\"16\" y=\"16\" width=\"768\" height=\"418\" fill=\"none\" stroke=\"#d9a441\" stroke-width=\"4\"/><rect x=\"27\" y=\"27\" width=\"746\" height=\"396\" fill=\"none\" stroke=\"#e8e0d0\" stroke-width=\"1.5\"/><rect x=\"430\" y=\"170\" width=\"280\" height=\"230\" fill=\"#e8e0d0\" rx=\"0\" opacity=\"1\"/><polygon points=\"420,170 720,170 696,144 444,144\" fill=\"#6e2a34\" opacity=\"1\"/><rect x=\"444\" y=\"188\" width=\"26\" height=\"30\" fill=\"#c9d8e0\" rx=\"0\" opacity=\"1\"/><rect x=\"486\" y=\"188\" width=\"26\" height=\"30\" fill=\"#c9d8e0\" rx=\"0\" opacity=\"1\"/><rect x=\"528\" y=\"188\" width=\"26\" height=\"30\" fill=\"#c9d8
