pacity=\"1\"/><text x=\"570\" y=\"250\" font-size=\"17\" fill=\"#6e2a34\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"2\" opacity=\"1\">RESTAURANT<\/text><g transform=\"translate(570 320)\"><ellipse cx=\"-28\" cy=\"0\" rx=\"9\" ry=\"13\" fill=\"#d9a441\"/><ellipse cx=\"28\" cy=\"0\" rx=\"9\" ry=\"13\" fill=\"#d9a441\"/><circle cx=\"-28\" cy=\"2\" r=\"4\" fill=\"#3a2f28\"/><circle cx=\"28\" cy=\"2\" r=\"4\" fill=\"#3a2f28\"/><\/g><polygon points=\"0,400 800,400 800,450 0,450\" fill=\"#2f3d28\" opacity=\"1\"/><text x=\"210\" y=\"58\" font-size=\"38\" fill=\"#ece4d0\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">注文の多い料理店<\/text><text x=\"148\" y=\"70\" font-size=\"22\" fill=\"#ece4d0\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">宮沢賢治<\/text><\/svg>","paras":[],"speech":["ちゅうもんのおおいりょうりてん。みやざわけんじ。"]},{"t":"山奥の二人","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#4a5c50\"/><polygon points=\"60,450 84,200 108,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"160,450 184,160 208,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"260,450 284,120 308,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"360,450 384,200 408,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"460,450 484,160 508,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"560,450 584,120 608,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"660,450 684,200 708,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"760,450 784,160 808,450\" fill=\"#1d2818\" opacity=\"0.9\"/><polygon points=\"20,450 40,280 60,450\" fill=\"#2f3d28\" opacity=\"0.9\"/><polygon points=\"180,450 200,250 220,450\" fill=\"#2f3d28\" opacity=\"0.9\"/><polygon points=\"340,450 360,280 380,450\" fill=\"#2f3d28\" opacity=\"0.9\"/><polygon points=\"500,450 520,250 540,450\" fill=\"#2f3d28\" opacity=\"0.9\"/><polygon points=\"660,450 680,280 700,450\" fill=\"#2f3d28\" opacity=\"0.9\"/><polygon points=\"309.1,430 314.6,366.2 323.4,348.6 337.7,348.6 345.4,366.2 350.9,430\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"330\" cy=\"335.4\" r=\"14.3\" fill=\"#4a3f2e\" opacity=\"1\"/><ellipse cx=\"330\" cy=\"324.4\" rx=\"18.700000000000003\" ry=\"4.95\" fill=\"#4a3f2e\"/><path d=\"M320.1 324.4 a9.9 8.8 0 0 1 19.8 0 z\" fill=\"#4a3f2e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><polygon points=\"409.1,434 414.6,370.2 423.4,352.6 437.7,352.6 445.4,370.2 450.9,434\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"430\" cy=\"339.4\" r=\"14.3\" fill=\"#3a3226\" opacity=\"1\"/><ellipse cx=\"430\" cy=\"328.4\" rx=\"18.700000000000003\" ry=\"4.95\" fill=\"#3a3226\"/><path d=\"M420.1 328.4 a9.9 8.8 0 0 1 19.8 0 z\" fill=\"#3a3226\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><line x1=\"300\" y1=\"350\" x2=\"342\" y2=\"372\" stroke=\"#26231e\" stroke-width=\"5\" opacity=\"1\" stroke-linecap=\"round\"/><line x1=\"400\" y1=\"352\" x2=\"442\" y2=\"374\" stroke=\"#26231e\" stroke-width=\"5\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M100 80 q99.0 -14 220 -2\" fill=\"none\" stroke=\"#5c6e84\" stroke-width=\"10\" opacity=\"0.5\" stroke-linecap=\"round\"/><\/svg>","paras":["　<ruby>二人<rt>ふたり<\/rt><\/ruby>の<ruby>若<rt>わか<\/rt><\/ruby>い<ruby>紳士<rt>しんし<\/rt><\/ruby>が、すっかりイギリスの<ruby>兵隊<rt>へいたい<\/rt><\/ruby>のかたちをして、ぴかぴかする<ruby>鉄砲<rt>てっぽう<\/rt><\/ruby>をかついで、<ruby>白熊<rt>しろくま<\/rt><\/ruby>のような<ruby>犬<rt>いぬ<\/rt><\/ruby>を<ruby>二<rt>に<\/rt><\/ruby><ruby>疋<rt>ひき<\/rt><\/ruby>つれて、だいぶ<ruby>山奥<rt>やまおく<\/rt><\/ruby>の、木の<ruby>葉<rt>このは<\/rt><\/ruby>のかさかさしたとこを、こんなことを<ruby>云<rt>い<\/rt><\/ruby>いながら、あるいておりました。","「ぜんたい、ここらの<ruby>山<rt>やま<\/rt><\/ruby>は<ruby>怪<rt>け<\/rt><\/ruby>しからんね。<ruby>鳥<rt>とり<\/rt><\/ruby>も<ruby>獣<rt>けもの<\/rt><\/ruby>も<ruby>一<rt>いち<\/rt><\/ruby><ruby>疋<rt>ひき<\/rt><\/ruby>も<ruby>居<rt>い<\/rt><\/ruby>やがらん。なんでも<ruby>構<rt>かま<\/rt><\/ruby>わないから、<ruby>早<rt>はや<\/rt><\/ruby>くタンタアーンと、やって<ruby>見<rt>み<\/rt><\/ruby>たいもんだなあ。」","「<ruby>鹿<rt>しか<\/rt><\/ruby>の<ruby>黄<rt>き<\/rt><\/ruby>いろな横っ<ruby>腹<rt>よこっぱら<\/rt><\/ruby>なんぞに、<ruby>二三<rt>にさん<\/rt><\/ruby><ruby>発<rt>はつ<\/rt><\/ruby>お<ruby>見舞<rt>みまい<\/rt><\/ruby>もうしたら、ずいぶん<ruby>痛快<rt>つうかい<\/rt><\/ruby>だろうねえ。くるくるまわって、それからどたっと<ruby>倒<rt>たお<\/rt><\/ruby>れるだろうねえ。」","　それはだいぶの<ruby>山奥<rt>やまおく<\/rt><\/ruby>でした。<ruby>案内<rt>あんない<\/rt><\/ruby>してきた<ruby>専門<rt>せんもん<\/rt><\/ruby>の<ruby>鉄砲<rt>てっぽう<\/rt><\/ruby><ruby>打<rt>う<\/rt><\/ruby>ちも、ちょっとまごついて、どこかへ<ruby>行<rt>い<\/rt><\/ruby>ってしまったくらいの<ruby>山奥<rt>やまおく<\/rt><\/ruby>でした。","　それに、あんまり<ruby>山<rt>やま<\/rt><\/ruby>が<ruby>物凄<rt>ものすご<\/rt><\/ruby>いので、その<ruby>白熊<rt>しろくま<\/rt><\/ruby>のような<ruby>犬<rt>いぬ<\/rt><\/ruby>が、<ruby>二<rt>に<\/rt><\/ruby><ruby>疋<rt>ひき<\/rt><\/ruby>いっしょにめまいを<ruby>起<rt>お<\/rt><\/ruby>こして、しばらく<ruby>吠<rt>うな<\/rt><\/ruby>って、それから<ruby>泡<rt>あわ<\/rt><\/ruby>を<ruby>吐<rt>は<\/rt><\/ruby>いて<ruby>死<rt>し<\/rt><\/ruby>んでしまいました。","「じつにぼくは、<ruby>二千四百<rt>にせんよんひゃく<\/rt><\/ruby><ruby>円<rt>えん<\/rt><\/ruby>の<ruby>損害<rt>そんがい<\/rt><\/ruby>だ」と<ruby>一人<rt>ひとり<\/rt><\/ruby>の<ruby>紳士<rt>しんし<\/rt><\/ruby>が、その<ruby>犬<rt>いぬ<\/rt><\/ruby>の<ruby>眼<rt>ま<\/rt><\/ruby>ぶたを、ちょっとかえしてみて<ruby>言<rt>い<\/rt><\/ruby>いました。","「ぼくは<ruby>二千八百<rt>にせんはちひゃく<\/rt><\/ruby><ruby>円<rt>えん<\/rt><\/ruby>の<ruby>損害<rt>そんがい<\/rt><\/ruby>だ。」と、もひとりが、くやしそうに、あたまをまげて<ruby>言<rt>い<\/rt><\/ruby>いました。","　はじめの<ruby>紳士<rt>しんし<\/rt><\/ruby>は、すこし<ruby>顔<rt>かお<\/rt><\/ruby>いろを<ruby>悪<rt>わる<\/rt><\/ruby>くして、じっと、もひとりの<ruby>紳士<rt>しんし<\/rt><\/ruby>の、<ruby>顔<rt>かお<\/rt><\/ruby>つきを<ruby>見<rt>み<\/rt><\/ruby>ながら<ruby>云<rt>い<\/rt><\/ruby>いました。","「ぼくはもう<ruby>戻<rt>もど<\/rt><\/ruby>ろうとおもう。」","「さあ、ぼくもちょうど<ruby>寒<rt>さむ<\/rt><\/ruby>くはなったし<ruby>腹<rt>はら<\/rt><\/ruby>は<ruby>空<rt>す<\/rt><\/ruby>いてきたし<ruby>戻<rt>もど<\/rt><\/ruby>ろうとおもう。」","「そいじゃ、これで<ruby>切<rt>き<\/rt><\/ruby>りあげよう。なあに<ruby>戻<rt>もど<\/rt><\/ruby>りに、<ruby>昨日<rt>きのう<\/rt><\/ruby>の<ruby>宿屋<rt>やどや<\/rt><\/ruby>で、<ruby>山鳥<rt>やまどり<\/rt><\/ruby>を<ruby>拾円<rt>じゅうえん<\/rt><\/ruby>も<ruby>買<rt>か<\/rt><\/ruby>って<ruby>帰<rt>かえ<\/rt><\/ruby>ればいい。」","「<ruby>兎<rt>うさぎ<\/rt><\/ruby>もでていたねえ。そうすれば<ruby>結局<rt>けっきょく<\/rt><\/ruby>おんなじこった。では<ruby>帰<rt>かえ<\/rt><\/ruby>ろうじゃないか」","　ところがどうも<ruby>困<rt>こま<\/rt><\/ruby>ったことは、どっちへ<ruby>行<rt>い<\/rt><\/ruby>けば<ruby>戻<rt>もど<\/rt><\/ruby>れるのか、いっこうに<ruby>見当<rt>けんとう<\/rt><\/ruby>がつかなくなっていました。","　<ruby>風<rt>かぜ<\/rt><\/ruby>がどうと<ruby>吹<rt>ふ<\/rt><\/ruby>いてきて、<ruby>草<rt>くさ<\/rt><\/ruby>はざわざわ、木の<ruby>葉<rt>このは<\/rt><\/ruby>はかさかさ、<ruby>木<rt>き<\/rt><\/ruby>はごとんごとんと<ruby>鳴<rt>な<\/rt><\/ruby>りました。","「どうも<ruby>腹<rt>はら<\/rt><\/ruby>が<ruby>空<rt>あ<\/rt><\/ruby>いた。さっきから横っ<ruby>腹<rt>よこっぱら<\/rt><\/ruby>が<ruby>痛<rt>いた<\/rt><\/ruby>くてたまらないんだ。」","「ぼくもそうだ。もうあんまりあるきたくないな。」","「あるきたくないよ。ああ<ruby>困<rt>こま<\/rt><\/ruby>ったなあ、<ruby>何<rt>なん<\/rt><\/ruby>かたべたいなあ。」","「<ruby>喰<rt>た<\/rt><\/ruby>べたいもんだなあ」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>の<ruby>紳士<rt>しんし<\/rt><\/ruby>は、ざわざわ<ruby>鳴<rt>な<\/rt><\/ruby>るすすきの<ruby>中<rt>なか<\/rt><\/ruby>で、こんなことを<ruby>云<rt>い<\/rt><\/ruby>いました。"],"speech":["ふたりのわかいしんしが、すっかりイギリスのへいたいのかたちをして、ぴかぴかするてっぽうをかついで、しろくまのようないぬをにひきつれて、だいぶやまおくの、木のこのはのかさかさしたとこを、こんなことをいいながら、あるいておりました。","「ぜんたい、ここらのやまはけしからんね。とりもけものもいちひきもいやがらん。なんでもかまわないから、はやくタンタアーンと、やってみたいもんだなあ。」","「しかのきいろな横っよこっぱらなんぞに、にさんはつおみまいもうしたら、ずいぶんつうかいだろうねえ。くるくるまわって、それからどたっとたおれるだろうねえ。」","それはだいぶのやまおくでした。あんないしてきたせんもんのてっぽううちも、ちょっとまごついて、どこかへいってしまったくらいのやまおくでした。","それに、あんまりやまがものすごいので、そのしろくまのようないぬが、にひきいっしょにめまいをおこして、しばらくうなって、それからあわをはいてしんでしまいました。","「じつにぼくは、にせんよんひゃくえんのそんがいだ」とひとりのしんしが、そのいぬのまぶたを、ちょっとかえしてみていいました。","「ぼくはにせんはちひゃくえんのそんがいだ。」と、もひとりが、くやしそうに、あたまをまげていいました。","はじめのしんしは、すこしかおいろをわるくして、じっと、もひとりのしんしの、かおつきをみながらいいました。","「ぼくはもうもどろうとおもう。」","「さあ、ぼくもちょうどさむくはなったしはらはすいてきたしもどろうとおもう。」","「そいじゃ、これできりあげよう。なあにもどりに、きのうのやどやで、やまどりをじゅうえんもかってかえればいい。」","「うさぎもでていたねえ。そうすればけっきょくおんなじこった。ではかえろうじゃないか」","ところがどうもこまったことは、どっちへいけばもどれるのか、いっこうにけんとうがつかなくなっていました。","かぜがどうとふいてきて、くさはざわざわ、木のこのははかさかさ、きはごとんごとんとなりました。","「どうもはらがあいた。さっきから横っよこっぱらがいたくてたまらないんだ。」","「ぼくもそうだ。もうあんまりあるきたくないな。」","「あるきたくないよ。ああこまったなあ、なんかたべたいなあ。」","「たべたいもんだなあ」","ふたりのしんしは、ざわざわなるすすきのなかで、こんなことをいいました。"]},{"t":"西洋料理店 山猫軒","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#5a6e5c\"/><polygon points=\"0,380 800,370 800,450 0,450\" fill=\"#2f3d28\" opacity=\"1\"/><rect x=\"220\" y=\"140\" width=\"360\" height=\"260\" fill=\"#ece4d4\" rx=\"0\" opacity=\"1\"/><polygon points=\"210,140 590,140 566,114 234,114\" fill=\"#6e2a34\" opacity=\"1\"/><rect x=\"234\" y=\"158\" width=\"26\" height=\"30\" fill=\"#c9d8e0\" rx=\"0\" opacity=\"1\"/><rect x=\"276\" y=\"158\" width=\"26\" height=\"30\" fill=\"#c9d8e0\" rx=\"0\" opacity=\"1\"/><rect x=\"318\" y=\"158\" width=\"26\" height=\"30\" fill=\"#c9d8e0\" rx=\"0\" opacity=\"1\"/><rect x=\"360\" y=\"158\" width=\"26\" height=\"30\" fill=\"#c9d8e0\" rx=\"0\" opacity=\"1\"/><rect x=\"360\" y=\"300\" width=\"80\" height=\"100\" fill=\"#8ca8b8\" rx=\"3\" opacity=\"1\"/><text x=\"400\" y=\"128\" font-size=\"19\" fill=\"#6e2a34\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"3\" opacity=\"1\">RESTAURANT<\/text><text x=\"400\" y=\"158\" font-size=\"23\" fill=\"#6e2a34\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"6\" opacity=\"1\">山猫軒<\/text><polygon points=\"101,428 106,370 114,354 127,354 134,370 139,428\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"120\" cy=\"342\" r=\"13\" fill=\"#4a3f2e\" opacity=\"1\"/><ellipse cx=\"120\" cy=\"332\" rx=\"17\" ry=\"4.5\" fill=\"#4a3f2e\"/><path d=\"M111 332 a9 8 0 0 1 18 0 z\" fill=\"#4a3f2e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><polygon points=\"641,430 646,372 654,356 667,356 674,372 679,430\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"660\" cy=\"344\" r=\"13\" fill=\"#3a3226\" opacity=\"1\"/><ellipse cx=\"660\" cy=\"334\" rx=\"17\" ry=\"4.5\" fill=\"#3a3226\"/><path d=\"M651 334 a9 8 0 0 1 18 0 z\" fill=\"#3a3226\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><\/svg>","paras":["　その<ruby>時<rt>とき<\/rt><\/ruby>ふとうしろを<ruby>見<rt>み<\/rt><\/ruby>ますと、<ruby>立派<rt>りっぱ<\/rt><\/ruby>な<ruby>一軒<rt>いっけん<\/rt><\/ruby>の<ruby>西洋<rt>せいよう<\/rt><\/ruby><ruby>造<rt>つく<\/rt><\/ruby>りの<ruby>家<rt>いえ<\/rt><\/ruby>がありました。","　そして<ruby>玄関<rt>げんかん<\/rt><\/ruby>には","","RESTAURANT","<ruby>西洋<rt>せいよう<\/rt><\/ruby><ruby>料理店<rt>りょうりてん<\/rt><\/ruby>","WILDCAT HOUSE","<ruby>山猫<rt>やまねこ<\/rt><\/ruby><ruby>軒<rt>けん<\/rt><\/ruby>","","という<ruby>札<rt>さつ<\/rt><\/ruby>がでていました。","「<ruby>君<rt>きみ<\/rt><\/ruby>、ちょうどいい。ここはこれでなかなか<ruby>開<rt>あ<\/rt><\/ruby>けてるんだ。<ruby>入<rt>はい<\/rt><\/ruby>ろうじゃないか」","「おや、こんなとこにおかしいね。しかしとにかく<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>食事<rt>しょくじ<\/rt><\/ruby>ができるんだろう」","「もちろんできるさ。<ruby>看板<rt>かんばん<\/rt><\/ruby>にそう<ruby>書<rt>か<\/rt><\/ruby>いてあるじゃないか」","「はいろうじゃないか。ぼくはもう<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>喰<rt>た<\/rt><\/ruby>べたくて<ruby>倒<rt>たお<\/rt><\/ruby>れそうなんだ。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>玄関<rt>げんかん<\/rt><\/ruby>に<ruby>立<rt>た<\/rt><\/ruby>ちました。<ruby>玄関<rt>げんかん<\/rt><\/ruby>は<ruby>白<rt>しろ<\/rt><\/ruby>い<ruby>瀬戸<rt>せと<\/rt><\/ruby>の<ruby>煉瓦<rt>れんが<\/rt><\/ruby>で<ruby>組<rt>く<\/rt><\/ruby>んで、<ruby>実<rt>じつ<\/rt><\/ruby>に<ruby>立派<rt>りっぱ<\/rt><\/ruby>なもんです。","　そして<ruby>硝子<rt>がらす<\/rt><\/ruby>の開き<ruby>戸<rt>ひらきど<\/rt><\/ruby>がたって、そこに<ruby>金<rt>きん<\/rt><\/ruby><ruby>文字<rt>もじ<\/rt><\/ruby>でこう<ruby>書<rt>か<\/rt><\/ruby>いてありました。","","「どなたもどうかお<ruby>入<rt>はい<\/rt><\/ruby>りください。<ruby>決<rt>けっ<\/rt><\/ruby>してご<ruby>遠慮<rt>えんりょ<\/rt><\/ruby>はありません」","","　<ruby>二人<rt>ふたり<\/rt><\/ruby>はそこで、ひどくよろこんで<ruby>言<rt>い<\/rt><\/ruby>いました。","「こいつはどうだ、やっぱり世の<ruby>中<rt>よのなか<\/rt><\/ruby>はうまくできてるねえ、きょう<ruby>一日<rt>ついたち<\/rt><\/ruby>なんぎしたけれど、こんどはこんないいこともある。このうちは<ruby>料理店<rt>りょうりてん<\/rt><\/ruby>だけれどもただでご<ruby>馳走<rt>ちそう<\/rt><\/ruby>するんだぜ。」","「どうもそうらしい。<ruby>決<rt>けっ<\/rt><\/ruby>してご<ruby>遠慮<rt>えんりょ<\/rt><\/ruby>はありませんというのはその<ruby>意味<rt>いみ<\/rt><\/ruby>だ。」"],"speech":["そのときふとうしろをみますと、りっぱないっけんのせいようつくりのいえがありました。","そしてげんかんには","","レストラン","せいようりょうりてん","ワイルドキャット、ハウス","やまねこけん","","というさつがでていました。","「きみ、ちょうどいい。ここはこれでなかなかあけてるんだ。はいろうじゃないか」","「おや、こんなとこにおかしいね。しかしとにかくなんかしょくじができるんだろう」","「もちろんできるさ。かんばんにそうかいてあるじゃないか」","「はいろうじゃないか。ぼくはもうなんかたべたくてたおれそうなんだ。」","ふたりはげんかんにたちました。げんかんはしろいせとのれんがでくんで、じつにりっぱなもんです。","そしてがらすの開きひらきどがたって、そこにきんもじでこうかいてありました。","","「どなたもどうかおはいりください。けっしてごえんりょはありません」","","ふたりはそこで、ひどくよろこんでいいました。","「こいつはどうだ、やっぱり世のよのなかはうまくできてるねえ、きょうついたちなんぎしたけれど、こんどはこんないいこともある。このうちはりょうりてんだけれどもただでごちそうするんだぜ。」","「どうもそうらしい。けっしてごえんりょはありませんというのはそのいみだ。」"]},{"t":"扉また扉","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3a3040\"/><polygon points=\"0,0 800,0 800,450 0,450\" fill=\"#3a3040\" opacity=\"1\"/><rect x=\"90\" y=\"90\" width=\"190\" height=\"300\" fill=\"#2a2433\" rx=\"0\" opacity=\"1\"/><rect x=\"120\" y=\"120\" width=\"130\" height=\"190\" fill=\"#6e4a34\" rx=\"4\" opacity=\"1\"/><rect x=\"128\" y=\"128\" width=\"114\" height=\"174\" fill=\"#f7f1e1\" rx=\"2\" opacity=\"1\"/><text x=\"185.0\" y=\"154\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">どなたも<\/text><text x=\"185.0\" y=\"178\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">どうか<\/text><text x=\"185.0\" y=\"202\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">お入り<\/text><text x=\"185.0\" y=\"226\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">ください<\/text><circle cx=\"232\" cy=\"215.0\" r=\"4\" fill=\"#6e4a34\" opacity=\"1\"/><rect x=\"330\" y=\"70\" width=\"200\" height=\"340\" fill=\"#2a2433\" rx=\"0\" opacity=\"1\"/><rect x=\"362\" y=\"104\" width=\"136\" height=\"220\" fill=\"#4a6b8c\" rx=\"4\" opacity=\"1\"/><rect x=\"370\" y=\"112\" width=\"120\" height=\"204\" fill=\"#f7f1e1\" rx=\"2\" opacity=\"1\"/><text x=\"430.0\" y=\"138\" font-size=\"13\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">注文は<\/text><text x=\"430.0\" y=\"162\" font-size=\"13\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">ずいぶん<\/text><text x=\"430.0\" y=\"186\" font-size=\"13\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">多いでしょうが<\/text><text x=\"430.0\" y=\"210\" font-size=\"13\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">一々こらえて<\/text><text x=\"430.0\" y=\"234\" font-size=\"13\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">下さい<\/text><circle cx=\"480\" cy=\"214.0\" r=\"4\" fill=\"#4a6b8c\" opacity=\"1\"/><rect x=\"580\" y=\"90\" width=\"190\" height=\"300\" fill=\"#2a2433\" rx=\"0\" opacity=\"1\"/><rect x=\"610\" y=\"120\" width=\"130\" height=\"190\" fill=\"#8a3a4a\" rx=\"4\" opacity=\"1\"/><rect x=\"618\" y=\"128\" width=\"114\" height=\"174\" fill=\"#f7f1e1\" rx=\"2\" opacity=\"1\"/><text x=\"675.0\" y=\"154\" font-size=\"12\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">髪をきちんと<\/text><text x=\"675.0\" y=\"178\" font-size=\"12\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">して、はきもの<\/text><text x=\"675.0\" y=\"202\" font-size=\"12\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">の泥を落して<\/text><text x=\"675.0\" y=\"226\" font-size=\"12\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">ください<\/text><circle cx=\"722\" cy=\"215.0\" r=\"4\" fill=\"#8a3a4a\" opacity=\"1\"/><\/svg>","paras":["　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>戸<rt>と<\/rt><\/ruby>を<ruby>押<rt>お<\/rt><\/ruby>して、なかへ<ruby>入<rt>はい<\/rt><\/ruby>りました。そこはすぐ<ruby>廊下<rt>ろうか<\/rt><\/ruby>になっていました。その<ruby>硝子戸<rt>がらすど<\/rt><\/ruby>の<ruby>裏側<rt>うらがわ<\/rt><\/ruby>には、<ruby>金<rt>きん<\/rt><\/ruby><ruby>文字<rt>もじ<\/rt><\/ruby>でこうなっていました。","","「ことに<ruby>肥<rt>ふと<\/rt><\/ruby>ったお<ruby>方<rt>かた<\/rt><\/ruby>や<ruby>若<rt>わか<\/rt><\/ruby>いお<ruby>方<rt>かた<\/rt><\/ruby>は、<ruby>大歓迎<rt>だいかんげい<\/rt><\/ruby>いたします」","","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>大<rt>だい<\/rt><\/ruby><ruby>歓迎<rt>かんげい<\/rt><\/ruby>というので、もう<ruby>大<rt>おお<\/rt><\/ruby>よろこびです。","「<ruby>君<rt>きみ<\/rt><\/ruby>、ぼくらは<ruby>大<rt>だい<\/rt><\/ruby><ruby>歓迎<rt>かんげい<\/rt><\/ruby>にあたっているのだ。」","「ぼくらは<ruby>両方<rt>りょうほう<\/rt><\/ruby><ruby>兼<rt>か<\/rt><\/ruby>ねてるから」","　ずんずん<ruby>廊下<rt>ろうか<\/rt><\/ruby>を<ruby>進<rt>すす<\/rt><\/ruby>んで<ruby>行<rt>い<\/rt><\/ruby>きますと、こんどは<ruby>水<rt>みず<\/rt><\/ruby>いろのペンキ<ruby>塗<rt>ぬ<\/rt><\/ruby>りの<ruby>扉<rt>と<\/rt><\/ruby>がありました。","「どうも<ruby>変<rt>へん<\/rt><\/ruby>な<ruby>家<rt>うち<\/rt><\/ruby>だ。どうしてこんなにたくさん<ruby>戸<rt>と<\/rt><\/ruby>があるのだろう。」","「これはロシア<ruby>式<rt>しき<\/rt><\/ruby>だ。<ruby>寒<rt>さむ<\/rt><\/ruby>いとこや<ruby>山<rt>やま<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>はみんなこうさ。」","　そして<ruby>二人<rt>ふたり<\/rt><\/ruby>はその<ruby>扉<rt>とびら<\/rt><\/ruby>をあけようとしますと、<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>黄<rt>き<\/rt><\/ruby>いろな<ruby>字<rt>じ<\/rt><\/ruby>でこう<ruby>書<rt>か<\/rt><\/ruby>いてありました。","","「<ruby>当<rt>とう<\/rt><\/ruby><ruby>軒<rt>けん<\/rt><\/ruby>は<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>の<ruby>多<rt>おお<\/rt><\/ruby>い<ruby>料理店<rt>りょうりてん<\/rt><\/ruby>ですからどうかそこはご<ruby>承知<rt>しょうち<\/rt><\/ruby>ください」","","「なかなかはやってるんだ。こんな<ruby>山<rt>やま<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>で。」","「それあそうだ。<ruby>見<rt>み<\/rt><\/ruby>たまえ、<ruby>東京<rt>とうきょう<\/rt><\/ruby>の<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>料理屋<rt>りょうりや<\/rt><\/ruby>だって<ruby>大通<rt>おおどお<\/rt><\/ruby>りにはすくないだろう」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>云<rt>い<\/rt><\/ruby>いながら、その<ruby>扉<rt>とびら<\/rt><\/ruby>をあけました。するとその<ruby>裏側<rt>うらがわ<\/rt><\/ruby>に、","","「<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>はずいぶん<ruby>多<rt>おお<\/rt><\/ruby>いでしょうがどうか<ruby>一々<rt>いちいち<\/rt><\/ruby>こらえて<ruby>下<rt>くだ<\/rt><\/ruby>さい。」","","「これはぜんたいどういうんだ。」ひとりの<ruby>紳士<rt>しんし<\/rt><\/ruby>は<ruby>顔<rt>かお<\/rt><\/ruby>をしかめました。","「うん、これはきっと<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>があまり<ruby>多<rt>おお<\/rt><\/ruby>くて<ruby>支度<rt>したく<\/rt><\/ruby>が<ruby>手間取<rt>てまど<\/rt><\/ruby>るけれどもごめん<ruby>下<rt>くだ<\/rt><\/ruby>さいと<ruby>斯<rt>こ<\/rt><\/ruby>ういうことだ。」","「そうだろう。<ruby>早<rt>はや<\/rt><\/ruby>くどこか<ruby>室<rt>へや<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>にはいりたいもんだな。」","「そしてテーブルに<ruby>座<rt>すわ<\/rt><\/ruby>りたいもんだな。」","　ところがどうもうるさいことは、また<ruby>扉<rt>とびら<\/rt><\/ruby>が<ruby>一<rt>ひと<\/rt><\/ruby>つありました。そしてそのわきに<ruby>鏡<rt>かがみ<\/rt><\/ruby>がかかって、その<ruby>下<rt>した<\/rt><\/ruby>には<ruby>長<rt>なが<\/rt><\/ruby>い<ruby>柄<rt>え<\/rt><\/ruby>のついたブラシが<ruby>置<rt>お<\/rt><\/ruby>いてあったのです。","　<ruby>扉<rt>とびら<\/rt><\/ruby>には<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>字<rt>じ<\/rt><\/ruby>で、","","「お<ruby>客<rt>きゃく<\/rt><\/ruby>さまがた、ここで<ruby>髪<rt>かみ<\/rt><\/ruby>をきちんとして、それからはきもの","　の<ruby>泥<rt>どろ<\/rt><\/ruby>を<ruby>落<rt>おと<\/rt><\/ruby>してください。」","","と<ruby>書<rt>か<\/rt><\/ruby>いてありました。","「これはどうも<ruby>尤<rt>もっと<\/rt><\/ruby>もだ。<ruby>僕<rt>ぼく<\/rt><\/ruby>もさっき<ruby>玄関<rt>げんかん<\/rt><\/ruby>で、<ruby>山<rt>やま<\/rt><\/ruby>のなかだとおもって<ruby>見<rt>み<\/rt><\/ruby>くびったんだよ」","「<ruby>作法<rt>さほう<\/rt><\/ruby>の<ruby>厳<rt>きび<\/rt><\/ruby>しい<ruby>家<rt>いえ<\/rt><\/ruby>だ。きっとよほど<ruby>偉<rt>えら<\/rt><\/ruby>い<ruby>人<rt>ひと<\/rt><\/ruby>たちが、たびたび<ruby>来<rt>く<\/rt><\/ruby>るんだ。」","　そこで<ruby>二人<rt>ふたり<\/rt><\/ruby>は、きれいに<ruby>髪<rt>かみ<\/rt><\/ruby>をけずって、<ruby>靴<rt>くつ<\/rt><\/ruby>の<ruby>泥<rt>どろ<\/rt><\/ruby>を<ruby>落<rt>おと<\/rt><\/ruby>しました。"],"speech":["ふたりはとをおして、なかへはいりました。そこはすぐろうかになっていました。そのがらすどのうらがわには、きんもじでこうなっていました。","","「ことにふとったおかたやわかいおかたは、だいかんげいいたします」","","ふたりはだいかんげいというので、もうおおよろこびです。","「きみ、ぼくらはだいかんげいにあたっているのだ。」","「ぼくらはりょうほうかねてるから」","ずんずんろうかをすすんでいきますと、こんどはみずいろのペンキぬりのとがありました。","「どうもへんなうちだ。どうしてこんなにたくさんとがあるのだろう。」","「これはロシアしきだ。さむいとこややまのなかはみんなこうさ。」","そしてふたりはそのとびらをあけようとしますと、うえにきいろなじでこうかいてありました。","","「とうけんはちゅうもんのおおいりょうりてんですからどうかそこはごしょうちください」","","「なかなかはやってるんだ。こんなやまのなかで。」","「それあそうだ。みたまえ、とうきょうのおおきなりょうりやだっておおどおりにはすくないだろう」","ふたりはいいながら、そのとびらをあけました。するとそのうらがわに、","","「ちゅうもんはずいぶんおおいでしょうがどうかいちいちこらえてください。」","","「これはぜんたいどういうんだ。」ひとりのしんしはかおをしかめました。","「うん、これはきっとちゅうもんがあまりおおくてしたくがてまどるけれどもごめんくださいとこういうことだ。」","「そうだろう。はやくどこかへやのなかにはいりたいもんだな。」","「そしてテーブルにすわりたいもんだな。」","ところがどうもうるさいことは、またとびらがひとつありました。そしてそのわきにかがみがかかって、そのしたにはながいえのついたブラシがおいてあったのです。","とびらにはあかいじで、","","「おきゃくさまがた、ここでかみをきちんとして、それからはきもの","のどろをおとしてください。」","","とかいてありました。","「これはどうももっともだ。ぼくもさっきげんかんで、やまのなかだとおもってみくびったんだよ」","「さほうのきびしいいえだ。きっとよほどえらいひとたちが、たびたびくるんだ。」","そこでふたりは、きれいにかみをけずって、くつのどろをおとしました。"]},{"t":"鉄砲と金物","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3a3040\"/><rect x=\"240\" y=\"60\" width=\"320\" height=\"390\" fill=\"#2a2433\" rx=\"0\" opacity=\"1\"/><rect x=\"280\" y=\"100\" width=\"240\" height=\"200\" fill=\"#4a3f2e\" rx=\"4\" opacity=\"1\"/><rect x=\"288\" y=\"108\" width=\"224\" height=\"184\" fill=\"#f7f1e1\" rx=\"2\" opacity=\"1\"/><text x=\"400.0\" y=\"134\" font-size=\"17\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">鉄砲と弾丸を<\/text><text x=\"400.0\" y=\"158\" font-size=\"17\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">ここへ置いて<\/text><text x=\"400.0\" y=\"182\" font-size=\"17\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">ください<\/text><circle cx=\"502\" cy=\"200.0\" r=\"4\" fill=\"#4a3f2e\" opacity=\"1\"/><rect x=\"120\" y=\"330\" width=\"130\" height=\"90\" fill=\"#1d1826\" rx=\"0\" opacity=\"1\"/><line x1=\"130\" y1=\"330\" x2=\"240\" y2=\"316\" stroke=\"#26231e\" stroke-width=\"7\" opacity=\"1\" stroke-linecap=\"round\"/><rect x=\"590\" y=\"330\" width=\"120\" height=\"100\" fill=\"#26231e\" rx=\"4\" opacity=\"1\"/><circle cx=\"650\" cy=\"360\" r=\"12\" fill=\"#d9a441\" opacity=\"0.9\"/><rect x=\"636\" y=\"380\" width=\"28\" height=\"8\" fill=\"#8ca8b8\" rx=\"0\" opacity=\"1\"/><polygon points=\"62.9,442 67.4,389.8 74.6,375.4 86.3,375.4 92.6,389.8 97.1,442\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"80\" cy=\"364.6\" r=\"11.700000000000001\" fill=\"#4a3f2e\" opacity=\"1\"/><ellipse cx=\"80\" cy=\"355.6\" rx=\"15.3\" ry=\"4.05\" fill=\"#4a3f2e\"/><path d=\"M71.9 355.6 a8.1 7.2 0 0 1 16.2 0 z\" fill=\"#4a3f2e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><\/svg>","paras":["　そしたら、どうです。ブラシを<ruby>板<rt>いた<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>置<rt>お<\/rt><\/ruby>くや<ruby>否<rt>いな<\/rt><\/ruby>や、そいつがぼうっとかすんで<ruby>無<rt>な<\/rt><\/ruby>くなって、<ruby>風<rt>かぜ<\/rt><\/ruby>がどうっと<ruby>室<rt>むろ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>入<rt>はい<\/rt><\/ruby>ってきました。","　<ruby>二人<rt>ふたり<\/rt><\/ruby>はびっくりして、<ruby>互<rt>たがい<\/rt><\/ruby>によりそって、<ruby>扉<rt>とびら<\/rt><\/ruby>をがたんと<ruby>開<rt>あ<\/rt><\/ruby>けて、<ruby>次<rt>つぎ<\/rt><\/ruby>の<ruby>室<rt>むろ<\/rt><\/ruby>へ<ruby>入<rt>はい<\/rt><\/ruby>って<ruby>行<rt>い<\/rt><\/ruby>きました。<ruby>早<rt>はや<\/rt><\/ruby>く<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>暖<rt>あたたか<\/rt><\/ruby>いものでもたべて、<ruby>元気<rt>げんき<\/rt><\/ruby>をつけて<ruby>置<rt>お<\/rt><\/ruby>かないと、もう<ruby>途方<rt>とほう<\/rt><\/ruby>もないことになってしまうと、<ruby>二人<rt>ふたり<\/rt><\/ruby>とも<ruby>思<rt>おも<\/rt><\/ruby>ったのでした。","　<ruby>扉<rt>とびら<\/rt><\/ruby>の<ruby>内側<rt>うちがわ<\/rt><\/ruby>に、また<ruby>変<rt>へん<\/rt><\/ruby>なことが<ruby>書<rt>か<\/rt><\/ruby>いてありました。","","「<ruby>鉄砲<rt>てっぽう<\/rt><\/ruby>と<ruby>弾丸<rt>たま<\/rt><\/ruby>をここへ<ruby>置<rt>お<\/rt><\/ruby>いてください。」","","　<ruby>見<rt>み<\/rt><\/ruby>るとすぐ<ruby>横<rt>よこ<\/rt><\/ruby>に<ruby>黒<rt>くろ<\/rt><\/ruby>い<ruby>台<rt>だい<\/rt><\/ruby>がありました。","「なるほど、<ruby>鉄砲<rt>てっぽう<\/rt><\/ruby>を<ruby>持<rt>も<\/rt><\/ruby>ってものを<ruby>食<rt>く<\/rt><\/ruby>うという<ruby>法<rt>ほう<\/rt><\/ruby>はない。」","「いや、よほど<ruby>偉<rt>えら<\/rt><\/ruby>いひとが<ruby>始終<rt>しじゅう<\/rt><\/ruby><ruby>来<rt>き<\/rt><\/ruby>ているんだ。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>鉄砲<rt>てっぽう<\/rt><\/ruby>をはずし、<ruby>帯皮<rt>おびかわ<\/rt><\/ruby>を<ruby>解<rt>と<\/rt><\/ruby>いて、それを<ruby>台<rt>だい<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>置<rt>お<\/rt><\/ruby>きました。","　また<ruby>黒<rt>くろ<\/rt><\/ruby>い<ruby>扉<rt>とびら<\/rt><\/ruby>がありました。","","「どうか<ruby>帽子<rt>ぼうし<\/rt><\/ruby>と<ruby>外套<rt>がいとう<\/rt><\/ruby>と<ruby>靴<rt>くつ<\/rt><\/ruby>をおとり<ruby>下<rt>くだ<\/rt><\/ruby>さい。」","","「どうだ、とるか。」","「<ruby>仕方<rt>しかた<\/rt><\/ruby>ない、とろう。たしかによっぽどえらいひとなんだ。<ruby>奥<rt>おく<\/rt><\/ruby>に<ruby>来<rt>き<\/rt><\/ruby>ているのは」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>帽子<rt>ぼうし<\/rt><\/ruby>とオーバーコートを<ruby>釘<rt>くぎ<\/rt><\/ruby>にかけ、<ruby>靴<rt>くつ<\/rt><\/ruby>をぬいでぺたぺたあるいて<ruby>扉<rt>とびら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>にはいりました。","　<ruby>扉<rt>とびら<\/rt><\/ruby>の<ruby>裏側<rt>うらがわ<\/rt><\/ruby>には、","","「ネクタイピン、カフスボタン、<ruby>眼鏡<rt>めがね<\/rt><\/ruby>、<ruby>財布<rt>さいふ<\/rt><\/ruby>、その<ruby>他<rt>た<\/rt><\/ruby><ruby>金物<rt>かなもの<\/rt><\/ruby><ruby>類<rt>るい<\/rt><\/ruby>、","　ことに<ruby>尖<rt>とが<\/rt><\/ruby>ったものは、みんなここに<ruby>置<rt>お<\/rt><\/ruby>いてください」","","と<ruby>書<rt>か<\/rt><\/ruby>いてありました。<ruby>扉<rt>とびら<\/rt><\/ruby>のすぐ<ruby>横<rt>よこ<\/rt><\/ruby>には<ruby>黒塗<rt>くろぬ<\/rt><\/ruby>りの<ruby>立派<rt>りっぱ<\/rt><\/ruby>な<ruby>金庫<rt>きんこ<\/rt><\/ruby>も、ちゃんと<ruby>口<rt>くち<\/rt><\/ruby>を<ruby>開<rt>あ<\/rt><\/ruby>けて<ruby>置<rt>お<\/rt><\/ruby>いてありました。<ruby>鍵<rt>かぎ<\/rt><\/ruby>まで<ruby>添<rt>そ<\/rt><\/ruby>えてあったのです。","「ははあ、<ruby>何<rt>なん<\/rt><\/ruby>かの<ruby>料理<rt>りょうり<\/rt><\/ruby>に<ruby>電気<rt>でんき<\/rt><\/ruby>をつかうと<ruby>見<rt>み<\/rt><\/ruby>えるね。<ruby>金気<rt>かなけ<\/rt><\/ruby>のものはあぶない。ことに<ruby>尖<rt>とが<\/rt><\/ruby>ったものはあぶないと<ruby>斯<rt>こ<\/rt><\/ruby>う<ruby>云<rt>い<\/rt><\/ruby>うんだろう。」","「そうだろう。して<ruby>見<rt>み<\/rt><\/ruby>ると<ruby>勘定<rt>かんじょう<\/rt><\/ruby>は<ruby>帰<rt>かえ<\/rt><\/ruby>りにここで<ruby>払<rt>はら<\/rt><\/ruby>うのだろうか。」","「どうもそうらしい。」","「そうだ。きっと。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>はめがねをはずしたり、カフスボタンをとったり、みんな<ruby>金庫<rt>きんこ<\/rt><\/ruby>のなかに<ruby>入<rt>い<\/rt><\/ruby>れて、ぱちんと<ruby>錠<rt>じょう<\/rt><\/ruby>をかけました。"],"speech":["そしたら、どうです。ブラシをいたのうえにおくやいなや、そいつがぼうっとかすんでなくなって、かぜがどうっとむろのなかにはいってきました。","ふたりはびっくりして、たがいによりそって、とびらをがたんとあけて、つぎのむろへはいっていきました。はやくなんかあたたかいものでもたべて、げんきをつけておかないと、もうとほうもないことになってしまうと、ふたりともおもったのでした。","とびらのうちがわに、またへんなことがかいてありました。","","「てっぽうとたまをここへおいてください。」","","みるとすぐよこにくろいだいがありました。","「なるほど、てっぽうをもってものをくうというほうはない。」","「いや、よほどえらいひとがしじゅうきているんだ。」","ふたりはてっぽうをはずし、おびかわをといて、それをだいのうえにおきました。","またくろいとびらがありました。","","「どうかぼうしとがいとうとくつをおとりください。」","","「どうだ、とるか。」","「しかたない、とろう。たしかによっぽどえらいひとなんだ。おくにきているのは」","ふたりはぼうしとオーバーコートをくぎにかけ、くつをぬいでぺたぺたあるいてとびらのなかにはいりました。","とびらのうらがわには、","","「ネクタイピン、カフスボタン、めがね、さいふ、そのたかなものるい、","ことにとがったものは、みんなここにおいてください」","","とかいてありました。とびらのすぐよこにはくろぬりのりっぱなきんこも、ちゃんとくちをあけておいてありました。かぎまでそえてあったのです。","「ははあ、なんかのりょうりにでんきをつかうとみえるね。かなけのものはあぶない。ことにとがったものはあぶないとこういうんだろう。」","「そうだろう。してみるとかんじょうはかえりにここではらうのだろうか。」","「どうもそうらしい。」","「そうだ。きっと。」","ふたりはめがねをはずしたり、カフスボタンをとったり、みんなきんこのなかにいれて、ぱちんとじょうをかけました。"]},{"t":"クリームと香水と塩","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3a3040\"/><rect x=\"250\" y=\"60\" width=\"300\" height=\"390\" fill=\"#2a2433\" rx=\"0\" opacity=\"1\"/><rect x=\"286\" y=\"96\" width=\"228\" height=\"190\" fill=\"#5a6e5c\" rx=\"4\" opacity=\"1\"/><rect x=\"294\" y=\"104\" width=\"212\" height=\"174\" fill=\"#f7f1e1\" rx=\"2\" opacity=\"1\"/><text x=\"400.0\" y=\"130\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">壺のなかの<\/text><text x=\"400.0\" y=\"154\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">クリームを<\/text><text x=\"400.0\" y=\"178\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">顔や手足に<\/text><text x=\"400.0\" y=\"202\" font-size=\"15\" fill=\"#3a2f28\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"0\" opacity=\"1\">塗ってください<\/text><circle cx=\"496\" cy=\"191.0\" r=\"4\" fill=\"#5a6e5c\" opacity=\"1\"/><g transform=\"translate(400 380)\"><path d=\"M-34 0 q-6 -44 34 -44 q40 0 34 44 z\" fill=\"#c9d8e0\"/><ellipse cx=\"0\" cy=\"-44\" rx=\"30\" ry=\"8\" fill=\"#ece4d4\"/><\/g><polygon points=\"141.95,440 146.7,384.9 154.3,369.7 166.65,369.7 173.3,384.9 178.05,440\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"160\" cy=\"358.3\" r=\"12.35\" fill=\"#4a3f2e\" opacity=\"1\"/><ellipse cx=\"160\" cy=\"348.8\" rx=\"16.15\" ry=\"4.2749999999999995\" fill=\"#4a3f2e\"/><path d=\"M151.45 348.8 a8.549999999999999 7.6 0 0 1 17.099999999999998 0 z\" fill=\"#4a3f2e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><polygon points=\"621.95,442 626.7,386.9 634.3,371.7 646.65,371.7 653.3,386.9 658.05,442\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"640\" cy=\"360.3\" r=\"12.35\" fill=\"#3a3226\" opacity=\"1\"/><ellipse cx=\"640\" cy=\"350.8\" rx=\"16.15\" ry=\"4.2749999999999995\" fill=\"#3a3226\"/><path d=\"M631.45 350.8 a8.549999999999999 7.6 0 0 1 17.099999999999998 0 z\" fill=\"#3a3226\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M200 360 q30 -20 56 -6\" fill=\"none\" stroke=\"#ece4d4\" stroke-width=\"5\" opacity=\"0.8\" stroke-linecap=\"round\"/><path d=\"M600 362 q-30 -20 -56 -6\" fill=\"none\" stroke=\"#ece4d4\" stroke-width=\"5\" opacity=\"0.8\" stroke-linecap=\"round\"/><\/svg>","paras":["　すこし<ruby>行<rt>い<\/rt><\/ruby>きますとまた<ruby>扉<rt>と<\/rt><\/ruby>があって、その<ruby>前<rt>まえ<\/rt><\/ruby>に<ruby>硝子<rt>がらす<\/rt><\/ruby>の<ruby>壺<rt>つぼ<\/rt><\/ruby>が<ruby>一<rt>ひと<\/rt><\/ruby>つありました。<ruby>扉<rt>とびら<\/rt><\/ruby>には<ruby>斯<rt>こ<\/rt><\/ruby>う<ruby>書<rt>か<\/rt><\/ruby>いてありました。","","「<ruby>壺<rt>つぼ<\/rt><\/ruby>のなかのクリームを<ruby>顔<rt>かお<\/rt><\/ruby>や<ruby>手足<rt>てあし<\/rt><\/ruby>にすっかり<ruby>塗<rt>ぬ<\/rt><\/ruby>ってください。」","","　みるとたしかに<ruby>壺<rt>つぼ<\/rt><\/ruby>のなかのものは<ruby>牛乳<rt>ぎゅうにゅう<\/rt><\/ruby>のクリームでした。","「クリームをぬれというのはどういうんだ。」","「これはね、<ruby>外<rt>そと<\/rt><\/ruby>がひじょうに<ruby>寒<rt>さむ<\/rt><\/ruby>いだろう。<ruby>室<rt>へや<\/rt><\/ruby>のなかがあんまり<ruby>暖<rt>あたたか<\/rt><\/ruby>いとひびがきれるから、その<ruby>予防<rt>よぼう<\/rt><\/ruby>なんだ。どうも<ruby>奥<rt>おく<\/rt><\/ruby>には、よほどえらいひとがきている。こんなとこで、<ruby>案外<rt>あんがい<\/rt><\/ruby>ぼくらは、<ruby>貴族<rt>きぞく<\/rt><\/ruby>とちかづきになるかも<ruby>知<rt>し<\/rt><\/ruby>れないよ。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>壺<rt>つぼ<\/rt><\/ruby>のクリームを、<ruby>顔<rt>かお<\/rt><\/ruby>に<ruby>塗<rt>ぬ<\/rt><\/ruby>って<ruby>手<rt>て<\/rt><\/ruby>に<ruby>塗<rt>ぬ<\/rt><\/ruby>ってそれから<ruby>靴下<rt>くつした<\/rt><\/ruby>をぬいで<ruby>足<rt>あし<\/rt><\/ruby>に<ruby>塗<rt>ぬ<\/rt><\/ruby>りました。それでもまだ<ruby>残<rt>のこ<\/rt><\/ruby>っていましたから、それは<ruby>二人<rt>ふたり<\/rt><\/ruby>ともめいめいこっそり<ruby>顔<rt>かお<\/rt><\/ruby>へ<ruby>塗<rt>ぬ<\/rt><\/ruby>るふりをしながら<ruby>喰<rt>た<\/rt><\/ruby>べました。","　それから<ruby>大急<rt>おおいそ<\/rt><\/ruby>ぎで<ruby>扉<rt>とびら<\/rt><\/ruby>をあけますと、その<ruby>裏側<rt>うらがわ<\/rt><\/ruby>には、","","「クリームをよく<ruby>塗<rt>ぬ<\/rt><\/ruby>りましたか、<ruby>耳<rt>みみ<\/rt><\/ruby>にもよく<ruby>塗<rt>ぬ<\/rt><\/ruby>りましたか、」","","と<ruby>書<rt>か<\/rt><\/ruby>いてあって、ちいさなクリームの<ruby>壺<rt>つぼ<\/rt><\/ruby>がここにも<ruby>置<rt>お<\/rt><\/ruby>いてありました。","「そうそう、ぼくは<ruby>耳<rt>みみ<\/rt><\/ruby>には<ruby>塗<rt>ぬ<\/rt><\/ruby>らなかった。あぶなく<ruby>耳<rt>みみ<\/rt><\/ruby>にひびを<ruby>切<rt>き<\/rt><\/ruby>らすとこだった。ここの<ruby>主人<rt>しゅじん<\/rt><\/ruby>はじつに<ruby>用意<rt>ようい<\/rt><\/ruby><ruby>周到<rt>しゅうとう<\/rt><\/ruby>だね。」","「ああ、<ruby>細<rt>こま<\/rt><\/ruby>かいとこまでよく<ruby>気<rt>き<\/rt><\/ruby>がつくよ。ところでぼくは<ruby>早<rt>はや<\/rt><\/ruby>く<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>喰<rt>た<\/rt><\/ruby>べたいんだが、どうも<ruby>斯<rt>こ<\/rt><\/ruby>うどこまでも<ruby>廊下<rt>ろうか<\/rt><\/ruby>じゃ<ruby>仕方<rt>しかた<\/rt><\/ruby>ないね。」","　するとすぐその<ruby>前<rt>まえ<\/rt><\/ruby>に<ruby>次<rt>つぎ<\/rt><\/ruby>の<ruby>戸<rt>と<\/rt><\/ruby>がありました。","","「<ruby>料理<rt>りょうり<\/rt><\/ruby>はもうすぐできます。","　<ruby>十五<rt>じゅうご<\/rt><\/ruby><ruby>分<rt>ふん<\/rt><\/ruby>とお<ruby>待<rt>ま<\/rt><\/ruby>たせはいたしません。","　すぐたべられます。","　<ruby>早<rt>はや<\/rt><\/ruby>くあなたの<ruby>頭<rt>あたま<\/rt><\/ruby>に<ruby>瓶<rt>びん<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>香水<rt>こうすい<\/rt><\/ruby>をよく<ruby>振<rt>ふ<\/rt><\/ruby>りかけてください。」","","　そして<ruby>戸<rt>と<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>には金ピカ（きんぴか）の<ruby>香水<rt>こうすい<\/rt><\/ruby>の<ruby>瓶<rt>びん<\/rt><\/ruby>が<ruby>置<rt>お<\/rt><\/ruby>いてありました。","　<ruby>二人<rt>ふたり<\/rt><\/ruby>はその<ruby>香水<rt>こうすい<\/rt><\/ruby>を、<ruby>頭<rt>あたま<\/rt><\/ruby>へぱちゃぱちゃ<ruby>振<rt>ふ<\/rt><\/ruby>りかけました。","　ところがその<ruby>香水<rt>こうすい<\/rt><\/ruby>は、どうも<ruby>酢<rt>す<\/rt><\/ruby>のような<ruby>匂<rt>におい<\/rt><\/ruby>がするのでした。","「この<ruby>香水<rt>こうすい<\/rt><\/ruby>はへんに<ruby>酢<rt>す<\/rt><\/ruby>くさい。どうしたんだろう。」","「まちがえたんだ。<ruby>下女<rt>げじょ<\/rt><\/ruby>が<ruby>風邪<rt>かぜ<\/rt><\/ruby>でも<ruby>引<rt>ひ<\/rt><\/ruby>いてまちがえて<ruby>入<rt>い<\/rt><\/ruby>れたんだ。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>扉<rt>とびら<\/rt><\/ruby>をあけて<ruby>中<rt>なか<\/rt><\/ruby>にはいりました。","　<ruby>扉<rt>とびら<\/rt><\/ruby>の<ruby>裏側<rt>うらがわ<\/rt><\/ruby>には、<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>字<rt>じ<\/rt><\/ruby>で<ruby>斯<rt>こ<\/rt><\/ruby>う<ruby>書<rt>か<\/rt><\/ruby>いてありました。","","「いろいろ<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>が<ruby>多<rt>おお<\/rt><\/ruby>くてうるさかったでしょう。お気の<ruby>毒<rt>きのどく<\/rt><\/ruby>でした。","　もうこれだけです。どうかからだ<ruby>中<rt>なか<\/rt><\/ruby>に、<ruby>壺<rt>つぼ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>塩<rt>しお<\/rt><\/ruby>をたくさん","　よくもみ<ruby>込<rt>こ<\/rt><\/ruby>んでください。」",""],"speech":["すこしいきますとまたとがあって、そのまえにがらすのつぼがひとつありました。とびらにはこうかいてありました。","","「つぼのなかのクリームをかおやてあしにすっかりぬってください。」","","みるとたしかにつぼのなかのものはぎゅうにゅうのクリームでした。","「クリームをぬれというのはどういうんだ。」","「これはね、そとがひじょうにさむいだろう。へやのなかがあんまりあたたかいとひびがきれるから、そのよぼうなんだ。どうもおくには、よほどえらいひとがきている。こんなとこで、あんがいぼくらは、きぞくとちかづきになるかもしれないよ。」","ふたりはつぼのクリームを、かおにぬっててにぬってそれからくつしたをぬいであしにぬりました。それでもまだのこっていましたから、それはふたりともめいめいこっそりかおへぬるふりをしながらたべました。","それからおおいそぎでとびらをあけますと、そのうらがわには、","","「クリームをよくぬりましたか、みみにもよくぬりましたか、」","","とかいてあって、ちいさなクリームのつぼがここにもおいてありました。","「そうそう、ぼくはみみにはぬらなかった。あぶなくみみにひびをきらすとこだった。ここのしゅじんはじつによういしゅうとうだね。」","「ああ、こまかいとこまでよくきがつくよ。ところでぼくははやくなんかたべたいんだが、どうもこうどこまでもろうかじゃしかたないね。」","するとすぐそのまえにつぎのとがありました。","","「りょうりはもうすぐできます。","じゅうごふんとおまたせはいたしません。","すぐたべられます。","はやくあなたのあたまにびんのなかのこうすいをよくふりかけてください。」","","そしてとのまえには金ピカ（きんぴか）のこうすいのびんがおいてありました。","ふたりはそのこうすいを、あたまへぱちゃぱちゃふりかけました。","ところがそのこうすいは、どうもすのようなにおいがするのでした。","「このこうすいはへんにすくさい。どうしたんだろう。」","「まちがえたんだ。げじょがかぜでもひいてまちがえていれたんだ。」","ふたりはとびらをあけてなかにはいりました。","とびらのうらがわには、おおきなじでこうかいてありました。","","「いろいろちゅうもんがおおくてうるさかったでしょう。お気のきのどくでした。","もうこれだけです。どうかからだなかに、つぼのなかのしおをたくさん","よくもみこんでください。」",""]},{"t":"気づいた二人","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1d1826\"/><rect x=\"230\" y=\"40\" width=\"340\" height=\"410\" fill=\"#26231e\" rx=\"0\" opacity=\"1\"/><rect x=\"258\" y=\"68\" width=\"284\" height=\"360\" fill=\"#3f2f24\" rx=\"0\" opacity=\"1\"/><g transform=\"translate(340 240)\"><path d=\"M0 -22 a14 14 0 1 1 0 1 z M-7 -6 l14 0 l6 30 l-26 0 z\" fill=\"#0f0c0a\"/><circle cx=\"0\" cy=\"-14\" r=\"7\" fill=\"#d9a441\"/><circle cx=\"0\" cy=\"-14\" r=\"3.4\" fill=\"#3a2f28\"/><\/g><g transform=\"translate(460 240)\"><path d=\"M0 -22 a14 14 0 1 1 0 1 z M-7 -6 l14 0 l6 30 l-26 0 z\" fill=\"#0f0c0a\"/><circle cx=\"0\" cy=\"-14\" r=\"7\" fill=\"#d9a441\"/><circle cx=\"0\" cy=\"-14\" r=\"3.4\" fill=\"#3a2f28\"/><\/g><text x=\"400\" y=\"360\" font-size=\"16\" fill=\"#e0cfa0\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"1\" opacity=\"1\">さあさあ おなかにおはいりください<\/text><polygon points=\"92.9,444 97.4,391.8 104.6,377.4 116.3,377.4 122.6,391.8 127.1,444\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"110\" cy=\"366.6\" r=\"11.700000000000001\" fill=\"#4a3f2e\" opacity=\"1\"/><ellipse cx=\"110\" cy=\"357.6\" rx=\"15.3\" ry=\"4.05\" fill=\"#4a3f2e\"/><path d=\"M101.9 357.6 a8.1 7.2 0 0 1 16.2 0 z\" fill=\"#4a3f2e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><polygon points=\"672.9,446 677.4,393.8 684.6,379.4 696.3,379.4 702.6,393.8 707.1,446\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"690\" cy=\"368.6\" r=\"11.700000000000001\" fill=\"#3a3226\" opacity=\"1\"/><ellipse cx=\"690\" cy=\"359.6\" rx=\"15.3\" ry=\"4.05\" fill=\"#3a3226\"/><path d=\"M681.9 359.6 a8.1 7.2 0 0 1 16.2 0 z\" fill=\"#3a3226\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><line x1=\"96\" y1=\"380\" x2=\"86\" y2=\"400\" stroke=\"#4a3f2e\" stroke-width=\"3\" opacity=\"1\" stroke-linecap=\"round\"/><line x1=\"124\" y1=\"380\" x2=\"134\" y2=\"400\" stroke=\"#4a3f2e\" stroke-width=\"3\" opacity=\"1\" stroke-linecap=\"round\"/><\/svg>","paras":["　なるほど<ruby>立派<rt>りっぱ<\/rt><\/ruby>な<ruby>青<rt>あお<\/rt><\/ruby>い<ruby>瀬戸<rt>せと<\/rt><\/ruby>の<ruby>塩壺<rt>しおつぼ<\/rt><\/ruby>は<ruby>置<rt>お<\/rt><\/ruby>いてありましたが、こんどというこんどは<ruby>二人<rt>ふたり<\/rt><\/ruby>ともぎょっとしてお<ruby>互<rt>たがい<\/rt><\/ruby>にクリームをたくさん<ruby>塗<rt>ぬ<\/rt><\/ruby>った<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見合<rt>みあわ<\/rt><\/ruby>せました。","「どうもおかしいぜ。」","「ぼくもおかしいとおもう。」","「<ruby>沢山<rt>たくさん<\/rt><\/ruby>の<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>というのは、<ruby>向<rt>むこ<\/rt><\/ruby>うがこっちへ<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>してるんだよ。」","「だからさ、<ruby>西洋<rt>せいよう<\/rt><\/ruby><ruby>料理店<rt>りょうりてん<\/rt><\/ruby>というのは、ぼくの<ruby>考<rt>かんが<\/rt><\/ruby>えるところでは、<ruby>西洋<rt>せいよう<\/rt><\/ruby><ruby>料理<rt>りょうり<\/rt><\/ruby>を、<ruby>来<rt>き<\/rt><\/ruby>た<ruby>人<rt>ひと<\/rt><\/ruby>にたべさせるのではなくて、<ruby>来<rt>き<\/rt><\/ruby>た<ruby>人<rt>ひと<\/rt><\/ruby>を<ruby>西洋<rt>せいよう<\/rt><\/ruby><ruby>料理<rt>りょうり<\/rt><\/ruby>にして、<ruby>食<rt>た<\/rt><\/ruby>べてやる<ruby>家<rt>うち<\/rt><\/ruby>とこういうことなんだ。これは、その、つ、つ、つ、つまり、ぼ、ぼ、ぼくらが……。」がたがたがたがた、ふるえだしてもうものが<ruby>言<rt>い<\/rt><\/ruby>えませんでした。","「その、ぼ、ぼくらが、……うわあ。」がたがたがたがたふるえだして、もうものが<ruby>言<rt>い<\/rt><\/ruby>えませんでした。","「<ruby>遁<rt>に<\/rt><\/ruby>げ……。」がたがたしながら<ruby>一人<rt>ひとり<\/rt><\/ruby>の<ruby>紳士<rt>しんし<\/rt><\/ruby>はうしろの<ruby>戸<rt>と<\/rt><\/ruby>を<ruby>押<rt>お<\/rt><\/ruby>そうとしましたが、どうです、<ruby>戸<rt>と<\/rt><\/ruby>はもう<ruby>一分<rt>いちぶ<\/rt><\/ruby>も<ruby>動<rt>うご<\/rt><\/ruby>きませんでした。","　<ruby>奥<rt>おく<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>にはまだ<ruby>一<rt>いち<\/rt><\/ruby><ruby>枚<rt>まい<\/rt><\/ruby><ruby>扉<rt>とびら<\/rt><\/ruby>があって、<ruby>大<rt>おお<\/rt><\/ruby>きなかぎ<ruby>穴<rt>あな<\/rt><\/ruby>が<ruby>二<rt>ふた<\/rt><\/ruby>つつき、<ruby>銀<rt>ぎん<\/rt><\/ruby>いろのホークとナイフの<ruby>形<rt>かたち<\/rt><\/ruby>が<ruby>切<rt>き<\/rt><\/ruby>りだしてあって、","","「いや、わざわざご<ruby>苦労<rt>くろう<\/rt><\/ruby>です。","　<ruby>大<rt>たい<\/rt><\/ruby>へん<ruby>結構<rt>けっこう<\/rt><\/ruby>にできました。","　さあさあおなかにおはいりください。」","","と<ruby>書<rt>か<\/rt><\/ruby>いてありました。おまけにかぎ<ruby>穴<rt>あな<\/rt><\/ruby>からはきょろきょろ<ruby>二<rt>ふた<\/rt><\/ruby>つの<ruby>青<rt>あお<\/rt><\/ruby>い<ruby>眼玉<rt>めだま<\/rt><\/ruby>がこっちをのぞいています。","「うわあ。」がたがたがたがた。","「うわあ。」がたがたがたがた。","　ふたりは<ruby>泣<rt>な<\/rt><\/ruby>き<ruby>出<rt>だ<\/rt><\/ruby>しました。"],"speech":["なるほどりっぱなあおいせとのしおつぼはおいてありましたが、こんどというこんどはふたりともぎょっとしておたがいにクリームをたくさんぬったかおをみあわせました。","「どうもおかしいぜ。」","「ぼくもおかしいとおもう。」","「たくさんのちゅうもんというのは、むこうがこっちへちゅうもんしてるんだよ。」","「だからさ、せいようりょうりてんというのは、ぼくのかんがえるところでは、せいようりょうりを、きたひとにたべさせるのではなくて、きたひとをせいようりょうりにして、たべてやるうちとこういうことなんだ。これは、その、つ、つ、つ、つまり、ぼ、ぼ、ぼくらが……。」がたがたがたがた、ふるえだしてもうものがいえませんでした。","「その、ぼ、ぼくらが、……うわあ。」がたがたがたがたふるえだして、もうものがいえませんでした。","「にげ……。」がたがたしながらひとりのしんしはうしろのとをおそうとしましたが、どうです、とはもういちぶもうごきませんでした。","おくのほうにはまだいちまいとびらがあって、おおきなかぎあながふたつつき、ぎんいろのホークとナイフのかたちがきりだしてあって、","","「いや、わざわざごくろうです。","たいへんけっこうにできました。","さあさあおなかにおはいりください。」","","とかいてありました。おまけにかぎあなからはきょろきょろふたつのあおいめだまがこっちをのぞいています。","「うわあ。」がたがたがたがた。","「うわあ。」がたがたがたがた。","ふたりはなきだしました。"]},{"t":"戸の向うの声","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#0f0c14\"/><circle cx=\"300\" cy=\"200\" r=\"30\" fill=\"#d9a441\" opacity=\"0.95\"/><circle cx=\"500\" cy=\"200\" r=\"30\" fill=\"#d9a441\" opacity=\"0.95\"/><ellipse cx=\"300\" cy=\"200\" rx=\"10\" ry=\"24\" fill=\"#3a2f28\"/><ellipse cx=\"500\" cy=\"200\" rx=\"10\" ry=\"24\" fill=\"#3a2f28\"/><circle cx=\"300\" cy=\"200\" r=\"48\" fill=\"#d9a441\" opacity=\"0.18\"/><circle cx=\"500\" cy=\"200\" r=\"48\" fill=\"#d9a441\" opacity=\"0.18\"/><g fill=\"#e8e0d0\"><path d=\"M120 400 q10 -40 44 -44 q30 -4 44 18 q10 18 -2 34 l-70 4 z\"/><circle cx=\"212\" cy=\"382\" r=\"16\"/><polygon points=\"224,378 244,384 224,392\"/><\/g><g fill=\"#d8ccb8\"><path d=\"M580 410 q10 -40 44 -44 q30 -4 44 18 q10 18 -2 34 l-70 4 z\"/><circle cx=\"672\" cy=\"392\" r=\"16\"/><polygon points=\"684,388 704,394 684,402\"/><\/g><g fill=\"#5c6e84\" opacity=\"0.5\"><circle cx=\"242\" cy=\"18\" r=\"1.2\"/><circle cx=\"379\" cy=\"107\" r=\"1.9\"/><circle cx=\"516\" cy=\"76\" r=\"2.5999999999999996\"/><circle cx=\"653\" cy=\"45\" r=\"1.2\"/><circle cx=\"50\" cy=\"14\" r=\"1.9\"/><circle cx=\"187\" cy=\"103\" r=\"2.5999999999999996\"/><circle cx=\"324\" cy=\"72\" r=\"1.2\"/><circle cx=\"461\" cy=\"41\" r=\"1.9\"/><\/g><\/svg>","paras":["　すると<ruby>戸<rt>と<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>では、こそこそこんなことを<ruby>云<rt>い<\/rt><\/ruby>っています。","「だめだよ。もう<ruby>気<rt>き<\/rt><\/ruby>がついたよ。<ruby>塩<rt>しお<\/rt><\/ruby>をもみこまないようだよ。」","「あたりまえさ。<ruby>親分<rt>おやぶん<\/rt><\/ruby>の<ruby>書<rt>か<\/rt><\/ruby>きようがまずいんだ。あすこへ、いろいろ<ruby>注文<rt>ちゅうもん<\/rt><\/ruby>が<ruby>多<rt>おお<\/rt><\/ruby>くてうるさかったでしょう、お気の<ruby>毒<rt>きのどく<\/rt><\/ruby>でしたなんて、<ruby>間抜<rt>まぬ<\/rt><\/ruby>けたことを<ruby>書<rt>か<\/rt><\/ruby>いたもんだ。」","「どっちでもいいよ。どうせぼくらには、<ruby>骨<rt>ほね<\/rt><\/ruby>も<ruby>分<rt>わ<\/rt><\/ruby>けて<ruby>呉<rt>く<\/rt><\/ruby>れやしないんだ。」","「それはそうだ。けれどももしここへあいつらがはいって<ruby>来<rt>こ<\/rt><\/ruby>なかったら、それはぼくらの<ruby>責任<rt>せきにん<\/rt><\/ruby>だぜ。」","「<ruby>呼<rt>よ<\/rt><\/ruby>ぼうか、<ruby>呼<rt>よ<\/rt><\/ruby>ぼう。おい、お<ruby>客<rt>きゃく<\/rt><\/ruby>さん<ruby>方<rt>かた<\/rt><\/ruby>、<ruby>早<rt>はや<\/rt><\/ruby>くいらっしゃい。いらっしゃい。いらっしゃい。お<ruby>皿<rt>さら<\/rt><\/ruby>も<ruby>洗<rt>あら<\/rt><\/ruby>ってありますし、菜っ<ruby>葉<rt>なっぱ<\/rt><\/ruby>ももうよく<ruby>塩<rt>しお<\/rt><\/ruby>でもんで<ruby>置<rt>お<\/rt><\/ruby>きました。あとはあなたがたと、菜っ<ruby>葉<rt>なっぱ<\/rt><\/ruby>をうまくとりあわせて、まっ<ruby>白<rt>しろ<\/rt><\/ruby>なお<ruby>皿<rt>さら<\/rt><\/ruby>にのせるだけです。はやくいらっしゃい。」","「へい、いらっしゃい、いらっしゃい。それともサラドはお<ruby>嫌<rt>きら<\/rt><\/ruby>いですか。そんならこれから<ruby>火<rt>ひ<\/rt><\/ruby>を<ruby>起<rt>おこ<\/rt><\/ruby>してフライにしてあげましょうか。とにかくはやくいらっしゃい。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>はあんまり<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>痛<rt>いた<\/rt><\/ruby>めたために、<ruby>顔<rt>かお<\/rt><\/ruby>がまるでくしゃくしゃの<ruby>紙屑<rt>かみくず<\/rt><\/ruby>のようになり、お<ruby>互<rt>たがい<\/rt><\/ruby>にその<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見合<rt>みあわ<\/rt><\/ruby>せ、ぶるぶるふるえ、<ruby>声<rt>こえ<\/rt><\/ruby>もなく<ruby>泣<rt>な<\/rt><\/ruby>きました。","　<ruby>中<rt>なか<\/rt><\/ruby>ではふっふっとわらってまた<ruby>叫<rt>さけ<\/rt><\/ruby>んでいます。","「いらっしゃい、いらっしゃい。そんなに<ruby>泣<rt>な<\/rt><\/ruby>いては<ruby>折角<rt>せっかく<\/rt><\/ruby>のクリームが<ruby>流<rt>なが<\/rt><\/ruby>れるじゃありませんか。へい、ただいま。じきもってまいります。さあ、<ruby>早<rt>はや<\/rt><\/ruby>くいらっしゃい。」","「<ruby>早<rt>はや<\/rt><\/ruby>くいらっしゃい。<ruby>親方<rt>おやかた<\/rt><\/ruby>がもうナフキンをかけて、ナイフをもって、<ruby>舌<rt>した<\/rt><\/ruby>なめずりして、お<ruby>客<rt>きゃく<\/rt><\/ruby>さま<ruby>方<rt>かた<\/rt><\/ruby>を<ruby>待<rt>ま<\/rt><\/ruby>っていられます。」","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>泣<rt>な<\/rt><\/ruby>いて<ruby>泣<rt>な<\/rt><\/ruby>いて<ruby>泣<rt>な<\/rt><\/ruby>いて<ruby>泣<rt>な<\/rt><\/ruby>いて<ruby>泣<rt>な<\/rt><\/ruby>きました。","　そのときうしろからいきなり、","「わん、わん、ぐゎあ。」という<ruby>声<rt>こえ<\/rt><\/ruby>がして、あの<ruby>白熊<rt>しろくま<\/rt><\/ruby>のような<ruby>犬<rt>いぬ<\/rt><\/ruby>が<ruby>二<rt>に<\/rt><\/ruby><ruby>疋<rt>ひき<\/rt><\/ruby>、<ruby>扉<rt>と<\/rt><\/ruby>をつきやぶって<ruby>室<rt>へや<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に飛び<ruby>込<rt>とびこ<\/rt><\/ruby>んできました。<ruby>鍵穴<rt>かぎあな<\/rt><\/ruby>の<ruby>眼玉<rt>めだま<\/rt><\/ruby>はたちまちなくなり、<ruby>犬<rt>いぬ<\/rt><\/ruby>どもはううとうなってしばらく<ruby>室<rt>むろ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>をくるくる<ruby>廻<rt>まわ<\/rt><\/ruby>っていましたが、また<ruby>一声<rt>いっせい<\/rt><\/ruby>","「わん。」と<ruby>高<rt>たか<\/rt><\/ruby>く<ruby>吠<rt>ほ<\/rt><\/ruby>えて、いきなり<ruby>次<rt>つぎ<\/rt><\/ruby>の<ruby>扉<rt>とびら<\/rt><\/ruby>に<ruby>飛<rt>と<\/rt><\/ruby>びつきました。<ruby>戸<rt>と<\/rt><\/ruby>はがたりとひらき、<ruby>犬<rt>いぬ<\/rt><\/ruby>どもは吸い<ruby>込<rt>すいこ<\/rt><\/ruby>まれるように<ruby>飛<rt>と<\/rt><\/ruby>んで<ruby>行<rt>い<\/rt><\/ruby>きました。","　その<ruby>扉<rt>とびら<\/rt><\/ruby>の<ruby>向<rt>むこ<\/rt><\/ruby>うのまっくらやみのなかで、","「にゃあお、くゎあ、ごろごろ。」という<ruby>声<rt>こえ<\/rt><\/ruby>がして、それからがさがさ<ruby>鳴<rt>な<\/rt><\/ruby>りました。"],"speech":["するととのなかでは、こそこそこんなことをいっています。","「だめだよ。もうきがついたよ。しおをもみこまないようだよ。」","「あたりまえさ。おやぶんのかきようがまずいんだ。あすこへ、いろいろちゅうもんがおおくてうるさかったでしょう、お気のきのどくでしたなんて、まぬけたことをかいたもんだ。」","「どっちでもいいよ。どうせぼくらには、ほねもわけてくれやしないんだ。」","「それはそうだ。けれどももしここへあいつらがはいってこなかったら、それはぼくらのせきにんだぜ。」","「よぼうか、よぼう。おい、おきゃくさんかた、はやくいらっしゃい。いらっしゃい。いらっしゃい。おさらもあらってありますし、菜っなっぱももうよくしおでもんでおきました。あとはあなたがたと、菜っなっぱをうまくとりあわせて、まっしろなおさらにのせるだけです。はやくいらっしゃい。」","「へい、いらっしゃい、いらっしゃい。それともサラドはおきらいですか。そんならこれからひをおこしてフライにしてあげましょうか。とにかくはやくいらっしゃい。」","ふたりはあんまりこころをいためたために、かおがまるでくしゃくしゃのかみくずのようになり、おたがいにそのかおをみあわせ、ぶるぶるふるえ、こえもなくなきました。","なかではふっふっとわらってまたさけんでいます。","「いらっしゃい、いらっしゃい。そんなにないてはせっかくのクリームがながれるじゃありませんか。へい、ただいま。じきもってまいります。さあ、はやくいらっしゃい。」","「はやくいらっしゃい。おやかたがもうナフキンをかけて、ナイフをもって、したなめずりして、おきゃくさまかたをまっていられます。」","ふたりはないてないてないてないてなきました。","そのときうしろからいきなり、","「わん、わん、ぐゎあ。」というこえがして、あのしろくまのようないぬがにひき、とをつきやぶってへやのなかに飛びとびこんできました。かぎあなのめだまはたちまちなくなり、いぬどもはううとうなってしばらくむろのなかをくるくるまわっていましたが、またいっせい","「わん。」とたかくほえて、いきなりつぎのとびらにとびつきました。とはがたりとひらき、いぬどもは吸いすいこまれるようにとんでいきました。","そのとびらのむこうのまっくらやみのなかで、","「にゃあお、くゎあ、ごろごろ。」というこえがして、それからがさがさなりました。"]},{"t":"すすきの中へ","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#8a9a74\"/><path d=\"M30 450 q6 -60 -4 -96 q14 34 10 96 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.85\" stroke-linecap=\"round\"/><path d=\"M84 450 q6 -60 -4 -96 q14 34 10 96 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.85\" stroke-linecap=\"round\"/><path d=\"M138 450 q6 -60 -4 -96 q14 34 10 96 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.85\" stroke-linecap=\"round\"/><path d=\"M192 450 q6 -60 -4 -96 q14 34 10 96 z\" fill=\"#c9b489\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.85\" stroke-linecap=\"round\"/><path d=\"M246 450 q6 -60 -4 - /><circle cx=\"390\" cy=\"333.7\" r=\"13.65\" fill=\"#3a3226\" opacity=\"1\"/><ellipse cx=\"390\" cy=\"323.2\" rx=\"17.85\" ry=\"4.7250000000000005\" fill=\"#3a3226\"/><path d=\"M380.55 323.2 a9.450000000000001 8.4 0 0 1 18.900000000000002 0 z\" fill=\"#3a3226\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><polygon points=\"541,428 546,370 554,354 567,354 574,370 579,428\" fill=\"#5a4a3c\" opacity=\"1\"/><circle cx=\"560\" cy=\"342\" r=\"13\" fill=\"#5a4a3c\" opacity=\"1\"/><polygon points=\"540,336 580,336 560,322\" fill=\"#5a4a3c\" opacity=\"1\"/><g fill=\"#e8e0d0\"><path d=\"M130 420 q8 -32 36 -36 q26 -3 38 15 q8 15 -2 28 l-58 3 z\"/><circle cx=\"212\" cy=\"406\" r=\"13\"/><\/g><circle cx=\"600\" cy=\"350\" r=\"8\" fill=\"#c9a06a\" opacity=\"1\"/><circle cx=\"622\" cy=\"350\" r=\"8\" fill=\"#c9a06a\" opacity=\"1\"/><circle cx=\"644\" cy=\"350\" r=\"8\" fill=\"#c9a06a\" opacity=\"1\"/><circle cx=\"680\" cy=\"90\" r=\"46\" fill=\"#e8b45a\" opacity=\"0.93\"/><circle cx=\"680\" cy=\"90\" r=\"57.5\" fill=\"none\" stroke=\"#e8b45a\" stroke-width=\"2.5\" opacity=\".35\"/><\/svg>","paras":["　<ruby>室<rt>むろ<\/rt><\/ruby>はけむりのように<ruby>消<rt>き<\/rt><\/ruby>え、<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>寒<rt>さむ<\/rt><\/ruby>さにぶるぶるふるえて、<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>立<rt>た<\/rt><\/ruby>っていました。","　<ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>上着<rt>うわぎ<\/rt><\/ruby>や<ruby>靴<rt>くつ<\/rt><\/ruby>や<ruby>財布<rt>さいふ<\/rt><\/ruby>やネクタイピンは、あっちの<ruby>枝<rt>えだ<\/rt><\/ruby>にぶらさがったり、こっちの<ruby>根<rt>ね<\/rt><\/ruby>もとにちらばったりしています。<ruby>風<rt>かぜ<\/rt><\/ruby>がどうと<ruby>吹<rt>ふ<\/rt><\/ruby>いてきて、<ruby>草<rt>くさ<\/rt><\/ruby>はざわざわ、木の<ruby>葉<rt>このは<\/rt><\/ruby>はかさかさ、<ruby>木<rt>き<\/rt><\/ruby>はごとんごとんと<ruby>鳴<rt>な<\/rt><\/ruby>りました。","　<ruby>犬<rt>いぬ<\/rt><\/ruby>がふうとうなって<ruby>戻<rt>もど<\/rt><\/ruby>ってきました。","　そしてうしろからは、","「<ruby>旦那<rt>だんな<\/rt><\/ruby>あ、<ruby>旦那<rt>だんな<\/rt><\/ruby>あ、」と<ruby>叫<rt>さけ<\/rt><\/ruby>ぶものがあります。","　<ruby>二人<rt>ふたり<\/rt><\/ruby>は<ruby>俄<rt>にわ<\/rt><\/ruby>かに<ruby>元気<rt>げんき<\/rt><\/ruby>がついて","「おおい、おおい、ここだぞ、<ruby>早<rt>はや<\/rt><\/ruby>く<ruby>来<rt>こ<\/rt><\/ruby>い。」と<ruby>叫<rt>さけ<\/rt><\/ruby>びました。","　<ruby>簔帽子<rt>みのぼうし<\/rt><\/ruby>をかぶった<ruby>専門<rt>せんもん<\/rt><\/ruby>の<ruby>猟師<rt>りょうし<\/rt><\/ruby>が、<ruby>草<rt>くさ<\/rt><\/ruby>をざわざわ<ruby>分<rt>わ<\/rt><\/ruby>けてやってきました。","　そこで<ruby>二人<rt>ふたり<\/rt><\/ruby>はやっと<ruby>安心<rt>あんしん<\/rt><\/ruby>しました。","　そして<ruby>猟師<rt>りょうし<\/rt><\/ruby>のもってきた<ruby>団子<rt>だんご<\/rt><\/ruby>をたべ、<ruby>途中<rt>とちゅう<\/rt><\/ruby>で<ruby>十<rt>じゅう<\/rt><\/ruby><ruby>円<rt>えん<\/rt><\/ruby>だけ<ruby>山鳥<rt>やまどり<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>って<ruby>東京<rt>とうきょう<\/rt><\/ruby>に<ruby>帰<rt>かえ<\/rt><\/ruby>りました。","　しかし、さっき<ruby>一<rt>いち<\/rt><\/ruby>ぺん<ruby>紙<rt>かみ<\/rt><\/ruby>くずのようになった<ruby>二人<rt>ふたり<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>だけは、<ruby>東京<rt>とうきょう<\/rt><\/ruby>に<ruby>帰<rt>かえ<\/rt><\/ruby>っても、お<ruby>湯<rt>ゆ<\/rt><\/ruby>にはいっても、もうもとのとおりになおりませんでした。"],"speech":["むろはけむりのようにきえ、ふたりはさむさにぶるぶるふるえて、くさのなかにたっていました。","みると、うわぎやくつやさいふやネクタイピンは、あっちのえだにぶらさがったり、こっちのねもとにちらばったりしています。かぜがどうとふいてきて、くさはざわざわ、木のこのははかさかさ、きはごとんごとんとなりました。","いぬがふうとうなってもどってきました。","そしてうしろからは、","「だんなあ、だんなあ、」とさけぶものがあります。","ふたりはにわかにげんきがついて","「おおい、おおい、ここだぞ、はやくこい。」とさけびました。","みのぼうしをかぶったせんもんのりょうしが、くさをざわざわわけてやってきました。","そこでふたりはやっとあんしんしました。","そしてりょうしのもってきただんごをたべ、とちゅうでじゅうえんだけやまどりをかってとうきょうにかえりました。","しかし、さっきいちぺんかみくずのようになったふたりのかおだけは、とうきょうにかえっても、おゆにはいっても、もうもとのとおりになおりませんでした。"]}]},{"id":"yodaka","title":"よだかの星","author":"宮沢賢治","mins":13,"cover":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#10182b\"/><rect x=\"16\" y=\"16\" width=\"768\" height=\"418\" fill=\"none\" stroke=\"#4a6b8c\" stroke-width=\"4\"/><rect x=\"27\" y=\"27\" width=\"746\" height=\"396\" fill=\"none\" stroke=\"#cfe0f0\" stroke-width=\"1.5\"/><g fill=\"#e8ecf4\" opacity=\"0.85\"><circle cx=\"189\" cy=\"107\" r=\"1.2\"/><circle cx=\"326\" cy=\"196\" r=\"1.9\"/><circle cx=\"463\" cy=\"285\" r=\"2.5999999999999996\"/><ci
