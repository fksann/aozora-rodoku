\" y2=\"170\" stroke=\"#cfe0f0\" stroke-width=\"1.6\" opacity=\"0.7\" stroke-linecap=\"round\"/><line x1=\"600\" y1=\"130\" x2=\"560\" y2=\"170\" stroke=\"#cfe0f0\" stroke-width=\"1.6\" opacity=\"0.7\" stroke-linecap=\"round\"/><line x1=\"600\" y1=\"130\" x2=\"640\" y2=\"90\" stroke=\"#cfe0f0\" stroke-width=\"1.6\" opacity=\"0.7\" stroke-linecap=\"round\"/><path d=\"M455.6 274.8 Q489.2 286.0 520 300 Q550.8 286.0 584.4 274.8 Q548.0 308.4 520 314.0 Q492.0 308.4 455.6 274.8 Z\" fill=\"#3a4652\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"520\" cy=\"308.4\" rx=\"14.0\" ry=\"8.399999999999999\" fill=\"#3a4652\"/><polygon points=\"532.6,307.0 545.2,309.8 532.6,312.6\" fill=\"#3a4652\"/><text x=\"210\" y=\"58\" font-size=\"56\" fill=\"#e8ecf4\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">よだかの星<\/text><text x=\"148\" y=\"70\" font-size=\"22\" fill=\"#e8ecf4\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">宮沢賢治<\/text><\/svg>","paras":[],"speech":["よだかのほし。みやざわけんじ。"]},{"t":"みにくい鳥","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#8a6a52\"/><rect x=\"0\" y=\"340\" width=\"800\" height=\"110\" fill=\"#3f3a30\" rx=\"0\" opacity=\"0.8\"/><polygon points=\"60,450 60,340 66,340 66,450\" fill=\"#2a2620\" opacity=\"1\"/><path d=\"M63 340 q30 -10 60 4\" fill=\"none\" stroke=\"#2a2620\" stroke-width=\"6\" opacity=\"1\" stroke-linecap=\"round\"/><g transform=\"translate(140 330)\"><ellipse cx=\"0\" cy=\"0\" rx=\"26\" ry=\"16\" fill=\"#4a4436\"/><circle cx=\"22\" cy=\"-8\" r=\"9\" fill=\"#4a4436\"/><path d=\"M28 -8 q10 2 14 8 l-14 2 z\" fill=\"#3a362c\"/><circle cx=\"24\" cy=\"-9\" r=\"1.8\" fill=\"#f7f1e1\"/><circle cx=\"-14\" cy=\"-4\" r=\"2.4\" fill=\"#6a5a42\"/><circle cx=\"-5\" cy=\"1\" r=\"2.4\" fill=\"#6a5a42\"/><circle cx=\"4\" cy=\"-4\" r=\"2.4\" fill=\"#6a5a42\"/><circle cx=\"13\" cy=\"1\" r=\"2.4\" fill=\"#6a5a42\"/><\/g><g transform=\"translate(560 300)\"><ellipse cx=\"0\" cy=\"0\" rx=\"14\" ry=\"10\" fill=\"#c9a052\"/><circle cx=\"12\" cy=\"-6\" r=\"6\" fill=\"#c9a052\"/><\/g><g transform=\"translate(640 320)\"><ellipse cx=\"0\" cy=\"0\" rx=\"13\" ry=\"9\" fill=\"#a8b8c9\"/><circle cx=\"11\" cy=\"-5\" r=\"5.5\" fill=\"#a8b8c9\"/><\/g><circle cx=\"660\" cy=\"110\" r=\"44\" fill=\"#c96a3a\" opacity=\"0.93\"/><circle cx=\"660\" cy=\"110\" r=\"55.0\" fill=\"none\" stroke=\"#c96a3a\" stroke-width=\"2.5\" opacity=\".35\"/><\/svg>","paras":["　よだかは、<ruby>実<rt>じつ<\/rt><\/ruby>にみにくい<ruby>鳥<rt>とり<\/rt><\/ruby>です。","　<ruby>顔<rt>かお<\/rt><\/ruby>は、ところどころ、<ruby>味噌<rt>みそ<\/rt><\/ruby>をつけたようにまだらで、くちばしは、ひらたくて、<ruby>耳<rt>みみ<\/rt><\/ruby>までさけています。","　<ruby>足<rt>あし<\/rt><\/ruby>は、まるでよぼよぼで、<ruby>一間<rt>いっけん<\/rt><\/ruby>とも<ruby>歩<rt>ある<\/rt><\/ruby>けません。","　ほかの<ruby>鳥<rt>とり<\/rt><\/ruby>は、もう、よだかの<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ただけでも、いやになってしまうという<ruby>工合<rt>ぐあい<\/rt><\/ruby>でした。","　たとえば、ひばりも、あまり<ruby>美<rt>うつく<\/rt><\/ruby>しい<ruby>鳥<rt>とり<\/rt><\/ruby>ではありませんが、よだかよりは、ずっと<ruby>上<rt>うえ<\/rt><\/ruby>だと<ruby>思<rt>おも<\/rt><\/ruby>っていましたので、<ruby>夕方<rt>ゆうがた<\/rt><\/ruby>など、よだかにあうと、さもさもいやそうに、しんねりと<ruby>目<rt>め<\/rt><\/ruby>をつぶりながら、<ruby>首<rt>くび<\/rt><\/ruby>をそっ<ruby>方<rt>ぽ<\/rt><\/ruby>へ<ruby>向<rt>む<\/rt><\/ruby>けるのでした。もっとちいさなおしゃべりの<ruby>鳥<rt>とり<\/rt><\/ruby>などは、いつでもよだかのまっこうから<ruby>悪口<rt>わるぐち<\/rt><\/ruby>をしました。","「ヘン。<ruby>又<rt>また<\/rt><\/ruby><ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>き<\/rt><\/ruby>たね。まあ、あのざまをごらん。ほんとうに、<ruby>鳥<rt>とり<\/rt><\/ruby>の<ruby>仲間<rt>なかま<\/rt><\/ruby>のつらよごしだよ。」","「ね、まあ、あのくちのおおきいことさ。きっと、かえるの<ruby>親類<rt>しんるい<\/rt><\/ruby>か<ruby>何<rt>なん<\/rt><\/ruby>かなんだよ。」","　こんな<ruby>調子<rt>ちょうし<\/rt><\/ruby>です。おお、よだかでないただのたかならば、こんな<ruby>生<rt>なま<\/rt><\/ruby>はんかのちいさい<ruby>鳥<rt>とり<\/rt><\/ruby>は、もう<ruby>名前<rt>なまえ<\/rt><\/ruby>を<ruby>聞<rt>き<\/rt><\/ruby>いただけでも、ぶるぶるふるえて、<ruby>顔色<rt>かおいろ<\/rt><\/ruby>を<ruby>変<rt>か<\/rt><\/ruby>えて、からだをちぢめて、木の<ruby>葉<rt>このは<\/rt><\/ruby>のかげにでもかくれたでしょう。ところが<ruby>夜<rt>よる<\/rt><\/ruby>だかは、ほんとうは<ruby>鷹<rt>たか<\/rt><\/ruby>の<ruby>兄弟<rt>きょうだい<\/rt><\/ruby>でも<ruby>親類<rt>しんるい<\/rt><\/ruby>でもありませんでした。かえって、よだかは、あの<ruby>美<rt>うつく<\/rt><\/ruby>しいかわせみや、<ruby>鳥<rt>とり<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>宝石<rt>ほうせき<\/rt><\/ruby>のような<ruby>蜂<rt>はち<\/rt><\/ruby>すずめの<ruby>兄<rt>にい<\/rt><\/ruby>さんでした。<ruby>蜂<rt>はち<\/rt><\/ruby>すずめは<ruby>花<rt>はな<\/rt><\/ruby>の<ruby>蜜<rt>みつ<\/rt><\/ruby>をたべ、かわせみはお<ruby>魚<rt>さかな<\/rt><\/ruby>を<ruby>食<rt>た<\/rt><\/ruby>べ、<ruby>夜<rt>よる<\/rt><\/ruby>だかは<ruby>羽虫<rt>はむし<\/rt><\/ruby>をとってたべるのでした。それによだかには、するどい<ruby>爪<rt>つめ<\/rt><\/ruby>もするどいくちばしもありませんでしたから、どんなに<ruby>弱<rt>よわ<\/rt><\/ruby>い<ruby>鳥<rt>とり<\/rt><\/ruby>でも、よだかをこわがる<ruby>筈<rt>はず<\/rt><\/ruby>はなかったのです。","　それなら、たかという<ruby>名<rt>な<\/rt><\/ruby>のついたことは<ruby>不思議<rt>ふしぎ<\/rt><\/ruby>なようですが、これは、<ruby>一<rt>ひと<\/rt><\/ruby>つはよだかのはねが<ruby>無暗<rt>むやみ<\/rt><\/ruby>に<ruby>強<rt>つよ<\/rt><\/ruby>くて、<ruby>風<rt>かぜ<\/rt><\/ruby>を<ruby>切<rt>き<\/rt><\/ruby>って<ruby>翔<rt>か<\/rt><\/ruby>けるときなどは、まるで<ruby>鷹<rt>たか<\/rt><\/ruby>のように<ruby>見<rt>み<\/rt><\/ruby>えたことと、も<ruby>一<rt>ひと<\/rt><\/ruby>つはなきごえがするどくて、やはりどこか<ruby>鷹<rt>たか<\/rt><\/ruby>に<ruby>似<rt>に<\/rt><\/ruby>ていた<ruby>為<rt>ため<\/rt><\/ruby>です。もちろん、<ruby>鷹<rt>たか<\/rt><\/ruby>は、これをひじょうに<ruby>気<rt>き<\/rt><\/ruby>にかけて、いやがっていました。それですから、よだかの<ruby>顔<rt>かお<\/rt><\/ruby>さえ<ruby>見<rt>み<\/rt><\/ruby>ると、<ruby>肩<rt>かた<\/rt><\/ruby>をいからせて、<ruby>早<rt>はや<\/rt><\/ruby>く<ruby>名前<rt>なまえ<\/rt><\/ruby>をあらためろ、<ruby>名前<rt>なまえ<\/rt><\/ruby>をあらためろと、いうのでした。"],"speech":["よだかは、じつにみにくいとりです。","かおは、ところどころ、みそをつけたようにまだらで、くちばしは、ひらたくて、みみまでさけています。","あしは、まるでよぼよぼで、いっけんともあるけません。","ほかのとりは、もう、よだかのかおをみただけでも、いやになってしまうというぐあいでした。","たとえば、ひばりも、あまりうつくしいとりではありませんが、よだかよりは、ずっとうえだとおもっていましたので、ゆうがたなど、よだかにあうと、さもさもいやそうに、しんねりとめをつぶりながら、くびをそっぽへむけるのでした。もっとちいさなおしゃべりのとりなどは、いつでもよだかのまっこうからわるぐちをしました。","「ヘン。またでてきたね。まあ、あのざまをごらん。ほんとうに、とりのなかまのつらよごしだよ。」","「ね、まあ、あのくちのおおきいことさ。きっと、かえるのしんるいかなんかなんだよ。」","こんなちょうしです。おお、よだかでないただのたかならば、こんななまはんかのちいさいとりは、もうなまえをきいただけでも、ぶるぶるふるえて、かおいろをかえて、からだをちぢめて、木のこのはのかげにでもかくれたでしょう。ところがよるだかは、ほんとうはたかのきょうだいでもしんるいでもありませんでした。かえって、よだかは、あのうつくしいかわせみや、とりのなかのほうせきのようなはちすずめのにいさんでした。はちすずめははなのみつをたべ、かわせみはおさかなをたべ、よるだかははむしをとってたべるのでした。それによだかには、するどいつめもするどいくちばしもありませんでしたから、どんなによわいとりでも、よだかをこわがるはずはなかったのです。","それなら、たかというなのついたことはふしぎなようですが、これは、ひとつはよだかのはねがむやみにつよくて、かぜをきってかけるときなどは、まるでたかのようにみえたことと、もひとつはなきごえがするどくて、やはりどこかたかににていたためです。もちろん、たかは、これをひじょうにきにかけて、いやがっていました。それですから、よだかのかおさえみると、かたをいからせて、はやくなまえをあらためろ、なまえをあらためろと、いうのでした。"]},{"t":"鷹の言い分","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#a04a30\"/><circle cx=\"400\" cy=\"380\" r=\"110\" fill=\"#b03a24\" opacity=\"0.93\"/><circle cx=\"400\" cy=\"380\" r=\"137.5\" fill=\"none\" stroke=\"#b03a24\" stroke-width=\"2.5\" opacity=\".35\"/><rect x=\"0\" y=\"360\" width=\"800\" height=\"90\" fill=\"#3a2620\" rx=\"0\" opacity=\"0.8\"/><g transform=\"translate(520 190)\"><path d=\"M-101.2 -39.6 Q-48.400000000000006 -22.0 0 0 Q48.400000000000006 -22.0 101.2 -39.6 Q44.0 13.200000000000001 0 22.0 Q-44.0 13.200000000000001 -101.2 -39.6 Z\" fill=\"#26231e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"0\" cy=\"13.200000000000001\" rx=\"22.0\" ry=\"13.200000000000001\" fill=\"#26231e\"/><polygon points=\"19.8,11.0 39.6,15.400000000000002 19.8,19.8\" fill=\"#26231e\"/><\/g><polygon points=\"560,180 610,160 600,186\" fill=\"#26231e\" opacity=\"1\"/><path d=\"M176.3 282.9 Q199.1 290.5 220 300 Q240.9 290.5 263.7 282.9 Q239.0 305.7 220 309.5 Q201.0 305.7 176.3 282.9 Z\" fill=\"#4a4436\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"220\" cy=\"305.7\" rx=\"9.5\" ry=\"5.699999999999999\" fill=\"#4a4436\"/><polygon points=\"228.55,304.75 237.1,306.65 228.55,308.55\" fill=\"#4a4436\"/><path d=\"M80 90 q108.0 -14 240 -2\" fill=\"none\" stroke=\"#7a3a2a\" stroke-width=\"11\" opacity=\"0.85\" stroke-linecap=\"round\"/><path d=\"M420 60 q117.0 -14 260 -2\" fill=\"none\" stroke=\"#7a3a2a\" stroke-width=\"9\" opacity=\"0.7\" stroke-linecap=\"round\"/><\/svg>","paras":["　ある<ruby>夕方<rt>ゆうがた<\/rt><\/ruby>、とうとう、<ruby>鷹<rt>たか<\/rt><\/ruby>がよだかのうちへやって<ruby>参<rt>まい<\/rt><\/ruby>りました。","「おい。<ruby>居<rt>い<\/rt><\/ruby>るかい。まだお<ruby>前<rt>まえ<\/rt><\/ruby>は<ruby>名前<rt>なまえ<\/rt><\/ruby>をかえないのか。ずいぶんお<ruby>前<rt>まえ<\/rt><\/ruby>も<ruby>恥<rt>はじ<\/rt><\/ruby><ruby>知<rt>し<\/rt><\/ruby>らずだな。お<ruby>前<rt>まえ<\/rt><\/ruby>とおれでは、よっぽど<ruby>人格<rt>じんかく<\/rt><\/ruby>がちがうんだよ。たとえばおれは、<ruby>青<rt>あお<\/rt><\/ruby>いそらをどこまででも<ruby>飛<rt>と<\/rt><\/ruby>んで<ruby>行<rt>い<\/rt><\/ruby>く。おまえは、<ruby>曇<rt>くも<\/rt><\/ruby>ってうすぐらい<ruby>日<rt>ひ<\/rt><\/ruby>か、<ruby>夜<rt>よる<\/rt><\/ruby>でなくちゃ、<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>こ<\/rt><\/ruby>ない。それから、おれのくちばしやつめを<ruby>見<rt>み<\/rt><\/ruby>ろ。そして、よくお<ruby>前<rt>まえ<\/rt><\/ruby>のとくらべて<ruby>見<rt>み<\/rt><\/ruby>るがいい。」","「<ruby>鷹<rt>たか<\/rt><\/ruby>さん。それはあんまり<ruby>無理<rt>むり<\/rt><\/ruby>です。<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>名前<rt>なまえ<\/rt><\/ruby>は<ruby>私<rt>わたくし<\/rt><\/ruby>が<ruby>勝手<rt>かって<\/rt><\/ruby>につけたのではありません。<ruby>神<rt>かみ<\/rt><\/ruby>さまから<ruby>下<rt>くだ<\/rt><\/ruby>さったのです。」","「いいや。おれの<ruby>名<rt>な<\/rt><\/ruby>なら、<ruby>神<rt>かみ<\/rt><\/ruby>さまから<ruby>貰<rt>もら<\/rt><\/ruby>ったのだと<ruby>云<rt>い<\/rt><\/ruby>ってもよかろうが、お<ruby>前<rt>まえ<\/rt><\/ruby>のは、<ruby>云<rt>い<\/rt><\/ruby>わば、おれと<ruby>夜<rt>よる<\/rt><\/ruby>と、<ruby>両方<rt>りょうほう<\/rt><\/ruby>から<ruby>借<rt>か<\/rt><\/ruby>りてあるんだ。さあ<ruby>返<rt>かえ<\/rt><\/ruby>せ。」","「<ruby>鷹<rt>たか<\/rt><\/ruby>さん。それは<ruby>無理<rt>むり<\/rt><\/ruby>です。」","「<ruby>無理<rt>むり<\/rt><\/ruby>じゃない。おれがいい<ruby>名<rt>な<\/rt><\/ruby>を<ruby>教<rt>おし<\/rt><\/ruby>えてやろう。<ruby>市蔵<rt>いちぞう<\/rt><\/ruby>というんだ。<ruby>市蔵<rt>いちぞう<\/rt><\/ruby>とな。いい<ruby>名<rt>な<\/rt><\/ruby>だろう。そこで、<ruby>名前<rt>なまえ<\/rt><\/ruby>を<ruby>変<rt>か<\/rt><\/ruby>えるには、<ruby>改名<rt>かいめい<\/rt><\/ruby>の<ruby>披露<rt>ひろう<\/rt><\/ruby>というものをしないといけない。いいか。それはな、<ruby>首<rt>くび<\/rt><\/ruby>へ<ruby>市<rt>し<\/rt><\/ruby><ruby>蔵<rt>ぞう<\/rt><\/ruby>と<ruby>書<rt>か<\/rt><\/ruby>いたふだをぶらさげて、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>以来<rt>いらい<\/rt><\/ruby><ruby>市<rt>し<\/rt><\/ruby><ruby>蔵<rt>ぞう<\/rt><\/ruby>と<ruby>申<rt>もう<\/rt><\/ruby>しますと、<ruby>口上<rt>こうじょう<\/rt><\/ruby>を<ruby>云<rt>い<\/rt><\/ruby>って、みんなの<ruby>所<rt>ところ<\/rt><\/ruby>をおじぎしてまわるのだ。」","「そんなことはとても<ruby>出来<rt>でき<\/rt><\/ruby>ません。」","「いいや。<ruby>出来<rt>でき<\/rt><\/ruby>る。そうしろ。もしあさっての<ruby>朝<rt>あさ<\/rt><\/ruby>までに、お<ruby>前<rt>まえ<\/rt><\/ruby>がそうしなかったら、もうすぐ、つかみ<ruby>殺<rt>ころ<\/rt><\/ruby>すぞ。つかみ<ruby>殺<rt>ころ<\/rt><\/ruby>してしまうから、そう<ruby>思<rt>おも<\/rt><\/ruby>え。おれはあさっての<ruby>朝<rt>あさ<\/rt><\/ruby><ruby>早<rt>はや<\/rt><\/ruby>く、<ruby>鳥<rt>とり<\/rt><\/ruby>のうちを<ruby>一<rt>いち<\/rt><\/ruby><ruby>軒<rt>けん<\/rt><\/ruby>ずつまわって、お<ruby>前<rt>まえ<\/rt><\/ruby>が<ruby>来<rt>き<\/rt><\/ruby>たかどうかを<ruby>聞<rt>き<\/rt><\/ruby>いてあるく。<ruby>一<rt>いち<\/rt><\/ruby><ruby>軒<rt>けん<\/rt><\/ruby>でも<ruby>来<rt>こ<\/rt><\/ruby>なかったという<ruby>家<rt>いえ<\/rt><\/ruby>があったら、もう<ruby>貴様<rt>きさま<\/rt><\/ruby>もその<ruby>時<rt>とき<\/rt><\/ruby>がおしまいだぞ。」","「だってそれはあんまり<ruby>無理<rt>むり<\/rt><\/ruby>じゃありませんか。そんなことをする<ruby>位<rt>くらい<\/rt><\/ruby>なら、<ruby>私<rt>わたくし<\/rt><\/ruby>はもう<ruby>死<rt>し<\/rt><\/ruby>んだ<ruby>方<rt>ほう<\/rt><\/ruby>がましです。<ruby>今<rt>いま<\/rt><\/ruby>すぐ<ruby>殺<rt>ころ<\/rt><\/ruby>して<ruby>下<rt>くだ<\/rt><\/ruby>さい。」","「まあ、よく、あとで<ruby>考<rt>かんが<\/rt><\/ruby>えてごらん。<ruby>市蔵<rt>いちぞう<\/rt><\/ruby>なんてそんなにわるい<ruby>名<rt>な<\/rt><\/ruby>じゃないよ。」<ruby>鷹<rt>たか<\/rt><\/ruby>は<ruby>大<rt>おお<\/rt><\/ruby>きなはねを<ruby>一杯<rt>いっぱい<\/rt><\/ruby>にひろげて、<ruby>自分<rt>じぶん<\/rt><\/ruby>の<ruby>巣<rt>す<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へ<ruby>飛<rt>と<\/rt><\/ruby>んで<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>行<rt>い<\/rt><\/ruby>きました。","　よだかは、じっと<ruby>目<rt>め<\/rt><\/ruby>をつぶって<ruby>考<rt>かんが<\/rt><\/ruby>えました。"],"speech":["あるゆうがた、とうとう、たかがよだかのうちへやってまいりました。","「おい。いるかい。まだおまえはなまえをかえないのか。ずいぶんおまえもはじしらずだな。おまえとおれでは、よっぽどじんかくがちがうんだよ。たとえばおれは、あおいそらをどこまででもとんでいく。おまえは、くもってうすぐらいひか、よるでなくちゃ、でてこない。それから、おれのくちばしやつめをみろ。そして、よくおまえのとくらべてみるがいい。」","「たかさん。それはあんまりむりです。わたくしのなまえはわたくしがかってにつけたのではありません。かみさまからくださったのです。」","「いいや。おれのななら、かみさまからもらったのだといってもよかろうが、おまえのは、いわば、おれとよると、りょうほうからかりてあるんだ。さあかえせ。」","「たかさん。それはむりです。」","「むりじゃない。おれがいいなをおしえてやろう。いちぞうというんだ。いちぞうとな。いいなだろう。そこで、なまえをかえるには、かいめいのひろうというものをしないといけない。いいか。それはな、くびへしぞうとかいたふだをぶらさげて、わたくしはいらいしぞうともうしますと、こうじょうをいって、みんなのところをおじぎしてまわるのだ。」","「そんなことはとてもできません。」","「いいや。できる。そうしろ。もしあさってのあさまでに、おまえがそうしなかったら、もうすぐ、つかみころすぞ。つかみころしてしまうから、そうおもえ。おれはあさってのあさはやく、とりのうちをいちけんずつまわって、おまえがきたかどうかをきいてあるく。いちけんでもこなかったといういえがあったら、もうきさまもそのときがおしまいだぞ。」","「だってそれはあんまりむりじゃありませんか。そんなことをするくらいなら、わたくしはもうしんだほうがましです。いますぐころしてください。」","「まあ、よく、あとでかんがえてごらん。いちぞうなんてそんなにわるいなじゃないよ。」たかはおおきなはねをいっぱいにひろげて、じぶんのすのほうへとんでかえっていきました。","よだかは、じっとめをつぶってかんがえました。"]},{"t":"夜の翼","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#26202e\"/><polygon points=\"0,380 240,340 520,380 800,350 800,450 0,450\" fill=\"#3a1d18\" opacity=\"1\"/><rect x=\"0\" y=\"330\" width=\"800\" height=\"60\" fill=\"#c93a20\" rx=\"0\" opacity=\"0.35\"/><path d=\"M326.4 151.2 Q364.8 164.0 400 180 Q435.2 164.0 473.6 151.2 Q432.0 189.6 400 196.0 Q368.0 189.6 326.4 151.2 Z\" fill=\"#1d1826\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"400\" cy=\"189.6\" rx=\"16.0\" ry=\"9.600000000000001\" fill=\"#1d1826\"/><polygon points=\"414.4,188.0 428.8,191.2 414.4,194.4\" fill=\"#1d1826\"/><circle cx=\"300\" cy=\"140\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"383\" cy=\"197\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"466\" cy=\"254\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"309\" cy=\"191\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"392\" cy=\"248\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"475\" cy=\"185\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"318\" cy=\"242\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><circle cx=\"401\" cy=\"179\" r=\"2\" fill=\"#c9c2b4\" opacity=\"0.8\"/><g fill=\"#8ca8c9\" opacity=\"0.7\"><circle cx=\"666\" cy=\"106\" r=\"1.2\"/><circle cx=\"63\" cy=\"55\" r=\"1.9\"/><circle cx=\"200\" cy=\"144\" r=\"2.5999999999999996\"/><circle cx=\"337\" cy=\"93\" r=\"1.2\"/><circle cx=\"474\" cy=\"42\" r=\"1.9\"/><circle cx=\"611\" cy=\"131\" r=\"2.5999999999999996\"/><circle cx=\"748\" cy=\"80\" r=\"1.2\"/><circle cx=\"145\" cy=\"29\" r=\"1.9\"/><circle cx=\"282\" cy=\"118\" r=\"2.5999999999999996\"/><circle cx=\"419\" cy=\"67\" r=\"1.2\"/><circle cx=\"556\" cy=\"16\" r=\"1.9\"/><circle cx=\"693\" cy=\"105\" r=\"2.5999999999999996\"/><circle cx=\"90\" cy=\"54\" r=\"1.2\"/><circle cx=\"227\" cy=\"143\" r=\"1.9\"/><circle cx=\"364\" cy=\"92\" r=\"2.5999999999999996\"/><circle cx=\"501\" cy=\"41\" r=\"1.2\"/><\/g><circle cx=\"120\" cy=\"80\" r=\"57.8\" fill=\"#d8ccb8\" opacity=\"0.13\"/><circle cx=\"120\" cy=\"80\" r=\"34\" fill=\"#d8ccb8\" opacity=\"1\"/><\/svg>","paras":["（<ruby>一<rt>いち<\/rt><\/ruby>たい<ruby>僕<rt>ぼく<\/rt><\/ruby>は、なぜこうみんなにいやがられるのだろう。<ruby>僕<rt>ぼく<\/rt><\/ruby>の<ruby>顔<rt>かお<\/rt><\/ruby>は、<ruby>味噌<rt>みそ<\/rt><\/ruby>をつけたようで、<ruby>口<rt>くち<\/rt><\/ruby>は<ruby>裂<rt>さ<\/rt><\/ruby>けてるからなあ。それだって、<ruby>僕<rt>ぼく<\/rt><\/ruby>は<ruby>今<rt>いま<\/rt><\/ruby>まで、なんにも<ruby>悪<rt>わる<\/rt><\/ruby>いことをしたことがない。<ruby>赤<rt>あか<\/rt><\/ruby>ん<ruby>坊<rt>ぼう<\/rt><\/ruby>のめじろが<ruby>巣<rt>す<\/rt><\/ruby>から<ruby>落<rt>お<\/rt><\/ruby>ちていたときは、<ruby>助<rt>たす<\/rt><\/ruby>けて<ruby>巣<rt>す<\/rt><\/ruby>へ<ruby>連<rt>つ<\/rt><\/ruby>れて<ruby>行<rt>い<\/rt><\/ruby>ってやった。そしたらめじろは、赤ん<ruby>坊<rt>あかんぼう<\/rt><\/ruby>をまるでぬす<ruby>人<rt>びと<\/rt><\/ruby>からでもとりかえすように<ruby>僕<rt>ぼく<\/rt><\/ruby>からひきはなしたんだなあ。それからひどく<ruby>僕<rt>ぼく<\/rt><\/ruby>を<ruby>笑<rt>わら<\/rt><\/ruby>ったっけ。それにああ、<ruby>今度<rt>こんど<\/rt><\/ruby>は<ruby>市<rt>し<\/rt><\/ruby><ruby>蔵<rt>ぞう<\/rt><\/ruby>だなんて、<ruby>首<rt>くび<\/rt><\/ruby>へふだをかけるなんて、つらいはなしだなあ。）","　あたりは、もううすくらくなっていました。<ruby>夜<rt>よる<\/rt><\/ruby>だかは<ruby>巣<rt>す<\/rt><\/ruby>から飛び<ruby>出<rt>とびだ<\/rt><\/ruby>しました。<ruby>雲<rt>くも<\/rt><\/ruby>が<ruby>意地<rt>いじ<\/rt><\/ruby><ruby>悪<rt>わる<\/rt><\/ruby>く<ruby>光<rt>ひか<\/rt><\/ruby>って、<ruby>低<rt>ひく<\/rt><\/ruby>くたれています。<ruby>夜<rt>よる<\/rt><\/ruby>だかはまるで<ruby>雲<rt>くも<\/rt><\/ruby>とすれすれになって、<ruby>音<rt>おと<\/rt><\/ruby>なく<ruby>空<rt>そら<\/rt><\/ruby>を<ruby>飛<rt>と<\/rt><\/ruby>びまわりました。","　それからにわかによだかは<ruby>口<rt>くち<\/rt><\/ruby>を<ruby>大<rt>おお<\/rt><\/ruby>きくひらいて、はねをまっすぐに<ruby>張<rt>は<\/rt><\/ruby>って、まるで<ruby>矢<rt>や<\/rt><\/ruby>のようにそらをよこぎりました。<ruby>小<rt>ちい<\/rt><\/ruby>さな<ruby>羽虫<rt>はむし<\/rt><\/ruby>が<ruby>幾匹<rt>いくひき<\/rt><\/ruby>も<ruby>幾<rt>いく<\/rt><\/ruby><ruby>匹<rt>ひき<\/rt><\/ruby>もその<ruby>咽喉<rt>のど<\/rt><\/ruby>にはいりました。","　からだがつちにつくかつかないうちに、よだかはひらりとまたそらへはねあがりました。もう<ruby>雲<rt>くも<\/rt><\/ruby>は<ruby>鼠色<rt>ねずみいろ<\/rt><\/ruby>になり、<ruby>向<rt>むこ<\/rt><\/ruby>うの<ruby>山<rt>やま<\/rt><\/ruby>には<ruby>山<rt>やま<\/rt><\/ruby><ruby>焼<rt>や<\/rt><\/ruby>けの<ruby>火<rt>ひ<\/rt><\/ruby>がまっ<ruby>赤<rt>か<\/rt><\/ruby>です。","　<ruby>夜<rt>よる<\/rt><\/ruby>だかが思い<ruby>切<rt>おもいき<\/rt><\/ruby>って<ruby>飛<rt>と<\/rt><\/ruby>ぶときは、そらがまるで<ruby>二<rt>ふた<\/rt><\/ruby>つに<ruby>切<rt>き<\/rt><\/ruby>れたように<ruby>思<rt>おも<\/rt><\/ruby>われます。<ruby>一<rt>いち<\/rt><\/ruby><ruby>疋<rt>ぴき<\/rt><\/ruby>の<ruby>甲虫<rt>かぶとむし<\/rt><\/ruby>が、<ruby>夜<rt>よる<\/rt><\/ruby>だかの<ruby>咽喉<rt>いんこう<\/rt><\/ruby>にはいって、ひどくもがきました。よだかはすぐそれを<ruby>呑<rt>の<\/rt><\/ruby>みこみましたが、その<ruby>時<rt>とき<\/rt><\/ruby><ruby>何<rt>なん<\/rt><\/ruby>だかせなかがぞっとしたように<ruby>思<rt>おも<\/rt><\/ruby>いました。","　<ruby>雲<rt>くも<\/rt><\/ruby>はもうまっくろく、<ruby>東<rt>ひがし<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>だけ<ruby>山<rt>やま<\/rt><\/ruby>やけの<ruby>火<rt>ひ<\/rt><\/ruby>が<ruby>赤<rt>あか<\/rt><\/ruby>くうつって、<ruby>恐<rt>おそ<\/rt><\/ruby>ろしいようです。よだかはむねがつかえたように<ruby>思<rt>おも<\/rt><\/ruby>いながら、<ruby>又<rt>また<\/rt><\/ruby>そらへのぼりました。","　また<ruby>一<rt>いち<\/rt><\/ruby><ruby>疋<rt>ひき<\/rt><\/ruby>の<ruby>甲虫<rt>かぶとむし<\/rt><\/ruby>が、<ruby>夜<rt>よる<\/rt><\/ruby>だかののどに、はいりました。そしてまるでよだかの<ruby>咽喉<rt>いんこう<\/rt><\/ruby>をひっかいてばたばたしました。よだかはそれを<ruby>無理<rt>むり<\/rt><\/ruby>にのみこんでしまいましたが、その<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>急<rt>きゅう<\/rt><\/ruby>に<ruby>胸<rt>むね<\/rt><\/ruby>がどきっとして、<ruby>夜<rt>よる<\/rt><\/ruby>だかは<ruby>大声<rt>おおごえ<\/rt><\/ruby>をあげて<ruby>泣<rt>な<\/rt><\/ruby>き<ruby>出<rt>だ<\/rt><\/ruby>しました。<ruby>泣<rt>な<\/rt><\/ruby>きながらぐるぐるぐるぐる<ruby>空<rt>そら<\/rt><\/ruby>をめぐったのです。","（ああ、かぶとむしや、たくさんの<ruby>羽虫<rt>はむし<\/rt><\/ruby>が、<ruby>毎晩<rt>まいばん<\/rt><\/ruby><ruby>僕<rt>ぼく<\/rt><\/ruby>に<ruby>殺<rt>ころ<\/rt><\/ruby>される。そしてそのただ<ruby>一<rt>ひと<\/rt><\/ruby>つの<ruby>僕<rt>ぼく<\/rt><\/ruby>がこんどは<ruby>鷹<rt>たか<\/rt><\/ruby>に<ruby>殺<rt>ころ<\/rt><\/ruby>される。それがこんなにつらいのだ。ああ、つらい、つらい。<ruby>僕<rt>ぼく<\/rt><\/ruby>はもう<ruby>虫<rt>むし<\/rt><\/ruby>をたべないで<ruby>餓<rt>う<\/rt><\/ruby>えて<ruby>死<rt>し<\/rt><\/ruby>のう。いやその<ruby>前<rt>まえ<\/rt><\/ruby>にもう<ruby>鷹<rt>たか<\/rt><\/ruby>が<ruby>僕<rt>ぼく<\/rt><\/ruby>を<ruby>殺<rt>ころ<\/rt><\/ruby>すだろう。いや、その<ruby>前<rt>まえ<\/rt><\/ruby>に、<ruby>僕<rt>ぼく<\/rt><\/ruby>は<ruby>遠<rt>とお<\/rt><\/ruby>くの<ruby>遠<rt>とお<\/rt><\/ruby>くの<ruby>空<rt>そら<\/rt><\/ruby>の<ruby>向<rt>むこ<\/rt><\/ruby>うに<ruby>行<rt>い<\/rt><\/ruby>ってしまおう。）","　<ruby>山<rt>やま<\/rt><\/ruby><ruby>焼<rt>や<\/rt><\/ruby>けの<ruby>火<rt>ひ<\/rt><\/ruby>は、だんだん<ruby>水<rt>みず<\/rt><\/ruby>のように<ruby>流<rt>なが<\/rt><\/ruby>れてひろがり、<ruby>雲<rt>くも<\/rt><\/ruby>も<ruby>赤<rt>あか<\/rt><\/ruby>く<ruby>燃<rt>も<\/rt><\/ruby>えているようです。"],"speech":["（いちたいぼくは、なぜこうみんなにいやがられるのだろう。ぼくのかおは、みそをつけたようで、くちはさけてるからなあ。それだって、ぼくはいままで、なんにもわるいことをしたことがない。あかんぼうのめじろがすからおちていたときは、たすけてすへつれていってやった。そしたらめじろは、赤んあかんぼうをまるでぬすびとからでもとりかえすようにぼくからひきはなしたんだなあ。それからひどくぼくをわらったっけ。それにああ、こんどはしぞうだなんて、くびへふだをかけるなんて、つらいはなしだなあ。）","あたりは、もううすくらくなっていました。よるだかはすから飛びとびだしました。くもがいじわるくひかって、ひくくたれています。よるだかはまるでくもとすれすれになって、おとなくそらをとびまわりました。","それからにわかによだかはくちをおおきくひらいて、はねをまっすぐにはって、まるでやのようにそらをよこぎりました。ちいさなはむしがいくひきもいくひきもそののどにはいりました。","からだがつちにつくかつかないうちに、よだかはひらりとまたそらへはねあがりました。もうくもはねずみいろになり、むこうのやまにはやまやけのひがまっかです。","よるだかが思いおもいきってとぶときは、そらがまるでふたつにきれたようにおもわれます。いちぴきのかぶとむしが、よるだかのいんこうにはいって、ひどくもがきました。よだかはすぐそれをのみこみましたが、そのときなんだかせなかがぞっとしたようにおもいました。","くもはもうまっくろく、ひがしのほうだけやまやけのひがあかくうつって、おそろしいようです。よだかはむねがつかえたようにおもいながら、またそらへのぼりました。","またいちひきのかぶとむしが、よるだかののどに、はいりました。そしてまるでよだかのいんこうをひっかいてばたばたしました。よだかはそれをむりにのみこんでしまいましたが、そのとき、きゅうにむねがどきっとして、よるだかはおおごえをあげてなきだしました。なきながらぐるぐるぐるぐるそらをめぐったのです。","（ああ、かぶとむしや、たくさんのはむしが、まいばんぼくにころされる。そしてそのただひとつのぼくがこんどはたかにころされる。それがこんなにつらいのだ。ああ、つらい、つらい。ぼくはもうむしをたべないでうえてしのう。いやそのまえにもうたかがぼくをころすだろう。いや、そのまえに、ぼくはとおくのとおくのそらのむこうにいってしまおう。）","やまやけのひは、だんだんみずのようにながれてひろがり、くももあかくもえているようです。"]},{"t":"川せみの弟へ","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1d2e36\"/><polygon points=\"0,300 800,280 800,450 0,450\" fill=\"#2f4a52\" opacity=\"1\"/><path d=\"M-10 320 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0 q30 -12 60 0\" fill=\"none\" stroke=\"#5b8c9e\" stroke-width=\"4\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M-10 380 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0 q31 -10 62 0\" fill=\"none\" stroke=\"#5b8c9e\" stroke-width=\"3\" opacity=\"0.6\" stroke-linecap=\"round\"/><polygon points=\"80,450 80,300 92,300 92,450\" fill=\"#26231e\" opacity=\"1\"/><g transform=\"translate(150 250)\"><ellipse cx=\"0\" cy=\"0\" rx=\"18\" ry=\"12\" fill=\"#3a8ca8\"/><circle cx=\"15\" cy=\"-8\" r=\"8\" fill=\"#3a8ca8\"/><polygon points=\"21,-8 38,-4 21,-1\" fill=\"#c96a3a\"/><circle cx=\"17\" cy=\"-9\" r=\"1.6\" fill=\"#f7f1e1\"/><\/g><path d=\"M369.4 140.2 Q395.8 149.0 420 160 Q444.2 149.0 470.6 140.2 Q442.0 166.6 420 171.0 Q398.0 166.6 369.4 140.2 Z\" fill=\"#3a4652\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"420\" cy=\"166.6\" rx=\"11.0\" ry=\"6.6000000000000005\" fill=\"#3a4652\"/><polygon points=\"429.9,165.5 439.8,167.7 429.9,169.9\" fill=\"#3a4652\"/><circle cx=\"660\" cy=\"90\" r=\"71.39999999999999\" fill=\"#d8e0d0\" opacity=\"0.13\"/><circle cx=\"660\" cy=\"90\" r=\"42\" fill=\"#d8e0d0\" opacity=\"1\"/><g fill=\"#cfe0d8\" opacity=\"0.6\"><circle cx=\"295\" cy=\"29\" r=\"1.2\"/><circle cx=\"432\" cy=\"118\" r=\"1.9\"/><circle cx=\"569\" cy=\"67\" r=\"2.5999999999999996\"/><circle cx=\"706\" cy=\"16\" r=\"1.2\"/><circle cx=\"103\" cy=\"105\" r=\"1.9\"/><circle cx=\"240\" cy=\"54\" r=\"2.5999999999999996\"/><circle cx=\"377\" cy=\"143\" r=\"1.2\"/><circle cx=\"514\" cy=\"92\" r=\"1.9\"/><circle cx=\"651\" cy=\"41\" r=\"2.5999999999999996\"/><circle cx=\"48\" cy=\"130\" r=\"1.2\"/><\/g><\/svg>","paras":["　よだかはまっすぐに、<ruby>弟<rt>おとうと<\/rt><\/ruby>の<ruby>川<rt>かわ<\/rt><\/ruby>せみの<ruby>所<rt>ところ<\/rt><\/ruby>へ<ruby>飛<rt>と<\/rt><\/ruby>んで<ruby>行<rt>い<\/rt><\/ruby>きました。きれいな<ruby>川<rt>かわ<\/rt><\/ruby>せみも、<ruby>丁度<rt>ちょうど<\/rt><\/ruby><ruby>起<rt>お<\/rt><\/ruby>きて<ruby>遠<rt>とお<\/rt><\/ruby>くの<ruby>山火事<rt>やまかじ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ていた<ruby>所<rt>ところ<\/rt><\/ruby>でした。そしてよだかの<ruby>降<rt>お<\/rt><\/ruby>りて<ruby>来<rt>き<\/rt><\/ruby>たのを<ruby>見<rt>み<\/rt><\/ruby>て<ruby>云<rt>い<\/rt><\/ruby>いました。","「<ruby>兄<rt>にい<\/rt><\/ruby>さん。<ruby>今晩<rt>こんばん<\/rt><\/ruby>は。<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>急<rt>きゅう<\/rt><\/ruby>のご<ruby>用<rt>よう<\/rt><\/ruby>ですか。」","「いいや、<ruby>僕<rt>ぼく<\/rt><\/ruby>は<ruby>今度<rt>こんど<\/rt><\/ruby><ruby>遠<rt>とお<\/rt><\/ruby>い<ruby>所<rt>ところ<\/rt><\/ruby>へ<ruby>行<rt>い<\/rt><\/ruby>くからね、その<ruby>前<rt>まえ<\/rt><\/ruby><ruby>一寸<rt>ちょっと<\/rt><\/ruby>お<ruby>前<rt>まえ<\/rt><\/ruby>に<ruby>遭<rt>あ<\/rt><\/ruby>いに<ruby>来<rt>き<\/rt><\/ruby>たよ。」","「<ruby>兄<rt>にい<\/rt><\/ruby>さん。<ruby>行<rt>い<\/rt><\/ruby>っちゃいけませんよ。<ruby>蜂雀<rt>はちすずめ<\/rt><\/ruby>もあんな<ruby>遠<rt>とお<\/rt><\/ruby>くにいるんですし、<ruby>僕<rt>ぼく<\/rt><\/ruby>ひとりぼっちになってしまうじゃありませんか。」","「それはね。どうも<ruby>仕方<rt>しかた<\/rt><\/ruby>ないのだ。もう<ruby>今日<rt>きょう<\/rt><\/ruby>は<ruby>何<rt>なん<\/rt><\/ruby>も<ruby>云<rt>い<\/rt><\/ruby>わないで<ruby>呉<rt>く<\/rt><\/ruby>れ。そしてお<ruby>前<rt>まえ<\/rt><\/ruby>もね、どうしてもとらなければならない<ruby>時<rt>とき<\/rt><\/ruby>のほかはいたずらにお<ruby>魚<rt>さかな<\/rt><\/ruby>を<ruby>取<rt>と<\/rt><\/ruby>ったりしないようにして<ruby>呉<rt>く<\/rt><\/ruby>れ。ね、さよなら。」","「<ruby>兄<rt>にい<\/rt><\/ruby>さん。どうしたんです。まあもう<ruby>一寸<rt>ちょっと<\/rt><\/ruby>お<ruby>待<rt>ま<\/rt><\/ruby>ちなさい。」","「いや、いつまで<ruby>居<rt>い<\/rt><\/ruby>てもおんなじだ。はちすずめへ、あとでよろしく<ruby>云<rt>い<\/rt><\/ruby>ってやって<ruby>呉<rt>く<\/rt><\/ruby>れ。さよなら。もうあわないよ。さよなら。」","　よだかは<ruby>泣<rt>な<\/rt><\/ruby>きながら<ruby>自分<rt>じぶん<\/rt><\/ruby>のお<ruby>家<rt>うち<\/rt><\/ruby>へ<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>参<rt>まい<\/rt><\/ruby>りました。みじかい<ruby>夏<rt>なつ<\/rt><\/ruby>の<ruby>夜<rt>よる<\/rt><\/ruby>はもうあけかかっていました。"],"speech":["よだかはまっすぐに、おとうとのかわせみのところへとんでいきました。きれいなかわせみも、ちょうどおきてとおくのやまかじをみていたところでした。そしてよだかのおりてきたのをみていいました。","「にいさん。こんばんは。なんかきゅうのごようですか。」","「いいや、ぼくはこんどとおいところへいくからね、そのまえちょっとおまえにあいにきたよ。」","「にいさん。いっちゃいけませんよ。はちすずめもあんなとおくにいるんですし、ぼくひとりぼっちになってしまうじゃありませんか。」","「それはね。どうもしかたないのだ。もうきょうはなんもいわないでくれ。そしておまえもね、どうしてもとらなければならないときのほかはいたずらにおさかなをとったりしないようにしてくれ。ね、さよなら。」","「にいさん。どうしたんです。まあもうちょっとおまちなさい。」","「いや、いつまでいてもおんなじだ。はちすずめへ、あとでよろしくいってやってくれ。さよなら。もうあわないよ。さよなら。」","よだかはなきながらじぶんのおうちへかえってまいりました。みじかいなつのよるはもうあけかかっていました。"]},{"t":"お日さん","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#d97a3a\"/><circle cx=\"400\" cy=\"230\" r=\"150\" fill=\"#c93a20\" opacity=\"0.93\"/><circle cx=\"400\" cy=\"230\" r=\"187.5\" fill=\"none\" stroke=\"#c93a20\" stroke-width=\"2.5\" opacity=\".35\"/><circle cx=\"400\" cy=\"230\" r=\"190\" fill=\"#e8b45a\" opacity=\"0.2\"/><circle cx=\"400\" cy=\"230\" r=\"230\" fill=\"#e8b45a\" opacity=\"0.1\"/><path d=\"M138.6 113.8 Q160.2 121.0 180 130 Q199.8 121.0 221.4 113.8 Q198.0 135.4 180 139.0 Q162.0 135.4 138.6 113.8 Z\" fill=\"#26231e\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"180\" cy=\"135.4\" rx=\"9.0\" ry=\"5.4\" fill=\"#26231e\"/><polygon points=\"188.1,134.5 196.2,136.3 188.1,138.1\" fill=\"#26231e\"/><path d=\"M60 350 q135.0 -14 300 -2\" fill=\"none\" stroke=\"#e0a05a\" stroke-width=\"10\" opacity=\"0.6\" stroke-linecap=\"round\"/><path d=\"M460 380 q126.0 -14 280 -2\" fill=\"none\" stroke=\"#e0a05a\" stroke-width=\"9\" opacity=\"0.5\" stroke-linecap=\"round\"/><\/svg>","paras":["　<ruby>羊歯<rt>しだ<\/rt><\/ruby>の<ruby>葉<rt>は<\/rt><\/ruby>は、よあけの<ruby>霧<rt>きり<\/rt><\/ruby>を<ruby>吸<rt>す<\/rt><\/ruby>って、<ruby>青<rt>あお<\/rt><\/ruby>くつめたくゆれました。よだかは<ruby>高<rt>たか<\/rt><\/ruby>くきしきしきしと<ruby>鳴<rt>な<\/rt><\/ruby>きました。そして<ruby>巣<rt>す<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>をきちんとかたづけ、きれいにからだ<ruby>中<rt>ちゅう<\/rt><\/ruby>のはねや<ruby>毛<rt>け<\/rt><\/ruby>をそろえて、また<ruby>巣<rt>す<\/rt><\/ruby>から飛び<ruby>出<rt>とびだ<\/rt><\/ruby>しました。","　<ruby>霧<rt>きり<\/rt><\/ruby>がはれて、お<ruby>日<rt>ひ<\/rt><\/ruby>さまが<ruby>丁度<rt>ちょうど<\/rt><\/ruby><ruby>東<rt>ひがし<\/rt><\/ruby>からのぼりました。<ruby>夜<rt>よる<\/rt><\/ruby>だかはぐらぐらするほどまぶしいのをこらえて、<ruby>矢<rt>や<\/rt><\/ruby>のように、そっちへ<ruby>飛<rt>と<\/rt><\/ruby>んで<ruby>行<rt>い<\/rt><\/ruby>きました。","「お<ruby>日<rt>ひ<\/rt><\/ruby>さん、お<ruby>日<rt>ひ<\/rt><\/ruby>さん。どうぞ<ruby>私<rt>わたくし<\/rt><\/ruby>をあなたの<ruby>所<rt>ところ<\/rt><\/ruby>へ<ruby>連<rt>つ<\/rt><\/ruby>れてって<ruby>下<rt>くだ<\/rt><\/ruby>さい。<ruby>灼<rt>や<\/rt><\/ruby>けて<ruby>死<rt>し<\/rt><\/ruby>んでもかまいません。<ruby>私<rt>わたくし<\/rt><\/ruby>のようなみにくいからだでも<ruby>灼<rt>や<\/rt><\/ruby>けるときには<ruby>小<rt>ちい<\/rt><\/ruby>さなひかりを<ruby>出<rt>だ<\/rt><\/ruby>すでしょう。どうか<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>連<rt>つ<\/rt><\/ruby>れてって<ruby>下<rt>くだ<\/rt><\/ruby>さい。」","　<ruby>行<rt>い<\/rt><\/ruby>っても<ruby>行<rt>い<\/rt><\/ruby>っても、お<ruby>日<rt>ひ<\/rt><\/ruby>さまは<ruby>近<rt>ちか<\/rt><\/ruby>くなりませんでした。かえってだんだん<ruby>小<rt>ちい<\/rt><\/ruby>さく<ruby>遠<rt>とお<\/rt><\/ruby>くなりながらお<ruby>日<rt>ひ<\/rt><\/ruby>さまが<ruby>云<rt>い<\/rt><\/ruby>いました。","「お<ruby>前<rt>まえ<\/rt><\/ruby>はよだかだな。なるほど、ずいぶんつらかろう。<ruby>今夜<rt>こんや<\/rt><\/ruby>そらを<ruby>飛<rt>と<\/rt><\/ruby>んで、<ruby>星<rt>ほし<\/rt><\/ruby>にそうたのんでごらん。お<ruby>前<rt>まえ<\/rt><\/ruby>はひるの<ruby>鳥<rt>とり<\/rt><\/ruby>ではないのだからな。」","　<ruby>夜<rt>よる<\/rt><\/ruby>だかはおじぎを<ruby>一<rt>ひと<\/rt><\/ruby>つしたと<ruby>思<rt>おも<\/rt><\/ruby>いましたが、<ruby>急<rt>きゅう<\/rt><\/ruby>にぐらぐらしてとうとう<ruby>野原<rt>のはら<\/rt><\/ruby>の<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>落<rt>お<\/rt><\/ruby>ちてしまいました。そしてまるで<ruby>夢<rt>ゆめ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ているようでした。からだがずうっと<ruby>赤<rt>あか<\/rt><\/ruby>や<ruby>黄<rt>き<\/rt><\/ruby>の<ruby>星<rt>ほし<\/rt><\/ruby>のあいだをのぼって<ruby>行<rt>い<\/rt><\/ruby>ったり、どこまでも<ruby>風<rt>かぜ<\/rt><\/ruby>に<ruby>飛<rt>と<\/rt><\/ruby>ばされたり、<ruby>又<rt>また<\/rt><\/ruby><ruby>鷹<rt>たか<\/rt><\/ruby>が<ruby>来<rt>き<\/rt><\/ruby>てからだをつかんだりしたようでした。"],"speech":["しだのはは、よあけのきりをすって、あおくつめたくゆれました。よだかはたかくきしきしきしとなきました。そしてすのなかをきちんとかたづけ、きれいにからだちゅうのはねやけをそろえて、またすから飛びとびだしました。","きりがはれて、おひさまがちょうどひがしからのぼりました。よるだかはぐらぐらするほどまぶしいのをこらえて、やのように、そっちへとんでいきました。","「おひさん、おひさん。どうぞわたくしをあなたのところへつれてってください。やけてしんでもかまいません。わたくしのようなみにくいからだでもやけるときにはちいさなひかりをだすでしょう。どうかわたくしをつれてってください。」","いってもいっても、おひさまはちかくなりませんでした。かえってだんだんちいさくとおくなりながらおひさまがいいました。","「おまえはよだかだな。なるほど、ずいぶんつらかろう。こんやそらをとんで、ほしにそうたのんでごらん。おまえはひるのとりではないのだからな。」","よるだかはおじぎをひとつしたとおもいましたが、きゅうにぐらぐらしてとうとうのはらのくさのうえにおちてしまいました。そしてまるでゆめをみているようでした。からだがずうっとあかやきのほしのあいだをのぼっていったり、どこまでもかぜにとばされたり、またたかがきてからだをつかんだりしたようでした。"]},{"t":"星々への願い","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#0c1220\"/><g fill=\"#e8ecf4\" opacity=\"0.85\"><circle cx=\"454\" cy=\"262\" r=\"1.2\"/><circle cx=\"591\" cy=\"351\" r=\"1.9\"/><circle cx=\"728\" cy=\"20\" r=\"2.5999999999999996\"/><circle cx=\"125\" cy=\"109\" r=\"1.2\"/><circle cx=\"262\" cy=\"198\" r=\"1.9\"/><circle cx=\"399\" cy=\"287\" r=\"2.5999999999999996\"/><circle cx=\"536\" cy=\"376\" r=\"1.2\"/><circle cx=\"673\" cy=\"45\" r=\"1.9\"/><circle cx=\"70\" cy=\"134\" r=\"2.5999999999999996\"/><circle cx=\"207\" cy=\"223\" r=\"1.2\"/><circle cx=\"344\" cy=\"312\" r=\"1.9\"/><circle cx=\"481\" cy=\"401\" r=\"2.5999999999999996\"/><circle cx=\"618\" cy=\"70\" r=\"1.2\"/><circle cx=\"755\" cy=\"159\" r=\"1.9\"/><circle cx=\"152\" cy=\"248\" r=\"2.5999999999999996\"/><circle cx=\"289\" cy=\"337\" r=\"1.2\"/><circle cx=\"426\" cy=\"426\" r=\"1.9\"/><circle cx=\"563\" cy=\"95\" r=\"2.5999999999999996\"/><circle cx=\"700\" cy=\"184\" r=\"1.2\"/><circle cx=\"97\" cy=\"273\" r=\"1.9\"/><circle cx=\"234\" cy=\"362\" r=\"2.5999999999999996\"/><circle cx=\"371\" cy=\"31\" r=\"1.2\"/><circle cx=\"508\" cy=\"120\" r=\"1.9\"/><circle cx=\"645\" cy=\"209\" r=\"2.5999999999999996\"/><circle cx=\"42\" cy=\"298\" r=\"1.2\"/><circle cx=\"179\" cy=\"387\" r=\"1.9\"/><circle cx=\"316\" cy=\"56\" r=\"2.5999999999999996\"/><circle cx=\"453\" cy=\"145\" r=\"1.2\"/><circle cx=\"590\" cy=\"234\" r=\"1.9\"/><circle cx=\"727\" cy=\"323\" r=\"2.5999999999999996\"/><circle cx=\"124\" cy=\"412\" r=\"1.2\"/><circle cx=\"261\" cy=\"81\" r=\"1.9\"/><circle cx=\"398\" cy=\"170\" r=\"2.5999999999999996\"/><circle cx=\"535\" cy=\"259\" r=\"1.2\"/><\/g><circle cx=\"140\" cy=\"90\" r=\"4.5\" fill=\"#cfe0f0\" opacity=\"1\"/><circle cx=\"190\" cy=\"150\" r=\"4.5\" fill=\"#cfe0f0\" opacity=\"1\"/><circle cx=\"150\" cy=\"210\" r=\"4.5\" fill=\"#cfe0f0\" opacity=\"1\"/><circle cx=\"220\" cy=\"240\" r=\"4.5\" fill=\"#cfe0f0\" opacity=\"1\"/><circle cx=\"250\" cy=\"120\" r=\"4.5\" fill=\"#cfe0f0\" opacity=\"1\"/><line x1=\"140\" y1=\"90\" x2=\"190\" y2=\"150\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"190\" y1=\"150\" x2=\"150\" y2=\"210\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"190\" y1=\"150\" x2=\"250\" y2=\"120\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"150\" y1=\"210\" x2=\"220\" y2=\"240\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><circle cx=\"600\" cy=\"300\" r=\"4\" fill=\"#c9d8f0\" opacity=\"1\"/><circle cx=\"650\" cy=\"340\" r=\"4\" fill=\"#c9d8f0\" opacity=\"1\"/><circle cx=\"700\" cy=\"310\" r=\"4\" fill=\"#c9d8f0\" opacity=\"1\"/><circle cx=\"660\" cy=\"260\" r=\"4\" fill=\"#c9d8f0\" opacity=\"1\"/><line x1=\"600\" y1=\"300\" x2=\"650\" y2=\"340\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"650\" y1=\"340\" x2=\"700\" y2=\"310\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"700\" y1=\"310\" x2=\"660\" y2=\"260\" stroke=\"#5c7ba0\" stroke-width=\"1.6\" opacity=\"0.8\" stroke-linecap=\"round\"/><circle cx=\"660\" cy=\"90\" r=\"7\" fill=\"#e8b45a\" opacity=\"1\"/><circle cx=\"660\" cy=\"90\" r=\"16\" fill=\"#e8b45a\" opacity=\"0.25\"/><path d=\"M349.4 200.2 Q375.8 209.0 400 220 Q424.2 209.0 450.6 200.2 Q422.0 226.6 400 231.0 Q378.0 226.6 349.4 200.2 Z\" fill=\"#3a4652\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><ellipse cx=\"400\" cy=\"226.6\" rx=\"11.0\" ry=\"6.6000000000000005\" fill=\"#3a4652\"/><polygon points=\"409.9,225.5 419.8,227.7 409.9,229.9\" fill=\"#3a4652\"/><\/svg>","paras":["　つめたいものがにわかに<ruby>顔<rt>かお<\/rt><\/ruby>に<ruby>落<rt>お<\/rt><\/ruby>ちました。よだかは<ruby>眼<rt>め<\/rt><\/ruby>をひらきました。<ruby>一<rt>いち<\/rt><\/ruby><ruby>本<rt>ぽん<\/rt><\/ruby>の<ruby>若<rt>わか<\/rt><\/ruby>いすすきの<ruby>葉<rt>は<\/rt><\/ruby>から<ruby>露<rt>つゆ<\/rt><\/ruby>がしたたったのでした。もうすっかり<ruby>夜<rt>よる<\/rt><\/ruby>になって、<ruby>空<rt>そら<\/rt><\/ruby>は<ruby>青<rt>あお<\/rt><\/ruby>ぐろく、<ruby>一面<rt>いちめん<\/rt><\/ruby>の<ruby>星<rt>ほし<\/rt><\/ruby>がまたたいていました。よだかはそらへ<ruby>飛<rt>と<\/rt><\/ruby>びあがりました。<ruby>今夜<rt>こんや<\/rt><\/ruby>も<ruby>山<rt>やま<\/rt><\/ruby>やけの<ruby>火<rt>ひ<\/rt><\/ruby>はまっかです。よだかはその<ruby>火<rt>ひ<\/rt><\/ruby>のかすかな<ruby>照<rt>て<\/rt><\/ruby>りと、つめたいほしあかりの<ruby>中<rt>なか<\/rt><\/ruby>をとびめぐりました。それからもう<ruby>一<rt>いち<\/rt><\/ruby>ぺん<ruby>飛<rt>と<\/rt><\/ruby>びめぐりました。そして思い<ruby>切<rt>おもいき<\/rt><\/ruby>って<ruby>西<rt>にし<\/rt><\/ruby>のそらのあの<ruby>美<rt>うつく<\/rt><\/ruby>しいオリオンの<ruby>星<rt>ほし<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>に、まっすぐに<ruby>飛<rt>と<\/rt><\/ruby>びながら<ruby>叫<rt>さけ<\/rt><\/ruby>びました。","「お<ruby>星<rt>ほし<\/rt><\/ruby>さん。<ruby>西<rt>にし<\/rt><\/ruby>の<ruby>青<rt>あお<\/rt><\/ruby>じろいお<ruby>星<rt>ほし<\/rt><\/ruby>さん。どうか<ruby>私<rt>わたくし<\/rt><\/ruby>をあなたのところへ<ruby>連<rt>つ<\/rt><\/ruby>れてって<ruby>下<rt>くだ<\/rt><\/ruby>さい。<ruby>灼<rt>や<\/rt><\/ruby>けて<ruby>死<rt>し<\/rt><\/ruby>んでもかまいません。」","　オリオンは<ruby>勇<rt>いさ<\/rt><\/ruby>ましい<ruby>歌<rt>うた<\/rt><\/ruby>をつづけながらよだかなどはてんで<ruby>相手<rt>あいて<\/rt><\/ruby>にしませんでした。よだかは<ruby>泣<rt>な<\/rt><\/ruby>きそうになって、よろよろと<ruby>落<rt>お<\/rt><\/ruby>ちて、それからやっとふみとまって、もう<ruby>一<rt>いち<\/rt><\/ruby>ぺんとびめぐりました。それから、<ruby>南<rt>みなみ<\/rt><\/ruby>の<ruby>大犬座<rt>おおいぬざ<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へまっすぐに<ruby>飛<rt>と<\/rt><\/ruby>びながら<ruby>叫<rt>さけ<\/rt><\/ruby>びました。","「お<ruby>星<rt>ほし<\/rt><\/ruby>さん。<ruby>南<rt>みなみ<\/rt><\/ruby>の<ruby>青<rt>あお<\/rt><\/ruby>いお<ruby>星<rt>ほし<\/rt><\/ruby>さん。どうか<ruby>私<rt>わたくし<\/rt><\/ruby>をあなたの<ruby>所<rt>ところ<\/rt><\/ruby>へつれてって<ruby>下<rt>くだ<\/rt><\/ruby>さい。やけて<ruby>死<rt>し<\/rt><\/ruby>んでもかまいません。」","　<ruby>大犬<rt>おおいぬ<\/rt><\/ruby>は<ruby>青<rt>あお<\/rt><\/ruby>や<ruby>紫<rt>むらさき<\/rt><\/ruby>や<ruby>黄<rt>き<\/rt><\/ruby>やうつくしくせわしくまたたきながら<ruby>云<rt>い<\/rt><\/ruby>いました。","「<ruby>馬鹿<rt>ばか<\/rt><\/ruby>を<ruby>云<rt>い<\/rt><\/ruby>うな。おまえなんか<ruby>一体<rt>いったい<\/rt><\/ruby>どんなものだい。たかが<ruby>鳥<rt>とり<\/rt><\/ruby>じゃないか。おまえのはねでここまで<ruby>来<rt>く<\/rt><\/ruby>るには、<ruby>億<rt>おく<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby><ruby>兆<rt>ちょう<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby><ruby>億<rt>おく<\/rt><\/ruby><ruby>兆<rt>ちょう<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>だ。」そしてまた<ruby>別<rt>べつ<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>を<ruby>向<rt>む<\/rt><\/ruby>きました。","　よだかはがっかりして、よろよろ<ruby>落<rt>お<\/rt><\/ruby>ちて、それから<ruby>又<rt>また<\/rt><\/ruby><ruby>二<rt>に<\/rt><\/ruby>へん<ruby>飛<rt>と<\/rt><\/ruby>びめぐりました。それから<ruby>又<rt>また<\/rt><\/ruby>思い<ruby>切<rt>おもいき<\/rt><\/ruby>って<ruby>北<rt>きた<\/rt><\/ruby>の<ruby>大熊星<rt>おおぐまぼし<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>へまっすぐに<ruby>飛<rt>と<\/rt><\/ruby>びながら<ruby>叫<rt>さけ<\/rt><\/ruby>びました。","「<ruby>北<rt>きた<\/rt><\/ruby>の<ruby>青<rt>あお<\/rt><\/ruby>いお<ruby>星<rt>ほし<\/rt><\/ruby>さま、あなたの<ruby>所<rt>ところ<\/rt><\/ruby>へどうか<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>連<rt>つ<\/rt><\/ruby>れてって<ruby>下<rt>くだ<\/rt><\/ruby>さい。」","　<ruby>大熊<rt>おおくま<\/rt><\/ruby><ruby>星<rt>ほし<\/rt><\/ruby>はしずかに<ruby>云<rt>い<\/rt><\/ruby>いました。","「<ruby>余計<rt>よけい<\/rt><\/ruby>なことを<ruby>考<rt>かんが<\/rt><\/ruby>えるものではない。<ruby>少<rt>すこ<\/rt><\/ruby>し<ruby>頭<rt>あたま<\/rt><\/ruby>をひやして<ruby>来<rt>き<\/rt><\/ruby>なさい。そう<ruby>云<rt>い<\/rt><\/ruby>うときは、<ruby>氷山<rt>ひょうざん<\/rt><\/ruby>の<ruby>浮<rt>う<\/rt><\/ruby>いている<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へ<ruby>飛<rt>と<\/rt><\/ruby>び<ruby>込<rt>こ<\/rt><\/ruby>むか、<ruby>近<rt>ちか<\/rt><\/ruby>くに<ruby>海<rt>うみ<\/rt><\/ruby>がなかったら、<ruby>氷<rt>こおり<\/rt><\/ruby>をうかべたコップの<ruby>水<rt>みず<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へ飛び<ruby>込<rt>とびこ<\/rt><\/ruby>むのが<ruby>一<rt>いち<\/rt><\/ruby><ruby>等<rt>とう<\/rt><\/ruby>だ。」","　よだかはがっかりして、よろよろ<ruby>落<rt>お<\/rt><\/ruby>ちて、それから<ruby>又<rt>また<\/rt><\/ruby>、<ruby>四<rt>よん<\/rt><\/ruby>へんそらをめぐりました。そしてもう<ruby>一度<rt>いちど<\/rt><\/ruby>、<ruby>東<rt>ひがし<\/rt><\/ruby>から<ruby>今<rt>いま<\/rt><\/ruby>のぼった<ruby>天<rt>あま<\/rt><\/ruby>の<ruby>川<rt>がわ<\/rt><\/ruby>の向う<ruby>岸<rt>むこうぎし<\/rt><\/ruby>の<ruby>鷲<rt>わし<\/rt><\/ruby>の<ruby>星<rt>ほし<\/rt><\/ruby>に<ruby>叫<rt>さけ<\/rt><\/ruby>びました。","「<ruby>東<rt>ひがし<\/rt><\/ruby>の<ruby>白<rt>しろ<\/rt><\/ruby>いお<ruby>星<rt>ほし<\/rt><\/ruby>さま、どうか<ruby>私<rt>わたくし<\/rt><\/ruby>をあなたの<ruby>所<rt>ところ<\/rt><\/ruby>へ<ruby>連<rt>つ<\/rt><\/ruby>れてって<ruby>下<rt>くだ<\/rt><\/ruby>さい。やけて<ruby>死<rt>し<\/rt><\/ruby>んでもかまいません。」","　<ruby>鷲<rt>わし<\/rt><\/ruby>は<ruby>大風<rt>おおふう<\/rt><\/ruby>に<ruby>云<rt>い<\/rt><\/ruby>いました。","「いいや、とてもとても、<ruby>話<rt>はなし<\/rt><\/ruby>にも<ruby>何<rt>なん<\/rt><\/ruby>にもならん。<ruby>星<rt>ほし<\/rt><\/ruby>になるには、それ<ruby>相応<rt>そうおう<\/rt><\/ruby>の<ruby>身分<rt>みぶん<\/rt><\/ruby>でなくちゃいかん。<ruby>又<rt>また<\/rt><\/ruby>よほど<ruby>金<rt>かね<\/rt><\/ruby>もいるのだ。」"],"speech":["つめたいものがにわかにかおにおちました。よだかはめをひらきました。いちぽんのわかいすすきのはからつゆがしたたったのでした。もうすっかりよるになって、そらはあおぐろく、いちめんのほしがまたたいていました。よだかはそらへとびあがりました。こんやもやまやけのひはまっかです。よだかはそのひのかすかなてりと、つめたいほしあかりのなかをとびめぐりました。それからもういちぺんとびめぐりました。そして思いおもいきってにしのそらのあのうつくしいオリオンのほしのほうに、まっすぐにとびながらさけびました。","「おほしさん。にしのあおじろいおほしさん。どうかわたくしをあなたのところへつれてってください。やけてしんでもかまいません。」","オリオンはいさましいうたをつづけながらよだかなどはてんであいてにしませんでした。よだかはなきそうになって、よろよろとおちて、それからやっとふみとまって、もういちぺんとびめぐりました。それから、みなみのおおいぬざのほうへまっすぐにとびながらさけびました。","「おほしさん。みなみのあおいおほしさん。どうかわたくしをあなたのところへつれてってください。やけてしんでもかまいません。」","おおいぬはあおやむらさきやきやうつくしくせわしくまたたきながらいいました。","「ばかをいうな。おまえなんかいったいどんなものだい。たかがとりじゃないか。おまえのはねでここまでくるには、おくねんちょうねんおくちょうねんだ。」そしてまたべつのほうをむきました。","よだかはがっかりして、よろよろおちて、それからまたにへんとびめぐりました。それからまた思いおもいきってきたのおおぐまぼしのほうへまっすぐにとびながらさけびました。","「きたのあおいおほしさま、あなたのところへどうかわたくしをつれてってください。」","おおくまほしはしずかにいいました。","「よけいなことをかんがえるものではない。すこしあたまをひやしてきなさい。そういうときは、ひょうざんのういているうみのなかへとびこむか、ちかくにうみがなかったら、こおりをうかべたコップのみずのなかへ飛びとびこむのがいちとうだ。」","よだかはがっかりして、よろよろおちて、それからまた、よんへんそらをめぐりました。そしてもういちど、ひがしからいまのぼったあまのがわの向うむこうぎしのわしのほしにさけびました。","「ひがしのしろいおほしさま、どうかわたくしをあなたのところへつれてってください。やけてしんでもかまいません。」","わしはおおふうにいいました。","「いいや、とてもとても、はなしにもなんにもならん。ほしになるには、それそうおうのみぶんでなくちゃいかん。またよほどかねもいるのだ。」"]},{"t":"よだかの星","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#0a0f1d\"/><g fill=\"#dfe8f4\" opacity=\"0.9\"><circle cx=\"85\" cy=\"39\" r=\"1.2\"/><circle cx=\"222\" cy=\"128\" r=\"1.9\"/><circle cx=\"359\" cy=\"217\" r=\"2.5999999999999996\"/><circle cx=\"496\" cy=\"306\" r=\"1.2\"/><circle cx=\"633\" cy=\"395\" r=\"1.9\"/><circle cx=\"30\" cy=\"44\" r=\"2.5999999999999996\"/><circle cx=\"167\" cy=\"133\" r=\"1.2\"/><circle cx=\"304\" cy=\"222\" r=\"1.9\"/><circle cx=\"441\" cy=\"311\" r=\"2.5999999999999996\"/><circle cx=\"578\" cy=\"400\" r=\"1.2\"/><circle cx=\"715\" cy=\"49\" r=\"1.9\"/><circle cx=\"112\" cy=\"138\" r=\"2.5999999999999996\"/><circle cx=\"249\" cy=\"227\" r=\"1.2\"/><circle cx=\"386\" cy=\"316\" r=\"1.9\"/><circle cx=\"523\" cy=\"405\" r=\"2.5999999999999996\"/><circle cx=\"660\" cy=\"54\" r=\"1.2\"/><circle cx=\"57\" cy=\"143\" r=\"1.9\"/><circle cx=\"194\" cy=\"232\" r=\"2.5999999999999996\"/><circle cx=\"331\" cy=\"321\" r=\"1.2\"/><circle cx=\"468\" cy=\"410\" r=\"1.9\"/><circle cx=\"605\" cy=\"59\" r=\"2.599999999999 452\" y2=\"222\" stroke=\"#e8f0ff\" stroke-width=\"2\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"400\" y1=\"170\" x2=\"348\" y2=\"222\" stroke=\"#e8f0ff\" stroke-width=\"2\" opacity=\"0.8\" stroke-linecap=\"round\"/><line x1=\"400\" y1=\"170\" x2=\"452\" y2=\"118\" stroke=\"#e8f0ff\" stroke-width=\"2\" opacity=\"0.8\" stroke-linecap=\"round\"/><\/svg>","paras":["　よだかはもうすっかり<ruby>力<rt>ちから<\/rt><\/ruby>を<ruby>落<rt>おと<\/rt><\/ruby>してしまって、はねを<ruby>閉<rt>と<\/rt><\/ruby>じて、<ruby>地<rt>ち<\/rt><\/ruby>に<ruby>落<rt>お<\/rt><\/ruby>ちて<ruby>行<rt>い<\/rt><\/ruby>きました。そしてもう<ruby>一<rt>いち<\/rt><\/ruby><ruby>尺<rt>しゃく<\/rt><\/ruby>で<ruby>地面<rt>じめん<\/rt><\/ruby>にその<ruby>弱<rt>よわ<\/rt><\/ruby>い<ruby>足<rt>あし<\/rt><\/ruby>がつくというとき、よだかは<ruby>俄<rt>にわ<\/rt><\/ruby>かにのろしのようにそらへとびあがりました。そらのなかほどへ<ruby>来<rt>き<\/rt><\/ruby>て、よだかはまるで<ruby>鷲<rt>わし<\/rt><\/ruby>が<ruby>熊<rt>くま<\/rt><\/ruby>を<ruby>襲<rt>おそ<\/rt><\/ruby>うときするように、ぶるっとからだをゆすって<ruby>毛<rt>け<\/rt><\/ruby>をさかだてました。","　それからキシキシキシキシキシッと<ruby>高<rt>たか<\/rt><\/ruby>く<ruby>高<rt>たか<\/rt><\/ruby>く<ruby>叫<rt>さけ<\/rt><\/ruby>びました。その<ruby>声<rt>こえ<\/rt><\/ruby>はまるで<ruby>鷹<rt>たか<\/rt><\/ruby>でした。<ruby>野原<rt>のはら<\/rt><\/ruby>や<ruby>林<rt>はやし<\/rt><\/ruby>にねむっていたほかのとりは、みんな<ruby>目<rt>め<\/rt><\/ruby>をさまして、ぶるぶるふるえながら、いぶかしそうにほしぞらを<ruby>見<rt>み<\/rt><\/ruby>あげました。","　<ruby>夜<rt>よる<\/rt><\/ruby>だかは、どこまでも、どこまでも、まっすぐに<ruby>空<rt>そら<\/rt><\/ruby>へのぼって<ruby>行<rt>い<\/rt><\/ruby>きました。もう<ruby>山<rt>やま<\/rt><\/ruby><ruby>焼<rt>や<\/rt><\/ruby>けの<ruby>火<rt>ひ<\/rt><\/ruby>はたばこの<ruby>吸殻<rt>すいがら<\/rt><\/ruby>のくらいにしか<ruby>見<rt>み<\/rt><\/ruby>えません。よだかはのぼってのぼって<ruby>行<rt>い<\/rt><\/ruby>きました。","　<ruby>寒<rt>さむ<\/rt><\/ruby>さにいきはむねに<ruby>白<rt>しろ<\/rt><\/ruby>く<ruby>凍<rt>こお<\/rt><\/ruby>りました。<ruby>空気<rt>くうき<\/rt><\/ruby>がうすくなった<ruby>為<rt>ため<\/rt><\/ruby>に、はねをそれはそれはせわしくうごかさなければなりませんでした。","　それだのに、ほしの<ruby>大<rt>おお<\/rt><\/ruby>きさは、さっきと<ruby>少<rt>すこ<\/rt><\/ruby>しも<ruby>変<rt>かわ<\/rt><\/ruby>りません。つくいきはふいごのようです。<ruby>寒<rt>さむ<\/rt><\/ruby>さや<ruby>霜<rt>しも<\/rt><\/ruby>がまるで<ruby>剣<rt>けん<\/rt><\/ruby>のようによだかを<ruby>刺<rt>さ<\/rt><\/ruby>しました。よだかははねがすっかりしびれてしまいました。そしてなみだぐんだ<ruby>目<rt>め<\/rt><\/ruby>をあげてもう<ruby>一<rt>いち<\/rt><\/ruby>ぺんそらを<ruby>見<rt>み<\/rt><\/ruby>ました。そうです。これがよだかの<ruby>最後<rt>さいご<\/rt><\/ruby>でした。もうよだかは<ruby>落<rt>お<\/rt><\/ruby>ちているのか、のぼっているのか、さかさになっているのか、<ruby>上<rt>うえ<\/rt><\/ruby>を<ruby>向<rt>む<\/rt><\/ruby>いているのかも、わかりませんでした。ただこころもちはやすらかに、その<ruby>血<rt>ち<\/rt><\/ruby>のついた<ruby>大<rt>おお<\/rt><\/ruby>きなくちばしは、<ruby>横<rt>よこ<\/rt><\/ruby>にまがっては<ruby>居<rt>い<\/rt><\/ruby>ましたが、たしかに<ruby>少<rt>すこ<\/rt><\/ruby>しわらって<ruby>居<rt>お<\/rt><\/ruby>りました。","　それからしばらくたってよだかははっきりまなこをひらきました。そして<ruby>自分<rt>じぶん<\/rt><\/ruby>のからだがいま<ruby>燐<rt>りん<\/rt><\/ruby>の<ruby>火<rt>ひ<\/rt><\/ruby>のような<ruby>青<rt>あお<\/rt><\/ruby>い<ruby>美<rt>うつく<\/rt><\/ruby>しい<ruby>光<rt>ひかり<\/rt><\/ruby>になって、しずかに<ruby>燃<rt>も<\/rt><\/ruby>えているのを<ruby>見<rt>み<\/rt><\/ruby>ました。","　すぐとなりは、カシオピア<ruby>座<rt>ざ<\/rt><\/ruby>でした。天の<ruby>川<rt>あまのがわ<\/rt><\/ruby>の<ruby>青<rt>あお<\/rt><\/ruby>じろいひかりが、すぐうしろになっていました。","　そしてよだかの<ruby>星<rt>ほし<\/rt><\/ruby>は<ruby>燃<rt>も<\/rt><\/ruby>えつづけました。いつまでもいつまでも<ruby>燃<rt>も<\/rt><\/ruby>えつづけました。","　<ruby>今<rt>いま<\/rt><\/ruby>でもまだ<ruby>燃<rt>も<\/rt><\/ruby>えています。"],"speech":["よだかはもうすっかりちからをおとしてしまって、はねをとじて、ちにおちていきました。そしてもういちしゃくでじめんにそのよわいあしがつくというとき、よだかはにわかにのろしのようにそらへとびあがりました。そらのなかほどへきて、よだかはまるでわしがくまをおそうときするように、ぶるっとからだをゆすってけをさかだてました。","それからキシキシキシキシキシッとたかくたかくさけびました。そのこえはまるでたかでした。のはらやはやしにねむっていたほかのとりは、みんなめをさまして、ぶるぶるふるえながら、いぶかしそうにほしぞらをみあげました。","よるだかは、どこまでも、どこまでも、まっすぐにそらへのぼっていきました。もうやまやけのひはたばこのすいがらのくらいにしかみえません。よだかはのぼってのぼっていきました。","さむさにいきはむねにしろくこおりました。くうきがうすくなったために、はねをそれはそれはせわしくうごかさなければなりませんでした。","それだのに、ほしのおおきさは、さっきとすこしもかわりません。つくいきはふいごのようです。さむさやしもがまるでけんのようによだかをさしました。よだかははねがすっかりしびれてしまいました。そしてなみだぐんだめをあげてもういちぺんそらをみました。そうです。これがよだかのさいごでした。もうよだかはおちているのか、のぼっているのか、さかさになっているのか、うえをむいているのかも、わかりませんでした。ただこころもちはやすらかに、そのちのついたおおきなくちばしは、よこにまがってはいましたが、たしかにすこしわらっておりました。","それからしばらくたってよだかははっきりまなこをひらきました。そしてじぶんのからだがいまりんのひのようなあおいうつくしいひかりになって、しずかにもえているのをみました。","すぐとなりは、カシオピアざでした。天のあまのがわのあおじろいひかりが、すぐうしろになっていました。","そしてよだかのほしはもえつづけました。いつまでもいつまでももえつづけました。","いまでもまだもえています。"]}]},{"id":"lemon","title":"檸檬","author":"梶井基次郎","mins":12,"cover":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#2e2a30\"/><rect x=\"16\" y=\"16\" width=\"768\" height=\"418\" fill=\"none\" stroke=\"#e8c93a\" stroke-width=\"4\"/><rect x=\"27\" y=\"27\" width=\"746\" height=\"396\" fill=\"none\" stroke=\"#8a8070\" stroke-width=\"1.5\"/><rect x=\"430\" y=\"240\" width=\"220\" height=\"26\" fill=\"#6e2a34\" rx=\"1\" opacity=\"1\"/><rect x=\"434\" y=\"214\" width=\"212\" height=\"26\" fill=\"#33506e\" rx=\"1\" opacity=\"1\"/><rect x=\"438\" y=\"188\" width=\"204\" height=\"26\" fill=\"#3f5a44\" rx=\"1\" opacity=\"1\"/><rect x=\"442\" y=\"162\" width=\"196\" height=\"26\" fill=\"#5c4a6e\" rx=\"1\" opacity=\"1\"/><rect x=\"446\" y=\"136\" width=\"188\" height=\"26\" fill=\"#8a5a33\" rx=\"1\" opacity=\"1\"/><rect x=\"450\" y=\"110\" width=\"180\" height=\"26\" fill=\"#26364a\" rx=\"1\" opacity=\"1\"/><g transform=\"translate(560 200)\"><ellipse rx=\"44.2\" ry=\"31.200000000000003\" fill=\"#e8c93a\"/><polygon points=\"-44.2,0 -57.2,-5.2 -44.2,6.5\" fill=\"#e8c93a\"/><polygon points=\"44.2,0 57.2,5.2 44.2,-6.5\" fill=\"#e8c93a\"/><ellipse cx=\"-10.4\" cy=\"-10.4\" rx=\"13.0\" ry=\"6.5\" fill=\"#f4e08a\" opacity=\".8\"/><\/g><circle cx=\"560\" cy=\"200\" r=\"60\" fill=\"#e8c93a\" opacity=\"0.18\"/><text x=\"210\" y=\"58\" font-size=\"56\" fill=\"#e8e2d6\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">檸檬<\/text><text x=\"148\" y=\"70\" font-size=\"22\" fill=\"#e8e2d6\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">梶井基次郎<\/text><\/svg>","scenes":[{"t":"表紙","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#2e2a30\"/ <ruby>好<rt>す<\/rt><\/ruby>きであった<ruby>所<rt>ところ<\/rt><\/ruby>は、たとえば<ruby>丸善<rt>まるぜん<\/rt><\/ruby>であった。<ruby>赤<rt>あか<\/rt><\/ruby>や<ruby>黄<rt>き<\/rt><\/ruby>のオードコロンやオードキニン。<ruby>洒落<rt>しゃれ<\/rt><\/ruby>た<ruby>切子<rt>きりこ<\/rt><\/ruby><ruby>細工<rt>さいく<\/rt><\/ruby>や<ruby>典雅<rt>てんが<\/rt><\/ruby>なロココ<ruby>趣味<rt>しゅみ<\/rt><\/ruby>の<ruby>浮<rt>うき<\/rt><\/ruby><ruby>模様<rt>もよう<\/rt><\/ruby>を<ruby>持<rt>も<\/rt><\/ruby>った<ruby>琥珀<rt>こはく<\/rt><\/ruby><ruby>色<rt>しょく<\/rt><\/ruby>や<ruby>翡翠色<rt>ひすいいろ<\/rt><\/ruby>の<ruby>香水壜<rt>こうすいびん<\/rt><\/ruby>。<ruby>煙管<rt>きせる<\/rt><\/ruby>、<ruby>小刀<rt>しょうとう<\/rt><\/ruby>、<ruby>石鹸<rt>せっけん<\/rt><\/ruby>、<ruby>煙草<rt>たばこ<\/rt><\/ruby>。<ruby>私<rt>わたくし<\/rt><\/ruby>はそんなものを<ruby>見<rt>み<\/rt><\/ruby>るのに<ruby>小<rt>さ<\/rt><\/ruby><ruby>一<rt>いち<\/rt><\/ruby><ruby>時間<rt>じかん<\/rt><\/ruby>も<ruby>費<rt>ついや<\/rt><\/ruby>すことがあった。そして<ruby>結局<rt>けっきょく<\/rt><\/ruby><ruby>一<rt>いち<\/rt><\/ruby><ruby>等<rt>とう<\/rt><\/ruby>いい<ruby>鉛筆<rt>えんぴつ<\/rt><\/ruby>を<ruby>一<rt>いち<\/rt><\/ruby><ruby>本<rt>ぽん<\/rt><\/ruby><ruby>買<rt>か<\/rt><\/ruby>うくらいの<ruby>贅沢<rt>ぜいたく<\/rt><\/ruby>をするのだった。しかしここももうその<ruby>頃<rt>ころ<\/rt><\/ruby>の<ruby>私<rt>わたくし<\/rt><\/ruby>にとっては<ruby>重<rt>おも<\/rt><\/ruby>くるしい<ruby>場所<rt>ばしょ<\/rt><\/ruby>に<ruby>過<rt>す<\/rt><\/ruby>ぎなかった。<ruby>書籍<rt>しょせき<\/rt><\/ruby>、<ruby>学生<rt>がくせい<\/rt><\/ruby>、<ruby>勘定<rt>かんじょう<\/rt><\/ruby><ruby>台<rt>だい<\/rt><\/ruby>、これらはみな<ruby>借金取<rt>しゃっきんと<\/rt><\/ruby>りの<ruby>亡霊<rt>ぼうれい<\/rt><\/ruby>のように<ruby>私<rt>わたくし<\/rt><\/ruby>には<ruby>見<rt>み<\/rt><\/ruby>えるのだった。"],"speech":["えたいのしれないふきつなかたまりがわたくしのこころをしじゅうおさえつけていた。しょうそうといおうか、けんおといおうか――さけをのんだあとにふつかよいがあるように、さけをまいにちのんでいるとしゅくすいにそうとうしたじきがやってくる。それがきたのだ。これはちょっといけなかった。けっかしたはいせんカタルやしんけいすいじゃくがいけないのではない。またせをやくようなしゃっきんなどがいけないのではない。いけないのはそのふきつなかたまりだ。いぜんわたくしをよろこばせたどんなうつくしいおんがくも、どんなうつくしいしのいっせつもしんぼうがならなくなった。ちくおんきをきかせてもらいにわざわざでかけていっても、さいしょのにさんしょうせつでふいに立ちたちあがってしまいたくなる。なんかがわたくしをいたたまらずさせるのだ。それでしじゅうわたくしはまちからまちをふろうしつづけていた。","なぜだかそのころわたくしはみすぼらしくてうつくしいものにつよくひきつけられたのをおぼえている。ふうけいにしてもこわれかかったまちだとか、そのまちにしてもよそよそしいおもてどおりよりもどこかしたしみのある、きたないせんたくものがほしてあったりがらくたがころがしてあったりむさくるしいへやがのぞいていたりするうらどおりがすきであった。あめやかぜがむしばんでやがてつちにかえってしまう、といったようなおもむきのあるまちで、どべいがくずれていたりいえなみがかたむきかかっていたり――いきおいのいいのはしょくぶつだけで、ときとするとびっくりさせるようなひまわりがあったりカンナがさいていたりする。","ときどきわたくしはそんなじをあるきながら、ふと、そこがきょうとではなくてきょうとからなんびゃくりもはなれたせんだいとかながさきとか――そのようなしへこんじぶんがきているのだ――というさっかくをおこそうとつとめる。わたくしは、できることならきょうとから逃げにげだしてだれひとりしらないようなしへいってしまいたかった。だいいちにあんせい。がらんとしたりょかんのいっしつ。せいじょうなふとん。においのいいかやとのりのよくきいたゆかた。そこでいちがつほどなんもおもわずよこになりたい。ねがわくはここがいつのあいだにかそのしになっているのだったら。――さっかくがようやくせいこうしはじめるとわたくしはそれからそれへそうぞうのえのぐをぬりつけてゆく。なんのことはない、わたくしのさっかくとこわれかかったまちとのにじゅううつしである。そしてわたくしはそのなかにげんじつのわたしじしんをみうしなうのをたのしんだ。","わたくしはまたあのはなびというやつがすきになった。はなびそのものはだいにだんとして、あのやすっぽいえのぐであかやむらさきやきやあおや、さまざまのしまもようをもったはなびのたば、なかやまてらのほしおり、はなかっせん、かれすすき。それからねずみはなびというのはひとつずつわになっていてばこにつめてある。そんなものがへんにわたくしのこころをそそった。","それからまた、びいどろといういろガラスでたいやはなを打ちうちだしてあるおはじきがすきになったし、なんきんだまがすきになった。またそれをなめてみるのがわたくしにとってなんともいえないきょうらくだったのだ。あのびいどろのあじほどかすかなすずしいあじがあるものか。わたくしはおさないときよくそれをくちにいれてはふぼにしかられたものだが、そのようじのあまいきおくがおおきくなっておちぶれたわたくしによみがえってくるせいだろうか、まったくあのあじにはかすかなさわやかななんとなくうたみといったようなみかくがただよってくる。","さっしはつくだろうがわたくしにはまるでかねがなかった。とはいえそんなものをみてすこしでもこころのうごきかけたときのわたしじしんをなぐさめるためにはぜいたくということがひつようであった。にせんやさんせんのもの――といってぜいたくなもの。うつくしいもの――といってむきりょくなわたくしのしょっかくにむしろこびてくるもの。――そういったものがしぜんわたくしをなぐさめるのだ。","せいかつがまだむしばまれていなかったいぜんわたくしのすきであったところは、たとえばまるぜんであった。あかやきのオードコロンやオードキニン。しゃれたきりこさいくやてんがなロココしゅみのうきもようをもったこはくしょくやひすいいろのこうすいびん。きせる、しょうとう、せっけん、たばこ。わたくしはそんなものをみるのにさいちじかんもついやすことがあった。そしてけっきょくいちとういいえんぴつをいちぽんかうくらいのぜいたくをするのだった。しかしここももうそのころのわたくしにとってはおもくるしいばしょにすぎなかった。しょせき、がくせい、かんじょうだい、これらはみなしゃっきんとりのぼうれいのようにわたくしにはみえるのだった。"]},{"t":"果物屋の夜","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#17130f\"/><rect x=\"160\" y=\"120\" width=\"480\" height=\"330\" fill=\"#2e2622\" rx=\"0\" opacity=\"1\"/><rect x=\"190\" y=\"150\" width=\"420\" height=\"60\" fill=\"#3f2f24\" rx=\"0\" opacity=\"1\"/><rect x=\"190\" y=\"230\" width=\"420\" height=\"60\" fill=\"#3f2f24\" rx=\"0\" opacity=\"1\"/><rect x=\"190\" y=\"310\" width=\"420\" h t><\/ruby>の<ruby>詰<rt>つ<\/rt><\/ruby>まった<ruby>紡錘形<rt>ぼうすいけい<\/rt><\/ruby>の<ruby>恰好<rt>かっこう<\/rt><\/ruby>も。――<ruby>結局<rt>けっきょく<\/rt><\/ruby><ruby>私<rt>わたくし<\/rt><\/ruby>はそれを<ruby>一<rt>ひと<\/rt><\/ruby>つだけ<ruby>買<rt>か<\/rt><\/ruby>うことにした。それからの<ruby>私<rt>わたくし<\/rt><\/ruby>はどこへどう<ruby>歩<rt>ある<\/rt><\/ruby>いたのだろう。<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>長<rt>なが<\/rt><\/ruby>い<ruby>間<rt>ま<\/rt><\/ruby><ruby>街<rt>がい<\/rt><\/ruby>を<ruby>歩<rt>ある<\/rt><\/ruby>いていた。<ruby>始終<rt>しじゅう<\/rt><\/ruby><ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>圧<rt>おさ<\/rt><\/ruby>えつけていた<ruby>不吉<rt>ふきつ<\/rt><\/ruby>な<ruby>塊<rt>かたまり<\/rt><\/ruby>がそれを<ruby>握<rt>にぎ<\/rt><\/ruby>った<ruby>瞬間<rt>しゅんかん<\/rt><\/ruby>からいくらか<ruby>弛<rt>ゆる<\/rt><\/ruby>んで<ruby>来<rt>き<\/rt><\/ruby>たとみえて、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>街<rt>まち<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>で<ruby>非常<rt>ひじょう<\/rt><\/ruby>に<ruby>幸福<rt>こうふく<\/rt><\/ruby>であった。あんなに<ruby>執拗<rt>しつこ<\/rt><\/ruby>かった<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>が、そんなものの<ruby>一顆<rt>いっか<\/rt><\/ruby>で<ruby>紛<rt>まぎ<\/rt><\/ruby>らされる――あるいは<ruby>不審<rt>ふしん<\/rt><\/ruby>なことが、<ruby>逆説的<rt>ぎゃくせつてき<\/rt><\/ruby>なほんとうであった。それにしても<ruby>心<rt>こころ<\/rt><\/ruby>というやつはなんという<ruby>不可思議<rt>ふかしぎ<\/rt><\/ruby>なやつだろう。"],"speech":["あるあさ――そのころわたくしはこうのともだちからおつのともだちへというふうにともだちのげしゅくをてんてんとしてくらしていたのだが――ともだちががっこうへでてしまったあとのくうきょなくうきのなかにぽつねんとひとり取りとりのこされた。わたくしはまたそこからさまよいでなければならなかった。なんかがわたくしをおいたてる。そしてまちからまちへ、さきにいったようなうらどおりをあるいたり、だがしやのまえでたちどまったり、かんぶつやのほしえびやぼうだらやゆばをながめたり、とうとうわたくしはにじょうのほうへてらまちをさがり、そこのくだものやであしをとめた。ここでちょっとそのくだものやをしょうかいしたいのだが、そのくだものやはわたくしのしっていたはんいでもっともすきなみせであった。そこはけっしてりっぱなみせではなかったのだが、くだものやこゆうのうつくしさがもっともろこつにかんぜられた。くだものはかなりこうばいのきゅうなだいのうえにならべてあって、そのだいというのもふるびたくろいうるしぬりのいただったようにおもえる。なんかはなやかなうつくしいおんがくのアッレグロのながれが、みるひとをいしにかしたというゴルゴンのきめん――てきなものをさしつけられて、あんなしきさいやあんなヴォリウムにこりかたまったというふうにくだものはならんでいる。あおものもやはりおくへゆけばゆくほどうずたかくつまれている。――じっさいあそこのにんじんばのうつくしさなどはすばらしかった。それからみずにつけてあるまめだとかくわいだとか。","またそこのいえのうつくしいのはよるだった。てらまちつうはいったいににぎやかなとおりで――といってかんじはとうきょうやおおさかよりはずっとすんでいるが――かざりまどのひかりがおびただしくがいろへ流れながれでている。それがどうしたわけかそのてんとうのしゅういだけがみょうにくらいのだ。もともとかたほうはくらいにじょうどおりにせっしているまちかどになっているので、くらいのはとうぜんであったが、そのりんかがてらまちつうにあるいえにもかかわらずくらかったのがはっきりしない。しかしそのいえがくらくなかったら、あんなにもわたくしをゆうわくするにはいたらなかったとおもう。もうひとつはそのいえの打ちうちだしたひさしなのだが、そのひさしがまぶかにかんむりったぼうしのひさしのように――これはけいようというよりも、「おや、あそこのみせはぼうしのひさしをやけにさげているぞ」とおもわせるほどなので、ひさしのうえはこれもまっくらなのだ。そうしゅういがまっくらなため、てんとうにつけられたいくつものでんとうがしゅううのようにあびせかけるけんらんは、しゅういのなにものにもうばわれることなく、ほしいままにもうつくしいながめが照らしてらしだされているのだ。はだかのでんとうがほそながいらせんぼうをきりきりめのなかへさしこんでくるおうらいにたって、またきんじょにあるかぎやのにかいのガラスまどをすかしてながめたこのくだものてんのながめほど、そのときどきのわたくしをきょうがらせたものはてらまちのなかでもまれだった。","そのひわたくしはいつになくそのみせでかいものをした。というのはそのみせにはめずらしいれもんがでていたのだ。れもんなどごくありふれている。がそのみせというのもみすぼらしくはないまでもただあたりまえのやおやにすぎなかったので、それまであまりみかけたことはなかった。いったいわたくしはあのれもんがすきだ。レモンエロウのえのぐをチューブから搾りしぼりだしてかためたようなあのたんじゅんないろも、それからあのたけのつまったぼうすいけいのかっこうも。――けっきょくわたくしはそれをひとつだけかうことにした。それからのわたくしはどこへどうあるいたのだろう。わたくしはながいまがいをあるいていた。しじゅうわたくしのこころをおさえつけていたふきつなかたまりがそれをにぎったしゅんかんからいくらかゆるんできたとみえて、わたくしはまちのうえでひじょうにこうふくであった。あんなにしつこかったゆううつが、そんなもののいっかでまぎらされる――あるいはふしんなことが、ぎゃくせつてきなほんとうであった。それにしてもこころというやつはなんというふかしぎなやつだろう。"]},{"t":"一顆の檸檬","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3a3630\"/><circle cx=\"400\" cy=\"220\" r=\"170\" fill=\"#e8c93a\" opacity=\"0.1\"/><circle cx=\"400\" cy=\"220\" r=\"120\" fill=\"#e8c93a\" opacity=\"0.16\"/><path d=\"M330 320 q-10 -50 20 -68 q10 -6 22 -2 q30 8 34 40 q2 22 -12 38 z\" fill=\"#f2ddc2\"/><g transform=\"translate(400 224)\"><ellipse rx=\"54.400000000000006\" ry=\"38.400000000000006\" fill=\"#e8c93a\"/><polygon points=\"-54.400000000000006,0 -70.4,-6.4 -54.400000000000006,8.0\" fill=\"#e8c93a\"/><polygon points=\"54.400000000000006,0 70.4,6.4 54.400000000000006,-8.0\" fill=\"#e8c93a\"/><ellipse cx=\"-12.8\" cy=\"-12.8\" rx=\"16.0\" ry=\"8.0\" fill=\"#f4e08a\" opacity=\".8\"/><\/g><line x1=\"400\" y1=\"74\" x2=\"400\" y2=\"34\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"505.0\" y1=\"119.0\" x2=\"533.0\" y2=\"91.0\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"550\" y1=\"224\" x2=\"590\" y2=\"224\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"505.0\" y1=\"329.0\" x2=\"533.0\" y2=\"357.0\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"295.0\" y1=\"119.0\" x2=\"267.0\" y2=\"91.0\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"250\" y1=\"224\" x2=\"210\" y2=\"224\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"295.0\" y1=\"329.0\" x2=\"267.0\" y2=\"357.0\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><line x1=\"400\" y1=\"374\" x2=\"400\" y2=\"414\" stroke=\"#e8c93a\" stroke-width=\"2.4\" opacity=\"0.6\" stroke-linecap=\"round\"/><text x=\"400\" y=\"100\" font-size=\"17\" fill=\"#6a625c\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"2\" opacity=\"1\">つまりはこの重さなんだな<\/text><\/svg>","paras":["　その<ruby>檸檬<rt>れもん<\/rt><\/ruby>の<ruby>冷<rt>つめ<\/rt><\/ruby>たさはたとえようもなくよかった。その<ruby>頃<rt>ころ<\/rt><\/ruby><ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>肺尖<rt>はいせん<\/rt><\/ruby>を<ruby>悪<rt>わる<\/rt><\/ruby>くしていていつも<ruby>身体<rt>からだ<\/rt><\/ruby>に<ruby>熱<rt>ねつ<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>た。<ruby>事実<rt>じじつ<\/rt><\/ruby><ruby>友達<rt>ともだち<\/rt><\/ruby>の<ruby>誰彼<rt>だれかれ<\/rt><\/ruby>に<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>熱<rt>ねつ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>せびらかすために<ruby>手<rt>て<\/rt><\/ruby>の握り<ruby>合<rt>にぎりあ<\/rt><\/ruby>いなどをしてみるのだが、<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>掌<rt>てのひら<\/rt><\/ruby>が<ruby>誰<rt>だれ<\/rt><\/ruby>のよりも<ruby>熱<rt>あつ<\/rt><\/ruby>かった。その<ruby>熱<rt>あつ<\/rt><\/ruby>い<ruby>故<rt>せい<\/rt><\/ruby>だったのだろう、<ruby>握<rt>にぎ<\/rt><\/ruby>っている<ruby>掌<rt>てのひら<\/rt><\/ruby>から<ruby>身内<rt>みうち<\/rt><\/ruby>に浸み<ruby>透<rt>しみとお<\/rt><\/ruby>ってゆくようなその<ruby>冷<rt>つめ<\/rt><\/ruby>たさは<ruby>快<rt>こころよ<\/rt><\/ruby>いものだった。","　<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>何度<rt>なんど<\/rt><\/ruby>も<ruby>何度<rt>なんど<\/rt><\/ruby>もその<ruby>果実<rt>かじつ<\/rt><\/ruby>を<ruby>鼻<rt>はな<\/rt><\/ruby>に<ruby>持<rt>も<\/rt><\/ruby>っていっては<ruby>嗅<rt>か<\/rt><\/ruby>いでみた。それの<ruby>産地<rt>さんち<\/rt><\/ruby>だというカリフォルニヤが<ruby>想像<rt>そうぞう<\/rt><\/ruby>に<ruby>上<rt>のぼ<\/rt><\/ruby>って<ruby>来<rt>く<\/rt><\/ruby>る。<ruby>漢文<rt>かんぶん<\/rt><\/ruby>で<ruby>習<rt>なら<\/rt><\/ruby>った「<ruby>売<rt>うり<\/rt><\/ruby><ruby>柑<rt>かん<\/rt><\/ruby><ruby>者<rt>しゃ<\/rt><\/ruby><ruby>之<rt>の<\/rt><\/ruby><ruby>言<rt>げん<\/rt><\/ruby>」の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>書<rt>か<\/rt><\/ruby>いてあった「<ruby>鼻<rt>はな<\/rt><\/ruby>を<ruby>撲<rt>う<\/rt><\/ruby>つ」という<ruby>言葉<rt>ことば<\/rt><\/ruby>が<ruby>断<rt>き<\/rt><\/ruby>れぎれに<ruby>浮<rt>う<\/rt><\/ruby>かんで<ruby>来<rt>く<\/rt><\/ruby>る。そしてふかぶかと<ruby>胸<rt>むね<\/rt><\/ruby><ruby>一杯<rt>いっぱい<\/rt><\/ruby>に<ruby>匂<rt>にお<\/rt><\/ruby>やかな<ruby>空気<rt>くうき<\/rt><\/ruby>を吸い<ruby>込<rt>すいこ<\/rt><\/ruby>めば、ついぞ<ruby>胸<rt>むね<\/rt><\/ruby><ruby>一杯<rt>いっぱい<\/rt><\/ruby>に<ruby>呼吸<rt>こきゅう<\/rt><\/ruby>したことのなかった<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>身体<rt>からだ<\/rt><\/ruby>や<ruby>顔<rt>かお<\/rt><\/ruby>には<ruby>温<rt>ぬく<\/rt><\/ruby>い<ruby>血<rt>ち<\/rt><\/ruby>のほとぼりが<ruby>昇<rt>のぼ<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>てなんだか<ruby>身内<rt>みうち<\/rt><\/ruby>に<ruby>元気<rt>げんき<\/rt><\/ruby>が<ruby>目覚<rt>めざ<\/rt><\/ruby>めて<ruby>来<rt>き<\/rt><\/ruby>たのだった。……","　<ruby>実際<rt>じっさい<\/rt><\/ruby>あんな<ruby>単純<rt>たんじゅん<\/rt><\/ruby>な<ruby>冷覚<rt>れいかく<\/rt><\/ruby>や<ruby>触覚<rt>しょっかく<\/rt><\/ruby>や<ruby>嗅覚<rt>きゅうかく<\/rt><\/ruby>や<ruby>視覚<rt>しかく<\/rt><\/ruby>が、ずっと<ruby>昔<rt>むかし<\/rt><\/ruby>からこればかり<ruby>探<rt>さが<\/rt><\/ruby>していたのだと<ruby>言<rt>い<\/rt><\/ruby>いたくなったほど<ruby>私<rt>わたくし<\/rt><\/ruby>にしっくりしたなんて<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>不思議<rt>ふしぎ<\/rt><\/ruby>に<ruby>思<rt>おも<\/rt><\/ruby>える――それがあの<ruby>頃<rt>ころ<\/rt><\/ruby>のことなんだから。","　<ruby>私<rt>わたくし<\/rt><\/ruby>はもう<ruby>往来<rt>おうらい<\/rt><\/ruby>を<ruby>軽<rt>かろ<\/rt><\/ruby>やかな<ruby>昂奮<rt>こうふん<\/rt><\/ruby>に<ruby>弾<rt>はず<\/rt><\/ruby>んで、<ruby>一種<rt>いっしゅ<\/rt><\/ruby><ruby>誇<rt>ほこ<\/rt><\/ruby>りかな<ruby>気持<rt>きもち<\/rt><\/ruby>さえ<ruby>感<rt>かん<\/rt><\/ruby>じながら、<ruby>美的<rt>びてき<\/rt><\/ruby><ruby>装束<rt>しょうぞく<\/rt><\/ruby>をして<ruby>街<rt>まち<\/rt><\/ruby>を<ruby>闊歩<rt>かっぽ<\/rt><\/ruby>した<ruby>詩人<rt>しじん<\/rt><\/ruby>のことなど思い<ruby>浮<rt>おもいう<\/rt><\/ruby>かべては<ruby>歩<rt>ある<\/rt><\/ruby>いていた。<ruby>汚<rt>よご<\/rt><\/ruby>れた<ruby>手拭<rt>てぬぐい<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>へ<ruby>載<rt>の<\/rt><\/ruby>せてみたりマントの<ruby>上<rt>うえ<\/rt><\/ruby>へあてがってみたりして<ruby>色<rt>いろ<\/rt><\/ruby>の<ruby>反映<rt>はんえい<\/rt><\/ruby>を<ruby>量<rt>はか<\/rt><\/ruby>ったり、またこんなことを<ruby>思<rt>おも<\/rt><\/ruby>ったり、","　――つまりはこの<ruby>重<rt>おも<\/rt><\/ruby>さなんだな。――","　その<ruby>重<rt>おも<\/rt><\/ruby>さこそ<ruby>常<rt>つね<\/rt><\/ruby>づね<ruby>尋<rt>たず<\/rt><\/ruby>ねあぐんでいたもので、<ruby>疑<rt>うたが<\/rt><\/ruby>いもなくこの<ruby>重<rt>おも<\/rt><\/ruby>さはすべての<ruby>善<rt>よ<\/rt><\/ruby>いものすべての<ruby>美<rt>うつく<\/rt><\/ruby>しいものを<ruby>重量<rt>じゅうりょう<\/rt><\/ruby>に<ruby>換算<rt>かんさん<\/rt><\/ruby>して<ruby>来<rt>き<\/rt><\/ruby>た<ruby>重<rt>おも<\/rt><\/ruby>さであるとか、<ruby>思<rt>おも<\/rt><\/ruby>いあがった<ruby>諧謔心<rt>かいぎゃくしん<\/rt><\/ruby>からそんな<ruby>馬鹿<rt>ばか<\/rt><\/ruby>げたことを<ruby>考<rt>かんが<\/rt><\/ruby>えてみたり――なにがさて<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>幸福<rt>こうふく<\/rt><\/ruby>だったのだ。"],"speech":["そのれもんのつめたさはたとえようもなくよかった。そのころわたくしははいせんをわるくしていていつもからだにねつがでた。じじつともだちのだれかれにわたくしのねつをみせびらかすためにての握りにぎりあいなどをしてみるのだが、わたくしのてのひらがだれのよりもあつかった。そのあついせいだったのだろう、にぎっているてのひらからみうちに浸みしみとおってゆくようなそのつめたさはこころよいものだった。","わたくしはなんどもなんどもそのかじつをはなにもっていってはかいでみた。それのさんちだというカリフォルニヤがそうぞうにのぼってくる。かんぶんでならった「うりかんしゃのげん」のなかにかいてあった「はなをうつ」ということばがきれぎれにうかんでくる。そしてふかぶかとむねいっぱいににおやかなくうきを吸いすいこめば、ついぞむねいっぱいにこきゅうしたことのなかったわたくしのからだやかおにはぬくいちのほとぼりがのぼってきてなんだかみうちにげんきがめざめてきたのだった。……","じっさいあんなたんじゅんなれいかくやしょっかくやきゅうかくやしかくが、ずっとむかしからこればかりさがしていたのだといいたくなったほどわたくしにしっくりしたなんてわたくしはふしぎにおもえる――それがあのころのことなんだから。","わたくしはもうおうらいをかろやかなこうふんにはずんで、いっしゅほこりかなきもちさえかんじながら、びてきしょうぞくをしてまちをかっぽしたしじんのことなど思いおもいうかべてはあるいていた。よごれたてぬぐいのうえへのせてみたりマントのうえへあてがってみたりしていろのはんえいをはかったり、またこんなことをおもったり、","――つまりはこのおもさなんだな。――","そのおもさこそつねづねたずねあぐんでいたもので、うたがいもなくこのおもさはすべてのよいものすべてのうつくしいものをじゅうりょうにかんさんしてきたおもさであるとか、おもいあがったかいぎゃくしんからそんなばかげたことをかんがえてみたり――なにがさてわたくしはこうふくだったのだ。"]},{"t":"丸善にて","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#332b24\"/><rect x=\"120\" y=\"100\" width=\"560\" height=\"54\" fill=\"#3f342a\" rx=\"0\" opacity=\"1\"/><rect x=\"120\" y=\"170\" width=\"560\" height=\"54\" fill=\"#3f342a\" rx=\"0\" opacity=\"1\"/><rect x=\"120\" y=\"240\" width=\"560\" height=\"54\" fill=\"#3f342a\" rx=\"0\" opacity=\"1\"/><rect x=\"120\" y=\"310\" width=\"560\" height=\"54\" fill=\"#3f342a\" rx=\"0\" opacity=\"1\"/><rect x=\"120\" y=\"380\" width=\"560\" height=\"54\" fill=\"#3f342a\" rx=\"0\" opacity=\"1\"/><rect x=\"140\" y=\"106\" width=\"24\" height=\"42\" fill=\"#6e2a34\" rx=\"1\" opacity=\"1\"/><rect x=\"174\" y=\"106\" width=\"24\" height=\"42\" fill=\"#33506e\" rx=\"1\" opacity=\"1\"/><rect x=\"208\" y=\"106\" width=\"24\" height=\"42\" fill=\"#3f5a44\" rx=\"1\" opacity=\"1\"/><rect x=\"242\" y=\"106\" width=\"24\" height=\"42\" fill=\"#8a5a33\" rx=\"1\" opacity=\"1\"/><rect x=\"276\" y=\"106\" width=\"24\" height=\"42\" fill=\"#5c4a6e\" rx=\"1\" opacity=\"1\"/><rect x=\"310\" y=\"106\" width=\"24\" height=\"42\" fill=\"#8a3a4a\" rx=\"1\" opacity=\"1\"/><rect x=\"344\" y=\"106\" width=\"24\" height=\"42\" fill=\"#4a6b8c\" rx=\"1\" opacity=\"1\"/><rect x=\"378\" y=\"106\" width=\"24\" height=\"42\" fill=\"#6e2a34\" rx=\"1\" opacity=\"1\"/><rect x=\"412\" y=\"106\" width=\"24\" height=\"42\" fill=\"#33506e\" rx=\"1\" opacity=\"1\"/><rect x=\"446\" y=\"106\" width=\"24\" height=\"42\" fill=\"#3f5a44\" rx=\"1\" opacity=\"1\"/><rect x=\"480\" y=\"106\" width=\"24\" height=\"42\" fill=\"#8a5a33\" rx=\"1\" opacity=\"1\"/><rect x=\"514\" y=\"106\" width=\"24\" height=\"42\" fill=\"#5c4a6e\" rx=\"1\" opacity=\"1\"/><rect x=\"548\" y=\"106\" width=\"24\" height=\"42\" fill=\"#8a3a4a\" rx=\"1\" opacity=\"1\"/><rect x=\"582\" y=\"106\" width=\ cing=\"10\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">丸善<\/text><polygon points=\"671,444 676,386 684,370 697,370 704,386 709,444\" fill=\"#2e2a2c\" opacity=\"1\"/><circle cx=\"690\" cy=\"358\" r=\"13\" fill=\"#2e2a2c\" opacity=\"1\"/><ellipse cx=\"690\" cy=\"348\" rx=\"17\" ry=\"4.5\" fill=\"#2e2a2c\"/><path d=\"M681 348 a9 8 0 0 1 18 0 z\" fill=\"#2e2a2c\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><\/svg>","paras":["　どこをどう<ruby>歩<rt>ある<\/rt><\/ruby>いたのだろう、<ruby>私<rt>わたくし<\/rt><\/ruby>が<ruby>最後<rt>さいご<\/rt><\/ruby>に<ruby>立<rt>た<\/rt><\/ruby>ったのは<ruby>丸善<rt>まるぜん<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>だった。<ruby>平常<rt>へいじょう<\/rt><\/ruby>あんなに<ruby>避<rt>さ<\/rt><\/ruby>けていた<ruby>丸善<rt>まるぜん<\/rt><\/ruby>がその<ruby>時<rt>とき<\/rt><\/ruby>の<ruby>私<rt>わたくし<\/rt><\/ruby>にはやすやすと<ruby>入<rt>い<\/rt><\/ruby>れるように<ruby>思<rt>おも<\/rt><\/ruby>えた。","「<ruby>今日<rt>きょう<\/rt><\/ruby>は<ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>入<rt>はい<\/rt><\/ruby>ってみてやろう」そして<ruby>私<rt>わたくし<\/rt><\/ruby>はずかずか<ruby>入<rt>はい<\/rt><\/ruby>って<ruby>行<rt>い<\/rt><\/ruby>った。","　しかしどうしたことだろう、<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>充<rt>み<\/rt><\/ruby>たしていた<ruby>幸福<rt>こうふく<\/rt><\/ruby>な<ruby>感情<rt>かんじょう<\/rt><\/ruby>はだんだん<ruby>逃<rt>に<\/rt><\/ruby>げていった。<ruby>香水<rt>こうすい<\/rt><\/ruby>の<ruby>壜<rt>びん<\/rt><\/ruby>にも<ruby>煙管<rt>きせる<\/rt><\/ruby>にも<ruby>私<rt>わたくし<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>はのしかかってはゆかなかった。<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>が<ruby>立<rt>た<\/rt><\/ruby>て<ruby>罩<rt>こ<\/rt><\/ruby>めて<ruby>来<rt>く<\/rt><\/ruby>る、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>歩<rt>ある<\/rt><\/ruby>き<ruby>廻<rt>まわ<\/rt><\/ruby>った<ruby>疲労<rt>ひろう<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>き<\/rt><\/ruby>たのだと<ruby>思<rt>おも<\/rt><\/ruby>った。<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>画本<rt>えほん<\/rt><\/ruby>の<ruby>棚<rt>たな<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>へ<ruby>行<rt>い<\/rt><\/ruby>ってみた。<ruby>画集<rt>がしゅう<\/rt><\/ruby>の<ruby>重<rt>おも<\/rt><\/ruby>たいのを取り<ruby>出<rt>とりだ<\/rt><\/ruby>すのさえ<ruby>常<rt>つね<\/rt><\/ruby>に<ruby>増<rt>ま<\/rt><\/ruby>して<ruby>力<rt>ちから<\/rt><\/ruby>が<ruby>要<rt>い<\/rt><\/ruby>るな！　と<ruby>思<rt>おも<\/rt><\/ruby>った。しかし<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>一<rt>いち<\/rt><\/ruby><ruby>冊<rt>さつ<\/rt><\/ruby>ずつ抜き<ruby>出<rt>ぬきだ<\/rt><\/ruby>してはみる、そして<ruby>開<rt>あ<\/rt><\/ruby>けてはみるのだが、<ruby>克明<rt>こくめい<\/rt><\/ruby>にはぐってゆく<ruby>気持<rt>きもち<\/rt><\/ruby>はさらに<ruby>湧<rt>わ<\/rt><\/ruby>いて<ruby>来<rt>こ<\/rt><\/ruby>ない。しかも<ruby>呪<rt>のろ<\/rt><\/ruby>われたことにはまた<ruby>次<rt>つぎ<\/rt><\/ruby>の<ruby>一<rt>いち<\/rt><\/ruby><ruby>冊<rt>さつ<\/rt><\/ruby>を引き<ruby>出<rt>ひきだ<\/rt><\/ruby>して<ruby>来<rt>く<\/rt><\/ruby>る。それも<ruby>同<rt>おな<\/rt><\/ruby>じことだ。それでいて<ruby>一度<rt>いちど<\/rt><\/ruby>バラバラとやってみなくては<ruby>気<rt>き<\/rt><\/ruby>が<ruby>済<rt>す<\/rt><\/ruby>まないのだ。それ<ruby>以上<rt>いじょう<\/rt><\/ruby>は<ruby>堪<rt>たま<\/rt><\/ruby>らなくなってそこへ<ruby>置<rt>お<\/rt><\/ruby>いてしまう。<ruby>以前<rt>いぜん<\/rt><\/ruby>の<ruby>位置<rt>いち<\/rt><\/ruby>へ<ruby>戻<rt>もど<\/rt><\/ruby>すことさえできない。<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>幾度<rt>いくど<\/rt><\/ruby>もそれを繰り<ruby>返<rt>くりかえ<\/rt><\/ruby>した。とうとうおしまいには<ruby>日頃<rt>ひごろ<\/rt><\/ruby>から<ruby>大好<rt>だいす<\/rt><\/ruby>きだったアングルの<ruby>橙色<rt>だいだいろ<\/rt><\/ruby>の<ruby>重<rt>おも<\/rt><\/ruby>い<ruby>本<rt>ほん<\/rt><\/ruby>までなおいっそうの<ruby>堪<rt>た<\/rt><\/ruby>えがたさのために<ruby>置<rt>お<\/rt><\/ruby>いてしまった。――なんという<ruby>呪<rt>のろ<\/rt><\/ruby>われたことだ。<ruby>手<rt>て<\/rt><\/ruby>の<ruby>筋肉<rt>きんにく<\/rt><\/ruby>に<ruby>疲労<rt>ひろう<\/rt><\/ruby>が<ruby>残<rt>のこ<\/rt><\/ruby>っている。<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>になってしまって、<ruby>自分<rt>じぶん<\/rt><\/ruby>が<ruby>抜<rt>ぬ<\/rt><\/ruby>いたまま積み<ruby>重<rt>つみかさ<\/rt><\/ruby>ねた<ruby>本<rt>ほん<\/rt><\/ruby>の<ruby>群<rt>ぐん<\/rt><\/ruby>を<ruby>眺<rt>なが<\/rt><\/ruby>めていた。","　<ruby>以前<rt>いぜん<\/rt><\/ruby>にはあんなに<ruby>私<rt>わたくし<\/rt><\/ruby>をひきつけた<ruby>画本<rt>えほん<\/rt><\/ruby>がどうしたことだろう。<ruby>一<rt>いち<\/rt><\/ruby><ruby>枚<rt>まい<\/rt><\/ruby><ruby>一<rt>いち<\/rt><\/ruby><ruby>枚<rt>まい<\/rt><\/ruby>に<ruby>眼<rt>め<\/rt><\/ruby>を<ruby>晒<rt>さら<\/rt><\/ruby>し<ruby>終<rt>お<\/rt><\/ruby>わって<ruby>後<rt>あと<\/rt><\/ruby>、さてあまりに<ruby>尋常<rt>じんじょう<\/rt><\/ruby>な<ruby>周囲<rt>しゅうい<\/rt><\/ruby>を<ruby>見廻<rt>みまわ<\/rt><\/ruby>すときのあの<ruby>変<rt>へん<\/rt><\/ruby>にそぐわない<ruby>気持<rt>きもち<\/rt><\/ruby>を、<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>以前<rt>いぜん<\/rt><\/ruby>には<ruby>好<rt>この<\/rt><\/ruby>んで<ruby>味<rt>あじ<\/rt><\/ruby>わっていたものであった。……"],"speech":["どこをどうあるいたのだろう、わたくしがさいごにたったのはまるぜんのまえだった。へいじょうあんなにさけていたまるぜんがそのときのわたくしにはやすやすといれるようにおもえた。","「きょうはひとつはいってみてやろう」そしてわたくしはずかずかはいっていった。","しかしどうしたことだろう、わたくしのこころをみたしていたこうふくなかんじょうはだんだんにげていった。こうすいのびんにもきせるにもわたくしのこころはのしかかってはゆかなかった。ゆううつがたてこめてくる、わたくしはあるきまわったひろうがでてきたのだとおもった。わたくしはえほんのたなのまえへいってみた。がしゅうのおもたいのを取りとりだすのさえつねにましてちからがいるな！とおもった。しかしわたくしはいちさつずつ抜きぬきだしてはみる、そしてあけてはみるのだが、こくめいにはぐってゆくきもちはさらにわいてこない。しかものろわれたことにはまたつぎのいちさつを引きひきだしてくる。それもおなじことだ。それでいていちどバラバラとやってみなくてはきがすまないのだ。それいじょうはたまらなくなってそこへおいてしまう。いぜんのいちへもどすことさえできない。わたくしはいくどもそれを繰りくりかえした。とうとうおしまいにはひごろからだいすきだったアングルのだいだいろのおもいほんまでなおいっそうのたえがたさのためにおいてしまった。――なんというのろわれたことだ。てのきんにくにひろうがのこっている。わたくしはゆううつになってしまって、じぶんがぬいたまま積みつみかさねたほんのぐんをながめていた。","いぜんにはあんなにわたくしをひきつけたえほんがどうしたことだろう。いちまいいちまいにめをさらしおわってあと、さてあまりにじんじょうなしゅういをみまわすときのあのへんにそぐわないきもちを、わたくしはいぜんにはこのんであじわっていたものであった。……"]},{"t":"画本の城","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#3a332c\"/><rect x=\"280\" y=\"350\" width=\"240\" height=\"28\" fill=\"#8a3a4a\" rx=\"1\" opacity=\"1\"/><rect x=\"287\" y=\"322\" width=\"228\" height=\"28\" fill=\"#33506e\" rx=\"1\" opacity=\"1\"/><rect x=\"294\" y=\"294\" width=\"216\" height=\"28\" fill=\"#3f5a44\" rx=\"1\" opacity=\"1\"/><rect x=\"277\" y=\"266\" width=\"204\" height=\"28\" fill=\"#c9a06a\" rx=\"1\" opacity=\"1\"/><rect x=\"284\" y=\"238\" width=\"240\" height=\"28\" fill=\"#5c4a6e\" rx=\"1\" opacity=\"1\"/><rect x=\"291\" y=\"210\" width=\"228\" height=\"28\" fill=\"#6e2a34\" rx=\"1\" opacity=\"1\"/><rect x=\"274\" y=\"182\" width=\"216\" height=\"28\" fill=\"#4a6b8c\" rx=\"1\" opacity=\"1\"/><rect x=\"281\" y=\"154\" width=\"204\" height=\"28\" fill=\"#8a5a33\" rx=\"1\" opacity=\"1\"/><rect x=\"300\" y=\"110\" width=\"180\" height=\"12\" fill=\"#26231e\"/><polygon points=\"141,442 146,384 154,368 167,368 174,384 179,442\" fill=\"#2e2a2c\" opacity=\"1\"/><circle cx=\"160\" cy=\"356\" r=\"13\" fill=\"#2e2a2c\" opacity=\"1\"/><ellipse cx=\"160\" cy=\"346\" rx=\"17\" ry=\"4.5\" fill=\"#2e2a2c\"/><path d=\"M151 346 a9 8 0 0 1 18 0 z\" fill=\"#2e2a2c\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M220 360 q40 -30 74 -14\" fill=\"none\" stroke=\"#2e2a2c\" stroke-width=\"5\" opacity=\"0.9\" stroke-linecap=\"round\"/><text x=\"560\" y=\"90\" font-size=\"15\" fill=\"#8a8070\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"1\" opacity=\"1\">アングルの橙色の重い本<\/text><\/svg>","paras":["「あ、そうだそうだ」その<ruby>時<rt>とき<\/rt><\/ruby><ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>袂<rt>たもと<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>檸檬<rt>れもん<\/rt><\/ruby>を憶い<ruby>出<rt>おもいだ<\/rt><\/ruby>した。<ruby>本<rt>ほん<\/rt><\/ruby>の<ruby>色彩<rt>しきさい<\/rt><\/ruby>をゴチャゴチャに<ruby>積<rt>つ<\/rt><\/ruby>みあげて、<ruby>一度<rt>いちど<\/rt><\/ruby>この<ruby>檸檬<rt>れもん<\/rt><\/ruby>で<ruby>試<rt>ため<\/rt><\/ruby>してみたら。「そうだ」","　<ruby>私<rt>わたくし<\/rt><\/ruby>にまた<ruby>先<rt>さき<\/rt><\/ruby>ほどの<ruby>軽<rt>かろ<\/rt><\/ruby>やかな<ruby>昂奮<rt>こうふん<\/rt><\/ruby>が<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>た。<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>手当<rt>てあ<\/rt><\/ruby>たり<ruby>次第<rt>しだい<\/rt><\/ruby>に<ruby>積<rt>つ<\/rt><\/ruby>みあげ、また<ruby>慌<rt>あわただ<\/rt><\/ruby>しく<ruby>潰<rt>つぶ<\/rt><\/ruby>し、また<ruby>慌<rt>あわただ<\/rt><\/ruby>しく<ruby>築<rt>きず<\/rt><\/ruby>きあげた。<ruby>新<rt>あたら<\/rt><\/ruby>しく引き<ruby>抜<rt>ひきぬ<\/rt><\/ruby>いてつけ<ruby>加<rt>くわ<\/rt><\/ruby>えたり、取り<ruby>去<rt>とりさ<\/rt><\/ruby>ったりした。<ruby>奇怪<rt>きっかい<\/rt><\/ruby>な<ruby>幻想的<rt>げんそうてき<\/rt><\/ruby>な<ruby>城<rt>しろ<\/rt><\/ruby>が、そのたびに<ruby>赤<rt>あか<\/rt><\/ruby>くなったり<ruby>青<rt>あお<\/rt><\/ruby>くなったりした。","　やっとそれはでき<ruby>上<rt>あ<\/rt><\/ruby>がった。そして<ruby>軽<rt>かる<\/rt><\/ruby>く<ruby>跳<rt>とべ<\/rt><\/ruby>りあがる<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>制<rt>せい<\/rt><\/ruby>しながら、その<ruby>城壁<rt>じょうへき<\/rt><\/ruby>の<ruby>頂<rt>いただ<\/rt><\/ruby>きに恐る<ruby>恐<rt>おそるおそ<\/rt><\/ruby>る<ruby>檸檬<rt>れもん<\/rt><\/ruby>を<ruby>据<rt>す<\/rt><\/ruby>えつけた。そしてそれは<ruby>上出来<rt>じょうでき<\/rt><\/ruby>だった。","　<ruby>見<rt>み<\/rt><\/ruby>わたすと、その<ruby>檸檬<rt>れもん<\/rt><\/ruby>の<ruby>色彩<rt>しきさい<\/rt><\/ruby>はガチャガチャした<ruby>色<rt>いろ<\/rt><\/ruby>の<ruby>階調<rt>かいちょう<\/rt><\/ruby>をひっそりと<ruby>紡錘形<rt>ぼうすいけい<\/rt><\/ruby>の<ruby>身体<rt>からだ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へ<ruby>吸収<rt>きゅうしゅう<\/rt><\/ruby>してしまって、カーンと<ruby>冴<rt>さ<\/rt><\/ruby>えかえっていた。<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>埃<rt>ほこり<\/rt><\/ruby>っぽい<ruby>丸善<rt>まるぜん<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>空気<rt>くうき<\/rt><\/ruby>が、その<ruby>檸檬<rt>れもん<\/rt><\/ruby>の<ruby>周囲<rt>しゅうい<\/rt><\/ruby>だけ<ruby>変<rt>へん<\/rt><\/ruby>に<ruby>緊張<rt>きんちょう<\/rt><\/ruby>しているような<ruby>気<rt>き<\/rt><\/ruby>がした。<ruby>私<rt>わたくし<\/rt><\/ruby>はしばらくそれを<ruby>眺<rt>なが<\/rt><\/ruby>めていた。"],"speech":["「あ、そうだそうだ」そのときわたくしはたもとのなかのれもんを憶いおもいだした。ほんのしきさいをゴチャゴチャにつみあげて、いちどこのれもんでためしてみたら。「そうだ」","わたくしにまたさきほどのかろやかなこうふんがかえってきた。わたくしはてあたりしだいにつみあげ、またあわただしくつぶし、またあわただしくきずきあげた。あたらしく引きひきぬいてつけくわえたり、取りとりさったりした。きっかいなげんそうてきなしろが、そのたびにあかくなったりあおくなったりした。","やっとそれはできあがった。そしてかるくとべりあがるこころをせいしながら、そのじょうへきのいただきに恐るおそるおそるれもんをすえつけた。そしてそれはじょうできだった。","みわたすと、そのれもんのしきさいはガチャガチャしたいろのかいちょうをひっそりとぼうすいけいのからだのなかへきゅうしゅうしてしまって、カーンとさえかえっていた。わたくしはほこりっぽいまるぜんのなかのくうきが、そのれもんのしゅういだけへんにきんちょうしているようなきがした。わたくしはしばらくそれをながめていた。"]},{"t":"黄金色の爆弾","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#2e2a30\"/><rect x=\"300\" y=\"330\" width=\"200\" height=\"26\" fill=\"#33506e\" rx=\"1\" opacity=\"1\"/><rect x=\"305\" y=\"304\" width=\"190\" height=\"26\" fill=\"#6e2a34\" rx=\"1\" opacity=\"1\"/><rect x=\"310\" y=\"278\" width=\"180\" height=\"26\" fill=\"#3f5a44\" rx=\"1\" opacity=\"1\"/><rect x=\"297\" y=\"252\" width=\"170\" height=\"26\" fill=\"#5c4a6e\" rx=\"1\" opacity=\"1\"/><rect x=\"302\" y=\"226\" width=\"200\" height=\"26\" fill=\"#8a5a33\" rx=\"1\" opacity=\"1\"/><rect x=\"307\" y=\"200\" width=\"190\" height=\"26\" fill=\"#26364a\" rx=\"1\" opacity=\"1\"/><g transform=\"translate(392 158)\"><ellipse rx=\"39.099999999999994\" ry=\"27.599999999999998\" fill=\"#e8c93a\"/><polygon points=\"-39.099999999999994,0 -50.599999999999994,-4.6 -39.099999999999994,5.75\" fill=\"#e8c93a\"/><polygon points=\"39.099999999999994,0 50.599999999999994,4.6 39.099999999999994,-5.75\" fill=\"#e8c93a\"/><ellipse cx=\"-9.2\" cy=\"-9.2\" rx=\"11.5\" ry=\"5.75\" fill=\"#f4e08a\" opacity=\".8\"/><\/g><line x1=\"392\" y1=\"98\" x2=\"392\" y2=\"48\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"434.0\" y1=\"116.0\" x2=\"469.0\" y2=\"81.0\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"452\" y1=\"158\" x2=\"502\" y2=\"158\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"434.0\" y1=\"200.0\" x2=\"469.0\" y2=\"235.0\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"350.0\" y1=\"116.0\" x2=\"315.0\" y2=\"81.0\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"332\" y1=\"158\" x2=\"282\" y2=\"158\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"350.0\" y1=\"200.0\" x2=\"315.0\" y2=\"235.0\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><line x1=\"392\" y1=\"218\" x2=\"392\" y2=\"268\" stroke=\"#e8c93a\" stroke-width=\"2.6\" opacity=\"0.75\" stroke-linecap=\"round\"/><circle cx=\"392\" cy=\"158\" r=\"46\" fill=\"#e8c93a\" opacity=\"0.2\"/><polygon points=\"662.9,440 667.4,387.8 674.6,373.4 686.3,373.4 692.6,387.8 697.1,440\" fill=\"#2e2a2c\" opacity=\"1\"/><circle cx=\"680\" cy=\"362.6\" r=\"11.700000000000001\" fill=\"#2e2a2c\" opacity=\"1\"/><ellipse cx=\"680\" cy=\"353.6\" rx=\"15.3\" ry=\"4.05\" fill=\"#2e2a2c\"/><path d=\"M671.9 353.6 a8.1 7.2 0 0 1 16.2 0 z\" fill=\"#2e2a2c\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><text x=\"680\" y=\"120\" font-size=\"15\" fill=\"#8a8070\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"1\" opacity=\"1\">十分後には丸善が大爆発する<\/text><\/svg>","paras":["　<ruby>不意<rt>ふい<\/rt><\/ruby>に<ruby>第<rt>だい<\/rt><\/ruby><ruby>二<rt>に<\/rt><\/ruby>のアイディアが<ruby>起<rt>お<\/rt><\/ruby>こった。その<ruby>奇妙<rt>きみょう<\/rt><\/ruby>なたくらみはむしろ<ruby>私<rt>わたくし<\/rt><\/ruby>をぎょっとさせた。","　――それをそのままにしておいて<ruby>私<rt>わたくし<\/rt><\/ruby>は、なに<ruby>喰<rt>く<\/rt><\/ruby>わぬ<ruby>顔<rt>かお<\/rt><\/ruby>をして<ruby>外<rt>そと<\/rt><\/ruby>へ<ruby>出<rt>で<\/rt><\/ruby>る。――","　<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>変<rt>へん<\/rt><\/ruby>にくすぐったい<ruby>気持<rt>きもち<\/rt><\/ruby>がした。「<ruby>出<rt>で<\/rt><\/ruby>て<ruby>行<rt>い<\/rt><\/ruby>こうかなあ。そうだ<ruby>出<rt>で<\/rt><\/ruby>て<ruby>行<rt>い<\/rt><\/ruby>こう」そして<ruby>私<rt>わたくし<\/rt><\/ruby>はすたすた<ruby>出<rt>で<\/rt><\/ruby>て<ruby>行<rt>い<\/rt><\/ruby>った。","　<ruby>変<rt>へん<\/rt><\/ruby>にくすぐったい<ruby>気持<rt>きもち<\/rt><\/ruby>が<ruby>街<rt>まち<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>の<ruby>私<rt>わたくし<\/rt><\/ruby>を<ruby>微笑<rt>ほほえ<\/rt><\/ruby>ませた。<ruby>丸善<rt>まるぜん<\/rt><\/ruby>の<ruby>棚<rt>たな<\/rt><\/ruby>へ<ruby>黄金色<rt>こがねいろ<\/rt><\/ruby>に<ruby>輝<rt>かがや<\/rt><\/ruby>く<ruby>恐<rt>おそ<\/rt><\/ruby>ろしい<ruby>爆弾<rt>ばくだん<\/rt><\/ruby>を<ruby>仕掛<rt>しか<\/rt><\/ruby>けて<ruby>来<rt>き<\/rt><\/ruby>た<ruby>奇怪<rt>きっかい<\/rt><\/ruby>な<ruby>悪漢<rt>あっかん<\/rt><\/ruby>が<ruby>私<rt>わたくし<\/rt><\/ruby>で、もう<ruby>十<rt>じゅう<\/rt><\/ruby><ruby>分<rt>ふん<\/rt><\/ruby><ruby>後<rt>ご<\/rt><\/ruby>にはあの<ruby>丸善<rt>まるぜん<\/rt><\/ruby>が<ruby>美術<rt>びじゅつ<\/rt><\/ruby>の<ruby>棚<rt>たな<\/rt><\/ruby>を<ruby>中心<rt>ちゅうしん<\/rt><\/ruby>として<ruby>大<rt>だい<\/rt><\/ruby><ruby>爆発<rt>ばくはつ<\/rt><\/ruby>をするのだったらどんなにおもしろいだろう。","　<ruby>私<rt>わたくし<\/rt><\/ruby>はこの<ruby>想像<rt>そうぞう<\/rt><\/ruby>を<ruby>熱心<rt>ねっしん<\/rt><\/ruby>に<ruby>追求<rt>ついきゅう<\/rt><\/ruby>した。「そうしたらあの<ruby>気詰<rt>きづ<\/rt><\/ruby>まりな<ruby>丸善<rt>まるぜん<\/rt><\/ruby>も<ruby>粉葉<rt>こっぱ<\/rt><\/ruby>みじんだろう」","　そして<ruby>私<rt>わたくし<\/rt><\/ruby>は<ruby>活動<rt>かつどう<\/rt><\/ruby><ruby>写真<rt>しゃしん<\/rt><\/ruby>の<ruby>看板<rt>かんばん<\/rt><\/ruby><ruby>画<rt>が<\/rt><\/ruby>が<ruby>奇体<rt>きたい<\/rt><\/ruby>な<ruby>趣<rt>おもむ<\/rt><\/ruby>きで<ruby>街<rt>まち<\/rt><\/ruby>を<ruby>彩<rt>いろど<\/rt><\/ruby>っている<ruby>京極<rt>きょうごく<\/rt><\/ruby>を<ruby>下<rt>くだ<\/rt><\/ruby>って<ruby>行<rt>い<\/rt><\/ruby>った。"],"speech":["ふいにだいにのアイディアがおこった。そのきみょうなたくらみはむしろわたくしをぎょっとさせた。","――それをそのままにしておいてわたくしは、なにくわぬかおをしてそとへでる。――","わたくしはへんにくすぐったいきもちがした。「でていこうかなあ。そうだでていこう」そしてわたくしはすたすたでていった。","へんにくすぐったいきもちがまちのうえのわたくしをほほえませた。まるぜんのたなへこがねいろにかがやくおそろしいばくだんをしかけてきたきっかいなあっかんがわたくしで、もうじゅうふんごにはあのまるぜんがびじゅつのたなをちゅうしんとしてだいばくはつをするのだったらどんなにおもしろいだろう。","わたくしはこのそうぞうをねっしんについきゅうした。「そうしたらあのきづまりなまるぜんもこっぱみじんだろう」","そしてわたくしはかつどうしゃしんのかんばんががきたいなおもむきでまちをいろどっているきょうごくをくだっていった。"]}]},{"id":"sakura","title":"桜の樹の下には","author":"梶井基次郎","mins":4,"cover":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#26202e\"/><rect x=\"16\" y=\"16\" width=\"768\" height=\"418\" fill=\"none\" stroke=\"#d98ca6\" stroke-width=\"4\"/><rect x=\"27\" y=\"27\" width=\"746\" height=\"396\" fill=\"none\" stroke=\"#8a8070\" stroke-width=\"1.5\"/><circle cx=\"490\" cy=\"312\" r=\"44\" fill=\"#d98ca6\" opacity=\"0.95\"/><circle cx=\"550\" cy=\"286\" r=\"56\" fill=\"#f0c0d0\" opacity=\"0.95\"/><circle cx=\"616\" cy=\"310\" r=\"46\" fill=\"#d98ca6\" opacity=\"0.95\"/><circle cx=\"560\" cy=\"324\" r=\"40\" fill=\"#f0c0d0\" opacity=\"0.9\"/><circle cx=\"516\" cy=\"336\" r=\"30\" fill=\"#d98ca6\" opacity=\"0.85\"/><circle cx=\"604\" cy=\"340\" r=\"30\" fill=\"#d98ca6\" opacity=\"0.85\"/><circle cx=\"656\" cy=\"324\" r=\"26\" fill=\"#f0c0d0\" opacity=\"0.8\"/><circle cx=\"456\" cy=\"330\" r=\"24\" fill=\"#f0c0d0\" opacity=\"0.8\"/><path d=\"M560 430 q-6 -60 -2
