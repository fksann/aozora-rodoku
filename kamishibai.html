 cy=\"410\" rx=\"5\" ry=\"3\" transform=\"rotate(157 340 410)\"/><ellipse cx=\"489\" cy=\"107\" rx=\"5\" ry=\"3\" transform=\"rotate(204 489 107)\"/><ellipse cx=\"638\" cy=\"204\" rx=\"5\" ry=\"3\" transform=\"rotate(251 638 204)\"/><\/g><rect x=\"0\" y=\"430\" width=\"800\" height=\"20\" fill=\"#1d1826\" rx=\"0\" opacity=\"0.8\"/><text x=\"210\" y=\"58\" font-size=\"36\" fill=\"#f0dce4\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">桜の樹の下には<\/text><text x=\"148\" y=\"70\" font-size=\"22\" fill=\"#f0dce4\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"4\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">梶井基次郎<\/text><\/svg>","paras":[],"speech":["さくらのきのしたには。かじいもとじろう。"]},{"t":"屍体が埋まっている","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#0f0c14\"/><circle cx=\"330\" cy=\"242\" r=\"44\" fill=\"#d98ca6\" opacity=\"0.95\"/><circle cx=\"390\" cy=\"216\" r=\"56\" fill=\"#f0c0d0\" opacity=\"0.95\"/><circle cx=\"456\" cy=\"240\" r=\"46\" fill=\"#d98ca6\" opacity=\"0.95\"/><circle cx=\"400\" cy=\"254\" r=\"40\" fill=\"#f0c0d0\" opacity=\"0.9\"/><circle cx=\"356\" cy=\"266\" r=\"30\" fill=\"#d98ca6\" opacity=\"0.85\"/><circle cx=\"444\" cy=\"270\" r=\"30\" fill=\"#d98ca6\" opacity=\"0.85\"/><circle cx=\"496\" cy=\"254\" r=\"26\" fill=\"#f0c0d0\" opacity=\"0.8\"/><circle cx=\"296\" cy=\"260\" r=\"24\" fill=\"#f0c0d0\" opacity=\"0.8\"/><path d=\"M400 360 q-6 -60 -20 -90 M400 360 q4 -70 24 -96 M388 296 q-18 -14 -40 -18 M416 290 q20 -20 44 -24\" stroke=\"#3a2f28\" stroke-width=\"10.799999999999999\" fill=\"none\" stroke-linecap=\"round\"/><rect x=\"0\" y=\"360\" width=\"800\" height=\"8\" fill=\"#0f0c14\" rx=\"0\" opacity=\"0.9\"/><polygon points=\"0,368 800,368 800,450 0,450\" fill=\"#171320\" opacity=\"1\"/><path d=\"M240 420 q10 -14 24 -10 q-4 12 -20 14 z\" fill=\"#c9c2b4\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.55\" stroke-linecap=\"round\"/><path d=\"M330 420 q10 -14 24 -10 q-4 12 -20 14 z\" fill=\"#c9c2b4\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.55\" stroke-linecap=\"round\"/><path d=\"M420 420 q10 -14 24 -10 q-4 12 -20 14 z\" fill=\"#c9c2b4\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.55\" stroke-linecap=\"round\"/><path d=\"M510 420 q10 -14 24 -10 q-4 12 -20 14 z\" fill=\"#c9c2b4\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.55\" stroke-linecap=\"round\"/><path d=\"M180 430 a24 24 0 0 1 44 -6\" fill=\"none\" stroke=\"#c9c2b4\" stroke-width=\"4\" opacity=\"0.5\" stroke-linecap=\"round\"/><g fill=\"#f0c0d0\" opacity=\".9\"><ellipse cx=\"489\" cy=\"307\" rx=\"5\" ry=\"3\" transform=\"rotate(0 489 307)\"/><ellipse cx=\"638\" cy=\"404\" rx=\"5\" ry=\"3\" transform=\"rotate(47 638 404)\"/><ellipse cx=\"27\" cy=\"101\" rx=\"5\" ry=\"3\" transform=\"rotate(94 27 101)\"/><ellipse cx=\"176\" cy=\"198\" rx=\"5\" ry=\"3\" transform=\"rotate(141 176 198)\"/><ellipse cx=\"325\" cy=\"295\" rx=\"5\" ry=\"3\" transform=\"rotate(188 325 295)\"/><ellipse cx=\"474\" cy=\"392\" rx=\"5\" ry=\"3\" transform=\"rotate(235 474 392)\"/><ellipse cx=\"623\" cy=\"89\" rx=\"5\" ry=\"3\" transform=\"rotate(282 623 89)\"/><ellipse cx=\"772\" cy=\"186\" rx=\"5\" ry=\"3\" transform=\"rotate(329 772 186)\"/><ellipse cx=\"161\" cy=\"283\" rx=\"5\" ry=\"3\" transform=\"rotate(16 161 283)\"/><ellipse cx=\"310\" cy=\"380\" rx=\"5\" ry=\"3\" transform=\"rotate(63 310 380)\"/><\/g><\/svg>","paras":["　<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>樹<rt>き<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>には<ruby>屍体<rt>したい<\/rt><\/ruby>が<ruby>埋<rt>う<\/rt><\/ruby>まっている！","　これは<ruby>信<rt>しん<\/rt><\/ruby>じていいことなんだよ。<ruby>何故<rt>なぜ<\/rt><\/ruby>って、<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>花<rt>はな<\/rt><\/ruby>があんなにも<ruby>見事<rt>みごと<\/rt><\/ruby>に<ruby>咲<rt>さ<\/rt><\/ruby>くなんて<ruby>信<rt>しん<\/rt><\/ruby>じられないことじゃないか。<ruby>俺<rt>おれ<\/rt><\/ruby>はあの<ruby>美<rt>うつく<\/rt><\/ruby>しさが<ruby>信<rt>しん<\/rt><\/ruby>じられないので、この<ruby>二三<rt>にさん<\/rt><\/ruby><ruby>日<rt>にち<\/rt><\/ruby><ruby>不安<rt>ふあん<\/rt><\/ruby>だった。しかしいま、やっとわかるときが<ruby>来<rt>き<\/rt><\/ruby>た。<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>樹<rt>き<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>には<ruby>屍体<rt>したい<\/rt><\/ruby>が<ruby>埋<rt>う<\/rt><\/ruby>まっている。これは<ruby>信<rt>しん<\/rt><\/ruby>じていいことだ。","","　どうして<ruby>俺<rt>おれ<\/rt><\/ruby>が<ruby>毎晩<rt>まいばん<\/rt><\/ruby><ruby>家<rt>いえ<\/rt><\/ruby>へ<ruby>帰<rt>かえ<\/rt><\/ruby>って<ruby>来<rt>く<\/rt><\/ruby>る<ruby>道<rt>みち<\/rt><\/ruby>で、<ruby>俺<rt>おれ<\/rt><\/ruby>の<ruby>部屋<rt>へや<\/rt><\/ruby>の<ruby>数<rt>かず<\/rt><\/ruby>ある<ruby>道具<rt>どうぐ<\/rt><\/ruby>のうちの、<ruby>選<rt>よ<\/rt><\/ruby>りに<ruby>選<rt>え<\/rt><\/ruby>ってちっぽけな<ruby>薄<rt>うす<\/rt><\/ruby>っぺらいもの、<ruby>安全<rt>あんぜん<\/rt><\/ruby><ruby>剃刀<rt>かみそり<\/rt><\/ruby>の<ruby>刃<rt>は<\/rt><\/ruby>なんぞが、<ruby>千里眼<rt>せんりがん<\/rt><\/ruby>のように思い<ruby>浮<rt>おもいう<\/rt><\/ruby>かんで<ruby>来<rt>く<\/rt><\/ruby>るのか――おまえはそれがわからないと<ruby>言<rt>い<\/rt><\/ruby>ったが――そして<ruby>俺<rt>おれ<\/rt><\/ruby>にもやはりそれがわからないのだが――それもこれもやっぱり<ruby>同<rt>おな<\/rt><\/ruby>じようなことにちがいない。",""],"speech":["さくらのきのしたにはしたいがうまっている！","これはしんじていいことなんだよ。なぜって、さくらのはながあんなにもみごとにさくなんてしんじられないことじゃないか。おれはあのうつくしさがしんじられないので、このにさんにちふあんだった。しかしいま、やっとわかるときがきた。さくらのきのしたにはしたいがうまっている。これはしんじていいことだ。","","どうしておれがまいばんいえへかえってくるみちで、おれのへやのかずあるどうぐのうちの、よりにえってちっぽけなうすっぺらいもの、あんぜんかみそりのはなんぞが、せんりがんのように思いおもいうかんでくるのか――おまえはそれがわからないといったが――そしておれにもやはりそれがわからないのだが――それもこれもやっぱりおなじようなことにちがいない。",""]},{"t":"満開の神秘","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#2e2233\"/><circle cx=\"230\" cy=\"160\" r=\"110\" fill=\"#e8a8bc\" opacity=\"0.95\"/><circle cx=\"420\" cy=\"110\" r=\"140\" fill=\"#f0c0d0\" opacity=\"0.95\"/><circle cx=\"620\" cy=\"170\" r=\"120\" fill=\"#e8a8bc\" opacity=\"0.95\"/><circle cx=\"320\" cy=\"250\" r=\"90\" fill=\"#f0c0d0\" opacity=\"0.9\"/><circle cx=\"540\" cy=\"260\" r=\"96\" fill=\"#e8a8bc\" opacity=\"0.9\"/><path d=\"M400 450 q-8 -110 -30 -170 M400 450 q10 -120 34 -180\" fill=\"none\" stroke=\"#3a2f28\" stroke-width=\"11\" opacity=\"1\" stroke-linecap=\"round\"/><g fill=\"#f0c0d0\" opacity=\".9\"><ellipse cx=\"288\" cy=\"184\" rx=\"5\" ry=\"3\" transform=\"rotate(0 288 184)\"/><ellipse cx=\"437\" cy=\"281\" rx=\"5\" ry=\"3\" transform=\"rotate(47 437 281)\"/><ellipse cx=\"586\" cy=\"378\" rx=\"5\" ry=\"3\" transform=\"rotate(94 586 378)\"/><ellipse cx=\"735\" cy=\"75\" rx=\"5\" ry=\"3\" transform=\"rotate(141 735 75)\"/><ellipse cx=\"124\" cy=\"172\" rx=\"5\" ry=\"3\" transform=\"rotate(188 124 172)\"/><ellipse cx=\"273\" cy=\"269\" rx=\"5\" ry=\"3\" transform=\"rotate(235 273 269)\"/><ellipse cx=\"422\" cy=\"366\" rx=\"5\" ry=\"3\" transform=\"rotate(282 422 366)\"/><ellipse cx=\"571\" cy=\"63\" rx=\"5\" ry=\"3\" transform=\"rotate(329 571 63)\"/><ellipse cx=\"720\" cy=\"160\" rx=\"5\" ry=\"3\" transform=\"rotate(16 720 160)\"/><ellipse cx=\"109\" cy=\"257\" rx=\"5\" ry=\"3\" transform=\"rotate(63 109 257)\"/><ellipse cx=\"258\" cy=\"354\" rx=\"5\" ry=\"3\" transform=\"rotate(110 258 354)\"/><ellipse cx=\"407\" cy=\"51\" rx=\"5\" ry=\"3\" transform=\"rotate(157 407 51)\"/><ellipse cx=\"556\" cy=\"148\" rx=\"5\" ry=\"3\" transform=\"rotate(204 556 148)\"/><ellipse cx=\"705\" cy=\"245\" rx=\"5\" ry=\"3\" transform=\"rotate(251 705 245)\"/><ellipse cx=\"94\" cy=\"342\" rx=\"5\" ry=\"3\" transform=\"rotate(298 94 342)\"/><ellipse cx=\"243\" cy=\"39\" rx=\"5\" ry=\"3\" transform=\"rotate(345 243 39)\"/><ellipse cx=\"392\" cy=\"136\" rx=\"5\" ry=\"3\" transform=\"rotate(32 392 136)\"/><ellipse cx=\"541\" cy=\"233\" rx=\"5\" ry=\"3\" transform=\"rotate(79 541 233)\"/><ellipse cx=\"690\" cy=\"330\" rx=\"5\" ry=\"3\" transform=\"rotate(126 690 330)\"/><ellipse cx=\"79\" cy=\"27\" rx=\"5\" ry=\"3\" transform=\"rotate(173 79 27)\"/><\/g><rect x=\"0\" y=\"420\" width=\"800\" height=\"30\" fill=\"#3a2a34\" rx=\"0\" opacity=\"0.5\"/><\/svg>","paras":["　いったいどんな<ruby>樹<rt>き<\/rt><\/ruby>の<ruby>花<rt>はな<\/rt><\/ruby>でも、いわゆる真っ<ruby>盛<rt>まっさか<\/rt><\/ruby>りという<ruby>状態<rt>じょうたい<\/rt><\/ruby>に<ruby>達<rt>たっ<\/rt><\/ruby>すると、あたりの<ruby>空気<rt>くうき<\/rt><\/ruby>のなかへ<ruby>一種<rt>いっしゅ<\/rt><\/ruby><ruby>神秘<rt>しんぴ<\/rt><\/ruby>な<ruby>雰囲気<rt>ふんいき<\/rt><\/ruby>を撒き<ruby>散<rt>まきち<\/rt><\/ruby>らすものだ。それは、よく<ruby>廻<rt>まわ<\/rt><\/ruby>った<ruby>独楽<rt>こま<\/rt><\/ruby>が<ruby>完全<rt>かんぜん<\/rt><\/ruby>な<ruby>静止<rt>せいし<\/rt><\/ruby>に<ruby>澄<rt>す<\/rt><\/ruby>むように、また、<ruby>音楽<rt>おんがく<\/rt><\/ruby>の<ruby>上手<rt>じょうず<\/rt><\/ruby>な<ruby>演奏<rt>えんそう<\/rt><\/ruby>がきまってなにかの<ruby>幻覚<rt>げんかく<\/rt><\/ruby>を<ruby>伴<rt>ともな<\/rt><\/ruby>うように、<ruby>灼熱<rt>しゃくねつ<\/rt><\/ruby>した<ruby>生殖<rt>せいしょく<\/rt><\/ruby>の<ruby>幻覚<rt>げんかく<\/rt><\/ruby>させる<ruby>後光<rt>ごこう<\/rt><\/ruby>のようなものだ。それは<ruby>人<rt>ひと<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>撲<rt>う<\/rt><\/ruby>たずにはおかない、<ruby>不思議<rt>ふしぎ<\/rt><\/ruby>な、生き<ruby>生<rt>いきい<\/rt><\/ruby>きとした、<ruby>美<rt>うつく<\/rt><\/ruby>しさだ。","　しかし、<ruby>昨日<rt>きのう<\/rt><\/ruby>、<ruby>一昨<rt>いっさく<\/rt><\/ruby><ruby>日<rt>ひ<\/rt><\/ruby>、<ruby>俺<rt>おれ<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>をひどく<ruby>陰気<rt>いんき<\/rt><\/ruby>にしたものもそれなのだ。<ruby>俺<rt>おれ<\/rt><\/ruby>にはその<ruby>美<rt>うつく<\/rt><\/ruby>しさがなにか<ruby>信<rt>しん<\/rt><\/ruby>じられないもののような<ruby>気<rt>き<\/rt><\/ruby>がした。<ruby>俺<rt>おれ<\/rt><\/ruby>は<ruby>反対<rt>はんたい<\/rt><\/ruby>に<ruby>不安<rt>ふあん<\/rt><\/ruby>になり、<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>になり、<ruby>空虚<rt>くうきょ<\/rt><\/ruby>な<ruby>気持<rt>きもち<\/rt><\/ruby>になった。しかし、<ruby>俺<rt>おれ<\/rt><\/ruby>はいまやっとわかった。","　おまえ、この<ruby>爛漫<rt>らんまん<\/rt><\/ruby>と咲き<ruby>乱<rt>さきみだ<\/rt><\/ruby>れている<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>樹<rt>き<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>へ、<ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>一<rt>ひと<\/rt><\/ruby>つ<ruby>屍体<rt>したい<\/rt><\/ruby>が<ruby>埋<rt>う<\/rt><\/ruby>まっていると<ruby>想像<rt>そうぞう<\/rt><\/ruby>してみるがいい。<ruby>何<rt>なん<\/rt><\/ruby>が<ruby>俺<rt>おれ<\/rt><\/ruby>をそんなに<ruby>不安<rt>ふあん<\/rt><\/ruby>にしていたかがおまえには<ruby>納得<rt>なっとく<\/rt><\/ruby>がいくだろう。","　<ruby>馬<rt>うま<\/rt><\/ruby>のような<ruby>屍体<rt>したい<\/rt><\/ruby>、<ruby>犬猫<rt>いぬねこ<\/rt><\/ruby>のような<ruby>屍体<rt>したい<\/rt><\/ruby>、そして<ruby>人間<rt>にんげん<\/rt><\/ruby>のような<ruby>屍体<rt>したい<\/rt><\/ruby>、<ruby>屍体<rt>したい<\/rt><\/ruby>はみな<ruby>腐爛<rt>ふらん<\/rt><\/ruby>して<ruby>蛆<rt>うじ<\/rt><\/ruby>が<ruby>湧<rt>わ<\/rt><\/ruby>き、<ruby>堪<rt>たま<\/rt><\/ruby>らなく<ruby>臭<rt>くさ<\/rt><\/ruby>い。それでいて<ruby>水晶<rt>すいしょう<\/rt><\/ruby>のような<ruby>液<rt>えき<\/rt><\/ruby>をたらたらとたらしている。<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>根<rt>ね<\/rt><\/ruby>は<ruby>貪婪<rt>どんらん<\/rt><\/ruby>な<ruby>蛸<rt>たこ<\/rt><\/ruby>のように、それを<ruby>抱<rt>だ<\/rt><\/ruby>きかかえ、いそぎんちゃくの<ruby>食<rt>しょく<\/rt><\/ruby><ruby>糸<rt>いと<\/rt><\/ruby>のような<ruby>毛根<rt>もうこん<\/rt><\/ruby>を<ruby>聚<rt>あつ<\/rt><\/ruby>めて、その<ruby>液体<rt>えきたい<\/rt><\/ruby>を<ruby>吸<rt>す<\/rt><\/ruby>っている。","　<ruby>何<rt>なん<\/rt><\/ruby>があんな<ruby>花弁<rt>かべん<\/rt><\/ruby>を<ruby>作<rt>つく<\/rt><\/ruby>り、<ruby>何<rt>なん<\/rt><\/ruby>があんな<ruby>蕊<rt>しべ<\/rt><\/ruby>を<ruby>作<rt>つく<\/rt><\/ruby>っているのか、<ruby>俺<rt>おれ<\/rt><\/ruby>は<ruby>毛根<rt>もうこん<\/rt><\/ruby>の<ruby>吸<rt>す<\/rt><\/ruby>いあげる<ruby>水晶<rt>すいしょう<\/rt><\/ruby>のような<ruby>液<rt>えき<\/rt><\/ruby>が、<ruby>静<rt>しず<\/rt><\/ruby>かな<ruby>行列<rt>ぎょうれつ<\/rt><\/ruby>を<ruby>作<rt>つく<\/rt><\/ruby>って、<ruby>維管<rt>いかん<\/rt><\/ruby><ruby>束<rt>たば<\/rt><\/ruby>のなかを<ruby>夢<rt>ゆめ<\/rt><\/ruby>のようにあがってゆくのが<ruby>見<rt>み<\/rt><\/ruby>えるようだ。"],"speech":["いったいどんなきのはなでも、いわゆる真っまっさかりというじょうたいにたっすると、あたりのくうきのなかへいっしゅしんぴなふんいきを撒きまきちらすものだ。それは、よくまわったこまがかんぜんなせいしにすむように、また、おんがくのじょうずなえんそうがきまってなにかのげんかくをともなうように、しゃくねつしたせいしょくのげんかくさせるごこうのようなものだ。それはひとのこころをうたずにはおかない、ふしぎな、生きいきいきとした、うつくしさだ。","しかし、きのう、いっさくひ、おれのこころをひどくいんきにしたものもそれなのだ。おれにはそのうつくしさがなにかしんじられないもののようなきがした。おれははんたいにふあんになり、ゆううつになり、くうきょなきもちになった。しかし、おれはいまやっとわかった。","おまえ、このらんまんと咲きさきみだれているさくらのきのしたへ、ひとつひとつしたいがうまっているとそうぞうしてみるがいい。なんがおれをそんなにふあんにしていたかがおまえにはなっとくがいくだろう。","うまのようなしたい、いぬねこのようなしたい、そしてにんげんのようなしたい、したいはみなふらんしてうじがわき、たまらなくくさい。それでいてすいしょうのようなえきをたらたらとたらしている。さくらのねはどんらんなたこのように、それをだきかかえ、いそぎんちゃくのしょくいとのようなもうこんをあつめて、そのえきたいをすっている。","なんがあんなかべんをつくり、なんがあんなしべをつくっているのか、おれはもうこんのすいあげるすいしょうのようなえきが、しずかなぎょうれつをつくって、いかんたばのなかをゆめのようにあがってゆくのがみえるようだ。"]},{"t":"溪間のかげろう","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#26333d\"/><polygon points=\"0,300 800,270 800,450 0,450\" fill=\"#2f4a52\" opacity=\"1\"/><path d=\"M-10 320 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0 q28 -10 56 0\" fill=\"none\" stroke=\"#5b8c9e\" stroke-width=\"3.5\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M-10 380 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0 q30 -8 60 0\" fill=\"none\" stroke=\"#5b8c9e\" stroke-width=\"3\" opacity=\"0.6\" stroke-linecap=\"round\"/><ellipse cx=\"300\" cy=\"300\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(0 300 300)\"/><ellipse cx=\"367\" cy=\"341\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(31 367 341)\"/><ellipse cx=\"434\" cy=\"302\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(62 434 302)\"/><ellipse cx=\"501\" cy=\"343\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(93 501 343)\"/><ellipse cx=\"568\" cy=\"304\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(124 568 304)\"/><ellipse cx=\"635\" cy=\"345\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(155 635 345)\"/><ellipse cx=\"362\" cy=\"306\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(6 362 306)\"/><ellipse cx=\"429\" cy=\"347\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(37 429 347)\"/><ellipse cx=\"496\" cy=\"308\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(68 496 308)\"/><ellipse cx=\"563\" cy=\"349\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(99 563 349)\"/><ellipse cx=\"630\" cy=\"310\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(130 630 310)\"/><ellipse cx=\"357\" cy=\"351\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(161 357 351)\"/><ellipse cx=\"424\" cy=\"312\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(12 424 312)\"/><ellipse cx=\"491\" cy=\"353\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(43 491 353)\"/><ellipse cx=\"558\" cy=\"314\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(74 558 314)\"/><ellipse cx=\"625\" cy=\"355\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(105 625 355)\"/><ellipse cx=\"352\" cy=\"316\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(136 352 316)\"/><ellipse cx=\"419\" cy=\"357\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(167 419 357)\"/><ellipse cx=\"486\" cy=\"318\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(18 486 318)\"/><ellipse cx=\"553\" cy=\"359\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(49 553 359)\"/><ellipse cx=\"620\" cy=\"320\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(80 620 320)\"/><ellipse cx=\"347\" cy=\"361\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(111 347 361)\"/><ellipse cx=\"414\" cy=\"322\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(142 414 322)\"/><ellipse cx=\"481\" cy=\"363\" rx=\"4\" ry=\"1.6\" fill=\"#e8ecf4\" opacity=\".9\" transform=\"rotate(173 481 363)\"/><circle cx=\"470\" cy=\"340\" r=\"26\" fill=\"#e8ecf4\" opacity=\"0.12\"/><polygon points=\"91,420 96,362 104,346 117,346 124,362 129,420\" fill=\"#3a3040\" opacity=\"1\"/><circle cx=\"110\" cy=\"334\" r=\"13\" fill=\"#3a3040\" opacity=\"1\"/><polygon points=\"0,300 220,260 470,296 700,266 800,290 800,310 0,316\" fill=\"#3a4652\" opacity=\"0.9\"/><\/svg>","paras":["　――おまえは<ruby>何<rt>なん<\/rt><\/ruby>をそう<ruby>苦<rt>くる<\/rt><\/ruby>しそうな<ruby>顔<rt>かお<\/rt><\/ruby>をしているのだ。<ruby>美<rt>うつく<\/rt><\/ruby>しい<ruby>透視<rt>とうし<\/rt><\/ruby><ruby>術<rt>じゅつ<\/rt><\/ruby>じゃないか。<ruby>俺<rt>おれ<\/rt><\/ruby>はいまようやく<ruby>瞳<rt>ひとみ<\/rt><\/ruby>を<ruby>据<rt>す<\/rt><\/ruby>えて<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>花<rt>はな<\/rt><\/ruby>が<ruby>見<rt>み<\/rt><\/ruby>られるようになったのだ。<ruby>昨日<rt>きのう<\/rt><\/ruby>、<ruby>一昨<rt>いっさく<\/rt><\/ruby><ruby>日<rt>ひ<\/rt><\/ruby>、<ruby>俺<rt>おれ<\/rt><\/ruby>を<ruby>不安<rt>ふあん<\/rt><\/ruby>がらせた<ruby>神秘<rt>しんぴ<\/rt><\/ruby>から<ruby>自由<rt>じゆう<\/rt><\/ruby>になったのだ。","　<ruby>二三<rt>にさん<\/rt><\/ruby><ruby>日<rt>にち<\/rt><\/ruby><ruby>前<rt>まえ<\/rt><\/ruby>、<ruby>俺<rt>おれ<\/rt><\/ruby>は、ここの<ruby>溪<rt>たに<\/rt><\/ruby>へ<ruby>下<rt>お<\/rt><\/ruby>りて、<ruby>石<rt>いし<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>を伝い<ruby>歩<rt>つたいある<\/rt><\/ruby>きしていた。<ruby>水<rt>みず<\/rt><\/ruby>のしぶきのなかからは、あちらからもこちらからも、<ruby>薄羽<rt>うすば<\/rt><\/ruby>かげろうがアフロディットのように<ruby>生<rt>う<\/rt><\/ruby>まれて<ruby>来<rt>き<\/rt><\/ruby>て、溪の<ruby>空<rt>そら<\/rt><\/ruby>をめがけて舞い<ruby>上<rt>まいあ<\/rt><\/ruby>がってゆくのが<ruby>見<rt>み<\/rt><\/ruby>えた。おまえも<ruby>知<rt>し<\/rt><\/ruby>っているとおり、<ruby>彼<rt>かれ<\/rt><\/ruby>らはそこで<ruby>美<rt>うつく<\/rt><\/ruby>しい<ruby>結婚<rt>けっこん<\/rt><\/ruby>をするのだ。しばらく<ruby>歩<rt>ある<\/rt><\/ruby>いていると、<ruby>俺<rt>おれ<\/rt><\/ruby>は<ruby>変<rt>へん<\/rt><\/ruby>なものに<ruby>出喰<rt>でく<\/rt><\/ruby>わした。それは溪の<ruby>水<rt>みず<\/rt><\/ruby>が<ruby>乾<rt>かわ<\/rt><\/ruby>いた<ruby>磧<rt>かわら<\/rt><\/ruby>へ、<ruby>小<rt>ちい<\/rt><\/ruby>さい<ruby>水溜<rt>みずたまり<\/rt><\/ruby>を<ruby>残<rt>のこ<\/rt><\/ruby>している、その<ruby>水<rt>みず<\/rt><\/ruby>のなかだった。<ruby>思<rt>おも<\/rt><\/ruby>いがけない<ruby>石油<rt>せきゆ<\/rt><\/ruby>を<ruby>流<rt>なが<\/rt><\/ruby>したような<ruby>光彩<rt>こうさい<\/rt><\/ruby>が、<ruby>一面<rt>いちめん<\/rt><\/ruby>に<ruby>浮<rt>う<\/rt><\/ruby>いているのだ。おまえはそれを<ruby>何<rt>なん<\/rt><\/ruby>だったと<ruby>思<rt>おも<\/rt><\/ruby>う。それは<ruby>何万<rt>なんまん<\/rt><\/ruby><ruby>匹<rt>ひき<\/rt><\/ruby>とも<ruby>数<rt>すう<\/rt><\/ruby>の<ruby>知<rt>し<\/rt><\/ruby>れない、<ruby>薄羽<rt>うすば<\/rt><\/ruby>かげろうの<ruby>屍体<rt>したい<\/rt><\/ruby>だったのだ。<ruby>隙間<rt>すきま<\/rt><\/ruby>なく<ruby>水<rt>みず<\/rt><\/ruby>の<ruby>面<rt>めん<\/rt><\/ruby>を<ruby>被<rt>かぶ<\/rt><\/ruby>っている、<ruby>彼<rt>かれ<\/rt><\/ruby>らのかさなりあった<ruby>翅<rt>はね<\/rt><\/ruby>が、<ruby>光<rt>ひかり<\/rt><\/ruby>にちぢれて<ruby>油<rt>あぶら<\/rt><\/ruby>のような<ruby>光彩<rt>こうさい<\/rt><\/ruby>を<ruby>流<rt>なが<\/rt><\/ruby>しているのだ。そこが、<ruby>産卵<rt>さんらん<\/rt><\/ruby>を<ruby>終<rt>お<\/rt><\/ruby>わった<ruby>彼<rt>かれ<\/rt><\/ruby>らの<ruby>墓場<rt>はかば<\/rt><\/ruby>だったのだ。","　<ruby>俺<rt>おれ<\/rt><\/ruby>はそれを<ruby>見<rt>み<\/rt><\/ruby>たとき、<ruby>胸<rt>むね<\/rt><\/ruby>が<ruby>衝<rt>つ<\/rt><\/ruby>かれるような<ruby>気<rt>き<\/rt><\/ruby>がした。<ruby>墓場<rt>はかば<\/rt><\/ruby>を<ruby>発<rt>あば<\/rt><\/ruby>いて<ruby>屍体<rt>したい<\/rt><\/ruby>を<ruby>嗜<rt>この<\/rt><\/ruby>む<ruby>変質者<rt>へんしつしゃ<\/rt><\/ruby>のような<ruby>残忍<rt>ざんにん<\/rt><\/ruby>なよろこびを<ruby>俺<rt>おれ<\/rt><\/ruby>は<ruby>味<rt>あじ<\/rt><\/ruby>わった。","　この溪間ではなにも<ruby>俺<rt>おれ<\/rt><\/ruby>をよろこばすものはない。<ruby>鶯<rt>うぐいす<\/rt><\/ruby>や<ruby>四十雀<rt>しじゅうから<\/rt><\/ruby>も、<ruby>白<rt>しろ<\/rt><\/ruby>い<ruby>日光<rt>にっこう<\/rt><\/ruby>をさ<ruby>青<rt>お<\/rt><\/ruby>に<ruby>煙<rt>けむ<\/rt><\/ruby>らせている<ruby>木<rt>き<\/rt><\/ruby>の<ruby>若芽<rt>わかめ<\/rt><\/ruby>も、ただそれだけでは、もうろうとした<ruby>心象<rt>しんしょう<\/rt><\/ruby>に<ruby>過<rt>す<\/rt><\/ruby>ぎない。<ruby>俺<rt>おれ<\/rt><\/ruby>には<ruby>惨劇<rt>さんげき<\/rt><\/ruby>が<ruby>必要<rt>ひつよう<\/rt><\/ruby>なんだ。その<ruby>平衡<rt>へいこう<\/rt><\/ruby>があって、はじめて<ruby>俺<rt>おれ<\/rt><\/ruby>の<ruby>心象<rt>しんしょう<\/rt><\/ruby>は<ruby>明確<rt>めいかく<\/rt><\/ruby>になって<ruby>来<rt>く<\/rt><\/ruby>る。<ruby>俺<rt>おれ<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>は<ruby>悪鬼<rt>あくき<\/rt><\/ruby>のように<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>に<ruby>渇<rt>かわ<\/rt><\/ruby>いている。<ruby>俺<rt>おれ<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>に<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>が<ruby>完成<rt>かんせい<\/rt><\/ruby>するときにばかり、<ruby>俺<rt>おれ<\/rt><\/ruby>の<ruby>心<rt>こころ<\/rt><\/ruby>は<ruby>和<rt>なご<\/rt><\/ruby>んでくる。"],"speech":["――おまえはなんをそうくるしそうなかおをしているのだ。うつくしいとうしじゅつじゃないか。おれはいまようやくひとみをすえてさくらのはながみられるようになったのだ。きのう、いっさくひ、おれをふあんがらせたしんぴからじゆうになったのだ。","にさんにちまえ、おれは、ここのたにへおりて、いしのうえを伝いつたいあるきしていた。みずのしぶきのなかからは、あちらからもこちらからも、うすばかげろうがアフロディットのようにうまれてきて、溪のそらをめがけて舞いまいあがってゆくのがみえた。おまえもしっているとおり、かれらはそこでうつくしいけっこんをするのだ。しばらくあるいていると、おれはへんなものにでくわした。それは溪のみずがかわいたかわらへ、ちいさいみずたまりをのこしている、そのみずのなかだった。おもいがけないせきゆをながしたようなこうさいが、いちめんにういているのだ。おまえはそれをなんだったとおもう。それはなんまんひきともすうのしれない、うすばかげろうのしたいだったのだ。すきまなくみずのめんをかぶっている、かれらのかさなりあったはねが、ひかりにちぢれてあぶらのようなこうさいをながしているのだ。そこが、さんらんをおわったかれらのはかばだったのだ。","おれはそれをみたとき、むねがつかれるようなきがした。はかばをあばいてしたいをこのむへんしつしゃのようなざんにんなよろこびをおれはあじわった。","この溪間ではなにもおれをよろこばすものはない。うぐいすやしじゅうからも、しろいにっこうをさおにけむらせているきのわかめも、ただそれだけでは、もうろうとしたしんしょうにすぎない。おれにはさんげきがひつようなんだ。そのへいこうがあって、はじめておれのしんしょうはめいかくになってくる。おれのこころはあくきのようにゆううつにかわいている。おれのこころにゆううつがかんせいするときにばかり、おれのこころはなごんでくる。"]},{"t":"酒宴の権利","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1d1826\"/><circle cx=\"490\" cy=\"282\" r=\"44\" fill=\"#d98ca6\" opacity=\"0.95\"/><circle cx=\"550\" cy=\"256\" r=\"56\" fill=\"#f0c0d0\" opacity=\"0.95\"/><circle cx=\"616\" cy=\"280\" r=\"46\" fill=\"#d98ca6\" opacity=\"0.95\"/><circle cx=\"560\" cy=\"294\" r=\"40\" fill=\"#f0c0d0\" opacity=\"0.9\"/><circle cx=\"516\" cy=\"306\" r=\"30\" fill=\"#d98ca6\" opacity=\"0.85\"/><circle cx=\"604\" cy=\"310\" r=\"30\" fill=\"#d98ca6\" opacity=\"0.85\"/><circle cx=\"656\" cy=\"294\" r=\"26\" fill=\"#f0c0d0\" opacity=\"0.8\"/><circle cx=\"456\" cy=\"300\" r=\"24\" fill=\"#f0c0d0\" opacity=\"0.8\"/><path d=\"M560 400 q-6 -60 -20 -90 M560 400 q4 -70 24 -96 M548 336 q-18 -14 -40 -18 M576 330 q20 -20 44 -24\" stroke=\"#3a2f28\" stroke-width=\"9.9\" fill=\"none\" stroke-linecap=\"round\"/><g fill=\"#f0c0d0\" opacity=\".9\"><ellipse cx=\"623\" cy=\"389\" rx=\"5\" ry=\"3\" transform=\"rotate(0 623 389)\"/><ellipse cx=\"772\" cy=\"86\" rx=\"5\" ry=\"3\" transform=\"rotate(47 772 86)\"/><ellipse cx=\"161\" cy=\"183\" rx=\"5\" ry=\"3\" transform=\"rotate(94 161 183)\"/><ellipse cx=\"310\" cy=\"280\" rx=\"5\" ry=\"3\" transform=\"rotate(141 310 280)\"/><ellipse cx=\"459\" cy=\"377\" rx=\"5\" ry=\"3\" transform=\"rotate(188 459 377)\"/><ellipse cx=\"608\" cy=\"74\" rx=\"5\" ry=\"3\" transform=\"rotate(235 608 74)\"/><ellipse cx=\"757\" cy=\"171\" rx=\"5\" ry=\"3\" transform=\"rotate(282 757 171)\"/><ellipse cx=\"146\" cy=\"268\" rx=\"5\" ry=\"3\" transform=\"rotate(329 146 268)\"/><ellipse cx=\"295\" cy=\"365\" rx=\"5\" ry=\"3\" transform=\"rotate(16 295 365)\"/><ellipse cx=\"444\" cy=\"62\" rx=\"5\" ry=\"3\" transform=\"rotate(63 444 62)\"/><ellipse cx=\"593\" cy=\"159\" rx=\"5\" ry=\"3\" transform=\"rotate(110 593 159)\"/><ellipse cx=\"742\" cy=\"256\" rx=\"5\" ry=\"3\" transform=\"rotate(157 742 256)\"/><ellipse cx=\"131\" cy=\"353\" rx=\"5\" ry=\"3\" transform=\"rotate(204 131 353)\"/><ellipse cx=\"280\" cy=\"50\" rx=\"5\" ry=\"3\" transform=\"rotate(251 280 50)\"/><ellipse cx=\"429\" cy=\"147\" rx=\"5\" ry=\"3\" transform=\"rotate(298 429 147)\"/><ellipse cx=\"578\" cy=\"244\" rx=\"5\" ry=\"3\" transform=\"rotate(345 578 244)\"/><\/g><g transform=\"translate(240 400)\"><circle cx=\"0\" cy=\"-64\" r=\"12\" fill=\"#3a3040\"/><path d=\"M-20 0 q-4 -40 12 -52 l16 0 q16 12 12 52 z\" fill=\"#3a3040\"/><path d=\"M8 -46 q18 -6 24 -18\" stroke=\"#3a3040\" stroke-width=\"7\" fill=\"none\" stroke-linecap=\"round\"/><\/g><ellipse cx=\"282\" cy=\"464\" rx=\"0\" ry=\"0\" fill=\"none\"/><rect x=\"272\" y=\"388\" width=\"18\" height=\"12\" fill=\"#c9c2b4\" rx=\"2\" opacity=\"0.9\"/><rect x=\"0\" y=\"410\" width=\"800\" height=\"40\" fill=\"#171320\" rx=\"0\" opacity=\"0.7\"/><\/svg>","paras":["　――おまえは<ruby>腋<rt>わき<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>を<ruby>拭<rt>ふ<\/rt><\/ruby>いているね。<ruby>冷汗<rt>ひやあせ<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>るのか。それは<ruby>俺<rt>おれ<\/rt><\/ruby>も<ruby>同<rt>おな<\/rt><\/ruby>じことだ。<ruby>何<rt>なん<\/rt><\/ruby>もそれを<ruby>不愉快<rt>ふゆかい<\/rt><\/ruby>がることはない。べたべたとまるで<ruby>精液<rt>せいえき<\/rt><\/ruby>のようだと<ruby>思<rt>おも<\/rt><\/ruby>ってごらん。それで<ruby>俺<rt>おれ<\/rt><\/ruby><ruby>達<rt>たち<\/rt><\/ruby>の<ruby>憂鬱<rt>ゆううつ<\/rt><\/ruby>は<ruby>完成<rt>かんせい<\/rt><\/ruby>するのだ。","　ああ、<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>樹<rt>き<\/rt><\/ruby>の<ruby>下<rt>した<\/rt><\/ruby>には<ruby>屍体<rt>したい<\/rt><\/ruby>が<ruby>埋<rt>う<\/rt><\/ruby>まっている！","　いったいどこから<ruby>浮<rt>う<\/rt><\/ruby>かんで<ruby>来<rt>き<\/rt><\/ruby>た<ruby>空想<rt>くうそう<\/rt><\/ruby>かさっぱり<ruby>見当<rt>けんとう<\/rt><\/ruby>のつかない<ruby>屍体<rt>したい<\/rt><\/ruby>が、いまはまるで<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>樹<rt>き<\/rt><\/ruby>と<ruby>一<rt>ひと<\/rt><\/ruby>つになって、どんなに<ruby>頭<rt>あたま<\/rt><\/ruby>を<ruby>振<rt>ふ<\/rt><\/ruby>っても<ruby>離<rt>はな<\/rt><\/ruby>れてゆこうとはしない。","　<ruby>今<rt>いま<\/rt><\/ruby>こそ<ruby>俺<rt>おれ<\/rt><\/ruby>は、あの<ruby>桜<rt>さくら<\/rt><\/ruby>の<ruby>樹<rt>き<\/rt><\/ruby>の<ruby>下<rt>もと<\/rt><\/ruby>で<ruby>酒宴<rt>しゅえん<\/rt><\/ruby>をひらいている<ruby>村人<rt>むらびと<\/rt><\/ruby>たちと<ruby>同<rt>おな<\/rt><\/ruby>じ<ruby>権利<rt>けんり<\/rt><\/ruby>で、<ruby>花見<rt>はなみ<\/rt><\/ruby>の<ruby>酒<rt>さけ<\/rt><\/ruby>が<ruby>呑<rt>の<\/rt><\/ruby>めそうな<ruby>気<rt>き<\/rt><\/ruby>がする。"],"speech":["――おまえはわきのしたをふいているね。ひやあせがでるのか。それはおれもおなじことだ。なんもそれをふゆかいがることはない。べたべたとまるでせいえきのようだとおもってごらん。それでおれたちのゆううつはかんせいするのだ。","ああ、さくらのきのしたにはしたいがうまっている！","いったいどこからうかんできたくうそうかさっぱりけんとうのつかないしたいが、いまはまるでさくらのきとひとつになって、どんなにあたまをふってもはなれてゆこうとはしない。","いまこそおれは、あのさくらのきのもとでしゅえんをひらいているむらびとたちとおなじけんりで、はなみのさけがのめそうなきがする。"]}]},{"id":"sangetsu","title":"山月記","author":"中島敦","mins":14,"cover":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1d2620\"/><rect x=\"16\" y=\"16\" width=\"768\" height=\"418\" fill=\"none\" stroke=\"#d9913f\" stroke-width=\"4\"/><rect x=\"27\" y=\"27\" width=\"746\" height=\"396\" fill=\"none\" stroke=\"#8a9a84\" stroke-width=\"1.5\"/><circle cx=\"590\" cy=\"120\" r=\"105.39999999999999\" fill=\"#f2ecd9\" opacity=\"0.13\"/><circle cx=\"590\" cy=\"120\" r=\"62\" fill=\"#f2ecd9\" opacity=\"1\"/><g transform=\"translate(560 400) scale(1.4 1.4)\"><path d=\"M-52 0 q-10 -34 6 -46 q20 -14 52 -12 q26 2 34 20 q6 14 2 38 l-12 0 q2 -18 - \"12\" fill=\"#26231e\" rx=\"0\" opacity=\"1\"/><rect x=\"330\" y=\"360\" width=\"90\" height=\"30\" fill=\"#f7f1e1\" rx=\"1\" opacity=\"1\"/><line x1=\"340\" y1=\"370\" x2=\"410\" y2=\"370\" stroke=\"#8a8070\" stroke-width=\"1.5\" opacity=\"1\" stroke-linecap=\"round\"/><line x1=\"340\" y1=\"378\" x2=\"400\" y2=\"378\" stroke=\"#8a8070\" stroke-width=\"1.5\" opacity=\"1\" stroke-linecap=\"round\"/><circle cx=\"540\" cy=\"340\" r=\"9\" fill=\"#d9a441\" opacity=\"1\"/><circle cx=\"540\" cy=\"340\" r=\"20\" fill=\"#d9a441\" opacity=\"0.25\"/><rect x=\"534\" y=\"350\" width=\"12\" height=\"40\" fill=\"#5c4a38\" rx=\"0\" opacity=\"1\"/><text x=\"240\" y=\"160\" font-size=\"20\" fill=\"#c9b489\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"6\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">隴西の李徴<\/text><\/svg>","paras":["　<ruby>隴西<rt>ろうさい<\/rt><\/ruby>の<ruby>李徴<rt>りちょう<\/rt><\/ruby>は<ruby>博学<rt>はくがく<\/rt><\/ruby><ruby>才穎<rt>さいえい<\/rt><\/ruby>、<ruby>天宝<rt>てんぽう<\/rt><\/ruby>の<ruby>末年<rt>まつねん<\/rt><\/ruby>、<ruby>若<rt>わか<\/rt><\/ruby>くして<ruby>名<rt>な<\/rt><\/ruby>を<ruby>虎榜<rt>こぼう<\/rt><\/ruby>に<ruby>連<rt>つら<\/rt><\/ruby>ね、ついで<ruby>江南尉<rt>こうなんい<\/rt><\/ruby>に<ruby>補<rt>ほ<\/rt><\/ruby>せられたが、<ruby>性<rt>せい<\/rt><\/ruby>、<ruby>狷介<rt>けんかい<\/rt><\/ruby>、<ruby>自<rt>みずか<\/rt><\/ruby>ら<ruby>恃<rt>たの<\/rt><\/ruby>むところ<ruby>頗<rt>すこぶ<\/rt><\/ruby>る<ruby>厚<rt>あつ<\/rt><\/ruby>く、<ruby>賤吏<rt>せんり<\/rt><\/ruby>に<ruby>甘<rt>あま<\/rt><\/ruby>んずるを<ruby>潔<rt>いさぎよ<\/rt><\/ruby>しとしなかった。いくばくもなく<ruby>官<rt>かん<\/rt><\/ruby>を<ruby>退<rt>しりぞ<\/rt><\/ruby>いた<ruby>後<rt>あと<\/rt><\/ruby>は、<ruby>故山<rt>こざん<\/rt><\/ruby>、<ruby>虢略<rt>かくりゃく<\/rt><\/ruby>に<ruby>帰臥<rt>きが<\/rt><\/ruby>し、<ruby>人<rt>ひと<\/rt><\/ruby>と<ruby>交<rt>まじわり<\/rt><\/ruby>を<ruby>絶<rt>た<\/rt><\/ruby>って、ひたすら<ruby>詩作<rt>しさく<\/rt><\/ruby>に<ruby>耽<rt>ふけ<\/rt><\/ruby>った。<ruby>下吏<rt>かり<\/rt><\/ruby>となって<ruby>長<rt>なが<\/rt><\/ruby>く<ruby>膝<rt>ひざ<\/rt><\/ruby>を<ruby>俗悪<rt>ぞくあく<\/rt><\/ruby>な<ruby>大官<rt>たいかん<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>に<ruby>屈<rt>くっ<\/rt><\/ruby>するよりは、<ruby>詩家<rt>しか<\/rt><\/ruby>としての<ruby>名<rt>な<\/rt><\/ruby>を<ruby>死後<rt>しご<\/rt><\/ruby><ruby>百<rt>ひゃく<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>に<ruby>遺<rt>のこ<\/rt><\/ruby>そうとしたのである。しかし、<ruby>文名<rt>ぶんめい<\/rt><\/ruby>は<ruby>容易<rt>ようい<\/rt><\/ruby>に<ruby>揚<rt>あが<\/rt><\/ruby>らず、<ruby>生活<rt>せいかつ<\/rt><\/ruby>は<ruby>日<rt>ひ<\/rt><\/ruby>を<ruby>逐<rt>お<\/rt><\/ruby>うて<ruby>苦<rt>くる<\/rt><\/ruby>しくなる。<ruby>李徴<rt>りちょう<\/rt><\/ruby>は<ruby>漸<rt>ようや<\/rt><\/ruby>く<ruby>焦躁<rt>しょうそう<\/rt><\/ruby>に<ruby>駆<rt>か<\/rt><\/ruby>られて<ruby>来<rt>き<\/rt><\/ruby>た。この<ruby>頃<rt>ころ<\/rt><\/ruby>からその<ruby>容貌<rt>ようぼう<\/rt><\/ruby>も<ruby>峭刻<rt>しょうこく<\/rt><\/ruby>となり、<ruby>肉<rt>にく<\/rt><\/ruby><ruby>落<rt>お<\/rt><\/ruby>ち<ruby>骨<rt>ほね<\/rt><\/ruby><ruby>秀<rt>ひい<\/rt><\/ruby>で、<ruby>眼光<rt>がんこう<\/rt><\/ruby>のみ<ruby>徒<rt>いたず<\/rt><\/ruby>らに<ruby>炯々<rt>けいけい<\/rt><\/ruby>として、<ruby>曾<rt>かつ<\/rt><\/ruby>て<ruby>進士<rt>しんし<\/rt><\/ruby>に<ruby>登第<rt>とうだい<\/rt><\/ruby>した<ruby>頃<rt>ころ<\/rt><\/ruby>の<ruby>豊頬<rt>ほうきょう<\/rt><\/ruby>の<ruby>美少年<rt>びしょうねん<\/rt><\/ruby>の<ruby>俤<rt>おもかげ<\/rt><\/ruby>は、<ruby>何処<rt>どこ<\/rt><\/ruby>に<ruby>求<rt>もと<\/rt><\/ruby>めようもない。<ruby>数<rt>すう<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>の<ruby>後<rt>あと<\/rt><\/ruby>、<ruby>貧窮<rt>ひんきゅう<\/rt><\/ruby>に<ruby>堪<rt>た<\/rt><\/ruby>えず、<ruby>妻子<rt>さいし<\/rt><\/ruby>の<ruby>衣<rt>い<\/rt><\/ruby><ruby>食<rt>しょく<\/rt><\/ruby>のために<ruby>遂<rt>つい<\/rt><\/ruby>に<ruby>節<rt>ふし<\/rt><\/ruby>を<ruby>屈<rt>くっ<\/rt><\/ruby>して、<ruby>再<rt>ふたた<\/rt><\/ruby>び<ruby>東<rt>ひがし<\/rt><\/ruby>へ<ruby>赴<rt>おもむ<\/rt><\/ruby>き、<ruby>一<rt>いち<\/rt><\/ruby><ruby>地方<rt>ちほう<\/rt><\/ruby><ruby>官吏<rt>かんり<\/rt><\/ruby>の<ruby>職<rt>しょく<\/rt><\/ruby>を<ruby>奉<rt>ほう<\/rt><\/ruby>ずることになった。<ruby>一方<rt>いっぽう<\/rt><\/ruby>、これは、<ruby>己<rt>おのれ<\/rt><\/ruby>の<ruby>詩業<rt>しぎょう<\/rt><\/ruby>に<ruby>半<rt>なか<\/rt><\/ruby>ば<ruby>絶望<rt>ぜつぼう<\/rt><\/ruby>したためでもある。<ruby>曾<rt>かつ<\/rt><\/ruby>ての<ruby>同輩<rt>どうはい<\/rt><\/ruby>は<ruby>既<rt>すで<\/rt><\/ruby>に<ruby>遥<rt>はる<\/rt><\/ruby>か<ruby>高位<rt>こうい<\/rt><\/ruby>に<ruby>進<rt>すす<\/rt><\/ruby>み、<ruby>彼<rt>かれ<\/rt><\/ruby>が<ruby>昔<rt>むかし<\/rt><\/ruby>、<ruby>鈍物<rt>どんぶつ<\/rt><\/ruby>として<ruby>歯牙<rt>しが<\/rt><\/ruby>にもかけなかったその<ruby>連中<rt>れんちゅう<\/rt><\/ruby>の<ruby>下命<rt>かめい<\/rt><\/ruby>を<ruby>拝<rt>はい<\/rt><\/ruby>さねばならぬことが、<ruby>往年<rt>おうねん<\/rt><\/ruby>の<ruby>儁才<rt>しゅんさい<\/rt><\/ruby><ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>自尊心<rt>じそんしん<\/rt><\/ruby>を<ruby>如何<rt>いか<\/rt><\/ruby>に<ruby>傷<rt>きずつ<\/rt><\/ruby>けたかは、<ruby>想像<rt>そうぞう<\/rt><\/ruby>に<ruby>難<rt>かた<\/rt><\/ruby>くない。<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>怏々<rt>おうおう<\/rt><\/ruby>として<ruby>楽<rt>たの<\/rt><\/ruby>しまず、<ruby>狂悖<rt>きょうはい<\/rt><\/ruby>の<ruby>性<rt>せい<\/rt><\/ruby>は<ruby>愈々<rt>いよいよ<\/rt><\/ruby><ruby>抑<rt>おさ<\/rt><\/ruby>え<ruby>難<rt>がた<\/rt><\/ruby>くなった。<ruby>一<rt>いち<\/rt><\/ruby><ruby>年<rt>ねん<\/rt><\/ruby>の<ruby>後<rt>あと<\/rt><\/ruby>、<ruby>公用<rt>こうよう<\/rt><\/ruby>で<ruby>旅<rt>たび<\/rt><\/ruby>に<ruby>出<rt>で<\/rt><\/ruby>、<ruby>汝水<rt>じょすい<\/rt><\/ruby>のほとりに<ruby>宿<rt>やど<\/rt><\/ruby>った<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>遂<rt>つい<\/rt><\/ruby>に<ruby>発狂<rt>はっきょう<\/rt><\/ruby>した。<ruby>或<rt>ある<\/rt><\/ruby><ruby>夜半<rt>やはん<\/rt><\/ruby>、<ruby>急<rt>きゅう<\/rt><\/ruby>に<ruby>顔色<rt>かおいろ<\/rt><\/ruby>を<ruby>変<rt>か<\/rt><\/ruby>えて<ruby>寝床<rt>ねどこ<\/rt><\/ruby>から<ruby>起上<rt>おきあが<\/rt><\/ruby>ると、<ruby>何<rt>なん<\/rt><\/ruby>か<ruby>訳<rt>わけ<\/rt><\/ruby>の<ruby>分<rt>わか<\/rt><\/ruby>らぬことを<ruby>叫<rt>さけ<\/rt><\/ruby>びつつそのまま<ruby>下<rt>した<\/rt><\/ruby>にとび<ruby>下<rt>お<\/rt><\/ruby>りて、<ruby>闇<rt>やみ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>へ<ruby>駈出<rt>かけだ<\/rt><\/ruby>した。<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>二<rt>に<\/rt><\/ruby><ruby>度<rt>ど<\/rt><\/ruby>と<ruby>戻<rt>もど<\/rt><\/ruby>って<ruby>来<rt>こ<\/rt><\/ruby>なかった。<ruby>附近<rt>ふきん<\/rt><\/ruby>の<ruby>山野<rt>さんや<\/rt><\/ruby>を<ruby>捜索<rt>そうさく<\/rt><\/ruby>しても、<ruby>何<rt>なん<\/rt><\/ruby>の<ruby>手掛<rt>てがか<\/rt><\/ruby>りもない。その<ruby>後<rt>あと<\/rt><\/ruby><ruby>李徴<rt>りちょう<\/rt><\/ruby>がどうなったかを<ruby>知<rt>し<\/rt><\/ruby>る<ruby>者<rt>もの<\/rt><\/ruby>は、<ruby>誰<rt>だれ<\/rt><\/ruby>もなかった。","　<ruby>翌年<rt>よくねん<\/rt><\/ruby>、<ruby>監察御史<rt>かんさつぎょし<\/rt><\/ruby>、<ruby>陳郡<rt>ちんぐん<\/rt><\/ruby>の<ruby>袁傪<rt>えんさん<\/rt><\/ruby>という<ruby>者<rt>もの<\/rt><\/ruby>、<ruby>勅命<rt>ちょくめい<\/rt><\/ruby>を<ruby>奉<rt>ほう<\/rt><\/ruby>じて<ruby>嶺南<rt>れいなん<\/rt><\/ruby>に<ruby>使<rt>つかい<\/rt><\/ruby>し、<ruby>途<rt>みち<\/rt><\/ruby>に<ruby>商於<rt>しょうお<\/rt><\/ruby>の<ruby>地<rt>ち<\/rt><\/ruby>に<ruby>宿<rt>やど<\/rt><\/ruby>った。<ruby>次<rt>つぎ<\/rt><\/ruby>の<ruby>朝<rt>あさ<\/rt><\/ruby><ruby>未<rt>ま<\/rt><\/ruby>だ<ruby>暗<rt>くら<\/rt><\/ruby>い<ruby>中<rt>うち<\/rt><\/ruby>に<ruby>出発<rt>しゅっぱつ<\/rt><\/ruby>しようとしたところ、<ruby>駅吏<rt>えきり<\/rt><\/ruby>が<ruby>言<rt>い<\/rt><\/ruby>うことに、これから<ruby>先<rt>さき<\/rt><\/ruby>の<ruby>道<rt>みち<\/rt><\/ruby>に<ruby>人喰虎<rt>ひとくいどら<\/rt><\/ruby>が<ruby>出<rt>で<\/rt><\/ruby>る<ruby>故<rt>ゆえ<\/rt><\/ruby>、<ruby>旅人<rt>たびびと<\/rt><\/ruby>は<ruby>白昼<rt>はくちゅう<\/rt><\/ruby>でなければ、<ruby>通<rt>とお<\/rt><\/ruby>れない。<ruby>今<rt>いま<\/rt><\/ruby>はまだ<ruby>朝<rt>あさ<\/rt><\/ruby>が<ruby>早<rt>はや<\/rt><\/ruby>いから、<ruby>今<rt>いま<\/rt><\/ruby><ruby>少<rt>すこ<\/rt><\/ruby>し<ruby>待<rt>ま<\/rt><\/ruby>たれたが<ruby>宜<rt>よろ<\/rt><\/ruby>しいでしょうと。<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は、しかし、<ruby>供廻<rt>ともまわ<\/rt><\/ruby>りの<ruby>多勢<rt>おおぜい<\/rt><\/ruby>なのを<ruby>恃<rt>たの<\/rt><\/ruby>み、<ruby>駅吏<rt>えきり<\/rt><\/ruby>の<ruby>言葉<rt>ことば<\/rt><\/ruby>を<ruby>斥<rt>しりぞ<\/rt><\/ruby>けて、<ruby>出発<rt>しゅっぱつ<\/rt><\/ruby>した。<ruby>残月<rt>ざんげつ<\/rt><\/ruby>の<ruby>光<rt>ひかり<\/rt><\/ruby>をたよりに<ruby>林中<rt>りんちゅう<\/rt><\/ruby>の<ruby>草地<rt>くさち<\/rt><\/ruby>を<ruby>通<rt>とお<\/rt><\/ruby>って<ruby>行<rt>い<\/rt><\/ruby>った<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>果<rt>はた<\/rt><\/ruby>して<ruby>一<rt>いち<\/rt><\/ruby><ruby>匹<rt>ひき<\/rt><\/ruby>の<ruby>猛虎<rt>もうこ<\/rt><\/ruby>が<ruby>叢<rt>くさむら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>から躍り<ruby>出<rt>おどりで<\/rt><\/ruby>た。<ruby>虎<rt>とら<\/rt><\/ruby>は、あわや<ruby>袁傪<rt>えんさん<\/rt><\/ruby>に<ruby>躍<rt>おど<\/rt><\/ruby>りかかるかと<ruby>見<rt>み<\/rt><\/ruby>えたが、<ruby>忽<rt>たちま<\/rt><\/ruby>ち<ruby>身<rt>み<\/rt><\/ruby>を<ruby>飜<rt>ひるがえ<\/rt><\/ruby>して、<ruby>元<rt>もと<\/rt><\/ruby>の<ruby>叢<rt>くさむら<\/rt><\/ruby>に<ruby>隠<rt>かく<\/rt><\/ruby>れた。<ruby>叢<rt>くさむら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>から<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>で「あぶないところだった」と<ruby>繰返<rt>くりかえ<\/rt><\/ruby>し<ruby>呟<rt>つぶや<\/rt><\/ruby>くのが<ruby>聞<rt>きこ<\/rt><\/ruby>えた。その<ruby>声<rt>こえ<\/rt><\/ruby>に<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>聞<rt>き<\/rt><\/ruby>き<ruby>憶<rt>おぼ<\/rt><\/ruby>えがあった。<ruby>驚懼<rt>きょうく<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>にも、<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>咄嗟<rt>とっさ<\/rt><\/ruby>に<ruby>思<rt>おも<\/rt><\/ruby>いあたって、<ruby>叫<rt>さけ<\/rt><\/ruby>んだ。「その<ruby>声<rt>こえ<\/rt><\/ruby>は、<ruby>我<rt>わ<\/rt><\/ruby>が<ruby>友<rt>とも<\/rt><\/ruby>、<ruby>李徴<rt>りちょう<\/rt><\/ruby><ruby>子<rt>し<\/rt><\/ruby>ではないか？」<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>李徴<rt>りちょう<\/rt><\/ruby>と<ruby>同年<rt>どうねん<\/rt><\/ruby>に<ruby>進士<rt>しんし<\/rt><\/ruby>の<ruby>第<rt>だい<\/rt><\/ruby>に<ruby>登<rt>のぼ<\/rt><\/ruby>り、<ruby>友人<rt>ゆうじん<\/rt><\/ruby>の<ruby>少<rt>すくな<\/rt><\/ruby>かった<ruby>李徴<rt>りちょう<\/rt><\/ruby>にとっては、<ruby>最<rt>もっと<\/rt><\/ruby>も<ruby>親<rt>した<\/rt><\/ruby>しい<ruby>友<rt>とも<\/rt><\/ruby>であった。<ruby>温和<rt>おんわ<\/rt><\/ruby>な<ruby>袁傪<rt>えんさん<\/rt><\/ruby>の<ruby>性格<rt>せいかく<\/rt><\/ruby>が、<ruby>峻峭<rt>しゅんしょう<\/rt><\/ruby>な<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>性情<rt>せいじょう<\/rt><\/ruby>と<ruby>衝突<rt>しょうとつ<\/rt><\/ruby>しなかったためであろう。"],"speech":["ろうさいのりちょうははくがくさいえい、てんぽうのまつねん、わかくしてなをこぼうにつらね、ついでこうなんいにほせられたが、せい、けんかい、みずからたのむところすこぶるあつく、せんりにあまんずるをいさぎよしとしなかった。いくばくもなくかんをしりぞいたあとは、こざん、かくりゃくにきがし、ひととまじわりをたって、ひたすらしさくにふけった。かりとなってながくひざをぞくあくなたいかんのまえにくっするよりは、しかとしてのなをしごひゃくねんにのこそうとしたのである。しかし、ぶんめいはよういにあがらず、せいかつはひをおうてくるしくなる。りちょうはようやくしょうそうにかられてきた。このころからそのようぼうもしょうこくとなり、にくおちほねひいで、がんこうのみいたずらにけいけいとして、かつてしんしにとうだいしたころのほうきょうのびしょうねんのおもかげは、どこにもとめようもない。すうねんのあと、ひんきゅうにたえず、さいしのいしょくのためについにふしをくっして、ふたたびひがしへおもむき、いちちほうかんりのしょくをほうずることになった。いっぽう、これは、おのれのしぎょうになかばぜつぼうしたためでもある。かつてのどうはいはすでにはるかこういにすすみ、かれがむかし、どんぶつとしてしがにもかけなかったそのれんちゅうのかめいをはいさねばならぬことが、おうねんのしゅんさいりちょうのじそんしんをいかにきずつけたかは、そうぞうにかたくない。かれはおうおうとしてたのしまず、きょうはいのせいはいよいよおさえがたくなった。いちねんのあと、こうようでたびにで、じょすいのほとりにやどったとき、ついにはっきょうした。あるやはん、きゅうにかおいろをかえてねどこからおきあがると、なんかわけのわからぬことをさけびつつそのまましたにとびおりて、やみのなかへかけだした。かれはにどともどってこなかった。ふきんのさんやをそうさくしても、なんのてがかりもない。そのあとりちょうがどうなったかをしるものは、だれもなかった。","よくねん、かんさつぎょし、ちんぐんのえんさんというもの、ちょくめいをほうじてれいなんにつかいし、みちにしょうおのちにやどった。つぎのあさまだくらいうちにしゅっぱつしようとしたところ、えきりがいうことに、これからさきのみちにひとくいどらがでるゆえ、たびびとははくちゅうでなければ、とおれない。いまはまだあさがはやいから、いますこしまたれたがよろしいでしょうと。えんさんは、しかし、ともまわりのおおぜいなのをたのみ、えきりのことばをしりぞけて、しゅっぱつした。ざんげつのひかりをたよりにりんちゅうのくさちをとおっていったとき、はたしていちひきのもうこがくさむらのなかから躍りおどりでた。とらは、あわやえんさんにおどりかかるかとみえたが、たちまちみをひるがえして、もとのくさむらにかくれた。くさむらのなかからにんげんのこえで「あぶないところだった」とくりかえしつぶやくのがきこえた。そのこえにえんさんはききおぼえがあった。きょうくのなかにも、かれはとっさにおもいあたって、さけんだ。「そのこえは、わがとも、りちょうしではないか？」えんさんはりちょうとどうねんにしんしのだいにのぼり、ゆうじんのすくなかったりちょうにとっては、もっともしたしいともであった。おんわなえんさんのせいかくが、しゅんしょうなりちょうのせいじょうとしょうとつしなかったためであろう。"]},{"t":"叢中の声","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#242e2a\"/><circle cx=\"140\" cy=\"90\" r=\"68.0\" fill=\"#d8ccb8\" opacity=\"0.13\"/><circle cx=\"140\" cy=\"90\" r=\"40\" fill=\"#d8ccb8\" opacity=\"1\"/><rect x=\"0\" y=\"350\" width=\"800\" height=\"100\" fill=\"#3a3a2c\" rx=\"0\" opacity=\"0.9\"/><path d=\"M480 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M520 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M560 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M600 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M640 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M680 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M720 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M760 400 q8 -60 -6 -96 q18 30 14 96 z\" fill=\"#2f3d28\" stroke=\"none\" stroke-width=\"0\" opacity=\"1\" stroke-linecap=\"round\"/><circle cx=\"600\" cy=\"320\" r=\"6\" fill=\"#d9a441\" opacity=\"1\"/><circle cx=\"640\" cy=\"316\" r=\"6\" fill=\"#d9a441\" opacity=\"1\"/><polygon points=\"200.05,396 205.3,335.1 213.7,318.3 227.35,318.3 234.7,335.1 239.95,396\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"220\" cy=\"305.7\" r=\"13.65\" fill=\"#4a3f2e\" opacity=\"1\"/><polygon points=\"199.0,299.4 241.0,299.4 220,284.7\" fill=\"#4a3f2e\" opacity=\"1\"/><circle cx=\"258\" cy=\"330\" r=\"8\" fill=\"#d9a441\" opacity=\"0.9\"/><rect x=\"254\" y=\"338\" width=\"8\" height=\"26\" fill=\"#5c4a38\" rx=\"0\" opacity=\"1\"/><polygon points=\"112.9,400 117.4,347.8 124.6,333.4 136.3,333.4 142.6,347.8 147.1,400\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"130\" cy=\"322.6\" r=\"11.700000000000001\" fill=\"#3a3226\" opacity=\"1\"/><polygon points=\"292.9,402 297.4,349.8 304.6,335.4 316.3,335.4 322.6,349.8 327.1,402\" fill=\"#3a3226\" opacity=\"1\"/><circle cx=\"310\" cy=\"324.6\" r=\"11.700000000000001\" fill=\"#3a3226\" opacity=\"1\"/><g fill=\"#d8ccb8\" opacity=\"0.7\"><circle cx=\"242\" cy=\"138\" r=\"1.2\"/><circle cx=\"379\" cy=\"67\" r=\"1.9\"/><circle cx=\"516\" cy=\"156\" r=\"2.5999999999999996\"/><circle cx=\"653\" cy=\"85\" r=\"1.2\"/><circle cx=\"50\" cy=\"14\" r=\"1.9\"/><circle cx=\"187\" cy=\"103\" r=\"2.5999999999999996\"/><circle cx=\"324\" cy=\"32\" r=\"1.2\"/><circle cx=\"461\" cy=\"121\" r=\"1.9\"/><circle cx=\"598\" cy=\"50\" r=\"2.5999999999999996\"/><circle cx=\"735\" cy=\"139\" r=\"1.2\"/><circle cx=\"132\" cy=\"68\" r=\"1.9\"/><circle cx=\"269\" cy=\"157\" r=\"2.5999999999999996\"/><\/g><\/svg>","paras":["　<ruby>叢<rt>くさむら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>からは、<ruby>暫<rt>しばら<\/rt><\/ruby>く<ruby>返辞<rt>へんじ<\/rt><\/ruby>が<ruby>無<rt>な<\/rt><\/ruby>かった。しのび<ruby>泣<rt>な<\/rt><\/ruby>きかと<ruby>思<rt>おも<\/rt><\/ruby>われる<ruby>微<rt>かす<\/rt><\/ruby>かな<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>時々<rt>ときどき<\/rt><\/ruby><ruby>洩<rt>も<\/rt><\/ruby>れるばかりである。ややあって、<ruby>低<rt>ひく<\/rt><\/ruby>い<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>答<rt>こた<\/rt><\/ruby>えた。「<ruby>如何<rt>いか<\/rt><\/ruby>にも<ruby>自分<rt>じぶん<\/rt><\/ruby>は<ruby>隴西<rt>ろうせい<\/rt><\/ruby>の<ruby>李徴<rt>りちょう<\/rt><\/ruby>である」と。","　<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>恐怖<rt>きょうふ<\/rt><\/ruby>を<ruby>忘<rt>わす<\/rt><\/ruby>れ、<ruby>馬<rt>うま<\/rt><\/ruby>から<ruby>下<rt>お<\/rt><\/ruby>りて<ruby>叢<rt>くさむら<\/rt><\/ruby>に<ruby>近<rt>ちか<\/rt><\/ruby>づき、<ruby>懐<rt>なつ<\/rt><\/ruby>かしげに<ruby>久闊<rt>きゅうかつ<\/rt><\/ruby>を<ruby>叙<rt>じょ<\/rt><\/ruby>した。そして、<ruby>何故<rt>なぜ<\/rt><\/ruby><ruby>叢<rt>くさむら<\/rt><\/ruby>から<ruby>出<rt>で<\/rt><\/ruby>て<ruby>来<rt>こ<\/rt><\/ruby>ないのかと<ruby>問<rt>と<\/rt><\/ruby>うた。<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>答<rt>こた<\/rt><\/ruby>えて<ruby>言<rt>ゆ<\/rt><\/ruby>う。<ruby>自分<rt>じぶん<\/rt><\/ruby>は<ruby>今<rt>いま<\/rt><\/ruby>や<ruby>異類<rt>いるい<\/rt><\/ruby>の<ruby>身<rt>み<\/rt><\/ruby>となっている。どうして、おめおめと<ruby>故人<rt>とも<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>にあさましい<ruby>姿<rt>すがた<\/rt><\/ruby>をさらせようか。かつ<ruby>又<rt>また<\/rt><\/ruby>、<ruby>自分<rt>じぶん<\/rt><\/ruby>が<ruby>姿<rt>すがた<\/rt><\/ruby>を<ruby>現<rt>あらわ<\/rt><\/ruby>せば、<ruby>必<rt>かなら<\/rt><\/ruby>ず<ruby>君<rt>きみ<\/rt><\/ruby>に<ruby>畏怖嫌厭<rt>いふけんえん<\/rt><\/ruby>の<ruby>情<rt>じょう<\/rt><\/ruby>を<ruby>起<rt>おこ<\/rt><\/ruby>させるに<ruby>決<rt>きま<\/rt><\/ruby>っているからだ。しかし、<ruby>今<rt>いま<\/rt><\/ruby>、<ruby>図<rt>はか<\/rt><\/ruby>らずも<ruby>故人<rt>こじん<\/rt><\/ruby>に<ruby>遇<rt>あ<\/rt><\/ruby>うことを<ruby>得<rt>え<\/rt><\/ruby>て、<ruby>愧赧<rt>きたん<\/rt><\/ruby>の<ruby>念<rt>ねん<\/rt><\/ruby>をも<ruby>忘<rt>わす<\/rt><\/ruby>れる<ruby>程<rt>ほど<\/rt><\/ruby>に<ruby>懐<rt>なつ<\/rt><\/ruby>かしい。どうか、ほんの<ruby>暫<rt>しばら<\/rt><\/ruby>くでいいから、<ruby>我<rt>わ<\/rt><\/ruby>が<ruby>醜悪<rt>しゅうあく<\/rt><\/ruby>な<ruby>今<rt>いま<\/rt><\/ruby>の<ruby>外形<rt>がいけい<\/rt><\/ruby>を<ruby>厭<rt>いと<\/rt><\/ruby>わず、<ruby>曾<rt>かつ<\/rt><\/ruby>て<ruby>君<rt>きみ<\/rt><\/ruby>の<ruby>友李<rt>ゆうり<\/rt><\/ruby><ruby>徴<rt>しるし<\/rt><\/ruby>であったこの<ruby>自分<rt>じぶん<\/rt><\/ruby>と<ruby>話<rt>はなし<\/rt><\/ruby>を<ruby>交<rt>かわ<\/rt><\/ruby>してくれないだろうか。","　<ruby>後<rt>あと<\/rt><\/ruby>で<ruby>考<rt>かんが<\/rt><\/ruby>えれば<ruby>不思議<rt>ふしぎ<\/rt><\/ruby>だったが、その<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は、この<ruby>超自然<rt>ちょうしぜん<\/rt><\/ruby>の<ruby>怪異<rt>かいい<\/rt><\/ruby>を、<ruby>実<rt>じつ<\/rt><\/ruby>に<ruby>素直<rt>すなお<\/rt><\/ruby>に<ruby>受容<rt>うけい<\/rt><\/ruby>れて、<ruby>少<rt>すこ<\/rt><\/ruby>しも<ruby>怪<rt>かい<\/rt><\/ruby>もうとしなかった。<ruby>彼<rt>かれ<\/rt><\/ruby>は<ruby>部下<rt>ぶか<\/rt><\/ruby>に<ruby>命<rt>めい<\/rt><\/ruby>じて<ruby>行列<rt>ぎょうれつ<\/rt><\/ruby>の<ruby>進行<rt>しんこう<\/rt><\/ruby>を<ruby>停<rt>と<\/rt><\/ruby>め、<ruby>自分<rt>じぶん<\/rt><\/ruby>は<ruby>叢<rt>くさむら<\/rt><\/ruby>の<ruby>傍<rt>かたわら<\/rt><\/ruby>に<ruby>立<rt>た<\/rt><\/ruby>って、<ruby>見<rt>み<\/rt><\/ruby>えざる<ruby>声<rt>こえ<\/rt><\/ruby>と<ruby>対談<rt>たいだん<\/rt><\/ruby>した。<ruby>都<rt>と<\/rt><\/ruby>の<ruby>噂<rt>うわさ<\/rt><\/ruby>、<ruby>旧友<rt>きゅうゆう<\/rt><\/ruby>の<ruby>消息<rt>しょうそく<\/rt><\/ruby>、<ruby>袁傪<rt>えんさん<\/rt><\/ruby>が<ruby>現在<rt>げんざい<\/rt><\/ruby>の<ruby>地位<rt>ちい<\/rt><\/ruby>、それに<ruby>対<rt>たい<\/rt><\/ruby>する<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>祝辞<rt>しゅくじ<\/rt><\/ruby>。<ruby>青年<rt>せいねん<\/rt><\/ruby><ruby>時代<rt>じだい<\/rt><\/ruby>に<ruby>親<rt>した<\/rt><\/ruby>しかった<ruby>者<rt>もの<\/rt><\/ruby><ruby>同志<rt>どうし<\/rt><\/ruby>の、あの<ruby>隔<rt>へだ<\/rt><\/ruby>てのない<ruby>語調<rt>ごちょう<\/rt><\/ruby>で、それ<ruby>等<rt>ら<\/rt><\/ruby>が<ruby>語<rt>かた<\/rt><\/ruby>られた<ruby>後<rt>あと<\/rt><\/ruby>、<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は、<ruby>李徴<rt>りちょう<\/rt><\/ruby>がどうして<ruby>今<rt>いま<\/rt><\/ruby>の<ruby>身<rt>み<\/rt><\/ruby>となるに<ruby>至<rt>いた<\/rt><\/ruby>ったかを<ruby>訊<rt>たず<\/rt><\/ruby>ねた。<ruby>草<rt>くさ<\/rt><\/ruby><ruby>中<rt>ちゅう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>は<ruby>次<rt>つぎ<\/rt><\/ruby>のように<ruby>語<rt>かた<\/rt><\/ruby>った。"],"speech":["くさむらのなかからは、しばらくへんじがなかった。しのびなきかとおもわれるかすかなこえがときどきもれるばかりである。ややあって、ひくいこえがこたえた。「いかにもじぶんはろうせいのりちょうである」と。","えんさんはきょうふをわすれ、うまからおりてくさむらにちかづき、なつかしげにきゅうかつをじょした。そして、なぜくさむらからでてこないのかととうた。りちょうのこえがこたえてゆう。じぶんはいまやいるいのみとなっている。どうして、おめおめととものまえにあさましいすがたをさらせようか。かつまた、じぶんがすがたをあらわせば、かならずきみにいふけんえんのじょうをおこさせるにきまっているからだ。しかし、いま、はからずもこじんにあうことをえて、きたんのねんをもわすれるほどになつかしい。どうか、ほんのしばらくでいいから、わがしゅうあくないまのがいけいをいとわず、かつてきみのゆうりしるしであったこのじぶんとはなしをかわしてくれないだろうか。","あとでかんがえればふしぎだったが、そのとき、えんさんは、このちょうしぜんのかいいを、じつにすなおにうけいれて、すこしもかいもうとしなかった。かれはぶかにめいじてぎょうれつのしんこうをとめ、じぶんはくさむらのかたわらにたって、みえざるこえとたいだんした。とのうわさ、きゅうゆうのしょうそく、えんさんがげんざいのちい、それにたいするりちょうのしゅくじ。せいねんじだいにしたしかったものどうしの、あのへだてのないごちょうで、それらがかたられたあと、えんさんは、りちょうがどうしていまのみとなるにいたったかをたずねた。くさちゅうのこえはつぎのようにかたった。"]},{"t":"虎になった夜","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#111a16\"/><circle cx=\"620\" cy=\"100\" r=\"78.2\" fill=\"#d8ccb8\" opacity=\"0.13\"/><circle cx=\"620\" cy=\"100\" r=\"46\" fill=\"#d8ccb8\" opacity=\"1\"/><polygon points=\"40,450 66,230 92,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"150,450 176,200 202,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"260,450 286,170 312,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"370,450 396,230 422,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"480,450 506,200 532,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"590,450 616,170 642,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"700,450 726,230 752,450\" fill=\"#1d2818\" opacity=\"0.95\"/><polygon points=\"309.4,420 338.0,382.6 351.2,373.8 327.0,417.8\" fill=\"#e0d8c4\" opacity=\"1\"/><polygon points=\"368.8,371.6 388.6,402.4 401.8,404.6 379.8,369.4\" fill=\"#e0d8c4\" opacity=\"1\"/><polygon points=\"342.4,376.0 353.4,336.4 377.6,340.8 373.2,378.2\" fill=\"#e0d8c4\" opacity=\"1\"/><polygon points=\"351.2,343.0 322.6,356.2 318.2,365.0 349.0,351.8\" fill=\"#e0d8c4\" opacity=\"1\"/><polygon points=\"3 uby>録<rt>ろく<\/rt><\/ruby>して<ruby>戴<rt>いただ<\/rt><\/ruby>きたいのだ。<ruby>何<rt>なん<\/rt><\/ruby>も、これに<ruby>仍<rt>よ<\/rt><\/ruby>って<ruby>一人前<rt>いちにんまえ<\/rt><\/ruby>の<ruby>詩人<rt>しじん<\/rt><\/ruby><ruby>面<rt>づら<\/rt><\/ruby>をしたいのではない。<ruby>作<rt>さく<\/rt><\/ruby>の<ruby>巧拙<rt>こうせつ<\/rt><\/ruby>は<ruby>知<rt>し<\/rt><\/ruby>らず、とにかく、<ruby>産<rt>さん<\/rt><\/ruby>を<ruby>破<rt>やぶ<\/rt><\/ruby>り<ruby>心<rt>こころ<\/rt><\/ruby>を<ruby>狂<rt>くる<\/rt><\/ruby>わせてまで<ruby>自分<rt>じぶん<\/rt><\/ruby>が<ruby>生涯<rt>しょうがい<\/rt><\/ruby>それに<ruby>執着<rt>しゅうちゃく<\/rt><\/ruby>したところのものを、<ruby>一部<rt>いちぶ<\/rt><\/ruby>なりとも<ruby>後代<rt>こうだい<\/rt><\/ruby>に<ruby>伝<rt>つた<\/rt><\/ruby>えないでは、<ruby>死<rt>し<\/rt><\/ruby>んでも<ruby>死<rt>し<\/rt><\/ruby>に<ruby>切<rt>き<\/rt><\/ruby>れないのだ。"],"speech":["いまからいちねんほどまえ、じぶんがたびにでてなんじみずのほとりにとまったよるのこと、いっすいしてから、ふとめをさますと、こがいでだれかがわがなをよんでいる。こえにおうじてそとへでてみると、こえはやみのなかからしきりにじぶんをまねく。おぼえず、じぶんはこえをおうてはしりだした。むがむちゅうでかけていくなかに、いつしかとはさんりんにはいり、しかも、しらぬまにじぶんはさゆうのてでちをつかんではしっていた。なんかからだなかにちからがみちみちたようなかんじで、けいけいとがんせきを跳びとびこえていった。きがつくと、てさきやひじのあたりにけをしょうじているらしい。すこしあかるくなってから、たにがわにのぞんですがたをうつしてみると、すでにとらとなっていた。じぶんははじめめをしんじなかった。つぎに、これはゆめにちがいないとかんがえた。ゆめのなかで、これはゆめだぞとしっているようなゆめを、じぶんはそれまでにみたことがあったから。どうしてもゆめでないとさとらねばならなかったとき、じぶんはぼうぜんとした。そうしておそれた。まったく、どんなことでもおこりえるのだとおもうて、ふかくおそれた。しかし、なぜこんなことになったのだろう。わからぬ。まったくなにごともわれわれにはわからぬ。りゆうもわからずにおしつけられたものをおとなしくうけとって、りゆうもわからずにいきていくのが、われわれいきもののさだめだ。じぶんはすぐにしをおもうた。しかし、そのとき、めのまえをいちひきのうさぎがかけすぎるのをみたとたんに、じぶんのなかのにんげんはたちまちすがたをけした。ふたたびじぶんのなかのにんげんがめをさましたとき、じぶんのくちはうさぎのちにまみれ、あたりには兎のうのけがちらばっていた。これがとらとしてのさいしょのけいけんであった。それいらいいままでにどんなしょぎょうをしつづけてきたか、それはとうていかたるにしのびない。ただ、いちにちのなかにかならずすうじかんは、にんげんのこころがかえってくる。そういうときには、かつてのひとおなじく、じんごもあやつれれば、ふくざつなしこうにもこらえうるし、けいしょのしょうくをそらんずることもできる。そのにんげんのこころで、とらとしてのおのれのざんぎゃくなおこないのあとをみ、おのれのうんめいをふりかえるときが、もっともなさけなく、おそろしく、いきどおろしい。しかし、その、にんげんにかえるすうじかんも、ひをへるにしたがってしだいにみじかくなっていく。いままでは、どうしてとらなどになったかとあやしんでいたのに、このあいだひょいときがついてみたら、おれはどうしていぜん、にんげんだったのかとかんがえていた。これはおそろしいことだ。いますこしたてば、おれのなかのにんげんのこころは、けものとしてのしゅうかんのなかにすっかりうもれてきえてしまうだろう。ちょうど、ふるいきゅうでんのいしずえがしだいにどしゃにまいぼつするように。そうすれば、しまいにおのれはじぶんのかこをわすれはて、いちひきのとらとしてくるいまわり、きょうのようにとできみとであってもともとみとめることなく、きみをさきくろうてなんのかいもかんじないだろう。いったい、けものでもにんげんでも、もとはなんかほかのものだったんだろう。はじめはそれをおぼえているが、しだいにわすれてしまい、はじめからいまのかたちのものだったと思いおもいこんでいるのではないか？いや、そんなことはどうでもいい。おのれのなかのにんげんのこころがすっかりきえてしまえば、おそらく、そのほうが、おのれはしあわせになれるだろう。だのに、おのれのなかのにんげんは、そのことを、このうえなくおそろしくかんじているのだ。ああ、まったく、どんなに、おそろしく、かなしく、せつなくおもっているだろう！おのがにんげんだったきおくのなくなることを。このきもちはだれにもわからない。だれにもわからない。おのれとおなじ身のみのうえになったものでなければ。ところで、そうだ。おのがすっかりにんげんでなくなってしまうまえに、ひとつたのんでおきたいことがある。","えんさんはじめいっこうは、いきをのんで、そうちゅうのこえのかたるふしぎにききいっていた。こえはつづけてゆう。","たでもない。じぶんはがんらいしじんとしてなをなすつもりでいた。しかも、ごういまだならざるに、このうんめいにたちいたった。かつてつくるところのしすーひゃくぺん、もとより、まだよにおこなわれておらぬ。いこうのしょざいももはやわからなくなっていよう。ところで、そのなか、いまもなおきしょうせるものがすうじゅうある。これをわがためにでんろくしていただきたいのだ。なんも、これによっていちにんまえのしじんづらをしたいのではない。さくのこうせつはしらず、とにかく、さんをやぶりこころをくるわせてまでじぶんがしょうがいそれにしゅうちゃくしたところのものを、いちぶなりともこうだいにつたえないでは、しんでもしにきれないのだ。"]},{"t":"月に吠える詩","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#16211c\"/><circle cx=\"400\" cy=\"130\" r=\"119.0\" fill=\"#f2ecd9\" opacity=\"0.13\"/><circle cx=\"400\" cy=\"130\" r=\"70\" fill=\"#f2ecd9\" opacity=\"1\"/><g transform=\"translate(370 420) scale(1.8 1.8)\"><path d=\"M-52 0 q-10 -34 6 -46 q20 -14 52 -12 q26 2 34 20 q6 14 2 38 l-12 0 q2 -18 -6 -26 l-4 26 l-14 0 l-2 -24 l-28 -2 l-4 26 l-14 0 q-2 -16 -6 -22 z\" fill=\"#d9913f\"/><path d=\"M-50 -40 q-22 4 -26 22\" stroke=\"#d9913f\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M-34 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M-18 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M-2 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M14 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><circle cx=\"46\" cy=\"-52\" r=\"18\" fill=\"#d9913f\"/><polygon points=\"58,-50 76,-44 58,-38\" fill=\"#d9913f\"/><polygon points=\"34,-66 30,-80 44,-70\" fill=\"#d9913f\"/><polygon points=\"52,-68 60,-82 62,-66\" fill=\"#d9913f\"/><circle cx=\"52\" cy=\"-54\" r=\"2.2\" fill=\"#3a2f28\"/><path d=\"M40 -70 q4 8 0 12 M52 -72 q4 8 0 12\" stroke=\"#3a2f28\" stroke-width=\"3.5\" fill=\"none\"/><\/g><path d=\"M560 450 q4 -40 -4 -66 q12 24 10 66 z\" fill=\"#3f4c46\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.9\" stroke-linecap=\"round\"/><path d=\"M596 450 q4 -40 -4 -66 q12 24 10 66 z\" fill=\"#3f4c46\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.9\" stroke-linecap=\"round\"/><path d=\"M632 450 q4 -40 -4 -66 q12 24 10 66 z\" fill=\"#3f4c46\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.9\" stroke-linecap=\"round\"/><path d=\"M668 450 q4 -40 -4 -66 q12 24 10 66 z\" fill=\"#3f4c46\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.9\" stroke-linecap=\"round\"/><path d=\"M704 450 q4 -40 -4 -66 q12 24 10 66 z\" fill=\"#3f4c46\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.9\" stroke-linecap=\"round\"/><path d=\"M740 450 q4 -40 -4 -66 q12 24 10 66 z\" fill=\"#3f4c46\" stroke=\"none\" stroke-width=\"0\" opacity=\"0.9\" stroke-linecap=\"round\"/><text x=\"660\" y=\"80\" font-size=\"19\" fill=\"#c9d0c0\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"3\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">偶因狂疾成殊類<\/text><text x=\"620\" y=\"100\" font-size=\"19\" fill=\"#c9d0c0\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"3\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">災患相仍不可逃<\/text><text x=\"140\" y=\"80\" font-size=\"19\" fill=\"#c9d0c0\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"3\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">此夕渓山対明月<\/text><text x=\"100\" y=\"100\" font-size=\"19\" fill=\"#c9d0c0\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"3\" opacity=\"1\" style=\"writing-mode:vertical-rl;text-orientation:upright\">不成長嘯但成嘷<\/text><\/svg>","paras":["　<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>部下<rt>ぶか<\/rt><\/ruby>に<ruby>命<rt>めい<\/rt><\/ruby>じ、<ruby>筆<rt>ふで<\/rt><\/ruby>を<ruby>執<rt>と<\/rt><\/ruby>って<ruby>叢中<rt>そうちゅう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>に<ruby>随<rt>したが<\/rt><\/ruby>って<ruby>書<rt>か<\/rt><\/ruby>きとらせた。<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>は<ruby>叢<rt>くさむら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>から<ruby>朗々<rt>ろうろう<\/rt><\/ruby>と<ruby>響<rt>ひび<\/rt><\/ruby>いた。<ruby>長短<rt>ちょうたん<\/rt><\/ruby><ruby>凡<rt>およ<\/rt><\/ruby>そ<ruby>三十<rt>さんじゅう<\/rt><\/ruby><ruby>篇<rt>へん<\/rt><\/ruby>、<ruby>格調<rt>かくちょう<\/rt><\/ruby><ruby>高雅<rt>こうが<\/rt><\/ruby>、<ruby>意趣<rt>いしゅ<\/rt><\/ruby><ruby>卓<rt>たく<\/rt><\/ruby><ruby>逸<rt>いつ<\/rt><\/ruby>、<ruby>一読<rt>いちどく<\/rt><\/ruby>して<ruby>作者<rt>さくしゃ<\/rt><\/ruby>の<ruby>才<rt>さい<\/rt><\/ruby>の<ruby>非凡<rt>ひぼん<\/rt><\/ruby>を<ruby>思<rt>おも<\/rt><\/ruby>わせるものばかりである。しかし、<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>感嘆<rt>かんたん<\/rt><\/ruby>しながらも<ruby>漠然<rt>ばくぜん<\/rt><\/ruby>と<ruby>次<rt>つぎ<\/rt><\/ruby>のように<ruby>感<rt>かん<\/rt><\/ruby>じていた。<ruby>成程<rt>なるほど<\/rt><\/ruby>、<ruby>作者<rt>さくしゃ<\/rt><\/ruby>の<ruby>素質<rt>そしつ<\/rt><\/ruby>が<ruby>第<rt>だい<\/rt><\/ruby><ruby>一<rt>いち<\/rt><\/ruby><ruby>流<rt>りゅう<\/rt><\/ruby>に<ruby>属<rt>ぞく<\/rt><\/ruby>するものであることは<ruby>疑<rt>うたが<\/rt><\/ruby>いない。しかし、このままでは、<ruby>第<rt>だい<\/rt><\/ruby><ruby>一流<rt>いちりゅう<\/rt><\/ruby>の<ruby>作品<rt>さくひん<\/rt><\/ruby>となるのには、<ruby>何処<rt>どこ<\/rt><\/ruby>か（<ruby>非常<rt>ひじょう<\/rt><\/ruby>に<ruby>微妙<rt>びみょう<\/rt><\/ruby>な<ruby>点<rt>てん<\/rt><\/ruby>に<ruby>於<rt>おい<\/rt><\/ruby>て）<ruby>欠<rt>か<\/rt><\/ruby>けるところがあるのではないか、と。","　<ruby>旧詩<rt>きゅうし<\/rt><\/ruby>を<ruby>吐<rt>は<\/rt><\/ruby>き<ruby>終<rt>おわ<\/rt><\/ruby>った<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>は、<ruby>突然<rt>とつぜん<\/rt><\/ruby><ruby>調子<rt>ちょうし<\/rt><\/ruby>を<ruby>変<rt>か<\/rt><\/ruby>え、<ruby>自<rt>みずか<\/rt><\/ruby>らを<ruby>嘲<rt>あざけ<\/rt><\/ruby>るか<ruby>如<rt>ごと<\/rt><\/ruby>くに<ruby>言<rt>い<\/rt><\/ruby>った。","　<ruby>羞<rt>はずか<\/rt><\/ruby>しいことだが、<ruby>今<rt>いま<\/rt><\/ruby>でも、こんなあさましい<ruby>身<rt>み<\/rt><\/ruby>と<ruby>成<rt>な<\/rt><\/ruby>り<ruby>果<rt>は<\/rt><\/ruby>てた<ruby>今<rt>いま<\/rt><\/ruby>でも、<ruby>己<rt>おれ<\/rt><\/ruby>は、<ruby>己<rt>おのれ<\/rt><\/ruby>の<ruby>詩集<rt>ししゅう<\/rt><\/ruby>が<ruby>長安<rt>ちょうあん<\/rt><\/ruby><ruby>風流<rt>ふうりゅう<\/rt><\/ruby><ruby>人士<rt>じんし<\/rt><\/ruby>の<ruby>机<rt>つくえ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に<ruby>置<rt>お<\/rt><\/ruby>かれている<ruby>様<rt>さま<\/rt><\/ruby>を、<ruby>夢<rt>ゆめ<\/rt><\/ruby>に<ruby>見<rt>み<\/rt><\/ruby>ることがあるのだ。<ruby>岩窟<rt>がんくつ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>横<rt>よこ<\/rt><\/ruby>たわって<ruby>見<rt>み<\/rt><\/ruby>る<ruby>夢<rt>ゆめ<\/rt><\/ruby>にだよ。<ruby>嗤<rt>わら<\/rt><\/ruby>ってくれ。<ruby>詩人<rt>しじん<\/rt><\/ruby>に<ruby>成<rt>な<\/rt><\/ruby>りそこなって<ruby>虎<rt>とら<\/rt><\/ruby>になった<ruby>哀<rt>あわ<\/rt><\/ruby>れな<ruby>男<rt>おとこ<\/rt><\/ruby>を。（<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>昔<rt>むかし<\/rt><\/ruby>の<ruby>青年<rt>せいねん<\/rt><\/ruby><ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>自嘲癖<rt>じちょうへき<\/rt><\/ruby>を<ruby>思出<rt>おもいだ<\/rt><\/ruby>しながら、<ruby>哀<rt>かな<\/rt><\/ruby>しく<ruby>聞<rt>き<\/rt><\/ruby>いていた。）そうだ。お笑い<ruby>草<rt>わらいぐさ<\/rt><\/ruby>ついでに、<ruby>今<rt>いま<\/rt><\/ruby>の<ruby>懐<rt>おもい<\/rt><\/ruby>を<ruby>即席<rt>そくせき<\/rt><\/ruby>の<ruby>詩<rt>し<\/rt><\/ruby>に<ruby>述<rt>の<\/rt><\/ruby>べて<ruby>見<rt>み<\/rt><\/ruby>ようか。この<ruby>虎<rt>とら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に、まだ、<ruby>曾<rt>かつ<\/rt><\/ruby>ての<ruby>李徴<rt>りちょう<\/rt><\/ruby>が<ruby>生<rt>い<\/rt><\/ruby>きているしるしに。","　<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>又<rt>また<\/rt><\/ruby><ruby>下吏<rt>かり<\/rt><\/ruby>に<ruby>命<rt>めい<\/rt><\/ruby>じてこれを<ruby>書<rt>か<\/rt><\/ruby>きとらせた。その<ruby>詩<rt>し<\/rt><\/ruby>に<ruby>言<rt>ゆ<\/rt><\/ruby>う。","","偶因狂疾成殊類　災患相仍不可逃","今日爪牙誰敢敵　当時声跡共相高","我為異物蓬茅下　君已乗軺気勢豪","此夕渓山対明月　不成長嘯但成嘷",""],"speech":["えんさんはぶかにめいじ、ふでをとってそうちゅうのこえにしたがってかきとらせた。りちょうのこえはくさむらのなかからろうろうとひびいた。ちょうたんおよそさんじゅうへん、かくちょうこうが、いしゅたくいつ、いちどくしてさくしゃのさいのひぼんをおもわせるものばかりである。しかし、えんさんはかんたんしながらもばくぜんとつぎのようにかんじていた。なるほど、さくしゃのそしつがだいいちりゅうにぞくするものであることはうたがいない。しかし、このままでは、だいいちりゅうのさくひんとなるのには、どこか（ひじょうにびみょうなてんにおいて）かけるところがあるのではないか、と。","きゅうしをはきおわったりちょうのこえは、とつぜんちょうしをかえ、みずからをあざけるかごとくにいった。","はずかしいことだが、いまでも、こんなあさましいみとなりはてたいまでも、おれは、おのれのししゅうがちょうあんふうりゅうじんしのつくえのうえにおかれているさまを、ゆめにみることがあるのだ。がんくつのなかによこたわってみるゆめにだよ。わらってくれ。しじんになりそこなってとらになったあわれなおとこを。（えんさんはむかしのせいねんりちょうのじちょうへきをおもいだしながら、かなしくきいていた。）そうだ。お笑いわらいぐさついでに、いまのおもいをそくせきのしにのべてみようか。このとらのなかに、まだ、かつてのりちょうがいきているしるしに。","えんさんはまたかりにめいじてこれをかきとらせた。そのしにゆう。","","たまたま、きょうしつによって、しゅるいとなる。さいかん、あいよって、のがるべからず。","こんにち、そうが、たれかあえててきせん。とうじ、せいせき、ともにあいたかし。","われは、いぶつとなる、ほうぼうのもと。きみはすでに、ようにのって、きせいごうなり。","このゆうべ、けいざん、めいげつにたいす。ちょうしょうをなさず、ただ、こうをなすのみ。",""]},{"t":"臆病な自尊心","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#16211c\"/><circle cx=\"620\" cy=\"100\" r=\"74.8\" fill=\"#d8ccb8\" opacity=\"0.13\"/><circle cx=\"620\" cy=\"100\" r=\"44\" fill=\"#d8ccb8\" opacity=\"1\"/><g transform=\"translate(280 350) scale(1.05 1.05)\"><path d=\"M-52 0 q-10 -34 6 -46 q20 -14 52 -12 q26 2 34 20 q6 14 2 38 l-12 0 q2 -18 -6 -26 l-4 26 l-14 0 l-2 -24 l-28 -2 l-4 26 l-14 0 q-2 -16 -6 -22 z\" fill=\"#d9913f\"/><path d=\"M-50 -40 q-22 4 -26 22\" stroke=\"#d9913f\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M-34 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M-18 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M-2 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M14 -46 q4 12 0 22\" stroke=\"#3a2f28\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/><circle cx=\"46\" cy=\"-52\" r=\"18\" fill=\"#d9913f\"/><polygon points=\"58,-50 76,-44 58,-38\" fill=\"#d9913f\"/><polygon points=\"34,-66 30,-80 44,-70\" fill=\"#d9913f\"/><polygon points=\"52,-68 60,-82 62,-66\" fill=\"#d9913f\"/><circle cx=\"52\" cy=\"-54\" r=\"2.2\" fill=\"#3a2f28\"/><path d=\"M40 -70 q4 8 0 12 M52 -72 q4 8 0 12\" stroke=\"#3a2f28\" stroke-width=\"3.5\" fill=\ わ<\/rt><\/ruby>って、<ruby>叢中<rt>そうちゅう<\/rt><\/ruby>から<ruby>慟哭<rt>どうこく<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>聞<rt>きこ<\/rt><\/ruby>えた。<ruby>袁<rt>えん<\/rt><\/ruby>もまた<ruby>涙<rt>なみだ<\/rt><\/ruby>を<ruby>泛<rt>うか<\/rt><\/ruby>べ、<ruby>欣<rt>よろこ<\/rt><\/ruby>んで<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>意<rt>い<\/rt><\/ruby>に<ruby>副<rt>そ<\/rt><\/ruby>いたい<ruby>旨<rt>むね<\/rt><\/ruby>を<ruby>答<rt>こた<\/rt><\/ruby>えた。<ruby>李徴<rt>りちょう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>はしかし<ruby>忽<rt>たちま<\/rt><\/ruby>ち<ruby>又<rt>また<\/rt><\/ruby><ruby>先刻<rt>せんこく<\/rt><\/ruby>の<ruby>自嘲<rt>じちょう<\/rt><\/ruby><ruby>的<rt>てき<\/rt><\/ruby>な<ruby>調子<rt>ちょうし<\/rt><\/ruby>に<ruby>戻<rt>もど<\/rt><\/ruby>って、<ruby>言<rt>い<\/rt><\/ruby>った。","　<ruby>本当<rt>ほんとう<\/rt><\/ruby>は、<ruby>先<rt>ま<\/rt><\/ruby>ず、この<ruby>事<rt>こと<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>を<ruby>先<rt>さき<\/rt><\/ruby>にお<ruby>願<rt>ねが<\/rt><\/ruby>いすべきだったのだ、<ruby>己<rt>おの<\/rt><\/ruby>が<ruby>人間<rt>にんげん<\/rt><\/ruby>だったなら。飢え<ruby>凍<rt>うえこご<\/rt><\/ruby>えようとする<ruby>妻子<rt>さいし<\/rt><\/ruby>のことよりも、<ruby>己<rt>おのれ<\/rt><\/ruby>の<ruby>乏<rt>とぼ<\/rt><\/ruby>しい<ruby>詩業<rt>しぎょう<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>を<ruby>気<rt>き<\/rt><\/ruby>にかけているような<ruby>男<rt>おとこ<\/rt><\/ruby>だから、こんな<ruby>獣<rt>けもの<\/rt><\/ruby>に<ruby>身<rt>み<\/rt><\/ruby>を<ruby>堕<rt>おと<\/rt><\/ruby>すのだ。","　そうして、<ruby>附加<rt>つけくわ<\/rt><\/ruby>えて<ruby>言<rt>い<\/rt><\/ruby>うことに、<ruby>袁傪<rt>えんさん<\/rt><\/ruby>が<ruby>嶺南<rt>れいなん<\/rt><\/ruby>からの<ruby>帰途<rt>きと<\/rt><\/ruby>には<ruby>決<rt>けっ<\/rt><\/ruby>してこの<ruby>途<rt>みち<\/rt><\/ruby>を<ruby>通<rt>とお<\/rt><\/ruby>らないで<ruby>欲<rt>ほ<\/rt><\/ruby>しい、その<ruby>時<rt>とき<\/rt><\/ruby>には<ruby>自分<rt>じぶん<\/rt><\/ruby>が<ruby>酔<rt>よ<\/rt><\/ruby>っていて<ruby>故人<rt>とも<\/rt><\/ruby>を<ruby>認<rt>みと<\/rt><\/ruby>めずに<ruby>襲<rt>おそ<\/rt><\/ruby>いかかるかも<ruby>知<rt>し<\/rt><\/ruby>れないから。<ruby>又<rt>また<\/rt><\/ruby>、<ruby>今<rt>いま<\/rt><\/ruby><ruby>別<rt>わか<\/rt><\/ruby>れてから、<ruby>前方<rt>ぜんぽう<\/rt><\/ruby><ruby>百<rt>ひゃく<\/rt><\/ruby><ruby>歩<rt>ほ<\/rt><\/ruby>の<ruby>所<rt>ところ<\/rt><\/ruby>にある、あの<ruby>丘<rt>おか<\/rt><\/ruby>に<ruby>上<rt>のぼ<\/rt><\/ruby>ったら、<ruby>此方<rt>こちら<\/rt><\/ruby>を<ruby>振<rt>ふ<\/rt><\/ruby>りかえって<ruby>見<rt>み<\/rt><\/ruby>て<ruby>貰<rt>もら<\/rt><\/ruby>いたい。<ruby>自分<rt>じぶん<\/rt><\/ruby>は<ruby>今<rt>いま<\/rt><\/ruby>の<ruby>姿<rt>すがた<\/rt><\/ruby>をもう<ruby>一度<rt>いちど<\/rt><\/ruby>お<ruby>目<rt>め<\/rt><\/ruby>に<ruby>掛<rt>か<\/rt><\/ruby>けよう。<ruby>勇<rt>いさむ<\/rt><\/ruby>に<ruby>誇<rt>ほこ<\/rt><\/ruby>ろうとしてではない。<ruby>我<rt>わ<\/rt><\/ruby>が<ruby>醜悪<rt>しゅうあく<\/rt><\/ruby>な<ruby>姿<rt>すがた<\/rt><\/ruby>を<ruby>示<rt>しめ<\/rt><\/ruby>して、<ruby>以<rt>もっ<\/rt><\/ruby>て、<ruby>再<rt>ふたた<\/rt><\/ruby>び<ruby>此処<rt>ここ<\/rt><\/ruby>を<ruby>過<rt>す<\/rt><\/ruby>ぎて<ruby>自分<rt>じぶん<\/rt><\/ruby>に<ruby>会<rt>あ<\/rt><\/ruby>おうとの<ruby>気持<rt>きもち<\/rt><\/ruby>を<ruby>君<rt>きみ<\/rt><\/ruby>に<ruby>起<rt>おこ<\/rt><\/ruby>させない<ruby>為<rt>ため<\/rt><\/ruby>であると。","　<ruby>袁傪<rt>えんさん<\/rt><\/ruby>は<ruby>叢<rt>くさむら<\/rt><\/ruby>に<ruby>向<rt>むか<\/rt><\/ruby>って、<ruby>懇<rt>ねんご<\/rt><\/ruby>ろに<ruby>別<rt>わか<\/rt><\/ruby>れの<ruby>言葉<rt>ことば<\/rt><\/ruby>を<ruby>述<rt>の<\/rt><\/ruby>べ、<ruby>馬<rt>うま<\/rt><\/ruby>に<ruby>上<rt>のぼ<\/rt><\/ruby>った。<ruby>叢<rt>くさむら<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>からは、<ruby>又<rt>また<\/rt><\/ruby>、<ruby>堪<rt>た<\/rt><\/ruby>え<ruby>得<rt>え<\/rt><\/ruby>ざるが<ruby>如<rt>ごと<\/rt><\/ruby>き<ruby>悲泣<rt>ひきゅう<\/rt><\/ruby>の<ruby>声<rt>こえ<\/rt><\/ruby>が<ruby>洩<rt>も<\/rt><\/ruby>れた。<ruby>袁傪<rt>えんさん<\/rt><\/ruby>も<ruby>幾度<rt>いくど<\/rt><\/ruby>か<ruby>叢<rt>くさむら<\/rt><\/ruby>を<ruby>振返<rt>ふりかえ<\/rt><\/ruby>りながら、<ruby>涙<rt>なみだ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>出発<rt>しゅっぱつ<\/rt><\/ruby>した。","　<ruby>一行<rt>いっこう<\/rt><\/ruby>が<ruby>丘<rt>おか<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>についた<ruby>時<rt>とき<\/rt><\/ruby>、<ruby>彼<rt>かれ<\/rt><\/ruby><ruby>等<rt>ら<\/rt><\/ruby>は、<ruby>言<rt>い<\/rt><\/ruby>われた<ruby>通<rt>とお<\/rt><\/ruby>りに<ruby>振返<rt>ふりかえ<\/rt><\/ruby>って、<ruby>先程<rt>さきほど<\/rt><\/ruby>の<ruby>林間<rt>りんかん<\/rt><\/ruby>の<ruby>草地<rt>くさち<\/rt><\/ruby>を<ruby>眺<rt>なが<\/rt><\/ruby>めた。<ruby>忽<rt>たちま<\/rt><\/ruby>ち、<ruby>一<rt>いち<\/rt><\/ruby><ruby>匹<rt>ひき<\/rt><\/ruby>の<ruby>虎<rt>とら<\/rt><\/ruby>が<ruby>草<rt>くさ<\/rt><\/ruby>の<ruby>茂<rt>しげ<\/rt><\/ruby>みから<ruby>道<rt>みち<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>に躍り<ruby>出<rt>おどりで<\/rt><\/ruby>たのを<ruby>彼<rt>かれ<\/rt><\/ruby><ruby>等<rt>ら<\/rt><\/ruby>は<ruby>見<rt>み<\/rt><\/ruby>た。<ruby>虎<rt>とら<\/rt><\/ruby>は、<ruby>既<rt>すで<\/rt><\/ruby>に<ruby>白<rt>しろ<\/rt><\/ruby>く<ruby>光<rt>ひかり<\/rt><\/ruby>を<ruby>失<rt>うしな<\/rt><\/ruby>った<ruby>月<rt>つき<\/rt><\/ruby>を<ruby>仰<rt>あお<\/rt><\/ruby>いで、<ruby>二<rt>に<\/rt><\/ruby><ruby>声<rt>せい<\/rt><\/ruby><ruby>三<rt>さん<\/rt><\/ruby><ruby>声<rt>せい<\/rt><\/ruby><ruby>咆哮<rt>ほうこう<\/rt><\/ruby>したかと<ruby>思<rt>おも<\/rt><\/ruby>うと、<ruby>又<rt>また<\/rt><\/ruby>、<ruby>元<rt>もと<\/rt><\/ruby>の<ruby>叢<rt>くさむら<\/rt><\/ruby>に躍り<ruby>入<rt>おどりい<\/rt><\/ruby>って、<ruby>再<rt>ふたた<\/rt><\/ruby>びその<ruby>姿<rt>すがた<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>なかった。"],"speech":["もはや、わかれをつげねばならぬ。よわねばならぬときが、（とらにかえらねばならぬときが）ちかづいたから、と、りちょうのこえがいった。だが、おわかれするまえにもうひとつたのみがある。それはわがさいしのことだ。かれらはまだかくりゃくにいる。もとより、おのれのうんめいについてはしるはずがない。きみがみなみからかえったら、おのれはすでにしんだとかれらにつげてもらえないだろうか。けっしてきょうのことだけはあかさないでほしい。あつかましいおねがいだが、かれらのこじゃくをあわれんで、こんごともどうとにきとうすることのないようにはからっていただけるならば、じぶんにとって、おんこう、これにすぎたるはない。","げんおわって、そうちゅうからどうこくのこえがきこえた。えんもまたなみだをうかべ、よろこんでりちょうのいにそいたいむねをこたえた。りちょうのこえはしかしたちまちまたせんこくのじちょうてきなちょうしにもどって、いった。","ほんとうは、まず、このことのほうをさきにおねがいすべきだったのだ、おのがにんげんだったなら。飢えうえこごえようとするさいしのことよりも、おのれのとぼしいしぎょうのほうをきにかけているようなおとこだから、こんなけものにみをおとすのだ。","そうして、つけくわえていうことに、えんさんがれいなんからのきとにはけっしてこのみちをとおらないでほしい、そのときにはじぶんがよっていてともをみとめずにおそいかかるかもしれないから。また、いまわかれてから、ぜんぽうひゃくほのところにある、あのおかにのぼったら、こちらをふりかえってみてもらいたい。じぶんはいまのすがたをもういちどおめにかけよう。いさむにほころうとしてではない。わがしゅうあくなすがたをしめして、もって、ふたたびここをすぎてじぶんにあおうとのきもちをきみにおこさせないためであると。","えんさんはくさむらにむかって、ねんごろにわかれのことばをのべ、うまにのぼった。くさむらのなかからは、また、たええざるがごときひきゅうのこえがもれた。えんさんもいくどかくさむらをふりかえりながら、なみだのなかにしゅっぱつした。","いっこうがおかのうえについたとき、かれらは、いわれたとおりにふりかえって、さきほどのりんかんのくさちをながめた。たちまち、いちひきのとらがくさのしげみからみちのうえに躍りおどりでたのをかれらはみた。とらは、すでにしろくひかりをうしなったつきをあおいで、にせいさんせいほうこうしたかとおもうと、また、もとのくさむらに躍りおどりいって、ふたたびそのすがたをみなかった。"]}]},{ t><\/ruby>に、<ruby>女<rt>おんな<\/rt><\/ruby>の<ruby>人魚<rt>にんぎょ<\/rt><\/ruby>があがって、あたりの<ruby>景色<rt>けしき<\/rt><\/ruby>を<ruby>眺<rt>なが<\/rt><\/ruby>めながら<ruby>休<rt>やす<\/rt><\/ruby>んでいました。","　<ruby>雲間<rt>くもま<\/rt><\/ruby>から<ruby>洩<rt>も<\/rt><\/ruby>れた<ruby>月<rt>つき<\/rt><\/ruby>の<ruby>光<rt>ひかり<\/rt><\/ruby>がさびしく、<ruby>波<rt>なみ<\/rt><\/ruby>の<ruby>上<rt>うえ<\/rt><\/ruby>を<ruby>照<rt>てらし<\/rt><\/ruby>していました。どちらを<ruby>見<rt>み<\/rt><\/ruby>ても<ruby>限<rt>かぎ<\/rt><\/ruby>りない、<ruby>物凄<rt>ものすご<\/rt><\/ruby>い<ruby>波<rt>なみ<\/rt><\/ruby>がうねうねと<ruby>動<rt>うご<\/rt><\/ruby>いているのであります。","　なんという<ruby>淋<rt>さび<\/rt><\/ruby>しい<ruby>景色<rt>けしき<\/rt><\/ruby>だろうと<ruby>人魚<rt>にんぎょ<\/rt><\/ruby>は<ruby>思<rt>おも<\/rt><\/ruby>いました。<ruby>自分<rt>じぶん<\/rt><\/ruby><ruby>達<rt>たち<\/rt><\/ruby>は、<ruby>人間<rt>にんげん<\/rt><\/ruby>とあまり<ruby>姿<rt>すがた<\/rt><\/ruby>は<ruby>変<rt>かわ<\/rt><\/ruby>っていない。<ruby>魚<rt>さかな<\/rt><\/ruby>や、また<ruby>底<rt>そこ<\/rt><\/ruby><ruby>深<rt>ふか<\/rt><\/ruby>い<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>棲<rt>す<\/rt><\/ruby>んでいる<ruby>気<rt>き<\/rt><\/ruby>の<ruby>荒<rt>あら<\/rt><\/ruby>い、いろいろな<ruby>獣物等<rt>けものなど<\/rt><\/ruby>とくらべたら、どれ<ruby>程<rt>ほど<\/rt><\/ruby><ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>方<rt>ほう<\/rt><\/ruby>に<ruby>心<rt>こころ<\/rt><\/ruby>も<ruby>姿<rt>すがた<\/rt><\/ruby>も<ruby>似<rt>に<\/rt><\/ruby>ているか<ruby>知<rt>し<\/rt><\/ruby>れない。それだのに、<ruby>自分<rt>じぶん<\/rt><\/ruby><ruby>達<rt>たち<\/rt><\/ruby>は、やはり<ruby>魚<rt>さかな<\/rt><\/ruby>や、<ruby>獣物<rt>けだもの<\/rt><\/ruby><ruby>等<rt>とう<\/rt><\/ruby>といっしょに、<ruby>冷<rt>つめ<\/rt><\/ruby>たい、<ruby>暗<rt>くら<\/rt><\/ruby>い、<ruby>気<rt>き<\/rt><\/ruby>の<ruby>滅入<rt>めい<\/rt><\/ruby>りそうな<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>に<ruby>暮<rt>く<\/rt><\/ruby>らさなければならないというのはどうしたことだろうと<ruby>思<rt>おも<\/rt><\/ruby>いました。","　<ruby>長<rt>なが<\/rt><\/ruby>い<ruby>年月<rt>としつき<\/rt><\/ruby>の<ruby>間<rt>あいだ<\/rt><\/ruby>、<ruby>話<rt>はなし<\/rt><\/ruby>をする<ruby>相手<rt>あいて<\/rt><\/ruby>もなく、いつも<ruby>明<rt>あか<\/rt><\/ruby>るい<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>面<rt>めん<\/rt><\/ruby>を憧がれて<ruby>暮<rt るあいてもなく、いつもあかるいうみのめんを憧がれてくらしてきたことをおもいますと、にんぎょはたまらなかったのであります。そして、つきのあかるくてらしすばんに、うみのめんにうかんでいわのうえにやすんでいろいろなくうそうにふけるのがつねでありました。","「にんげんのすんでいるまちは、うつくしいということだ。にんげんは、さかなよりもまたけだものよりもにんじょうがあってやさしいときいている。わたしたちは、さかなやけだもののなかにすんでいるが、もっとにんげんのほうにちかいのだから、にんげんのなかにはいってくらされないことはないだろう」と、にんぎょはかんがえたのであります。","そのにんぎょはおんなでありました。そしてみもちでありました。わたしたちは、もうながいあいだ、このさびしい、はなしをするものもない、きたのあおいうみのなかでくらしてきたのだから、もはや、あかるい、にぎやかなこくはのぞまないけれど、これからうまれるこどもに、こんなかなしい、たよりないおもいをせめてもさせたくないものだ。","こどもからわかれて、ひとりさびしくうみのなかにくらすということは、このうえもないかなしいことだけれど、こどもがどこにいても、しあわせにくらしてくれたなら、わたくしのよろこびは、それにましたことはない。","にんげんは、このせかいのうちでいちばんやさしいものだときいている。そしてかわいそうなものやたよりないものはけっしていじめたり、くるしめたりすることはないときいている。いったんてつけたなら、けっして、それをすてないともきいている。さいわい、わたしたちは、みんなよくかおがにんげんににているばかりでなく、どうからうえはぜんぶにんげんそのままなのであるから――さかなやけだもののせかいでさえ、くらされるところをみれば――そのせかいでくらされないことはない。いちど、にんげんがてに取りとりあげてそだててくれたら、けっしてむじひにすてることもあるまいとおもわれる。","にんぎょは、そうおもったのでありました。","せめて、じぶんのこどもだけは、にぎやかな、あかるい、うつくしいまちでそだてておおきくしたいというじょうから、おんなのにんぎょは、こどもをおかのうえに産みうみおとそうとしたのであります。そうすれば、じぶんは、もうにたびわがこのかおをみることはできないが、こどもはにんげんのなかまいりをして、こうふくにせいかつをするであろうとおもったからであります。","はるか、かなたには、かいがんのこだかいやまにあるじんじゃのともしびがちらちらとなみまにみえていました。あるよる、おんなのにんぎょは、こどもを産みうみおとすためにつめたいくらいなみのあいだをおよいで、りくのほうにむかってちかづいてきました。",""]},{"t":"蝋燭屋の老夫婦","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#1f2a30\"/><polygon points=\"0,330 240,296 500,330 800,300 800,450 0,450\" fill=\"#2f3d3a\" opacity=\"1\"/><rect x=\"300\" y=\"270\" width=\"200\" height=\"130\" fill=\"#5a4a3c\" rx=\"0\" opacity=\"1\"/><polygon points=\"290,270 510,270 486,244 314,244\" fill=\"#3a3226\" opacity=\"1\"/><rect x=\"384.0\" y=\"356\" width=\"32\" height=\"44\" fill=\"#3a2f28\" rx=\"2\" opacity=\"0.85\"/><rect x=\"330\" y=\"300\" width=\"50\" height=\"44\" fill=\"#d9a441\" rx=\"0\" opacity=\"0.95\"/><text x=\"400\" y=\"260\" font-size=\"15\" fill=\"#e8dcc0\" text-anchor=\"middle\" font-family=\"'Hiragino Mincho ProN',serif\" letter-spacing=\"3\" opacity=\"1\">ろうそく<\/text><polygon points=\"163.85,408 168.1,358.7 174.9,345.1 18 爺<rt>じい<\/rt><\/ruby>さんは、赤ん<ruby>坊<rt>あかんぼう<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>て<ruby>頭<rt>あたま<\/rt><\/ruby>を<ruby>傾<rt>かたむ<\/rt><\/ruby>けました。","「<ruby>私<rt>わたくし<\/rt><\/ruby>もそう<ruby>思<rt>おも<\/rt><\/ruby>います。しかし<ruby>人間<rt>にんげん<\/rt><\/ruby>の<ruby>子<rt>こ<\/rt><\/ruby>でなくても、なんというやさしい、<ruby>可愛<rt>かわい<\/rt><\/ruby>らしい<ruby>顔<rt>かお<\/rt><\/ruby>の女の<ruby>子<rt>おんなのこ<\/rt><\/ruby>でありましょう」と、お<ruby>婆<rt>ばあ<\/rt><\/ruby>さんは<ruby>言<rt>い<\/rt><\/ruby>いました。","「いいとも<ruby>何<rt>な<\/rt><\/ruby>んでも<ruby>構<rt>かま<\/rt><\/ruby>わない、<ruby>神<rt>かみ<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>のお<ruby>授<rt>さず<\/rt><\/ruby>けなさった<ruby>子供<rt>こども<\/rt><\/ruby>だから<ruby>大事<rt>だいじ<\/rt><\/ruby>にして<ruby>育<rt>そだ<\/rt><\/ruby>てよう。きっと<ruby>大<rt>おお<\/rt><\/ruby>きくなったら、<ruby>怜悧<rt>りこう<\/rt><\/ruby>ないい<ruby>子<rt>こ<\/rt><\/ruby>になるにちがいない」と、お<ruby>爺<rt>じい<\/rt><\/ruby>さんも<ruby>申<rt>もう<\/rt><\/ruby>しました。","　その<ruby>日<rt>ひ<\/rt><\/ruby>から、<ruby>二人<rt>ふたり<\/rt><\/ruby>は、その女の<ruby>子<rt>おんなのこ<\/rt><\/ruby>を<ruby>大事<rt>だいじ<\/rt><\/ruby>に<ruby>育<rt>そだ<\/rt><\/ruby>てました。<ruby>子供<rt>こども<\/rt><\/ruby>は、<ruby>大<rt>おお<\/rt><\/ruby>きくなるにつれて<ruby>黒眼勝<rt>くろめがち<\/rt><\/ruby>な<ruby>美<rt>うつく<\/rt><\/ruby>しい、<ruby>頭髪<rt>かみのけ<\/rt><\/ruby>の<ruby>色<rt>いろ<\/rt><\/ruby>のツヤツヤとした、おとなしい<ruby>怜悧<rt>れいり<\/rt><\/ruby>な<ruby>子<rt>こ<\/rt><\/ruby>となりました。",""],"speech":["に","","かいがんにちいさなまちがありました。まちにはいろいろなみせがありましたが、おみやのあるやまのしたにちいさなろうそくをあきなっているみせがありました。","そのいえにはとしよりのふうふがすんでいました。おじいさんがろうそくをつくって、おばあさんがみせでうっていたのであります。このまちのひとや、またふきんのりょうしがおみやへおまいりをするときに、このみせにたちよってろうそくをかってやまへのぼりました。","やまのうえには、まつのきがはえていました。そのなかにおみやがありました。うみのほうからふいてくるかぜが、まつのこずえにあたって、ひるもよるもごうごうとなっています。そして、まいばんのように、そのおみやにあがったろうそくのほかげがちらちらとゆらめいていますのが、とおいうみのうえからのぞまれたのであります。","あるよるのことでありました。おばあさんはおじいさんにむかって、","「わたしたちがこうして、くらしているのもみんなかみさまのおかげだ。このおやまにおみやがなかったら、ろうそくがうれない。わたくしどもはありがたいとおもわなければなりません。そうおもったついでに、おやまへのぼっておまいりをしてきます」と、いいました。","「ほんとうに、おまえのいうとおりだ。わたくしもまいにち、かみさまをありがたいとこころでおれいをもうさないひはないが、ついようじにかまけて、たびたびおやまへおまいりにいきもしない。いいところへきがつきなされた。わたくしのぶんもよくおれいをもうしてきておくれ」と、おじいさんはこたえました。","おばあさんは、とぼとぼといえをでかけました。つきのいいばんで、ひるまのようにそとはあかるかったのであります。おみやへおまいりをして、おばあさんはやまをおりてきますと、いしだんのしたに赤んあかんぼうがないていました。","「かわいそうにすてごだが、だれがこんなところにすてたのだろう。それにしてもふしぎなことは、おまいりのかえりにわたくしのめにとまるというのはなんかのえんだろう。このままにみすてていってはかみさまのばつがあたる。きっとかみさまがわたしたちふうふにこどものないのをしって、おさずけになったのだからかえっておじいさんとそうだんをしてそだてましょう」と、おばあさんは、こころのうちでいって、赤んあかんぼうを取りとりあげると、","「おおかわいそうに、かわいそうに」と、いって、うちへいだいてかえりました。","おじいさんは、おばあさんのかえるのをまっていますと、おばあさんが赤んあかんぼうをいだいてかえってきました。そしていちぶしじゅうをおばあさんはおじいさんにはなしますと、","「それは、まさしくかみさまのおさずけこだから、だいじにしてそだてなければばつがあたる」と、おじいさんももうしました。","ふたりは、その赤んあかんぼうをそだてることにしました。そのこはおんなのこであったのであります。そしてどうからしたのほうは、にんげんのすがたでなく、さかなのかたちをしていましたので、おじいさんも、おばあさんも、はなしにきいているにんぎょにちがいないとおもいました。","「これは、にんげんのこじゃあないが……」と、おじいさんは、赤んあかんぼうをみてあたまをかたむけました。","「わたくしもそうおもいます。しかしにんげんのこでなくても、なんというやさしい、かわいらしいかおの女のおんなのこでありましょう」と、おばあさんはいいました。","「いいともなんでもかまわない、かみさまのおさずけなさったこどもだからだいじにしてそだてよう。きっとおおきくなったら、りこうないいこになるにちがいない」と、おじいさんももうしました。","そのひから、ふたりは、その女のおんなのこをだいじにそだてました。こどもは、おおきくなるにつれてくろめがちなうつくしい、かみのけのいろのツヤツヤとした、おとなしいれいりなことなりました。",""]},{"t":"絵蝋燭","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#26201c\"/><rect x=\"160\" y=\"120\" width=\"480\" height=\"330\" fill=\"#3f3630\" rx=\"0\" opacity=\"1\"/><rect x=\"190\" y=\"150\" width=\"420\" height=\"280\" fill=\"#8a7050\" rx=\"0\" opacity=\"0.3\"/><rect x=\"252.65\" y=\"345.4\" width=\"14.700000000000001\" height=\"54.6\" fill=\"#c4552d\" rx=\"3\" opacity=\"1\"/><line x1=\"260\" y1=\"345.4\" x2=\"260\" y2=\"337.0\" stroke=\"#3a2f28\" stroke-width=\"2\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M255.8 358.0 q4 6 0 12 M264.2 370.6 q-4 6 0 12\" fill=\"none\" stroke=\"#f7f1e1\" stroke-width=\"2.4\" opacity=\"0.9\" stroke-linecap=\"round\"/><rect x=\"322.65\" y=\"345.4\" width=\"14.700000000000001\" height=\"54.6\" fill=\"#c4552d\" rx=\"3\" opacity=\"1\"/><line x1=\"330\" y1=\"345.4\" x2=\"330\" y2=\"337.0\" stroke=\"#3a2f28\" stroke-width=\"2\" opacity=\"1\" stroke-linecap=\"round\"/><path d=\"M325.8 358.0 q4 6 0 12 M334.2 370.6 q-4 6 0 12\" -2\" fill=\"none\" stroke=\"#c93a3a\" stroke-width=\"3\" opacity=\"0.9\" stroke-linecap=\"round\"/><\/svg>","paras":["<ruby>三<rt>さん<\/rt><\/ruby>","","　<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>大<rt>おお<\/rt><\/ruby>きくなりましたけれど、<ruby>姿<rt>すがた<\/rt><\/ruby>が<ruby>変<rt>かわ<\/rt><\/ruby>っているので<ruby>恥<rt>はず<\/rt><\/ruby>かしがって<ruby>顔<rt>かお<\/rt><\/ruby>を<ruby>出<rt>だ<\/rt><\/ruby>しませんでした。けれど<ruby>一目<rt>ひとめ<\/rt><\/ruby>その<ruby>娘<rt>むすめ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>た<ruby>人<rt>ひと<\/rt><\/ruby>は、みんなびっくりするような<ruby>美<rt>うつく<\/rt><\/ruby>しい<ruby>器量<rt>きりょう<\/rt><\/ruby>でありましたから、<ruby>中<rt>なか<\/rt><\/ruby>にはどうかしてその<ruby>娘<rt>むすめ<\/rt><\/ruby>を<ruby>見<rt>み<\/rt><\/ruby>ようと<ruby>思<rt>おも<\/rt><\/ruby>って、<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>いに<ruby>来<rt>き<\/rt><\/ruby>た<ruby>者<rt>もの<\/rt><\/ruby>もありました。","　お<ruby>爺<rt>じい<\/rt><\/ruby>さんや、お<ruby>婆<rt>ばあ<\/rt><\/ruby>さんは、","「うちの<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>内気<rt>うちき<\/rt><\/ruby>で<ruby>恥<rt>はず<\/rt><\/ruby>かしがりやだから、<ruby>人<rt>ひと<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>の<ruby>前<rt>まえ<\/rt><\/ruby>には<ruby>出<rt>で<\/rt><\/ruby>ないのです」と、<ruby>言<rt>い<\/rt><\/ruby>っていました。","　<ruby>奥<rt>おく<\/rt><\/ruby>の<ruby>間<rt>あいだ<\/rt><\/ruby>でお<ruby>爺<rt>じい<\/rt><\/ruby>さんは、せっせと<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>を<ruby>造<rt>つく<\/rt><\/ruby>っていました。<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>自分<rt>じぶん<\/rt><\/ruby>の思い<ruby>付<rt>おもいつ<\/rt><\/ruby>きで、きっと<ruby>絵<rt>え<\/rt><\/ruby>を<ruby>描<rt>か<\/rt><\/ruby>いたら、みんなが<ruby>喜<rt>よろこ<\/rt><\/ruby>んで<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>を<ruby>買<rt>か<\/rt><\/ruby>うだろうと<ruby>思<rt>おも<\/rt><\/ruby>いましたから、そのことをお<ruby>爺<rt>じい<\/rt><\/ruby>さんに<ruby>話<rt>はなし<\/rt><\/ruby>ますと、そんならお<ruby>前<rt>まえ<\/rt><\/ruby>の<ruby>好<rt>す<\/rt><\/ruby>きな<ruby>絵<rt>え<\/rt><\/ruby>をためしに<ruby>書<rt>か<\/rt><\/ruby>いて<ruby>見<rt>み<\/rt><\/ruby>るがいいと<ruby>答<rt>こた<\/rt><\/ruby>えました。","　<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>絵具<rt>えのぐ<\/rt><\/ruby>で、<ruby>白<rt>しろ<\/rt><\/ruby>い<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>に、<ruby>魚< y>ぬような<ruby>災難<rt>さいなん<\/rt><\/ruby>がないということが、いつからともなくみんなの<ruby>口々<rt>くちぐち<\/rt><\/ruby>に<ruby>噂<rt>うわさ<\/rt><\/ruby>となって<ruby>上<rt>のぼ<\/rt><\/ruby>りました。","「<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>神<rt>かみ<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>を<ruby>祭<rt>まつ<\/rt><\/ruby>ったお<ruby>宮<rt>みや<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>だもの、<ruby>綺麗<rt>きれい<\/rt><\/ruby>な<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>をあげれば、<ruby>神<rt>かみ<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>もお<ruby>喜<rt>よろこ<\/rt><\/ruby>びなさるのにきまっている」と、その<ruby>町<rt>まち<\/rt><\/ruby>の<ruby>人々<rt>ひとびと<\/rt><\/ruby>は<ruby>言<rt>い<\/rt><\/ruby>いました。","　<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby><ruby>屋<rt>や<\/rt><\/ruby>では、<ruby>絵<rt>え<\/rt><\/ruby>を<ruby>描<rt>えが<\/rt><\/ruby>いた<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>が<ruby>売<rt>う<\/rt><\/ruby>れるのでお<ruby>爺<rt>じい<\/rt><\/ruby>さんは、<ruby>一生懸命<rt>いっしょうけんめい<\/rt><\/ruby>に<ruby>朝<rt>あさ<\/rt><\/ruby>から<ruby>晩<rt>ばん<\/rt><\/ruby>まで<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>を<ruby>造<rt>つく<\/rt><\/ruby>りますと、<ruby>傍<rt>かたわら<\/rt><\/ruby>で<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>手<rt>て<\/rt><\/ruby>の<ruby>痛<rt>いた<\/rt><\/ruby>くなるのも<ruby>我慢<rt>がまん<\/rt><\/ruby>して<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>絵具<rt>えのぐ<\/rt><\/ruby>で<ruby>絵<rt>え<\/rt><\/ruby>を<ruby>描<rt>えが<\/rt><\/ruby>いたのであります。","「こんな<ruby>人間並<rt>にんげんなみ<\/rt><\/ruby>でない<ruby>自分<rt>じぶん<\/rt><\/ruby>をも、よく<ruby>育<rt>そだ<\/rt><\/ruby>て<ruby>可愛<rt>かわい<\/rt><\/ruby>がって<ruby>下<rt>くだ<\/rt><\/ruby>すったご<ruby>恩<rt>おん<\/rt><\/ruby>を<ruby>忘<rt>わす<\/rt><\/ruby>れてはならない」と、<ruby>娘<rt>むすめ<\/rt><\/ruby>はやさしい<ruby>心<rt>こころ<\/rt><\/ruby>に<ruby>感<rt>かん<\/rt><\/ruby>じて、<ruby>大<rt>おお<\/rt><\/ruby>きな<ruby>黒<rt>くろ<\/rt><\/ruby>い<ruby>瞳<rt>ひとみ<\/rt><\/ruby>をうるませたこともあります。","　この<ruby>話<rt>はなし<\/rt><\/ruby>は<ruby>遠<rt>とお<\/rt><\/ruby>くの<ruby>村<rt>むら<\/rt><\/ruby>まで<ruby>響<rt>ひび<\/rt><\/ruby>きました。<ruby>遠方<rt>えんぽう<\/rt><\/ruby>の<ruby>船乗<rt>ふなの<\/rt><\/ruby>りやまた、<ruby>漁師<rt>りょうし<\/rt><\/ruby>は、<ruby>神<rt>かみ<\/rt><\/ruby><ruby>様<rt>さま<\/rt><\/ruby>にあがった<ruby>絵<rt>え<\/rt><\/ruby>を<ruby>描<rt>えが<\/rt><\/ruby>いた<ruby>蝋燭<rt> <\/ruby>せて<ruby>来<rt>き<\/rt><\/ruby>ました。その<ruby>箱<rt>ばこ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>には、<ruby>曾<rt>かつ<\/rt><\/ruby>て<ruby>虎<rt>とら<\/rt><\/ruby>や、<ruby>獅子<rt>しし<\/rt><\/ruby>や、<ruby>豹<rt>ひょう<\/rt><\/ruby>などを<ruby>入<rt>い<\/rt><\/ruby>れたことがあるのです。","　このやさしい<ruby>人魚<rt>にんぎょ<\/rt><\/ruby>も、やはり<ruby>海<rt>うみ<\/rt><\/ruby>の<ruby>中<rt>なか<\/rt><\/ruby>の<ruby>獣物<rt>けだもの<\/rt><\/ruby>だというので、<ruby>虎<rt>とら<\/rt><\/ruby>や、<ruby>獅子<rt>しし<\/rt><\/ruby>と<ruby>同<rt>おな<\/rt><\/ruby>じように<ruby>取扱<rt>とりあつか<\/rt><\/ruby>おうとするのであります。もし、この<ruby>箱<rt>ばこ<\/rt><\/ruby>を<ruby>娘<rt>むすめ<\/rt><\/ruby>が<ruby>見<rt>み<\/rt><\/ruby>たら、どんなに<ruby>魂消<rt>たまげ<\/rt><\/ruby>たでありましょう。","　<ruby>娘<rt>むすめ<\/rt><\/ruby>は、それとも<ruby>知<rt>し<\/rt><\/ruby>らずに、<ruby>下<rt>した<\/rt><\/ruby>を<ruby>向<rt>む<\/rt><\/ruby>いて<ruby>絵<rt>え<\/rt><\/ruby>を<ruby>描<rt>えが<\/rt><\/ruby>いていました。<ruby>其処<rt>そこ<\/rt><\/ruby>へ、お<ruby>爺<rt>じい<\/rt><\/ruby>さんとお<ruby>婆<rt>ばあ<\/rt><\/ruby>さんとが<ruby>入<rt>はい<\/rt><\/ruby>って<ruby>来<rt>き<\/rt><\/ruby>て、","「さあ、お<ruby>前<rt>まえ<\/rt><\/ruby>は<ruby>行<rt>い<\/rt><\/ruby>くのだ」と、<ruby>言<rt>い<\/rt><\/ruby>って連れ<ruby>出<rt>つれだ<\/rt><\/ruby>そうとしました。","　<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>手<rt>て<\/rt><\/ruby>に<ruby>持<rt>も<\/rt><\/ruby>っている<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>に、せき<ruby>立<rt>た<\/rt><\/ruby>てられるので<ruby>絵<rt>え<\/rt><\/ruby>を<ruby>描<rt>えが<\/rt><\/ruby>くことが<ruby>出来<rt>でき<\/rt><\/ruby>ずに、それをみんな<ruby>赤<rt>あか<\/rt><\/ruby>く<ruby>塗<rt>ぬ<\/rt><\/ruby>ってしまいました。","　<ruby>娘<rt>むすめ<\/rt><\/ruby>は、<ruby>赤<rt>あか<\/rt><\/ruby>い<ruby>蝋燭<rt>ろうそく<\/rt><\/ruby>を<ruby>自分<rt>じぶん<\/rt><\/ruby>の<ruby>悲<rt>かな<\/rt><\/ruby>しい思い<ruby>出<rt>おもいで<\/rt><\/ruby>の<ruby>記念<rt>かたみ<\/rt><\/ruby>に、<ruby>二三<rt>にさん<\/rt><\/ruby><ruby>本<rt>ぽん<\/rt><\/ruby><ruby>残<rt>のこ<\/rt><\/ruby>して<ruby>行<rt>い<\/rt><\/ruby>ってしまったのです。",""],"speech":["よん","","あるとき、みなみのほうのくにから、やしがはいってきました。なんかきたのくにへいって、めずらしいものをさがして、それをばみなみのほうのくにへもっていってきんをもうけようというのであります。","やしは、どこから聞きききこんできましたか、または、いつむすめのすがたをみて、ほんとうのにんげんではない、じつによにもめずらしいにんぎょであることをみぬきましたか、あるひのことこっそりととしよりふうふのところへやってきて、むすめにはわからないように、たいきんをだすから、そのにんぎょをうってはくれないかともうしたのであります。","としよりふうふは、さいしょのうちは、このむすめは、かみさまのおさずけだから、どうしてうることができよう。そんなことをしたらばつがあたるといってしょうちをしませんでした。やしはいちど、にどことわられてもこりずに、またやってきました。そしてとしよりふうふにむかって、","「むかしからにんぎょは、ふきつなものとしてある。いまのうちにてもとからはなさないと、きっとわるいことがある」と、まことしやかにもうしたのであります。","としよりふうふは、ついにやしのいうことをしんじてしまいました。それにたいきんになりますので、ついかねにこころをうばわれて、むすめをやしにうることにやくそくをきめてしまったのであります。","やしは、たいそうよろこんでかえりました。いずれそのうちに、むすめをうけとりにくるといいました。","このはなしをむすめがしったときどんなにおどろいたでありましょう。うちきな、やさしいむすめは、このいえをはなれていくひゃくりもとおいしらないあついみなみのくににいくことをおそれました。そして、ないて、としよりふうふにねがったのであります。","「わたしは、どんなにもはたらきますから、どうぞしらないみなみのくにへうられていくことをゆるしてくださいまし」と、いいました。","しかし、もはや、おにのようなこころもちになってしまったとしよりふうふはなんといってもむすめのいうことを聞きききいれませんでした。","むすめは、へやのうちにとじこもって、いっしんにろうそくのえをかいていました。しかしとしよりふうふはそれをみても、いじらしいともあわれともおもわなかったのであります。","つきのあかるいばんのことであります。むすめは、ひとりなみのおとをききながら、みのゆくすえをおもうてかなしんでいました。なみのおとをきいていると、なんとなくとおくのほうで、じぶんをよんでいるものがあるようなきがしましたので、まどから、そとをのぞいてみました。けれど、ただあおいあおいうみのうえにつきのひかりが、はてしなくてらしているばかりでありました。","むすめは、また、すわって、ろうそくにえをえがいていました。するとこのとき、ひょうのほうがさわがしかったのです。いつかのやしが、いよいよそのよるむすめをつれにきたのです。おおきなてつごうしのはまったしかくなばこをくるまにのせてきました。そのばこのなかには、かつてとらや、ししや、ひょうなどをいれたことがあるのです。","このやさしいにんぎょも、やはりうみのなかのけだものだというので、とらや、ししとおなじようにとりあつかおうとするのであります。もし、このばこをむすめがみたら、どんなにたまげたでありましょう。","むすめは、それともしらずに、したをむいてえをえがいていました。そこへ、おじいさんとおばあさんとがはいってきて、","「さあ、おまえはいくのだ」と、いって連れつれだそうとしました。","むすめは、てにもっているろうそくに、せきたてられるのでえをえがくことができずに、それをみんなあかくぬってしまいました。","むすめは、あかいろうそくをじぶんのかなしい思いおもいでのかたみに、にさんぽんのこしていってしまったのです。",""]},{"t":"嵐の夜の女","art":"<svg viewBox=\"0 0 800 450\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"800\" height=\"450\" fill=\"#16282e\"/><line x1=\"60\" y1=\"0\" x2=\"20\" y2=\"450\" stroke=\"#4a6b6e\" stroke-width=\"2.5\" opacity=\"0.5\" stroke-linecap=\"round\"/><line x1=\"120\" y1=\"0\" x2=\"80\" y2=\"450\" stroke=\"#4a6b6e\" stroke-width=\"2.5\" opacity=\"0.5\" stroke-linecap=\"round\"/><line x1=\"180\" y1=\"0\" x2=\"140\" y2=\"450\" stroke=\"#4a6b6e\" stroke-width=\"2.5\" opacity=\"0.5\" stroke-linecap=\"round\"/><line x1=\"240\" y1=\"0\" x2=\"200\" y2=\"450\" stroke=\"#4a6b6e\" s
